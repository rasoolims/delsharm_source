message: |-
  یادم رفت بگم
  آقا روح الله می گفت اینقدر نگویید من
  من شیطان است
  تو که نیم من هم نیستی من جونم
  من بعد از سکوت چقدر من می شود
  چه وزنی داری ای من
  قبل از تو کلام به احترام وزنت سکوت می کند و سپس می گوید من!!!
  مننننننننننننننننننننن
