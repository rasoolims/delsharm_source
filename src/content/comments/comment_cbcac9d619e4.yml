  سلام علیکم
  اتفاقاً چند وقت پیش کتاب «چوب نروژی» (یا به ترجمه‌ی احتمالاً نادرست دیگر «جنگل نروژی») از هاروکی موراکامی را خواندم که طرح آن پیرامون زندگی و خودکشی شخصیت‌های داستان شکل می‌گیرد و البته این‌بار سخن از خودکشی سالخوردگان و ازکارافتادگان ژاپنی نیست، بلکه داستان حول ماجرای خودکشی افراد جوان آن جامعه شکل می‌گیرد.
  سپاس بابت معرفی کتاب.
