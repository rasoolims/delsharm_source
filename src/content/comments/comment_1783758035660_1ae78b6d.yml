message: |-
  داستان مسکن
  هر سال شکاف بین عرضه (تعداد خانه­های ساخته شده) و تقاضا (متقاضیان مسکن) بیشتر می­شد و این یعنی عملا سیاست و نگاه دولتها در این زمینه، ناکارآمد بود. به نقل از وزیر سابق مسکن، افتخار دولت وقت این بود که وام خرید مسکن از 5/3 میلیون به 18 میلیون تومان رسیده بود و قرار بود حتی تا 25 میلیون تومان هم برسد.
