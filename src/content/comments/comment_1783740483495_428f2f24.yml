date: '2120-08-22T17:04:00Z'
message: |-
  راستی آدم منتظر است هر قسمت یک اتفاقی بیفتد اما نمی افتد! همان حوادث روزمره، پراکنده و جذاب است. اگر بخواهد اینها کتاب بشود و هر قسمت یک فصل آن کتاب، فکر میکنم یک نکته باید هر قسمت داشته باشد و گرنه کسل کننده می شود.
  چند وقت پیش کتاب خاطرات سفیر رو خوندم و به شدت یاد شما افتادم.
