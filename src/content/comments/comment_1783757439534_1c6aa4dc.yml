  سلام ممنون بابت نوشته های خوبتون
  خیلی جالبه که دقت کردید کتاب های شهید مطهری توی کتابخونه نیستند، فکر کنم دلیل اصلیش این بوده که ایرانی ها اونجا کمتر سراغ این کتابها رفتند. در واقع امیدوارم علتش این نباشه که به عمد کتاب ها رو در مخزن دیگه ای قرار داده باشند!!
adminResponse:
  date: '2113-07-24T20:37:00Z'
  message: |-
    سلام
    حدس من این هست که معمولاً مخاطبان این کتابخونه کارمندان و محققان مرکز ایران‌شناسی ایرانیکا هستن که خیلی بعیده کتاب شهید مطهری به کارشون بیاد. چون همون طور که اشاره کردم کتاب‌های کم‌مخاطب‌تری از دید بنده، توی قفسه‌ها بودن.
