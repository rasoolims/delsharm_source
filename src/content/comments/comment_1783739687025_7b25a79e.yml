date: '2107-06-15T09:41:00Z'
message: |-
  سلام بر ستایش شده ی راست گو
  باز که شما سیاسی می نویسی برادر
  مگر قرار نبود هنرمندان هم به هنر خویش برسند
  مثل دینداران که به دین خویش
  سیاست را بگذارید برای ما ...
  (یه معذرت خواهی بی ربط:
  آمار وبلاگتو که دیدم حسودیم گل کرد
  یه چار تا کلفت بارت کردم
  دلم شرمنده)
