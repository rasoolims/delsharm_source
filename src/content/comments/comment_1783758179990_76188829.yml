postSlug: همسفر-شراب-سفرنامه-امریکا-فصل-2
name: سعید عادل مهربان
date: '2113-01-07T06:55:00Z'
message: |-
  سلام.
  اوّل از همه بذار بابت عوض کردن رنگ پس‌زمینه تشکّر کنم.
  جالب بود که ابتدای این قسمت از نظر زمانی قبل از انتهای قسمت قبل بود. البتّه جالب نه به معنای جالبِ خوب :دی
  به نظرم وقتی تموم شد کلّش رو یک‌پارچه کن و یه تجدید نظر هم برای این جور مسائل بکن. حالا که وسط گیر دادنم بذار یه گیر دیگه هم بدم. صفحه‌ی اصلی بلاگ رو شلوغ نکن، غیر از پاراگراف اوّل بقیه رو بذار توی «ادامه مطلب».
  حالا بریم سر اصل مطلب. واسه من این سفرنامه با صدای خودت تو گوشم خونده می‌شه. کلّی کِیف می‌کنم از خوندنش. حالا هر چی که باشه. هنوز که وارد مرحله‌ی اصلی نشده و منتظر کلّی مطالب جدید هستم. وقتی از برادوی صحبت می‌کردی یاد هولدن کالفیلد افتادم. به سنترال پارک نزدیکید؟
  راستی هفته‌ی پیش «الف» یه مقاله زده بود که توش می‌گفت قیمت مسکن در شهر تهران از برلین گرون‌تره. اجاره‌ی شما رو که دیدم یه کم امیدوار شدم. البتّه فکر می‌کنم اصطلاحاً بالاشهر نیویورک خونه گرفتید. ولی بازم چون مال خود دانشگاهه باید قیمت مناسب‌تری داده باشه بهتون. به هر حال که قیمت بالاییه.
  منتظر قسمت‌های بعدی هستم.
  یاحق.
  پ.ن: تسلیت می‌گم بابت حاج آقا مجتبی، می‌دونم که علاقه‌ی شدیدی داشتی به ایشون. خدا ایشون رو قرین رحمتش کنه.
  سلام
  در مورد ادامهٔ مطلب راست می‌گی سعی می‌کنم درستش کنم.
  ما با سنترال پارک ۲۰ دقیقه پیاده فاصله داریم. با سازمان ملل ۲ ساعت پیاده با امپایر استیت هم همین حدود. با هارلم ۵ دقیقه پیاده. با کلیسای کتدرال هم ۱۰ دقیقه پیاده. متروشان به ترتیب می‌شود ۱۰ دقیقه نیم ساعت ۵ دقیقه ۱۰ دقیقه. :)
