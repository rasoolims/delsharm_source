adminResponse:
  date: '2118-03-05T17:58:00Z'
  message: تنها نظرم این هست که به عنوان یک شمالی، مخصوصاً چون از یک طرف مازندرانی
    و از طرفی گیلانی هستم، به این مسأله افتخار کنم. مابقی‌ای‌اش نیاز به دانستن فضای
    جامعهٔ آن زمان داره.
