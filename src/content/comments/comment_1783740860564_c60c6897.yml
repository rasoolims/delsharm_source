  سلام . خیلی پخته تر از شعرهای قبلیتون بود . فکر کنم دارید وارد مرحله ی جدیدی در شعر میشید ... اینم به جای نظرسنجی که مگه این کامنت دونی واسه همین کار نیست؟
  درپناه خدا
