message: خیلی ممنون. اگه کمی بیشتر برای معرفی کتابهایی که خوندین وقت بزارین ممنون
  میشم. ترجیحا اونایی که ترجمه شده باشه،  من هنوز بلاگ شما رو چک می کنم هر از گاهی.
adminResponse:
  date: '2025-05-19T05:50:00Z'
  message: |-
    ممنون از لطف شما.
    بیشتر کتابها در گودریدز اگر نظری بوده همان موقع پیوند به مطلب همین وبلاگ داده‌ام ولی چشم.
