message: |-
  سلام آقای
  این اولین چیزی هست که بعد از راهنمایی های شما یعنی مراجعه به کتاب روزنه و شعرهای فروغ فرخزاد نوشتم. خوشحال میشم نظرتون رو بشنوم:
  در آن زمان که زیر سایه‌ی چنار
  نشسته و به فکر تو درگیر می‌شوم
  در امتدادِ سکوتِ تلخِ دشت
  زِ روشنائی خورشید سیر می‌شوم
  تو در خیال من و او در کنارِ تو
  به انتظارِ صدای تو من پیر می‌شوم
adminResponse:
  date: '2016-08-03T22:39:00Z'
  message: |-
    سلام
    البته بنده تخصص شاعری ندارم. ولی همین قدر که به نظرم می‌‌رسه این که قریحهٔ شعری‌تون خیلی خوبه ولی برای شروع باید بیشتر شعر بخونید. این شعر مشکل وزنی  داره که البته با تمرین و تقطیع هجاها به زودی حل میشه.
    کمی هم باید روی ارتباط منطقی اجزاء شعر فکر کنید. مثلاً چرا باید زیر سایهٔ چنار به انتظار صدا باشید؟ یا این که چرا باید از روشنایی سیر بشید؟
    کتاب‌های نادر نادرپور، سایه و اخوان برای تمرین تصویرسازی می‌تونه بهتون کمک کنه. (و البته مثل همیشه بزرگان شعر کهن مثل سعدی و حافظ)
