message: |-
  بسم الله
  سلام . داستانم شاید به این خاطر شعر شده که خودم داستانها رو اینطوری می پسندم .  مگه از نظر اصول داستان نویسی مشکلی ایجاد میکنه ؟ من خیلی از داستان نویسی نمیدونم ، همونطور که از شعر . پس باید دقیق برام توضیح بدید تا متوجه بشم .
  چرا اندیشیدن خوب نیست ؟
  بله اولی محاوره بود و دو و سه نع .
