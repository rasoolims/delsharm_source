message: |-
  برای منی که از ۵ سالگی تا حدود ۲۸ سالگی نماز خوندم و حدود ۷ سال هم هست که نمیخونم، بی دین شدنم رهایی از زنجیری بود که انگار جامعه به پاهام زده بود. به نظر جامعه ایران داره زندگی دوره هایی از غرب رو تجربه میکنه که به طور مشابه از دین کناره گیری کردن و قطعا یه اوجی هم داشتن که مثلا شاید شیوع hiv بین مردان هم در پی همون بوده ولی بالاخره بعد از ۴۰-۵۰ سال به یک ثبات نسبی رسیده.
  اتفاق مشابه در ایران هم داره میوفته، و هنوز هم به اوج خودش نرسیده ولی شاید بعد از ۱۰-۲۰ سال دیگه برسه و مردم تمام آنچه که میخوان رو تجربه کنن و بعد از اون برگردن به نقطه ای که ببینن اصلا خدا و دین لازم دارن یا نه.
  الان نسب به ۷ سال پیش که ایام نوروز رو با استرس فراوان تو اعتکاف بودم، آرامش بیشتری دارم. خدایی که قرار بود مایه آرامش و دلیل زندگی من باشه با ذهن منطقی که دنبال یه چیز خیلی ملموس تر می‌گشت جور در نمی‌کند و به نحوی جبر جغرافیایی بود که من رو پیش می برد
  هنوز هم دارم از عادت های گذشته جدا میشم و تا وقتی که کامل ریست نشم و هیچ حسی نسبت به هیج گرایشی نداشته باشم همچنان این راه رو ادامه میدم.
  متاسفانه تو ایران اگر ما بخواییم به مساله وجود خدا بله بگیم، باید خیلی (خیلی زیاد) از مسائل دینی و مذهبی دیگر رو هم هضم کنیم و بهشون بله بگیم. مثلا نمیشه گفت خدا هست ولی مسلمان نباشیم، نمیشه مسلمان باشیم ولی شیعه و سنی نباشیم، نمیشه شیعه باشی ولی مثلا تو اذان علی ولی الله نگی. و این به شدت برای کسی که می اندیشد کار را سخت میکنه، یا باید به دین والدین باشی و همه را قبول کنی، یا باید بیندیشی که به علت کثرت مطالب و تناقضات نمیتونی به همین سادگی به جمع بندی برسی.
  منتظر مطالعات و نوشته های بعدی شما در همین موضوع هستیم.
