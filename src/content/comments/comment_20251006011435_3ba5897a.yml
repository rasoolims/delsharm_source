message: |-
  در مورد جرم زدایی از مواد مخدر قضیه به این سادگی هم نیست که مساله سرمایه داری یا غیر آن باشد. جرم بودن مواد مخدر در کشورهای مختلف منجمله ایران و آمریکا مشکلات و حتی فجایعی ایجاد کرده است. یک جستجوی گوگل بکنید مطالب زیادی خواهید یافت.
  در مورد کرایه ماشین اگر ماشین کوچکتر رزرو کرده باشید اگر طرف نداشت باید بزرگتر را به همان قیمت بدهد.
  ماموران کرایه ماشین در مورد بیمه معمولا دروغ و دغل زیاد دارند ولی داستان پیچیدگیها و شرایطی هم دارد. فکر میکنم سایت نردوالت مقاله خوبی در مورد بیمه ماشین کرایه ای داشت.
