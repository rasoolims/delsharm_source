  سلام صادق جان.
  مثل همیشه زیبا است ولی "این کوچه بی‌تو مرا بغض می‌کند" زیاد به دل نمی نشیند همین طور "حالا تمام شدم با غروب تو" انگار زیاد مچ نیست با بقیه ی شعر.
