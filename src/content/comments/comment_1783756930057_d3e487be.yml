name: پیمان ‌‌
date: '2022-09-04T04:15:00Z'
message: نمی‌دانم چرا دلایل یاس ایرانیان را فقط افتصادی می‌بینید و دلایل بزرگ دیگری
  را نادیده می‌گیرید. عده زیادی از مردم از چوب اصلاح‌ناپذیر دیکتاتوری مذهبی ناامیدند،
  مثلاً همان به اصطلاح شما بدحجاب‌هایی که با زور آن نیمچه حجاب را بر سرشان گذاشته‌اند.
adminResponse:
  date: '2022-09-06T21:00:00Z'
  message: |-
    سلام
    ممنون از وقتی که گذاشتید و مطالعه کردید.
    من قضاوتی در مورد دلایل نکردم. صرفاً واگویهٔ چند مثال بود و در انتها هم گفتم در زمینه‌ای که تخصصی ندارم بهتر است بیشتر نظر ندهم.
