  سلام. سال نوی شما هم مبارک محمدصادق عزیز.
  در مورد شعرت واقعا قشنگ بود. ولی به نظرم وزن بیت یکی مونده به اخرش یه جوریه. یعنی مصرع اولش توی یه وزن متفاوت هست به نظرم. البته صاحبنظران باید نظر بدهند متاسفانه من تخصصی ندارم.
