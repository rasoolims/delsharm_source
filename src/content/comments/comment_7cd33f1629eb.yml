  سلام، تشکر بخاطر این کارناوال کتابی که راه انداختی. فقط چطور وقت میکنی که
  اینقدر بخونی؟ آخه من هم دارم تو حوزه هوش مصنوعی کار میکنم و عاشق کتاب هم هستم ولی واقعا نمیرسم اینقدر کتاب بخونم.
adminResponse:
  date: '2018-07-18T21:08:00Z'
  message: |-
    سلام
    از وقتی تلویزیون، تلگرام، وایبر، و امثالهم رو به طور کامل ترک کردم، شبی بین ۲ تا ۴ ساعت فقط وقت برای مطالعه می‌گذارم. هر ساعت حدود ۴۰ صفحه، نتیجتاً هر شب بین ۸۰ تا ۱۶۰ صفحه که می‌شود دو روزی یک کتاب معمولی. البته بعضی روزهای تعطیل که خون جلوی چشمم رو می‌گیره و کتاب خیلی جذابه ممکنه ساعات زیادتری بشه؛‌ اتفاقی که برای کتابی مثل «نام گل سرخ» افتاد :) البته باید اعتراف کنم الان در دورهٔ پسادفاع دکتری به سر می‌برم و هنوز کار جدیدم رو شروع نکردم و لذا دغدغهٔ ذهنی کمتری دارم. پارسال که توی اوج کار و مصاحبه‌های شغلی بودم به جای دو روزی یک کتاب، سه روزی یک کتاب بود. دلیل این که این نوشته‌ها را از امسال شروع کردم، تعهد شخصی‌م برای یادداشت‌برداری از کتاب‌ها بود. وقتی بدونم کس دیگری ممکنه یادداشتم رو بخونه این طوری انگیزه دارم که کتاب رو دقیق‌تر از حالت مطالعهٔ شخصی بخونم.
    ممنون
