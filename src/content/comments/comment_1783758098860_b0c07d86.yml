    سلام
    نمی‌دانم ترجمهٔ‌ دقیقش در اصطلاح داستان‌نویسی فارسی چیست ولی من ترجمهٔ‌ تحت‌اللفظی کردم. ضربه همان توصیفات کوتاه میان گفتگوهاست. مثلاً (مثال ساختگی است):
    بازجو گفت: «حرفت چیه؟»
    بازجو سوهان به ناخن‌هایش کشید و بعد ته‌ماندهٔ غبار روی ناخنش را فوت کرد. به متهم نگاه کرد
    : «نگفتی حرفت چیه. منتظرم بشنوم.»
    جملات وسطی در واقع همان ضربه است. کنش‌های رفتاری شخصیت که نشان‌دهندهٔ حالتش نیز می‌شود. مثلاً اینجا دارد به طمأنینهٔ بازجو اشاره می‌کند (به جای آن که بگوید «بازجو با آرامش گفت».)
