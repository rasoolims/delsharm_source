message: |-
  سلام.
  من به ندرت چیزی اینجا می‌نویسم. ولی هر چی تا حالا نوشتی خونده‌ام. این تعطیلات رفته بودم اصفهان و فکر دوشنبه صبح تهران که بیام شرکت پیش رفقای مشترک آزاردهنده بود. حس تعلقم به اون خیابون‌ها و آدم‌ها هر سال تشدید می‌شه ولی کندن از تهران و برگشتن هم به همون نسبت سخت‌تر.
  جایی یه نفر گفته بود من دوست ندارم برم خارج، من دوست دارم خارج به دنیا اومده باشم. من هم اغلب آرزو می‌کنم جایی به دنیا اومده بودم که تو اخبار اسمش نباشه. یه گوشهٔ دنجی برای خودم نون و ماستم رو می‌خوردم دیگه. یک قسمتی از پادکست لوگوس هم بود که توش به بحران میانسالی و تمایل آدم‌ها به برگشتن به عقب صحبت می‌کرد. نمی‌دونم شاید واقعاً اگه مهاجرتی هم نبود باز آدم دلش می‌خواست برگرده به عقب.
  در نهایت امیدوارم هر جا هستی آرامش داشته باشی.
