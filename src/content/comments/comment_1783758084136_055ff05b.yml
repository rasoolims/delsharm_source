  سلام
  چند هفته پیش مجید شاکری را دیدم. غیبتت را می کردیم که صادق هم دارد کم کم به سمتی می رود که امریکا ماندگار شود و متن نوشته هایش هم کم کم دارد این را نشان می دهد.
  جدا از اینکه تحلیلمان درست بوده یا نه خیلی هم نظر بودیم.
adminResponse:
