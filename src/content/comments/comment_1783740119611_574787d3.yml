  اسلام دو رکن دارد؛
  پرستش خدا
  پرستاری از انسان
  فلسفه غرب به بهانه واهی «پرستاری از انسان» ٬ پرستش خدا را از بین برده است.جدایی انسانیت از اسلام٬ همانند جدایی شوری از نمک است.یک مسلمان هم خدا پرست و هم پرستار انسان است
