message: "ببینید چند تا اشتباه بزرگ در مورد آمار و تحلیل فقر کردید:\n1- شما نوشتی\
  \ «حدود ۴۰٪ از جمعیت آمریکا در فقر مطلق زندگی می‌کنند» و با توجه به توضیح بعدش و\
  \ نیز پاسخی که به کامنت من دادی مشخصه تفاوت بین فقر و فقر مطلق رو نمیدونی. این دو\
  \ تفاوت مفهومی و مصداقی بنیادین دارند که بدون توجه بهش هر تحلیلی غلطه. اینجا رو\
  \ برای آشنایی با مبانی بخونید:\nhttps://www.economicshelp.org/blog/glossary/definition-of-absolute-and-relative-poverty/\n\
  2- اگر همون لینکی که پیشتر دادم رو با دقت مطالعه کنید در انتها نوشته که نرخ \ndeep\
  \ poverty در حدود 5.8 درصده. که طبق تعریف deep poverty یعنی زیستن با \nدرآمدی که\
  \ 50% از خط فقر هم پایینتره. که البته این تعریف همچنان نشانگر absolute poverty نیست\
  \ و فقر مطلق از این هم پایینتره. چیزی که برای نرخ جمعیت زیر خط فقر در آمریکا تخمین\
  \ میزنن در سالهای اخیر بین 12 تا 15 درصده و چیزی که برای فقر مطلق در آمریکا تخمین\
  \ زده شده کمتر از 2 درصده (آمار رسمی دولت فدرال وجود نداره در این مورد). برای مطالعه\
  \ جزییات دقیق و روش آمار و خطاها گزارش رسمی زیر رو بخونید:\nhttps://www.census.gov/content/dam/Census/library/publications/2017/demo/P60-259.pdf\n\
  3- کتاب Weapons of Math Destruction رو پیشتر خونده بودم. برای اطمینان دوباره ورق\
  \ زدمش. تنها جایی که در کتاب آماری از فقر داده ابتدای فصل پنجم بود که میگه شهری\
  \ در پنسیلوانیا هست به نام Reading که در سال 2011 نرخ فقر در آن برابر با 41.3 درصد\
  \ شد که بالاترین در کل کشور بود. درضمن گذشته از این خطای شما، آمارهای اقتصادی معتبر\
  \ رو نباید از کتابهای اینچنینی گرفت. در آمریکا آمار رسمی فقر (گزارشی که لینک کردم)\
  \ رو مرکز آمار فدرال در ماه سپتامبر هر سال منتشر میکنه:\nhttps://www.census.gov/topics/income-poverty/poverty.html\n\
  علاوه بر این پژوهشگران و اقتصاددانان هم هستند که مستقلا چنین آمارهایی رو حساب میکنن.\
  \ اما شما که اهل علم هستی باید بدونی که اگه کسی تخمینی از آمار هرچیزی میزنه باید\
  \ روشش رو دقیق گفته باشه و این روش مورد تایید جامعه علمی قرار گرفته باشه و از آزمونها\
  \ سربلند بیرون اومده باشه.\n4- جمله «آن چیزی که اهمیت دارد آن است که آمار فقر در\
  \ آمریکا بالاست» نه تنها غلطه بلکه نشان از سوگیری ذهنی شما داره. هرکی گفته فقر در\
  \ آمریکا وجود نداره مسلما غلط گفته چون آمارها و گزارشهای مختلف نشون میده که وجود\
  \ داره. ولی اگر دنبال «حقیقت» هستید باید دقیق و مستند و روشمند مطالعه و پژوهش کنید\
  \ مخصوصا وقتی پای آمار در میان باشه. تفاوت بین 40% زیر خط فقر مطلق با کمتر از 2%\
  \ اونقدر زیاده که اساسا هر تحلیلی بعدش غلط و مهمله. حدس میزنم پیش‌سوگیری ذهنی شما\
  \ باعث شد عددی کاملا بیربط در یک کتاب کاملا بیربط را بگیرید و همان را مقدمه استدلال\
  \ خود بگذارید.\nامیدوارم این حرفها مفید بوده باشه."
