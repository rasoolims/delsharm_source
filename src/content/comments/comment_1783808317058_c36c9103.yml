message: |-
  بسم الله
  ... دیوانه ام می کند ..
  گوش کن .. خوب گوش کن! صدای زنگوله ی شتران است .. نه!؟
  گوشت را بچسبان به زمین .. صدای سم اسبان ..! شتران .. می شنوی!؟
  کاروان نور در گذر زمان در راه است..
  زهیر عثمانی که لعن علی در قنوتهایش .. هم به کاروان پیوست ... ای خدا ..! این چشمها چه ها که نمی کند!
  کاروان می گذرد .. زهیرها هم پوستند!
  شیعه ی علی تو چه می کنی!؟ جا نمونی! که حسرتش ..
  یا لیتنا کنا معک ...
