  تو روحت صادق! از کار و زندگی انداختیمون. یه روزه که فقط داریم به این قضیه میخندیم. به خصوص این قسمتش:
  «تا اگر یک جایی در محفلی به این مسأله پی ببرند توی ذوقشان نخورد»
adminResponse:
  date: '2113-07-15T20:44:00Z'
  message: |-
    خوبه دیگه. موجب شادی دوستان هم هستیم :)
    البته یک نکته رو بگم. اون هم این که نسبت به مسألهٔ «چیز» تصورهای عجیب و غریب نشه. مثل آدمای عادی هستن ولی زوجیتشون چیزه :) کار خاصی در ملأ عام هیچ وقت صورت نمی‌گیره.
