message: |-
  سلام...ماشاالله به این همه تهعهد ! مرام ! معرفت !! اگر قرار است روزی حذف شویم دیگر چرا پیوند زده شویم اصلا ؟؟!!
  روزی آمدم گفتیم دست تان در نکتد بابت پیوند!! امروز هم می گوییم دست تان درد نکند بابت حذف !!
  دنیا همین است دیگر ! به باد می چرخد انگار! نه اینکه مهم باشد بودن یا نبودن ما در اینجا برایم ! مهم این است که یقین میکنم به شکم که : قرارمندی ندیدم در این جهان شما دیدید ؟
  البته اختیار وبلاگتون را دارید و به من ربطی نداره اصلا. در پناه خدا
