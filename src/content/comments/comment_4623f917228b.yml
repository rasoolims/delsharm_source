  سلام آقا صادق عزیز
  فصل دوم سفرنامه ات را با دقت و اشتیاق فراوان خواندم. از نکات خوبی که بعضی از دوستانت هم به آن اشاره کردند استفاده کردم.
  گفته بودی فکر نمی کنی این وبلاگ بیشتر از 15 نفر خواننده داشته باشه فعلاَ که چند نفر که شما را نمی شناسند از جمله یکی از همکارانم با تمایل بسیار پیگیر سفرنامه ات هست و حتماَ روز به روز به خوانندگان آن اضافه میشه.
  در مورد مطالب که در سفر نامه به آن ها می پردازیف من خودم را صاحب نظر نمی دانم که به خواهم اظهار نظری کرده باشم ولی این گفتی می خواهی به تفاوت ها بپردازی فکر می کنم بهترین چیزی که در هر فصل این سفر نامه خوبه که پررنگ تر مطرح بشه به خصوص تصوراتی که آدم های این طرف آب از آنجا دارند و واقعیت هایی که شما در آنجا دریافت می کنید.
  بی صبرانه منتظر فصل های بعدی هستم
  ارادتمند شما و التماس دعا
  سلام
  خیلی ممنون از نظر شما
