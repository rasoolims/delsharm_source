message: |-
  آهان راستی در مورد اون روز بدون شلوار:
  این خارجی‌ها که خودشون رو با آب نمی‌شورن. در نتیجه ماتحت‌شون باید معمولا آلوده باشه. بعد اگه بخوان فقط با یک زیرشلواری تو مکان‌های عمومی راه برن که اصلا آلودگی همه‌جا رو بر می‌داره! خیلی بده که این!
  تا حالا به این موضوع فکر نکردن یعنی؟
  سلام
  شما داری در بافت اسلامی صحبت می‌کنی. :) به همین خاطر شاید آلودگی برای این‌ها معنای دیگری داشته باشه.
