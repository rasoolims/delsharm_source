message: |-
  سلام
  نوشته های تو رو خوندم...برام جالب بود.
  نمی دونم با اینکه خودت گفته بودی بارها که نوشتنم ضعیف هست...خیلی این حس بهم دست نداد توی خودندن متن هات.ولی خوب کار خوبی کردی نوشتی...ولی توی سفرنامه ها همیشه دنبال احساس های خود آدم ها نسبت به وقایعی که براشون اتفاق می فته می گردم....تو خوب توضیح دادی که چی شد و چی نشد ولی جس خودت رو خیلی کم توضیح دادی در مورد این شدن ها و نشدن ها و این رویداد ها....با اینکه می دونم دونفره رفتید فکر می کردم که در مورد نظر خودت و همراهت با این پدیده ها می نویسی .....شاید من البته یکم عجله دارم و حتما در ادامه توضبح خواهی داد...بدون شک با شناختی که ما از تو داریم همین گونه خواهد بود......در مورد برگشتن یا برنگشتنت هم می خواهم یک چیزی بگم...... بعد رفتنت نظر خیلی ها رو شنیدم که گفتند خوب کرد رفت یا بد کرد رفت یا بر می گرده یا نه می مونه...برام مهم نیست یک مهاجر تحصیلی حتما بر گرده ، فکر می کنم این مهم هست که هر جایی که هست مفید تر از قبلش باشه...حالا می خواهد برگرده می خواهد بمونه.....مهم مفیدتر بودن...اگر قراره برگردی اینجا و مثل خیلی استاد ها بری توی دانشگاه فقط درس بدی و هزار جا مشاور بشی برای اینکه بتونی زندگیت رو بگردونی و اصلا یادت بره روی چی تحقیق می‌کردی ترجیح می دم بمونی همونجا و مثل خیلی استاد های مشاور اونجا برای دانشجو های اینطرف مفید تر باشی.
  برای شما آرزوی موفقیت می کنم.
  بدون شک راه خودت رو پیدا می کنی.
  منتظر ادامه هستم.
  دوستدار تو هومن.
