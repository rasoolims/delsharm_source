message: |-
  حسن خوب و بدت رو دوست داشتم.
  در مورد اون عراقی‌ها که از مرزهای جغرافیایی گذشته‌ن و رسیده‌ن به امام، به نظرم میاد هر چی آدم دل بکنه و جدا بشه، دل کندن‌های بعدی راحت‌تر می‌شه. اونی که از جغرافیا یک بار جدا شده، علی‌القاعده می‌تونه برای بار دوم راحت‌تر جدا بشه.
  البتّه این‌ها فکر خام منه که هنوز از جغرافیای خودم دل نکندم و جدا نشدم. قضاوتش با شما که یه پلّه جلوتری.
adminResponse:
  date: '2014-02-02T07:37:00Z'
  message: |-
    پاسخ:
    در مورد اون عراقی‌ها هم بعداً فهمیدم چیه. این‌ها جزء تبعیدی‌های دورهٔ صدام بودن. از بس تبعید بودن که دیگه برگشتن به عراق براشون سخت شده.
