message: |-
  سلام
  اوف! خوب بود :)
  فقط چیزی که سواله اینه که زندگی آمریکایی‌ها واقعا نظم داره یا صرفا خرکاریه؟
  مثلا گویا توی آلمان همه سر ساعت ۷ یا ۸ سر کارشونن، عصر میرن خونه و ساعت ۸ شب هیچکی رو توی خیابون نمیبینی، چون همه خونه هستند و مغازه‌ها هم تعطیله.
  برعکسش یادمه تو گوگل که کار میکردی، میگفتی کار ساعت مشخصی نداره و مهم اینه که تو و کارفرما راضی باشین.  الان به نظرت نظم آمریکاییها رو اعصابه یا مثلا آلمانی‌ها؟ از این نظر هم بهش نگاه کنی خیلی خوبه.
  هان، یه چیز دیگه که برام جالبه اینه که ظاهرا خارجی‌ها پایداری شغلی رو دوست ندارند، حتی بچه‌های استرالیا و اروپا هم همین رو میگن، مردم کرم دارند از این لحاظ!!! ولی مسئله اینه که اگه کسی از واریانس بالا خوشش نیاد و بخواد زندگی و شغل ثابتی داشته باشه، یعنی یه جور tenure position تو شغل‌های دانشگاهی و پژوهشی و کامپیوتری، چقدر امکان‌پذیره؟ یعنی هر روز باید احتمال بدی که اخراج میشی یا قراردادت تمدید نمیشه؟
  مرسی :)
