  message: |-
    پاسخ:
    سلام
    اینجا هر کسی یک حالت خوف و رجایی داره. خوف داره که موقعیتش توی شرکت الانی به خطر بیفته یا این که خوف این رو داره که لیاقت بیشتر از شغلی که الان داره هست و البته رجا به این داره که در جای جدید موفق‌تر بشه.
    معمولاً شرکت‌های کامپیوتری زیاد در بند زمان نیستند ولی چون همه معمولاً ساعات خاصی می‌آیند سر کار، تقریباً اکثریت در همان ساعت‌های اداری کار می‌کنند. قاعدتاً انعطاف زمانی خوب هست ولی آیا از لحاظ روانی این که فکر کنی هر زمانی ساعت کار می‌تونه باشه خوبه یا نه.
    توی یک سایت امریکایی دیده بودم که ساعت روزانهٔ اسمی امریکایی ۸ ساعت هست ولی متأسفانه در عمل بعضی‌ها متوسط روزی ۱۰ تا ۱۲ ساعت کار می‌کنند و این یعنی بیگاری.
