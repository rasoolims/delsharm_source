message: |-
  مثل همیشه زیبا و جذاب بود و آموزنده!
  این مسائل کارآموزی که ذکر کردید واقعا برای من جذاب و آموزنده است!
  فکر کنم یکی از دلایل عدم قبولی شما ایرانی بودن و مذهبی بودن شماست! به هر حال همین وبلاگ یک سری چیزها رو منعکس میکنه و اون شرکت ها هم خدای اطلاعات جمع کردن هستند.
  راستی کتاب "دیپلمات نامه" ی آقای میرشکاک رو شما بهتر از دیگران می توانی حس کنی!!!
  امیدوارم همواره موفق و سالم باشی.
