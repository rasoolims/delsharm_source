name: پاهنگ
date: '2115-11-07T10:57:00Z'
message: خوب بود و خوب نبود ! از این لحاظ که فردگرایی را معرفی کردید خوب بود اما توجه
  به بعد مادی زندگی اگر به آن تکثر نرسد، هم بد نیست و هم غیر دینی . یعنی برخی ابعادش
  را ما شورش رو در آوردیم و اتفاقا باید قدری به مادیات اهمیت داد . نکته دیگر اینکه
  فضای غالب با انسان ها به صورت جز متفاوتند و نگاه شما به فضای غالب است اگر انسان
  ها را خرد تر ببینید خواهید دید که نه بالاخره انسان هایی به فطرت نزدیک هستند و اتفاقا
  دارند در همین جامعه با همین سبک زندگی ، زندگی می کنند و برخی که جرات بیشتری داشتند
  متفاوت تر هم زندگی می کنند .
adminResponse:
  date: '2115-11-07T10:57:00Z'
  message: |-
    سلام علیکم
    خیلی ممنون از نظر لطف شما
    فکر نمی‌کنم غالب ایرانی‌ها غیرمادی باشند. بلکه ما ایرانی‌ها شورش را درآورده‌ایم در مصرف‌زدگی.
