date: null
message: |-
  گر متفرق شود خاک من اندر جهان
  باد نیارد ربود گرد من از کوی دوست
  گر شب هجران مرا تاختن آرد اجل
  روز قیامت زنم خیمه به پهلوی دوست
  هر غزلم نامه‌ایست صورت حالی در او
  نامه نوشتن چه سود چون نرسد سوی دوست
