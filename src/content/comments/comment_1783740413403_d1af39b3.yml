message: |-
  سلام
  با اینکه متن طولانی بود هم خودم خوندم و هم بلند بلند برای همسرم خوندم
  سفرنامه خیلی برام شیرینه، و تجاربی که ازش به دست میاد واقعا باارزشه
  و مهمه که همه چیز در سفر دیده بشه و گفته بشه
  خیلی خوب بود که این نوشتن رو نوعی رسالت خودتون دونستید
  همیشه بنویسید ، حتی اگر به درد یک نفر در این عالم بخورر، باز هم ارزشمند است
