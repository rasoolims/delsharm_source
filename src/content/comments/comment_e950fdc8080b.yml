message: |-
  . راستی همه‌ی ارشد‌ها بدون تز نیستند و به دو دسته‌ی course-based و thesis-based تقسیم می‌شن.
  ۸- فانون درس‌های اجباری برای خیلی از دانشگاه‌های دیگه‌ی آمریکا و حتی برای ارشد هم وجود داره و از این لحاظ عین کنکور ارشد و دکتری خودمونه که هردوش همون تکرار درس‌های قبلیه رو باید امتحان بدیم.
  ۹- فکر کردم ۴ ساله می‌شه دکتری گرفت. ۵.۵ سال خیلی زیاده.
  ۱۰- متاسفانه همایش‌ها خوبن، ولی خیلی از دانشجوهای ایرانی، چون پول شرکت در اونها رو ندارن یا براشون نمی‌فرستن، یا قبول شه اصلا نمی‌ره و اینجوری حداقل نصف شانس‌شون برای مطرح شدن رو از دست می‌دن.
  ۱۱- راستی اگه نتونی تابستون‌ها کارآموزی گیر بیاری، تو اون مدت کلا بهت پول نمی‌دن؟ یا باز می‌تونی با پول کمتر برای استادت کار کنی. اگه پول ندن و پول کم بیاد چی؟
adminResponse:
  date: '2014-01-07T10:31:00Z'
  message: |-
    پاسخ:
    سلام سینا
    ممنون از نظرهات.
    اگر پول کم بیاد که کم اومده :) معمولاً استادها تابستون دارن ولی مورد داشتیم که استاد تابستون پول نداشته.
    در مورد همایش‌ها باز هم میگم مشکل ما پیش از اون بخش حضوره. دانشجوهای ایرانی و استادها معمولاً در اون سطح نرسیدن که مقاله اونجا بفرستن و پذیرفته شه.
