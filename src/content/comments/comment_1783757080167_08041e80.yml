message: |-
  سلام
  می‌خواستم بپرسم که از چه روش‌هایی برای مدیریت پروژه در شرکت فیسبوک استفاده می‌شود؟ به طور مثال از روش اسکرام ژاپنی استفاده می‌شود؟ از پلتفرم‌هایی مانند trello یا پیام‌رسان‌های تخصصی مانند slack نیز در فرآیند مدیریت پروژه استفاده می‌شود؟
  همچنین چارت سازمانی چگونه‌است و به طور مثال کارفرمای شما در بخش تحقیق و توسعه به چه عنوان سازمانی اطلاق می‌شود؟ نحوه گزارش دادن نتایج مربوط به یک پروژه چگونه است و در چه زمان‌هایی صورت می‌گیرد؟
  خیلی ممنون
