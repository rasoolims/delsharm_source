message: |-
  سلام صادق جان. بعد از سالها هم سفرنامه ات را خواندم و هم این متن را.مثل یک دیدار مجازی بود.دلم برایت تنگ شده.از متن سفرنامه هایت پیداست هنوز همان صادقی هستی که میشناختم، ساده و صادق.
  برایم جالب است که هنوز از وبلاگ استفاده میکنی اگر ایمیل هایت برایم نیاید اصلا خبردار نمیشدم که وبلاگ مینویسی هنوز. متنی که نوشتی خوبی اش این است که کسی که آنجا زندگی کرده نگاهش را نوشته نه مثل کارشناسهای ما که از راه دور و از طریق فیلم و سریال و شبکه های ماهواره راجع به همه چیز نظر میدهند،بیشتر ینویس جدا از قضاوتهای افراد، چیزی که مینویسی به شدت جذاب و تازه است و شاید خودت این را حس نکنی ولی برای کسانی که آنجا نیستند مثل کشف سرزمین های ناشناخته است. بیشتر بنویس و مطمئن باش این نوشته ها روزی در جایی که اصلا فکرش را نمیکنی به کار خواهد آمد.
  موفق باشی.یاعلی
