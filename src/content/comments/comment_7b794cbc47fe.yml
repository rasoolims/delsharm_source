message: |-
  اولاً جواب سلام.
  و ممنون از شعر زیبا و مناسب حالی که برایم گذاشتی.
  ثانیاً سلام
  خیلی قشنگ نوشتی. انتقال حس به بهترین نحو انتقال پیدا کرد.
  در این وانفسایی که ما در وطن خویش غریبان، اینجا در تهران احساس غربت می کنیم، خواندن این قصه غربت هم لطف های زیادی دارد.
  کم و کیفش مسلماً فرق دارد اما الآن که فکر می کنم می بینم حتی قبل از اینکه به تهران بیایم در وطن خودم هم احساس غربت و تنهایی داشتم. شاید برای بعضی آدم ها همه جا و همیشه این احساس غربت باشد، شاهد حرفم هم کلنجاری است که در بند یکی مانده به آخر در ذهنت با خودت می روی. اصلاً شاید درک همین موضوع است که بعد از چندی آدم را پایبند غربت می کند. البته بازهم می گویم کم و کیفش خیلی متفاوت است، اما انگار این یک حس همیشگی است...
  این همان کلنجاری است که من هم دارم. خیلی بد است وقتی حتی وطنت وطنت نباشد. نه چالوست وطن باشد نه تهران و نه این جهنم‌دره پرزرق و برق.
