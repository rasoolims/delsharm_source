    فقط یک فیس‌بوک غیرفعال به اسم خودم دارم که هیچ مطلبی در آن نمی‌گذارم. تنها شبکهٔ اجتماعی که فعالم، گودریدز (شبکهٔ کتاب‌خوان‌ها) است.
