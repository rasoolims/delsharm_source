message: سلام امروز با وبلاگ فارسی و لاتینت آشنا شدم . قلم خوب  وروانی داری. خیلی
  خوبه که به این راحتی می تونیم از طریق آشنایی با جزئیات سبک زندگی  با فرهنگ و زندگی
  غربی ها آشنا بشیم . چیزی که د رایران خیلی با افراط یا تفریط راجع بهش نظرات داده 
  میشه.
