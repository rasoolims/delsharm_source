message: |-
  سلام
  اینکه بازه زمانی رو به عقب تر از قسمت اول برده بودی جالب بود. اما چند تا چیز به نظرم اومد که یه نگاهی بهشون بنداز:
  اول- توی سفرنامه نویسی سعی کن دقیق تر بنویسی. حدس و گمان کارت رو یکم بی ارزش میکنه.
  دوم- وقتی هم که داری توصیف میکنی سعی کن جزئیات رو بهتر بگی. کلی گویی در مورد اجزا و اشیا کامل منظور تو رو نمیرسونه. البته چون از عکس استفاده میکنی خیلی خوبه. ولی خودت هم از نگاه یه دوربین توصیف کن.
  سوم- پسر خوب تو مگه زیمباوه و اتیوپی رفتی که میگی خیابونهای آمریکا اینجوریه؟؟ تو که نرفتی؟؟؟؟ میتونستی همین تهران خودمون رو مثال بزنی!!!! یا اگه جزئیات بیشتری رو بگی نیازی به مثال زدن هم نیست.
  و جزیئات جزئیات جزئیات..... جملاتت رو هم همینطوری کوتاه بنویس جالب تر میشه. توصیه میکنم اگه میتونی و دسترسی داری یکی دوتا سفرنامه امروزی تر مطالعه کنی.... بهت دید بیشتری میده....
  به هر حال محمد صادق عزیز.... خیلی خوشحالم که توی این وب نوشت میتونم از خاطرات و احوالت با خیر بشم.
