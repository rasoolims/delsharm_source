message: |-
  سلام آقای رسولی ممنون از یادداشت های خوب شما
  بنده واقعا دوست دارم کتاب ها را به زبان اصلی بخوانم اما متاسفانه با وجود تلاش برای افزایش مهارت انگلیسی هنور نتوانستم به راحتی کتاب های انگلیسی را مثل فارسی بخوانم.
  البته با خواندن نوشته های شما انگیزه بیشتری برای یادگیری زبان پیدا می کنم.
  ممنون از شما
  موفق باشید
