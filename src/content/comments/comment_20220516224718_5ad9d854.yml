  پاسخ:
  سلام
  تو توی ایرانی شاکی هستی ما اینجا چی بگیم؟ طرف توی واشنگتن فتوا داده که چیز بودن مجازه. و البته یکی از روشنفکران عزیز ایرانی که توی سخنرانی تورنتو در مورد چیز بودن اظهار نظر قطعی نکرده.
  دلیل سریع شدن سیر مطالب یکیش عادی شدن اتفاقات برای خودمه که باعث شده جزئیات کمتری توی خاطرم بمونه و دومیش درخواست دوستان برای کمتر جزئیات گفتن.
