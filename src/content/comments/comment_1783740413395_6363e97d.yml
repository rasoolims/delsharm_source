message: |-
  سلام!
  من نمیدونم چطور شد که با وبلاگ شما آشنا شدم ولی این چند وقت که وبلاگ تون رو میخوندم، حس میکنم که باور مذهبی ما الحمدلله خیلی به هم شبیهه ولی در مقابلش باور سیاسی ما کاملاً میتونه در دو قطب مختلف باشه! اول امیدوار هستم بیماری تون جدی نباشه و ان شاء الله سلامتی رو به دست بیارید، بعد از کنجکاوی میپرسم، اگر دوست نداشتید میتونید جواب ندید! الان که نوشتید دیگه نیویورک نیستید یعنی میخواهید برگردید ایران؟ یا کار تو یه شهر دیگه پیدا کردید؟
  راستش رو بگم، نوشته هاتون رو تقریباً هیچ وقت نتونستم کامل بخونم! برخلاف اینکه یک جا نوشته بودید سعی میکنید واقعیت رو بگید نه مثل گزارش های صدا و سیما باشید، باید بگم متاسفانه نه تنها در عمل همین کار رو میکردید بلکه چه بسا خیلی شدید تر عمل میکردید! من نه غرب زدم نه اعتقاد دارم اونجا بهشت موعوده و نه مثل اونی که دلار با هزار تومنی گرفته بود دستش به برجام خوش بین بودم! همیشه هم به دوست های ایرانی و غیر ایرانیم میگم هر کسی دوست داره انرژی و مهارتش رو برای کشور خودش صرف کنه ولی وقتی دین تو رو مثل یه ابزار گرفتن دستشون و راه نفس کشیدن تو بستن چی؟ من الان از شما میپرسم، واقعا خوشحالید که وضع برجام و ریال این شد؟ به زبان فارسی سخت میگم! حالم بهم میخوره از زمانی که میبینم یه عده از به همچین وضع دچار شدن مملکتشون خوشحالن، چون میتونن ثابت کنن حرفشون درست بوده. از ساک غذا و هجوم گشنه ها و ازین چیزا تو وبلاگ تون خوندم، اون زمان که ایران بودید احتمالا شما ندید ولی من دیدم که چطور بچه ها تو سطل آشغال دنبال غذا بودن، درست همون زمان که یه عده تو ایران سوار هامر و مازراتی میشن، نه آدم های تحصیل کرده، پسر های 18، 19 ساله که معلوم نمیشه هیچ‌وقت، این پول رو باباهاشون چطور درآوردن! از عدم توانایی برای تحصیل به خاطر فقر میگید! بله اصلا تو ایران چنین چیزی امکان نداره که! واقعا این مسائل رو نمیبینید یا دوست ندارید ببینید؟. من همه حرف های شما رو قبول میکنم ولی فقط این جمله رو میگم: هیچ وقت کاراشون رو پای اسلام نداشتن! به اسم اسلام، خون مسلمون هارو تو شیشه نکردن! شاید یه زمانی کسایی که ایران رو ترک میکردن فقط برای همین بود که هر کاری خواستن بکنن ولی الان دیگه وضع فرق کرده، چقدر مسلمون معتقد که هر ساله داره این کشور رو برای همیشه ترک میکنه
  البته بازم ساده ترین کار همینه که فقط بگید اره اونایی که رفتن فقط دنبال همین چیزا بودن و از غرب برای خودشون کاخ آرزو ها ساختن و ما خوبیم و مقاومیم. البته من تا به حال آمریکا نبودم و همین که گفتم اروپایی هم که هستم برام بهشت موعود نیست ولی وقتی این چیزا رو مینویسید، خوبه از خودتون بپرسید وضع مملکت رو کی به اینجا رسوند...
  ببخشید اگه خیلی تند نوشتم، امیدوارم پیامم رو تایید کنید! بی صبرانه منتظر جواب تون هستم،
  موفق باشید
adminResponse:
  date: '2118-08-31T09:48:00Z'
  message: |-
    سلام دوست عزیز
    عیدتون مبارک باشه. خیلی ممنون که وقت می‌گذارید و مطالب بنده رو مطالعه می‌فرمایید. امیدوارم مشکلات موجود در متن و فرامتن مطالب بنده رو به بزرگی خودتون ببخشید.
    از نظر من یک موضوع و موضع در نوشتن باید وجود داشته باشه و باید سعی بشه که همهٔ مسائل عالم رو در یک نوشته مطرح نکرد. هدف از کل مطالب تحت عنوان «همسفر شراب» بیان برداشت‌های شخصی من از آمریکاست. لذا هیچ دلیلی بر ایراد گرفتن از وضع ایران در خاطرات آمریکا ندیدم. به همین خاطر نیازی به یادآوری چیزی که ایرانی‌ها به چشم می‌بینند نمی‌دیدم (یعنی مشکلات اظهر من الشمس در نابه‌سامانی ایران). همان طور که از مطالبم برمی‌آید سعی‌ام بر نشان دادن زاویه‌ای بوده که کمتر از زبان ایرانی‌های غرب گفته شده است. حالا اگر به نظرتان با واقعیت تطبیق ندارد، جای بحث دارد. سعی‌ام بر آن بوده که صداقت را سرلوحهٔ کار قرار بدهم. در نوشته‌هایم از خوشی‌ها و امکانات و خوبی‌هایی که در امریکا چشیده‌ام گفته‌ام از جمله همین نوشته در مورد موقعیت‌های ناب شغلی (اگر اعداد حقوقی که به امثال من پیشنهاد می‌شود بگویم، دود از سر خیلی‌ها بلند می‌شود و همهٔ حرف‌های من را به کناری می‌نهند و صرفاً به امید چنان حقوقی همهٔ تلاششان را برای آمدن به آمریکا می‌کنند)
    در متن نوشتم ولی احتمالاً به همان دلیلی که فرمودید، یعنی نیمه‌خواندن مطلب، درنیافتید. ان‌شاءالله عازم کالیفرنیا هستم برای آمادگی برای شروع کار در فیس‌بوک هر موقعی که کار ویزایم درست شود.
    التماس دعا
