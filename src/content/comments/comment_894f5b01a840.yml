name: از تهران!
email: ''
url: ''
date: '2018-10-14T01:05:00Z'
message: |-
  سلام، وقتتون به خیر به عنوان یه جوون ایرانی! دو تا سوال داشتم ازتون آقای رسولی
  اول اینکه  در آخرین مطلب خاطره تون خوندم که می خاین تو فیسبوک کار کنین..
  یه سوال برام پیش اومده، من تصورم اینه که شما تو رشته خودتون قوی هستین همینکه کلمبیا رفتین خودش سنده دیگه، فقط این همه تجربه و کار علمی خب چرا کار تو جایی مثه فیس بوک
  چون خودمم به عنوان یه دانشجو این سوال برام پیش اومده! نمی خاین مثلا تو حوزه علمی ادامه بدین یا برگردین و اینجا یه حرکتی بزنین!حتما ازتون استقبال خواهدشد(یا شایدم نه، نمی دونم!)
  اونجا که گفته بودین اون همه تلاش آخرش کار تو فیس بوک من یه جوری شدم راستش! دیگه شما که تا امریکاشم رفتین ما تو ایران و این وضع کپی و تقلید از اونا(به خصوص تو بحث رشته من علوم اجتماعی...)
  دوم یکی سوال دیگه هم داشتم که فک می کنم سوال خیلی از امثال جوونایی مثه من است؛ من رک می پرسم و ازتون خاهش دارم یه جواب جامع بدین که کمک کننده باشه. خلاصه سوالم اینه تو جایی مثه تهران(که خودتونم یه جا اشاره کرده بودین که از نظر فرهنگی و حجاب اینا وضع تهران از نیویورکم بدتره!) برای مثلا امثال ما یه کم سخته بحثهای تمرکز و اینا... منظورم همین وضع تهران از نظر اخلاقی و فرهنگیه و ایناس... می خام بدونم شما تو یه جایی مثه نیویورک که دیگه آخر نمی دونم آزادی روابط و ایناس چطور خودتون حفظ کردین و می کنین(فقط نگین ازدواج که فعلا وضع مملکت خیلی داغونه!) ایمان و تقوا و امثال این حرفا منظورمه.
  ممنونم از توجهتون.
  امیدوارم از خاطراتتون وازم بنویسین. من همه قسمت های همسفرشراب و شرابه های سفر وبلاگتون رو خوندم.
adminResponse:
  date: '2018-10-14T01:05:00Z'
  message: |-
    سلام
    خیلی ممنون که مطالب بنده رو مطالعه کردید.
    در جواب صحبت اولتون، حرفم این بود که انتهای بسیاری از کارهای اصطلاحاً علمی ما برای مصرف، سرگرمی، غفلت و بسیاری اوقات کارهای نظامی غیرانسان‌دوستانه به کار می‌ره. حرفم به این معنا نبود که مثلاً سطح علمی کار در جاهایی مثل فیس‌بوک پایین هست. مخصوصاً در سطح پژوهش کاربردی که کار ماست، ما عملاً همان پژوهشی را می‌کنیم که یک دانشگاهی می‌کند با این تفاوت که بیشتر تمرکز بر روی محصول است تا مقاله‌نویسی. رشتهٔ ما مهندسی است و اصل هدف ساختن محصولات مهندسی است.
    در جواب صحبت دوم شما، فارغ از گزاره‌هایی که آوردید و باهاش موافق نیستم، راه حل جامع اگر باشه به نظرم بزرگان اخلاق و دین گفتند و من کسی نیستم که راه‌حل جامع بدهم. به اصطلاح، کل اگر طبیب بودی...
    اما اگر منظور شما حفظ پاکدامنی است، ازدواج به نظرم اتمام حجت است وگرنه که تیر شیطان در هر جای عالم در کمین است، حتی در پرت‌ترین روستاهای جهان، به لطف اینترنت می‌شود به پست‌ترین مطالب اخلاقی در کمترین زمان ممکن دست پیدا کرد. به نظرم، مسألهٔ اصلی این هست که فضای غرب این مسائل رو قبیح نمی‌دونه ولی الحمدلله هنوز در فضای ایران، حتی در تهران، بسیاری از مسائل هنوز از دید جامعه قبیح شمرده می‌شه و به همین خاطر حتی به بهانهٔ حیا از اطرافیان، گاه انسان بیشتر حفظ حرمت می‌کنه.
    موفق باشید
