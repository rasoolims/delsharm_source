message: سر جمع ۶۰ تا آدم دور هم جمع شده اند و بحث می کنند که کی درست می گه؟! آخه
  این هم شد تجمع؟ داش صادق دفعه بعد چند تا از عکس های زمان دانشجوییت توی علم و صنعت
  را براشون ببر، بفهمند معنی تجمع چیه
