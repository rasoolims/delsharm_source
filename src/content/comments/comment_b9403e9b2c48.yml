message: |-
  سلام صادق جان
  عیدت مبارک برادر
  از چند تا از بزرگان مکرر شنیدم که افراد مومن هر جا برند، یکی هست که روی مخشان باشه، تا حسابی کیفور نشوند و دل نبندند. یکی همکارش، یکی زنش، یکی استادش و ... . مهم اینکه جور دیگه به این قضایا نگاه کنه، به قول یکی از بزرگان اگر میم مشکلات را بگیری میشه شکلات. خلاصه تو ایران هم مشکلات کم نداشتی، چند بار باهم دربارش صحبت کردیم.
  در ضمن متنت خیلی قشنگ بود. هنوز دوست دارم از پروژت و از استادت مخصوصا مایک بیشتر بنویسی.
  یا علی برادر
