message: |-
  تازه شاید به خاطر ریشهای از جبهه برگشته اش
  به سیگار کشیدنش در جای بسته نتوان گیر داد
  و یا به پارتی بازی اش
  برای بچه اش و برادرش
  اما برادر مم صادق جان
  شنیده ام که به خاطر ریشهای از جبهه برگشته اش شهدا
  شهدا همان رفقای قدیمش
  عاقش کرده اند، شاید هم دروغ شنیده ام
  شاید
  اما به خاطر شهدا برادر
  به ریشش گیر نده
  به ژلش هم
  نکند جانبازی دردمند هدفت قرار گیرد به اشتباه
  که او هم ریشهای از جبهه برگشته دارد
  و هر روز از بنیاد به بیمه
  و از بیمه به بیمارستان بر ویلچر میراند
  و میدود برای وام
  نکند برادر
  علی علی
