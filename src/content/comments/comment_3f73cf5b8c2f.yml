message: ضمنا نبینم که صادق پارسی گوی ما اتاق جلسات را بگوید اتاق کنفرانس. یاد اون
  روزی افتادم که دم ظهری با عجله می خواستی خیزش (یا یه چیزی تو این مایه ها) رو از
  کامپیوتری که پشتش نشسته بودم پرینت بگیری ببری برای کپی. گفتی اینو زودتر چاپ کن تا
  ببرم. منم با آرامش و با نیش باز میگفتم شرمنده، چاپ نداریم، فقط پرینت هست اگه میخوای!
  و تو بالا پایین میپریدی که دیر شد...
