message: |-
  اولین روزها در جاهای غربت تنهایی و دلتنگی است. اگر ضد حال :) هم بخوری بدتر. ولی رسول جان بعد از مدتی این افراد غرق در بزرگی غربت می شوند و دیگر دل به برگشت نمی دهند. بلایی که دوستان زیادم امد.
  هیچ وقت به تحصیل در غرب با وجود سطح بالای علمش اعتقادی نداشتم ولی با شرایطی که در دانشکده بعضا اتفاق می افتد از این اعتقاد پشیمان می شوم. هرکس به نداشته اش حرص می خورد
  عکست را هنوز. ما دلتنگ تر از توییم به تو. برادر افغانیمان را نیز سلامی از ما
  سلام
  چنان می‌گویی که انگار همهٔ تقصیر از سمت دوستان است.. دیدی و دیدم که چه‌ها بود و چه‌ها هست. بارها شده بود که این‌قدر عصبانی می‌شدم که واقعاً‌ تقوای زبانم را از دست می‌دادم و نامربوط می‌گفتم. دعا کن خدا به من صبر دهد و امید.
  این قدر اصرار  کردی که ما کوتاه آمدیم.
