  سلام
  متن جالب و لذتبخشی بود. از کار زیاد که میگفتی منو یاد تابستونی انداختی که تو اتاق ما در خوابگاه داخل مهمون بودی. یادش بخیر. انشالله که این ایام را به خوبی بگذرونی و با دست پر به خونه برگردی که کارهای نکردهء زیادی در انتظاره.
  سید سعید
