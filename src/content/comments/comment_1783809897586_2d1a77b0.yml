message: سلام می خواستم ببینم می خواستم ببینم اعتقاد مردم آمریکا به خدا چطوری اگه
  توضیح بدید ممنون واقعا من از سفرنامه تون لذت می برم خیلی دوست دارم در مورد تفاوت
  های عقیدتی فرهنگی مردم کشورهای دیگر بدونم خیلی ممنون و اینکه آیا شما سریال خانه
  پوشالی تولید کشور آمریکا را می بینید یا نه ؟ و اگر می بینید نظرتون و نظر مردم آمریکا
  در موردش چیه
adminResponse:
  date: '2016-03-14T18:41:00Z'
  message: |-
    امریکا چندصد میلیون جمعیت داره و هر گروه نژادی-دینی اعتقاد خاص خودش ولی در مجموع فرهنگ سکولار در جامعه حاکم هست. دین رو معمولاً امری کاملاً شخصی می‌دونند.
    اون سریال رو ندیدم.
