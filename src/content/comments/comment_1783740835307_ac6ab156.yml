name: حسین غیاثی مهر
date: '2113-07-23T07:43:00Z'
message: |-
  سلام صادق
  چند وقتی بود نیامده بودم. از این چیزای چیز زیاد اون جا می بینی!‌ خودت را آماده کن. زیاد هم تعجب نکن. البته مراقب باش برات عادی نشه. چند تا از بستگان ما خانواده شان در کشور های دوست و برادر مثل آمریکا زندگی می کنند.
  هر از چند گاهی که می بینیمشان از این چیزهای عجیب و غریب از آدم ها گرفته تا تحریف های تاریخی را برایمان نقل می کنند علی الخصوص در مورد عاشورا و امام حسین(ع).
  یاد حاج مجتبی به خیر. پارسال ماه رمضان در مورد دعا صحبت می کرد. الان سخنرانی هاش را دارم گوش می دهم. ماه رمضان ماه دعا است.
  التماس دعا
