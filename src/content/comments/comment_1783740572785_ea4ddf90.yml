name: ارمان
date: '2107-12-29T08:06:00Z'
message: |-
  بسم الله
  می گویند وارد حرمش که می شوی، باید از فضایل و رشادتهایش برای اسلام بگویی ..
  حیدر کرار باشد آن امام انس و جان/زهره ی شیران ز بیمش آب گردد بی گمان
  بی اختیار از سر هیبتش سر خم می کنی جلوی مرد مردان از ازل تا ابد ... به هیبت حرمش در این سفر نور ندیدم .. اما .. اما وقتی صحبت از عزیزش می کنی .. زهرایش را می گویم .. به احترامش، همه هیبت حرم فرو می ریزد .. آن مدافع همیشگی ولایت .. تنها و تنها یاس اوست که باغبان را هوایی می کند ..
  گرد حرم که می گردی .. بگذارید تعریفش را برای بعد ..
  الحمدلله الذی جعلنا من المتمسکین بولایة علی بن ابیطالب و اولادهم المعصومین علیهم السلام .. مبارکه ..
