message: |-
  سلام. اولاً ممنون که اینجا می نویسی.
  ثانیاً در مورد این شعر محتوا و حس شعری خوب است اما از نظر فنی به خوبی شعرهای قبلیت نیست. فکر کنم وزن خوبی را برای زبان شاعرانه خودت انتخاب نکردی. قافیه ات هم چون قبل از ردیف سکوت دارد کلاً کار را سخت کرده.
  "من شنیدم که زمان با من سر سازش نداشت"
  این مصرع هم در جریان شعر یه جورایی خارج می زنه.
  از نظرهای سازنده‌ات خیلی ممنونم رفیق
  سعی می‌کنم بهتر باشم
