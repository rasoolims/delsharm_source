message: |-
  صادق جان سلام
  قبل از اینکه دکتری قبول بشم خیلی پیگیر بودم که ایران نمونم ولی ...
  الان تو این شرایطی که هستم خط به خط نوشته هات برام قابل درکه؛ اصلا نمی دونی که آشوبی رو که الان تو دلم هست قشنگ داره وصف می کنه
  به هر حال من که خیلی منتظرم بقیه مطالبتو هم بخونم...
  یاعلی
  ممنونم
  لطف دارید
