  سلامت باشید
  بله فارغ از مثال بانکی بحران اقتصادی که ذکر داشتید و قبلتر تا حدی شنیده بودم و الان برای خود موضوع AI هوش مصنوعی جدیدترین صحبت و حرفهای جناب استاد نوام چامسکی MIT رو میخوندم که چند روز پیش نشست و گفتگویی داشتند و اسپیلبرگ کارگردان و فضلای عصر و محدود اندیشمندان همیشه در صحنه که تخصصی که ذکر اینها شد و ضریب تاثیر بالایی داره:
  I love anything that is created not by a computer, but by a human person
  و ادامه اسپیلبرگ نکته کلیدی رو گفته که هوش مصنوعی میتونه روح رو از کارهای خلاقانه جدا کنه و این ترسناک هست
  و نوام چامسکی که شدیدا انتقاد داشت به هوش مصنوعی و به نوعی معتقد بود که اینها الگوریتم هایی هستند که هیچ روحی ندارند و فاقد و خلاقیت و قشنگ بدش می اومد و بیشتر به زبان برنامه نویسی استفاده شده در این نوع هوش مصنوعی
  و
  مقدارکی تعریف هم شد که
  OpenAI's ChatGPT, Google's Bard, and Microsoft's Sydney are marvels of machine learning,
  و نکته تخصصی نوام چامسکی که نوشته
  We know from the science of linguistics and the philosophy of knowledge that they differ profoundly from how humans reason and use language. These differences place significant limitations on what these programs can do,” Chomsky wrote
  .
  در یادداشت چامسکی به Nytimes و ایمیلش به Insider و... متنش هست
  https://fortune.com/2023/03/08/noam-chomsky-ai-chatgpt-are-not-true-intelligence/amp/
  https://interestingengineering.com/culture/anti-chatgpt-sentiment-by-chomsky-spielberg
  و
  برنامه The Late Show و موضوع AI اسپیلبرگ و چامسکی
  .
  سلامت باشی و سپاس دکتر عزیز و نازنین
