message: |-
  دلشرم عزیز البته که خوب یادم هست که شما کی بودین و تازه دارم  خوب می فهممم که کی هستین (خوب اول و دوم جناس تام دارن :دی )
  خدایی پر از معلومات و روون روی کاغذ سر می خورین
  از خوندن مطالبتون جدا لذت می برم.
  در ضمن استفاده از گوگل... رو هم اگه بشه بم یاد بدین خیلی خوب می شه
  آخه خیلی دوست دارم به محض به روز شدن بخونمتون و البته بقیه دوستان رو
  ممنون
