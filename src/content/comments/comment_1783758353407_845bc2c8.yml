message: سلام. «بنیادگرایان» بهتر از «دین‌داران» نیست؟ چون کسی می‌تواند دین‌دار باشد
  ولی ملی‌گرا.
adminResponse:
  date: '2023-11-14T18:05:00Z'
  message: |-
    سلام
    تعریفی که کتاب از بنیادگرایی ارائه می‌دهد در انتهای آن و شامل القاعده و امثالهم شده است. دین‌داری هم درست می‌فرمایید که واژهٔ دقیقی نیست: منظورم طرفداران حکومت دینی و غیرسکولار بوده است.
    کلاً تعریف ملیت و ملت بعد از مشروطه به خاطر ترجمهٔ ناسیون از فرانسوی دچار خلط با مفهوم دینی شده است.
