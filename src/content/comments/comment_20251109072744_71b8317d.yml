  با عرض سلام و وقت بخیر خدمت شما
  اینجانب سروش صادقی هستم پسر خانم عبداله زاده معلم خانم شما امسال تازه دانشجو شدم(رشته برق - دانشگاه سمنان)می خواستم در رابطه با موفقیتتون در خصوص تحصیلتون تو آمریکا بیشتر بدونم . شرایطتون چی بود؟ خیلی سرمایه داشتین یا نه؟ ویژگیتون تو دوره کارشناسی چی بود؟ ممنون میشم اگه راهنماییم کنین...
