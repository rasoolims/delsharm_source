message: |-
  بسم الله
  چند روز است که میایی در مسجد گوهرشاد .. گوشه ی محراب می نشینی و نگاهش می کنی و بی هیچ حرفی بر می گردی .. همه زیارتهایشان را رفته اند .. وکیل آباد! .. شاندیز! .. طرقبه! .. بازار رضا! .. اما تو .. روز آخر است .. همه زیارت وداع را هم خوانده اند .. زعفران! .. زنجبیل! .. سوغات! .. اما تو .. هنوز نگاهش می کنی .. از همانجا .. بالاخره نگاهت می کند .. جَذَبه ی چشمانش .. تو را به سمت خود می کشاند .. أأدخلُ !؟.. دستت را .. لبانت را وجب به وجب به دیوار می کشی .. کشان کشان .. به سمت کفشداری معروف .. ... .. همه جا نور است .. می بینی!؟ .. نور .. پرده های نور را یک به یک رد می کنی .. نورٌ علی نور .. یا نور المستوحشین فی الظلم! .. سلام علیکم! .. با تمام یقینت .. تردُّ سلامی .. و علیکم السلام .. ما را بس ..
  صلی الله علیک یا ابالحسن، صلی الله علی روحک و بدنک، صبرت و انت الصادق المصدق، قتل الله من قتلک بالایدی و الالسن..
  یا علی .. ابن موسی الرضا! .. یا علی ..
