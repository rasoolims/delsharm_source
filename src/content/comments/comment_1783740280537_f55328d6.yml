message: |-
  همیشه تصور میکردم پرینسون یک جای شلوغ و بزرگه وپرتردد است .با این ترسیم از شهر واقعا اب پاکی ریختید رو تصوراتم.
  دکترحسن انصاری استاد تاریخ کلام در انجا هیت علمی هستند والبته اشمیتکه یهودی که درمورد میراث تشییع کار میکند(اندیشه های کلامی علامه حلی)
