  سلام صادق :)
  اعتراض دار و دسته‌ی رمان‌خوان‌ها را نسبت به تغییر سبک نوشتن اعلام می‌کنم :دی همه‌ی کِیفش این بود که کیفیّت زندگی را در متنش ببینیم نه اینکه زندگی را از لابه‌لای کیفیّتش!
  حوصله‌ی گیر دادن هم ندارم، ولی یک جایی قبل از نقطه فاصله گذاشته‌ای :|
  سلام جناب بن‌بست
  خاطره‌نویسی از گذشته راحت است ولی از گذشتهٔ خیلی نزدیک سخت است چون قرار هست در مورد خودت و آدم‌های دیگری حرف بزنی که حی و حاضرند. یک جورهایی خودزنی است.
