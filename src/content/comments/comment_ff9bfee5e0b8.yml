message: |-
  - فایلها مفید و مثبت، یا لینکهای مفید و ... هر چیزی که بتونه تجربه زیستن آکادمیک شما در غرب رو به ماها منتقل کنه بذار. شاید همین کار شما نیاز بسیاری رو به تکرار تجربه شما کم کنه. سعی کن معبری برای انتقال تجربه زیستن آکادمیک در غرب و قواعد و احکام و روابط و آدابش ایجاد کنی. چون بسیاری از دوستان برای کسب این تجربه در سر هوای سفر دارند و شاید این روند شما کمک بسیاری به افزایش درک م از غرب داشته باشه.
  - کمی تحلیل رو هم بر توصی بیفزا. نگران انگ شعارزدگی نباش. اگر از دل باشه برای قلبهای منصف حجت و برای قلبهای مریض اسباب آذار میشه که البته بد هم نیست.
  - نکته آخر هم خیلی دوست دارم بیشتر با شما آشنا بشم. اما میدونم با توجه به وقت و گرفتاری ها محقق نخواهد شد. ولی اگر فرصتی بود از یه مکالمه صوتی و تصویری یا متنی دریغ نکنید.
  - راستی انقدر با سفرنامه همراه شدم که احساس میکنم خودم این زیستن چندماهه شما رو تجربه کردم. خیلی ممنون برادر. بنده ساکن قم هستم و به نیابت از شما به زیارت حضرت معصومه سلام الله علیها میرم. راستی به سبک همه دوستان حزب اللهی، همسر شما فقط یه اسم و سایه است و اصلا در سفرنامه حضور نداره و حتی گاهی حس میکنم شما تنها به سفر رفتی. اگر از زبان ایشون و نگاه ایشون هم چیزی بنویسی شاید برای بسیاری از خانومها مفید باشه. حتی میشه از ایشون خواهش کنی که یادداشتهایی در کنار فصلهای شما با زبان خودشون و نگاه خودشون بنویسن.
  یا علی
  دم شما گرم
  یا حق
