message: |-
  من مجموعه سخنرانی های شخصی را در مورد قران دنبال می کنم که شاید بشناسید دکتر توسرکانی
  اخیرا در سخنرانی هایشان با موضوع قرآن و ادبیات مدرن مطالب خیلی جالبی گفتند که توصیف کتاب اولتون منو یاد اون انداخت.
  ایشون برخی از تکنیک های ادبیات به کار رفته در قران رو معرفی کردند که در ادبیات مدرن وجود داره و بعضی دیگر که هنوز در ادبیات مدرن وجود نداره
  سخنی وجود دارد در مورد این که کلمات باید خودشون احساسی که گوینده دارد رو منتقل کنند.
  در قران و ادبیات جدید همین گونه هست دیگر کسی نمی گوید آن فرد با عصبانیت گفت... با خوشحالی گفت... بلکه ما افراد رو وقتی حرف می زنند می شناسیم و احساسشان را درک می کنیم...
  اینقدر برایم برخی از نکاتی که از روایت سوره یوسف در این سخنرانی ها گفت جالب بود که حاضرم اینجا بنویسم:
  مثلا در داستان یوسف برای ما توضیح داده نمی شود که حتی زبان برادران کنعانی است و زبان یوسف مصری و آنها احتمالا با مترجم با یکدیگر ارتباط دارند... برادران پیش یوسف می گویند اگر او دزدی کرد برادرش هم دزد بود... قران نمی گوید که آنها این جمله را به زبان کنعانی گفتند و وقتی یوسف می شنود و می گوید که شما از او بدتر هستید ما خودمان می فهمیم که یوسف این حرف را در  دلش گفته و بلند نگفته است...
  ما کودکی یوسف زمان تعریف کردن خوابش را از روی کلمات یا ابتا و تکرار کودکانه فعل در جمله می فهمیم...
  ما شخصیت فرعون را در میان نقل قول های پخته و فریبنده اش می فهمیم...
  بنابراین هر چند کتاب را نخوانده ام اما جمله اول شما در توصیف کتاب اول را "شاید" به این ترتیب ویرایش کنم: نشانه ای از سبک نوین نویسنده در معرفی شخصیت هاست.
