message: |-
  سلام
  منظورم این نبود که حجم آورده شما کمه. بلکه منظور این بود که اگر صدها نفر هم به غرب سفر کنند و زحمت و رنج غربت رو بکشند و با اخلاص و تلاش بسیار سعی کنند که چیزی بیاورند که دوای درد ما باشه، نخواهند توانست.
  چرا که آنچه هست نه دوای درد ما بلکه دوای درد غرب نیز نیست.
  ما باید دوای خود را در خودمان بجوییم.
  از ساینس آبی برای ما گرم نمی شود. برای غرب نیز گرم نشد. آرزوی های بیکن و مور با آن همه امید و شعف کجا و این دنیای سرد کجا!
  بگذریم از اینکه از پروژه آی بی ام علاوه بر استفاده های خنثی این امکان را برای چه کسانی و در چه پروژه هایی و برای سرچ چه چیزهایی در فایلهای صوتی فراهم خواهد کرد!!!
