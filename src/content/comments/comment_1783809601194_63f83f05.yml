message: |-
  درسته
  گرچه حرف های شما رو اضافی نمی دونم.
  تو نسل های جدید افراد زیادی هستن که این حرف ها میتونه به فضای مطالعه شون عمق بیشتری ببخشه.
  کما این که مصداقی تر بخوام بگم اینه که بعد از بعضی از موج های کتابخوانی بین بچه های مذهبی نیاز بود که موج های نقد کتاب هم ایجاد بشه که سطحی خوان و فردگرا نشن که متاسفانه گاهی این اتفاق زیاد میفته.
  ممنون که همیشه با حوصله پیام ها رو جواب میدید.
