  سلام اقای دکتر. وقت تون به خیر.
  منم تصمیم گرفتم یه پیج تو اینستا بزنم (motezaa.esmaili@)و کتابایی که میخونم (و البته + فیلمایی که میبینم!) رو معرفی کنم،  اگر شما اینستا یا تویتر دارید - که بعید میدونم- ممنون میشم معرفی کنید. چون الان ملت همه اونجان! و دیگه کمتر بلاگ و سایت چک میکنن!
