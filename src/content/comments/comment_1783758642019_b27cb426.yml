message: |-
  سلام صادق خان
  خیلی ذوق کردم از متن تلخت.
  یه پیشنهاد دارم. اونم اینه که تو سفرنامه نویسی تحلیل خودت رو نیاری. تصور این متن برای من بدون اون جملات مربوط به جامعه مدرن و ... تصور تلخ اما پذیرفتنی تریه. منظورم اینه که بذار خود مخاطب در انتها به چنین گزاره ای برسه تا اینکه شما بهش بگی. به نظرم این جوری تلنگر متن تلخ تر هم هست.
  من گزارش یکت رو خوندم و به نظرم این گزارش خیلی بهتر از اونه.
  دارم تلاش میکنم همه رو بخونم. سرم شلوغ بود.
  انشاء الله حال همسرت هم بهتر شده باشه
  ببخشید اگر جسارت شد. یاعلی
