message: |-
  سلام
  دیدم نظرات این دفعه کمه گفتم ما هم نظر بذاریم زیاد شه. یه دفعه از نوشتن دست برنداری که اون وقت بی بهره از دنیا می ریم.
  البته نظرات کم شاید بابت متن کم و یحتمل وقت کمیست که این بار گذاشتی ولی ما به کمش هم راضیم .
  ثانیا ببین داداش ما سر رودها و دریاها و برکه های دهاتمون غیرت و تعصب  داریم  گفتم بگم که یه دفعه بی وضو اسمشون را نیاری ها.خخخخخخ
  ثالثا بعدش میشه رابعا و خامسا و سادسا.
  دمت داغ
