date: '2119-10-17T14:16:00Z'
message: |-
  سلام
  لطفا بنویسید که دقیقا چطور مدیریت می‌شید.
  مدیر شما چطور کار شما رو بررسی و ارزیابی می‌کنه؟
  ارزیابی مدیر چقدر روی حقوق‌تون تاثیر داره؟
  چه بخشی از کارتون رو مکتوب می‌کنید؟ گزارش می‌نویسید؟
  به طور دقیقتر می‌خوام بدونم که فرایندهای روزمره سازمانی در فیس‌بوک چطور هست؟ مخصوصا در مورد تفاوت‌هاش با رویه‌هایی که در ایران می‌دید بنویسید.
  اگر بتونید روال‌های روزمره فیس‌بوک رو با گوگل هم مقایسه کنید جالب هست.
