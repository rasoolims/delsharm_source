    پذیرش گرفتن اتفاقاً سخته. مخصوصاْ برای همسرم که مجبور بود فقط از بین چند دانشگاه انتخاب کنه و این که مثلاً امسال کلمبیا توی پردازش زبان دانشجو نگرفت. رتبهٔ فعلی جرج‌واشنگتن توی رده‌بندی‌های مختلف متفاوته  ولی توی رده‌بندی علوم رایانه هفتاد و نهم هستش.
