  سلام. خدا قوت. مثل همیشه عالی ، عالی تر از همیشه.
  اون انقباض مداوم ماهیچه که دکتر بهتون گفت، اسم علمیش یا لااقل اصطلاح رایج انگلیسیش چی میشه؟ چون گویا من گرفتارم ولی هر دکتری که میرم فقط میگن آستیگماتت رفته بالا از بسکه به موبایل نگاه کردی... چه میفهمن سر و کله زدن با نام پای و جی پی یو چیه! :/
