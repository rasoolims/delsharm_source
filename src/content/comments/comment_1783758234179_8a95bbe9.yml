message: |-
  سلام، فصل اول رو خوندم و خیلی عالی بود
  ولی یه نکته که اشاره نکرده بودین و با تصور مردم توی ایران فرق داره بحث کارآموزی بود خوب بود حداقل یه پاراگراف بحث کارآموزی ، حقوق خوبش و شرایطش میگفتین.
