message: |-
  سلام.
  سه بیت از استاد علی معلم دامغانی:
  زمین هیزم کش قوزی ست، قوزی مثل باعورا
  زمان آبستن روزی ست، روزی مثل عاشورا
  ...
  زمین افسرده ی کوری ست، کوری مثل باعورا
  زمان آبستن شوری ست، شوری مثل عاشورا
  ...
  زمین آلوده ی ننگی ست، ننگی مثل باعورا
  زمان آبستن جنگی ست، جنگی مثل عاشورا
  ...
  همین!
