message: |-
  سلام صادق جان!
  خدا رو شکر که یه فرصتی پیدا کردم و تونستم دست نوشته های قشنگتو بخونم. جالب بود و جذاب. امیدوارم که ادامه داشته باشه. برای شما دعا میکنم.
  انشاء الله با عزم و اراده بلندی که داری موفق میشی. قلبتان با یاد حضرت دوست با صفا و نورانی. یا علی
