message: |-
  قلمت مثل قدیم فوق العاده است صادق جان
  امیدوارم به همراه همسرت زورتون به مشکلات بچربه
  اخبارت رو از لطفی گرفتم چند بار
  زنده باشی
  منتظر بقیه اش هستیم
  ممنون رفیق
