message: |-
  خوشحالم
  گفتن حرف دل ساده نیست.
  ولی ساده  گفتن خیلی حرفه.
  تا اینجاش هم خیلی خوب اومدی.
  بقیه اشم خوب میتونی ادامه بدی.
  برات زمان ریزش رحمت الهی و زایش دوباره طبیعت دعا میکنم.
  خداوند به آبی و پاکی و زیبایی دریا هر کسی رو اجابت میکنه.
