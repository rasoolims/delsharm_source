message: |-
  طرحی از خودم:
  راه میرفتم، سبک. بیشتر به پرواز میمانست. ناگهان خودم را دیدم، توده ای از دوده، به سوی خویشم روان، دوان. به خودِ دوده گرفتهام رسیدم. ناگهان به خویش اندر شدم. سنگین شدم ... و سقوط
