message: |-
  پاسخ:
  سلام برادر
  قصه این هست که در ایران ما مسأله چیزهای دیگری است. حق بیمه در امریکا بالاتر از توان بعضی از اقشار جامعه است. نکتهٔ دوم این هست که برای یک سرماخوردگی ساده در امریکا باید نزدیک ۱۰۰۰ دلار خرج کنی. آیا در ایران هزینهٔ درمان بیماری‌های غیرخاص این قدر بالاست؟ فکر می‌کنم مشکل ایران ما بیشتر از بی‌نظمی و «جمهوری پسرخاله» باشد.
