message: |-
  یادم میاد یه بار تو وبلاگ ات گفتی،وقتی رفتم،کتاب عارفانه های چمران و با خودم بردم،بخونش دوباره حالت بهتر میشه
  شاید از این دوگانگی دراومدی
  به نظرم شما همون آدم سابق ایی،نوشته هات میگن ،من سه سال ه یادداشت هات و می خونم،
  میگم سابق ،چون یه کیوان نامی بود اومد سیلیکون ولی، بعد دو سال یه لایو گذاشت تو اینستا،عقایدش به کل برگشته بود ...عجیب بود ،نه عقاید مذهبی صرفا،عقایدش نسبت به وطن
  وطن هرچقدر بد،
  شرایط تلخ
  وطن ِ
  جایی که بهش تعلق داری
  امیدوارم ما و شما عاقبت به خیر شید
