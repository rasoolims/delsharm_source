  ممنون از لطفت. در مورد مسائل مالی که گفتی میشه ۲ تا اجاره خونه به علاوهٔ هزینهٔ رفت و آمد. یعنی رسماً مخارج اضافه میشه یک جورهایی. در هر صورت الحمدلله
