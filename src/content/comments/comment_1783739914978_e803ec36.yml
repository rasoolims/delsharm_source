message: اینطور که من یادم میاد اینجا شعر نو زیاد خوندم . هر چند منم شعر نو خیلی دوست
  ندارم ولی اینی که گفتید خیلی دلنشین بود . قضیه این پس رفت رو نمیفهمم این وسط!!
