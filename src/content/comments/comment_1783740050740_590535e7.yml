date: '2118-09-30T14:09:00Z'
message: سلام. لطفا نویسنده ها و کتاب ها و مقالات قوی ای که مخالف نگاه ماتریالیستی
  و سرمایه داری و یا داروینی باشند؛ اگر می شناسید معرفی کنید. مثلا یه جورایی تیپ توسعه
  و مبانی غرب آوینی و کتاب های مایکل سندل.
