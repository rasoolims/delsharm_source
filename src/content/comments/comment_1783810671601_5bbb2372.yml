message: |-
  دیدگاه کلی شما نسبت به جاهایی مثل فیس بوک چیست؟
  و به طور دقیق تر نظرتان را  راجع به این دیدگاه هم می خواهم بدانم که این شرکت ها به خاطر پول در خدمت استکبار هستند مثلا با هدایت افکار عمومی یا موج آفرینی یا کارهای دیگر
  و شما به عنوان یک فرد مسلمان که تجربه زندگی در آمریکا را دارید برنامه بلند مدتتان برای کار کردن برای این شرکت چیست؟
  ممنون
