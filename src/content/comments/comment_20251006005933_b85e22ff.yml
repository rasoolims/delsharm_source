message: واقعا عالی بود، پرداختن به جزئیات باعث میشه که شخصا با نوشته شما همزاد پنداری
  کنم. خیلی برام جالب بود که در آمریکا یه استاد حاضره کرسی دانشگاه ترک کنه و برای
  صنعت کار کنه، حداقل برای کسی که به خلقیات اساتید ایران عادت کرده عجیبه.
