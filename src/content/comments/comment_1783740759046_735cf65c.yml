  سلام
  الان ۹ فروردین ۹۹ است ک من پست اول سفرنامه ی شما رو میخونم، نوشته ب سال ۹۲!
  و کامنت های دوست واشناها و خواننده هایی ک امیدوار بودن شما برگردید ایران! یا اونی ک گفته از الان میبینم ک دیگه برنمی گردی! چه دلگیره ک پیش بینی ش درست از اب دراومده😔
