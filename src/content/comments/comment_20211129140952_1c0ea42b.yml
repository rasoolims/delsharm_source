message: کمترین مزیت نوشتن حست اینه که یکی مث من میفهمه چقد آدما تو تجربه هاشون به
  هم نزدیکن در عین اینکه هیچ تجربه ای شبیه اون یکی نیس. من تا حالا هزار بار ازخودم
  پرسیدم من اینجا چکار میکنم؟ این کیه کنار من؟ چرا خانوادم نیستن؟ یه حسی مثل شعری
  که نوشتی. انگار ذهنم یه جایی تو کودکی مونده. انگار من متعلق به هیچ جا نیستم.
