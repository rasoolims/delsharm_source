message: |-
  راست می گویی محمّدصادق، من همین الآن هم در صف منتقدینش هستم. شاید منظورم این بوده که هنوز از او خبط کبیره ای ندیده ام. اگر ببینم هم چیز خاصی نمی شود، شاید فقط لحن صحبتم در مورد او عوض شود! همین!
  دیوانه چو دیوانه ببیند خوشش آید
