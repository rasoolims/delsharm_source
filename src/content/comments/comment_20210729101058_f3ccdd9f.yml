  سلام و وقت بخیر خدمت دکتر عزیز
  آقا من که پایه ثابت نوشته های شما بودم از اینکه دیدم با استناد به نوشته های توی کانال های مختلف برای اپلای دیگه ننوشتید خیلی ناراحت شدم.
  از سمت خودم که خیلی خوشحال میشم دوباره بنویسید و تجربه هاتون رو در اختیار ما قرار بدید. خاصه که خیلی اشتراکات زیادی من جمله شهر و رشته و کار و حوزه ی تخصصی با شما دارم.
  ممنونم
