message: |-
  پیر خرد پیشه ی نورانیم
  برد ز دل گرد پریشانیم
  گفت به من در زندگی آزاد باش
  هان گذران است جهان،شاد باش
  میگذره آقای دکتر سخت نگیر
  سلام
  ممنونم
  شاد باش ای عشق خوش‌سودای ما
  ای طبیب جمله علت‌های ما
  قصه‌ها کز عشق بر افلاک شد
  کوه در رقص آمد و چالاک شد
  حدس می‌زنم مصرع سومش این باشه: گفت که در زندگی آزاد باش (وزنش درست میشه)
