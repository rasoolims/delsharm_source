  سلام صادق عزیز
  خوبی؟ این سفرنامه را هیچ وقت دلم نخواست بخونم و دوست داشتم که زودتر برگردی، ولی گویا خبری نیست، اگر هم برگردی بعیده دیگه فرصت کنی با دوستای قدیمی بشینی، امروز بعد از 10 سال که نوشتی، قصد کردم بشینم بخونم، دلم برای حرف زدن باهت خیلی تنگه، کار ت درست بود و هست، امثال تو شاید در زندگی آدم به عدد انگشتای یک دست هم پیدا نشه.
