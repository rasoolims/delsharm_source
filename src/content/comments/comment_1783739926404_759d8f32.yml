name: آقاگل ‌‌
date: '2118-09-30T11:58:00Z'
message: توی چهارمقاله نظامی، استاد برای کسانی که می‌خواهند فن شاعری رو یاد بگیرن
  یه نسخه‌ای می‌پیچه. میگه کسی که قصد داره شاعر بشه باید اول شعر بخونه. و تعداد زیادی
  بیت از حفظ باشه(عددش یه چیزی بین هزار یا ده هزار بود یادم نیست) و حتی اشعاری هم
  به همین شکل بگه. بعد که به همچین جایی رسید باید شروع کنه و فنون شعر رو بخونه و یاد
  بگیره.
