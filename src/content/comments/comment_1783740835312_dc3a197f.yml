  سلام
  من با معرفی یکی از دوستان یه ماهی هست که وبلاگ شما رو میخونم. از کامنت ها این جور برمیاد که مطالبی در متن وجود داشته که الان نیس.  آیا واقعا حذف شدن یا اشکالی هس که من نمی تونم ببینمشون؟
adminResponse:
  date: '2116-09-26T20:23:00Z'
  message: |-
    سلام
    ممنون از لطف شما.
    متأسفانه مشکل بلاگفا بوده که مطالب را حذف کرده. من کپی مطالب (بدون عکس) را دارم ولی باید وقت بگذارم و برگردانمشان.
