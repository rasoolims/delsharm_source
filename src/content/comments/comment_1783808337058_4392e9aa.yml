  message: |-
    سلام
    اون طور که شنیدم تنها کسایی که با این دست  ندادن کنار نمیان و ناراحت میشن ایرانی‌هایی هستن که دوست دارن مثل غربی‌ها رفتار کنن. البته من تا حالا باهاشون برخوردی نداشتم.
    آن مسائلی را هم که گفتی به چشم
