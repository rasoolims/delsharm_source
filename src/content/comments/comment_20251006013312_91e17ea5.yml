  سلام
  بسیار لذت بردم،ممنون،به عنوان خواهر ازتون می خوام قدر موقعیتتون رو بدونید،خسته نشید،ما براتون دعا مى کنیم.یا حافظ من کل غریب
  راستی همه سفر نا مه هارو مى خونم ولى تو کامنت کذاشتن تنبلم،امیدوارم آدامه بدی،هوای خانمتو داشته باش که اون بیشتر بهش سخت میکذره و قدر ایثارشو بدون،یادتم نره!!!!!!ببخشید،من خیلی خود مونی نوشتم!
  موفق و سربلند باشید
  سلام بر بهار
  خیلی ممنون از لطفتون. بابت توصیه‌هاتون بسیار سپاسگزارم
