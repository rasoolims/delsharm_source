  باز هم زیبا بود. نکات جالبی از نحوه تحصیل خواندم. با میل یا نوشته اگر بتونی نحوه ارتباط دولت و صنعت و دانشگاه را بیشتر و دقیق تر توضیح بدی ممنون می شم. دنبال این روشها در نقاط مختلف دنیا به خصوص امریکام
  راستی پری شب خوابتو دیدم. سلام برسون
