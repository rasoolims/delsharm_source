name: علی
date: '2120-09-02T11:00:00Z'
message: |-
  سلام سوالی دارم که شاید سوال خیلی ها باشه و جواب شما شاید اثر گذار باشد در زندگی همان خیلی ها ( متن های شما رو ادبیاتم اثر گذاشت) چون ممکن بعضی ها از الان دارند زندگیشونو به اون سمت هدایت میکنن و براش تلاش میکنند که به لطف خدا برسند به جایی که شما الان هستید  :
  اگه برگردید به نه سال قبل باز اقدام میکنید برای رفتن به آمریکا  یا کلا مهاجرت؟
  شاید کلیشه ای باشه اما مهمه اگه دوست نداشتید اینجا بزارید لطف کنید برام ایمیل کنید
adminResponse:
  date: '2120-09-02T18:06:00Z'
  message: |-
    سلام
    نگاه افراد به زندگی منحصر به خودشونه. همکاری داشتیم که به استرالیا مهاجرت کرد به هدف این که از این «خراب‌شده» برود و هیچ وقت برنگردد.
    تنها چیزی که می‌گم اینه که بر اساس جو موجود تصمیم نگیرند.
    من در دانشگاه علم و صنعت بود که آن موقع حداقل جو مهاجرت نداشت. می‌شنیدیم شریف خبرهایی است ولی ما در این باغ‌ها نبودیم. دلیل من برای مهاجرت صرفاً و صرفاً ارتقاء سطح تحصیلی بود. ظاهراً به آن و حتی بیشتر از آنچه می‌خواستم رسیدم (آن موقع برایم کافی بود یک دانشگاه معمولی خارج از کشور را تجربه کنم).  اگر برگردم به عقب، در زمینهٔ کارهای اداری و مهاجرتی کارهایی را می‌کردم که الان به این زندان دوطرفهٔ (ویزا+تحریم <-> سربازی) دچار نشوم. جزئیاتش را ان‌شاءالله در بخش‌های بعدی همسفر سراب خواهم نوشت.
