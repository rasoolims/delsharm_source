message: |-
  سلام دوباره
  1- در این که خیلی‌ها سوءاستفاده می‌کنند بحثی نیست؛ حرف طیف هم نیست، آقای به اصطلاح بسیجی از نام اسلام و آقای روشنفکر از شعارهای دموکراسی و آقای کمونیست از آرمان‌های پرولتاریا و آقای... (ایضاً خانم بسیجی از ... )
  2- در این که بنده نسبت به برخی تفکرات حب و نسبت به برخی دیگر بغض دارم، حرفی نیست. اگر تعصب مثبت باشد بد نیست ولی اگر تعصب کورکورانه باشد حرف شما درست است.
  3- به نظرم، حرف بنده در مورد اردوی جنوب ربطی به مسائل طیفی و جناحی نداشت، بیش‌تر علاقۀ شخصی‌ام هست به برخی از آرمان‌های فراموش‌شده. نمی‌دانم شاید تعصبی در آن نهفته بود که خودم نفهمیدم.
  4- این که برخی از نام دین سوءاستفاده می‌کنند دلیل بر بی‌دین‌شدن نیست. این حرف‌ها را خودتان بهتر می‌دانید و صرفاً خواستم به احترام شما پاسخی داده باشم.
  5- در این که اسلام چیست فکر نمی‌کنم بین من و شما تفاوت نظری باشد ولی در این که شخص بنده بر چه اساسی اسلام آورده‌ام باید بگویم... خدا به دادم برسد.
  6- مرا ببخشید اگر توهینی در مطالب و توهینی در پاسخم دیدید.
  7- با حرف‌های شما یاد این شعر از مؤدب افتادم، وقت کردید بخوانید
  http://moadab.blogfa.com/post-113.aspx
  می‌گویند دعای پنهانی یک دوست اثرش بیش‌تر از ناله و زاری فرد برای خودش است. فکر کنم منظورم را فهمیده باشید... پس مرا نیز فراموش نکنید
  یا حق
