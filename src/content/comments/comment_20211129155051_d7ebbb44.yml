  سلام
  دورود بر شما آریایی آسیایی!
  خب خدا رو شکر با اومدنت به اینجا اوضاع بهتر شده. نیویورک چیه آخه؟ شلوغ و همش تو هم تو هم. راستی موقعی که نمی خوای با خواهران اهل کتابمون دست بدی چی بهشون می گی؟ از دین و اسلام براش می گی؟ لطفا انگلیسی ش رو بنویس، شاید به دردم بخوره.
  تا کی قراره تو سانی ویل باشید؟ راستی مگه خونه ای که توی نیویورک داشتید رو شما از دانشگاه اجاره نکرده بودید؟ خب چطور شما(مستاجر) باز خودتون اون رو اجاره دادید؟ میشه؟
