  عجب! با زن ازدواج کرده که فمینیست باشد؟؟ :))
  اون نکتهء پرستارها که توی پرانتز نوشتید مرا یاد حرف مادرم انداخت. از تجربه های دیده شده اش میگفت که ماماها عمرهای طولانی و سلامت دارند. خودش میگفت چون به زنده شدن آدمها کمک میکنند خدا به عمرشان برکت میدهد. حالا اینجا درست برعکسش...
