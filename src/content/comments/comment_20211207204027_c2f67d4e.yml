  سلام
  از چیزی که متنفرم ولی گاهی سراغ را می‌گیرد حسرت نوستالژیک است. نوستالژی تا حدی خوب است ولی از حدی بیشتر مثل سم می‌ماند. تازگی حتی متوجه شدم یک رده از افسردگی‌ها نامش افسردگی ناشی از نوستالژی است.
