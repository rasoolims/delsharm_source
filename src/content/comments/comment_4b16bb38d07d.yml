message: |-
  بسم الله الرحمن الرحیم
  سلام - فصل پنجم رو الان خوندم و بعد تقریبا ده روز فرصت و وقت شد که بخونم
  خدا قوت و خیلی خوب بود
  اول یک جا صحبت از ریزپردارنده و کامپیوتر مرکزی داشتی که خیلی خوب و عالی بود برا اینکه برا انسان
  به نوعی ذکر یک جزء تخصصی که شکل ثبت طرح و اختراع برا ریزپردازنده ها رو داره ، هست
  هر چند مثل اون پوستر علمی تو برا مایکروسافت نصفه نیمه موند و اینو بدونی خوب هست که
  اولین پردازنده ها در اواخر دهه شصت و اوایل دهه هفتاد میلادی درکامپیوتر مرکزی هواپیمای جنگنده اف چهارده تامکت کاربردی شده
  چیزی که IEEE سال 1998-97 بود که روشن اعلام داشت
  اشاره به جزییات درفرهنگ ها بویژه اون حاج خانم اهل کارولینای جنوبی از نقاط قوت و شگفت انگیز
  این فصل بود و اون داستان عینک خریدن هم منو برد به یک دهه قبل و خرید عینکی چند منظوره آفتابی و مطالعه و ... در و چالوس
  یک دکتر تو درمانگاه امام رضا ع و گلسرخی ساختمان پزشکان
  نوشته ها و ذکر واقعه های تو ، انسان رو یاد واقعه هایی شبیه به
  واقعه های خودش میندازه حالا تو یک مقیاس دیگه و نقطه جغرافیایی دیگه و این چقدر خوب هست
  ممنون برا مطالب و ذکر واقعه ها آقا محمد صادق نازنینم
  ذکر و خیر تون رو لحظه هایی و جاهایی هست
  سلامت و شاد و سربلند باشی
