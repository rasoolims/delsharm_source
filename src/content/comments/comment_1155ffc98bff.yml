  سلام اقای رسولی، وقت تون به خیر
  سوالی داشتم ازتون البته با این پست معرفی کتاب زیاد مرتبط نیس! میخواستم بدونم در این مدت نسبتا طولانی که در دانشگاه کلمبیا مشغول تحصیل بودین اونجا - یا دانشگاه های آمریکا بطور کلی- از نظر فعالیت تشکلی دانشجوها چطوره اوضاع... مثلا مثل ایران که تشکل های مختلفی فعالیت دارند و جنبش های دانشجویی و بحث های اجتماعی سیاسی و غیره ... اونجام همینجوره و آیا اونا سایتی صفحه ای چیزی دارن بشه باهاشون ارتباط گرفت...
  ممنونم از توجهتون
