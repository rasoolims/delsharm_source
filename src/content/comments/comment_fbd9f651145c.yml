  باید هم این همه گیر بدهند سر برنامه نویسی. چون کار تیمی است. Reuse کردن در ایران خیلی عقب افتاده....  یک نفر که میره پروژه تعطیل میشه.... حالا میفهمم تو شرکت این آقای غیاثی برای چی گیر میده اینقدر سر برنامه نویسی... تا حالا 6 نفر مختلف روی پروژه طی دو سال کار کردند ولی هنوز پروژه سر پا است و جلو میره و محصول شده...  آدم ها هم عوض میشه!
  اون خاک بر سری را هم خوب اومدی....
