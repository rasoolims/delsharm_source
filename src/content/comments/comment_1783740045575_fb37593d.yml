  سلام
  این همه من اینجا تایپ کرده بودم. حرمت دوستی 7 ساله به درک. حرمت تایپم رو نگه می داشتی یه جواب می دادی. انصافا که باید به اون پیرمرده معرفی شی.
  سلام
  شرمنده ولی سؤالی نفرستاده بودی که جواب بدم.
