message: |-
  سلام
  بحث جالبیه. سوالاتی که مطرح کردی سالهاست که فکر من رو مشغول کرده. با نظر اول آقا حمید موافقم. یعنی اونا دقیقاً تو کتشون رفته که منفعت فرد در گرو منفعت جمعه. یعنی اجباراً قبول نکردن بلکه به باور رسیدن. به خاطر همینه که کم پیش میاد نقض بشه. تو وقتی چیزی رو عمیقاً باور داری اینجوری نیست که با عصبانیت فراموشش کنی اما وقتی یه چیزی رو همینطوری قراردادی پذیرفتی اون موقع حرف تو درسته.
  و حالا این که چطور تو کتشون رفته بازم با نظر حمید موافقم. ممکنه هم روشنگری و فرهنگ سازی باشه هم قانون و مجازات. در این خصوص نظر فاطمه خانم هم حرف درستیه. اونها تکلیفشون با خودشون روشن شده و روی این سیستمی که دارن کار کردند.
  اما این که چرا ما بعد از مدینه النبی هیچ وقت نتونستیم به این برسیم از نظر من دلایل مختلفی داره.
  1- اینکه دین امری تفسیر پذیره و ما آدمهایی با تفاوتهای اساسی فکری داریم که همه خودشون رو دیندار می دونند. یک بعد این قضیه همین الآنه که نه در سطح مسئولین و نه در سطح مردم مجموعه اصول قابل قبول یکسانی ایجاد نمی شه که بر اساس اون اخلاق در جامعه حاکم بشه. یک بعد دیگه این قضیه اینه که این تفسیرات مختلف (چه از روی غرض چه عقیده) از سوی علما مختلف در طول تاریخ باعث اضافه و کم شدن یا سبک و سنگین شدن خیلی مسائل و رسیدن به دست ما در این برهه تاریخ شده فلذا این یعنی تفسیرپذیری به توان 2. این یعنی اتفاقاً ما اونقدرها هم منبع نداریم.
  2- توی یک شرایطی که جامعه مریض و خرابی داشتیم، عده ای تصمیم گرفتن با حکومت اسلامی درستش کنند. حالا قراره همین مردم که مشکلات اساسی دارن بشن ارکان پیاده سازی حکومت اسلامی چه در مقام مسئول و چه در مقام حاکم. خب نمیشن. حالا اینکه چرا در صدر اسلام شدن و الان نمیشن؟ اولاً چون مشکل 1 وجود داره و ما رسول اللهی نداریم که حقیقت دین رو تمام و کمال معرفی بکنه. دوم رسول الله و افراد دیگه ای (مثل علی ع) نداریم که اونو به طور کامل در عمل نشون بدند. سوم حتی در بین کسانی که می خوان حکومت اسلامی رو برقرار کنن یک دیدگاه و انگیزه مشترک وجود نداره و باطل بینشون زیاده.
