    سلام
    سنگین نبود
    . در واقع ظاهراً چون دیباچهٔ کتابی دانشگاهی بوده سعی بر آن شده با ادبیات علوم انسانی با مسأله مواجه شود و انواع فرضیه‌ها را وارد کند و بعد ردشان کند
    چیزی شبیه سبک کتاب‌های شهید مطهری اما با حاشیهٔ کمتر و تمرکز بر اصل مطلب
