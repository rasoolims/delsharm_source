  عالی مثل همیشه. واقعاْ که قلم خیلی خوبی داری. اولش کمی ناراحت کننده بود و امیدوارم که هم خودتون و هم همسرتون همیشه صحیح و سالم باشید.
  اما تیکه دوم صحبت هاتون پر بود از تجربیات خوب و کارگشا برای ما. واقعاْ ممنونم ازت صادق جان ایشالا که سال دیگه تو گوگل میترکونی :)
