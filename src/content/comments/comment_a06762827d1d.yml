message: |-
  در پاسخ به یکی از نظرات فرمودید: فقط مطمنید که خواهید مُرد.
  ما هم هشت ساله اومدیم مثلا برا ارتقاء تحصیلی... و هر روز هشت سال گفتیم میخواهیم برگردیم و هرگز به ذهنمون خطور نکرد نمیخواهیم! و هر بار کسی شماتت کرد چرا حرف از برگشت میزنید، در کنار سایر دلایل نتونستم یک حرفی رو بگم، و اون اینه مطمئنم یک روزی خواهم مُرد و میترسم اینجا بمیرم! از کمی توشه ام می‌ترسم امیدوارم دوستی آشنایی رهگذری هوامو داشته باشه و با عبور از کنار قبرم برام طلب مغفرت کنه! می‌ترسم بمیرم و بچه ام تو این غربت تک و تنها بمونه! حقیقت اینه از مرگ در اینجا می‌ترسم! ارزوی شهادت داشتم و دارم... و اگر عملم اونقدر بود که میتونستم مطمئن باشم لایق شهادت هستم، شاید این ترس ازم جدا میشد.
  نمیدونم برگردم ایران ایا کاری خواهم توانست بکنم یا خیر! ولی الان حسم اینه که خوشی اینجا، فقط مال خودمه، خوشی خصوصی، و تو مرام ما خوشی تکی معنا نداره.
