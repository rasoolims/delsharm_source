message: |-
  اینکه میگی کفر از سر رو روش می باره درست نیست. نه اینکه بگم کفر بده ،منظورم اینه که ملت آمریکا مذهبی هستند. شاید در نیو یورک نه اما در جنوب و میدوست مردم بشدت مذهبی و خب در نتیجه متعصب هستند. مسئله اینجاست در آمریکا برای کسی مهم نیست که شما اعتقادت چیه ؟ شب با کی می خوابی؟ الکلی هستی یا نه؟ به کسی ربطی نداره. شما باید همون کاری رو که ازت میخوان درست انجام بدی. این یکی از فواید حکومت سکولاره : برخی از رفتارها در حریم خصوصی افراد هست و افراد دیگر و حکومت حق مداخله در آن را ندارند. خوش به حالشون که امر به معروف و نهی از منکر ندارند. که اگه داشتند شما باید به زور گوشت غیر حلال اونا رو می خوردی.
  سلام البرز
  من که نرفتم ولی دوستانی که رفتند می‌گن که روزهای یک‌شنبه کلیساهای نیویورک خیلی پر هستش ولی فضای حرفه‌ای این‌ها اصلاً رنگ و بوی مذهبی نداره.
  این که می‌گم کفر زیاده چون دیدم کسایی که به کافر بودن خودشون افتخار می‌کنن. و هیچ جوری برای من قابل فهم نیست که چطور و به چه عنوان باید کار اخلاقی انجام بدن.
