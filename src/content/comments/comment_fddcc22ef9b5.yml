message: |-
  3- نکته بعدی اینه که اگر رفتاری برآمده از باور درست باشه باید در همه جا جاری و ساری باشه. چرا این آمریکاییهای با اخلاق خوب در برخورد با ملتهای دیگه اینقدر خوش اخلاق نیستن. دولت ظالم آمریکا و حامی اول اسراییل با پول مالیات همین مردمان خوش اخلاق اداره میشه. اگر خوش اخلاقن چرا با همه نیستن؟ چون انسانها رو درجه بندی میکنن و تو درجات به عراق و افغانستان که می رسیم دیگه زیاد مهم نیست. به خاطر همین تو حمله به تروریستها حالا چند تا زن و کودک هم کشته شدن زیاد مهم نمیشه. نزدیک به یک میلیون نفر در عراق کشته شدن اما کک این ملت خوش اخلاق هم نگزید که آقا ما کلا به چه دلیل و اجازه ای به عراق حمله کردیم؟
  البته همه آنچه گفتم به معنای این نیست که حالا اونا بد و ما خوبیم. راجع به خودمان باید در فرصتی دیگر بحث کرد که چرا ظاهرمان بداخلاق شده است.
  در خود نیویورک چرا هارلم با اون وضعیت هست؟ در میان ایالات چرا به سمت جنوب که میریم دیگه بوی رفاه و عدالت به شدت کم میشه؟ پس معنای  اخلاق خوب چیه؟
  اخلاق خوبی که فقط یه قرارداد جمعی برای بهتر زیستن و بیشتر لذت بردن از زندگی به سبک مدرن.
  یه کفر پیچیده با ظاهری فریبنده. مخصوصا که با بداخلاقیهای خودمان مقایسه بشه و این سوال که شما مطرح کردی شدت بیشتری میگیره. آمریکا الان محور تکثیر بدی در عالمه. صنایع تسلیحاتی، گسترش جنگ در فضای جهانی، توسعه صنعت پورنوگرافی و سود سرشار آن، مواد مخدر و نقش آمریکا در توزیع جهانی آن و...حتی نقش آمریکا در بحرانهای جهانی مثل زیست محیطی هم از بیقه بیشتره. معاهدات بین المللی رو در زمینه که مغیار با رویکرد سیاسی و اقتصادیش باشه امضا نمیکنه مثل بحث گازهای گلخانه ای. توسعه تسلیحات هسته ای. چطور بپذیریم که مجموع آن آدمهای با اخلاق چنین نتایجی رو به بار آوردن. اگه بگی که مردم نیستن و دولته. اولا دولت با پول مردم چنین میکنه. ثانیا مردم ضعیفی هستن که اجازه میدن دولت با پولشون این همه بدی رو منتشر کنه.
  سلام رفیق
  خدا خیرت بده. جواب بلند و مستدلی‌ست
