message: |-
  سلام
  راستش سر کلاس شبکه عصبی بودم و حوصله‌ام از منطق فازی سر رفته بود که وقتی موضوع نوشته‌ات را دیدم نتونستم تا آخر کلاس صبر کنم و همونجا خواندمش. دیدن این پست حسابی حالم رو جا آورد.
  چند وقت هست که سوالی توی ذهنم هست و فکر کردم شاید سفرنامه‌‌ات جوابی برایش داشته باشه.
  یادم هست خود شما مطالعه کتاب "توسعه و مبانی تمدن غرب شهید آوینی" رو بهم پیشنهاد کردی. خیلی دوست دارم حالا که در پایتخت تمدن غرب هستی بنویسی که چیزی که می‌بینی چقدر شبیه به جامعه‌ای هست که شهید آوینی توصیف می‌کنه؟
  امیدوارم مجالی پیش بیاد و لابلای سفرنامه‌ات جواب سوالم را پیدا کنم.
