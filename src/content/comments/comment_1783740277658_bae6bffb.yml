  سلام
  مطالبی که می‌نویسید رو می‌خونم جالبه. ولی لطفا اون عکس خالکوبی رو بردارید. در شان وبلاگتون نیست!
  سلام
  خیلی ممنون از تذکر شما. زمانی که این عکس را گذاشتم فکر نمی‌کردم مشکلی داشته باشد. به روی چشم. عکس را برداشتم
