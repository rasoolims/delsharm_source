message: |-
  سلام
  من معتاد وبلاگ شما شدم
  مطالبتون خیلی جالب هستش.
  قبلا خاطرات سفر هر کی رو خونده بودم خیلی اهل خودباختگی بودند
  ولی شما خیلی فرق دارید
  امیدوارم موفق باشید
  سلام
  نظر لطف شماست.
  خیلی متشکرم
