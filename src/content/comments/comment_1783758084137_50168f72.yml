message: |-
  سلام
  محمد صادق
  الان ساعت  2 صبح
  ،شب جمعه
  بین نوشته های تو+ادامه سوره اسرا+دعای کمیل +مقاله تحقیقاتی+برنامه ریزی کنفرانس ها+ اینده،غوطه ورم
  فردا شهدای غواص مهمون ما هستند
  جای تو خالی..
  از مرزن اباد میرن به سمت چالوس و تا ساری و و تقسیم میشن به شهر هاشون
  پیامی اوردند...
