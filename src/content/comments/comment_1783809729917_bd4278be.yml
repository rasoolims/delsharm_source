message: |-
  من تجربی‌خوانده‌ی مبتلا به علوم انسانی عادت نکردم به این وضعیت...
  و هنوز نمی‌تونم فضای فکری منهای علوم انسانی رو درک کنم
  سختیش هم اینجاست که آدم‌های این فضایی که من درش هستم، تصور می‌کنن چون تو رشته تجربی به نقطه نسبتا خوبی رسیدن پس صلاحیت نظر دادن در همه حوزه‌ها رو دارن و علوم انسانی رو هم یه شاخه علمی مزخرف و بیهوده تلقی می‌کنن و اصلا شأنی براش قائل نیستن
  فضای غریبیه ولی بهبودش ضروریه و البته سخت
