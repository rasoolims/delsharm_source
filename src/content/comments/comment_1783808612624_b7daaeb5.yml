message: |-
  سلام
  دو شبه با تمام مشغله و گرفتاری که دارم تمام مطالب رو خوندم
  دم شما گرم
  فصلهای ابتدایی که سختی های اوایل هجرت بود و فصل 36 که اوایلش از اوضاع و احوال ایرانی ها نوشته بودید رو من بیشتر پسندیدم
  منتظر مطالب بعدی شما هستم
  ان شاءالله موفق باشید
