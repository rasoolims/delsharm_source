message: |-
  جناب رسولی سلام
  میخواستم پیشنهاد بدم، یه کانال تلگرامی برای سفرنامه تون درست کنید. خیلی دم دست تر و قابل استفاده تره. اگر هم که یه همچین کانالی دارید که نشانیش رو بذارید که استفاده کنیم.
