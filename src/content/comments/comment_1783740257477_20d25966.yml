name: جسد زنده
date: '2108-01-09T18:59:00Z'
message: |-
  میلرزید ... اگر دستکشم را هم به او بدهم، رئیسش میآید و  از وی میستاندش. کاپشن و کلاه و شال هم همینطور ... گذاشتم  و گذشتم.
  با شال و کلاه و دستکش روان شدم
  انگار مرا نگاه میکرد تمام پیاده رو
  ای تفو به این غیرت.
  یا حسین
