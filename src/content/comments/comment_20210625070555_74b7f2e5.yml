  سلام .... محمد صادق عزیز ..... نوشته ها و کتاب های رو وبلاگ رو که معرفی
  و توضیح میدی خیلی خوب هست .... اگه مثلا بشه نقطه نظرات اندیشمندا یا افرادی مطرح تا
  مردم عادی و... یعنی خواص و عوام رو  هم در باره کتاب ها ( اگر خونده باشند  ، بیارید هم خوب هست ....)
  ___  شعر و سفرنامه و رویداد های علمی و کاری .... رو قبلا  بیشتر می نوشتی ..؟
  الان دیگه چرا نمی نویسی ....بیشتر  بنویس .... دوستت داریم .... موفق باشی
