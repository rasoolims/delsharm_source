message: |-
  سلام
  مطالب 10 و 11 را با هم خواندم. در مشهد.
  این بند آخر مطلب 11 را پیش تر از مهدی ملکی هم شنیده بودم. عجیب بود برایش که این کره ای های (از نوع جنوبی شان) بی دین و بی خدا و اصلا بی هیچی چه جوری این همه کار می کنند. یادت هست که مهدی ملکی خودش روی اعصاب بود از بس فعال بود، حالا رفته بود کره و کم آورده بود.
  جدیدا حس می کنم که یزد یه خوبیِ خیلی خوب داره و اون اینکه وقتی عصر تصمیم بگیری می تونی صبح مشهد باشی.
