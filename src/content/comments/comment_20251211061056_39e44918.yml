message: |-
  ارشد که بودم پایان نامه رو برای استاد داور بردم. یکی از تصاویر رو نشون داد و گفت چرا رفرنسش رو ذکر نکردی؟
  گفتم عکس رو تغییر دادم و روش ویرایش اعمال کردم دیگه به نظرم لازم نیست رفرنس بدم.
  گفت : خلاصه حواست باشه فردا روز شاید رئیس جمهور شدی اونوقت همه ی اینا رو از پروندت میکشن بیرون.
  همیشه میدونستم که شاید هنوزم خیلی این کار مد نباشه ولی تا چند سال دیگه اگه پایان نامه ها بره رو اینترنت، معلوم میشه که چقدرشون تکراریه و چقدرشون کاملا کپی.
