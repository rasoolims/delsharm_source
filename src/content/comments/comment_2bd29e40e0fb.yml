  سلام!
  کتاب خوشه های خشم از جان اشتاین بک رو خوندین؟
  فکر کنم داستانش تو همین مایه های این کتاب باشه که خوندید
  جالب اینکه این کتاب فصل های زوجش اگه درست یادم باشه فقط توصیف اوضاع و خارج از شرح داستان بود تا جایی که اگه شما هیچ کدوم از اون فصل ها رو نمیخوندید هیچ مشکلی تو درک داستان پیدا نمیکردید!
  و جالب تر اینکه این کتاب هم جایزه پولیتزر رو برده :)
