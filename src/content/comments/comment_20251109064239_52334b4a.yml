  درود و سلام
  تا حدی غیر از حدیث چهارده معصوم که موثق و ضریب تاثیر بالایی داره در موضوع امام عصر و زمان مون بعدش کتاب تخصصی و به روز که موثر باشه رو ندیدم.
  اکثر کتاب های با این موضوع رو از نوجوانی تا الان دو دهه خوندم و مجهولات همچنان باقیست و تخصصی باگ زیادی داره و در کتاب های آخرالزمانی و ارزیابی دوره های تاریخی چه در زمان تمدن اسلامی و تاریخ ایران و رنسانس در اروپا و پیدایش امریکا و اتفاقای آسیا و...  همه رو بررسی کنید میبینیم اعتقاد به منجی در همه ادیان وجود داشته ولی با تفسیرات گوناگون و در ادامه روشنه که کتاب هایی در ایران چاپ میشه به شکلی سطحی و با تفسیر و نظر میل به خودی هست بدون اینکه با واقعیت روز متناسب باشه
  کاربرد و عمل به اینها رو در زندگی و رفتار و فرهنگ و پیشرفت کشور و آخرت و دنیا در جامعه پیدا کنید
  می رسید به آیه دو صف که : یَا أَیُّهَا الَّذِینَ آمَنُوا لِمَ تَقُولُونَ مَا لَا تَفْعَلُونَ
  و این یکی از باگ های بزرگ کسانی که ادعای دین و امام زمان رو دارند و به وقتش میشن منتظران امام حسین ع در چند قرن پیش که بعدش واقعه کربلا رو رقم میزنند.
  .
  نمونه ذکر امام عصر و زمان و اعتقاد به این موضوع آخرالزمان در وسط های دهه ۹۰ به عزیزی از دانشگاه شهید بهشتی که از ادیان دیگه بود و مذهبی در دین خودشون و تفسیر جالبی داشت از اعتقاد به منجی و ظهور
  یادمه یه روزی سال ۹۵ وقتی منتظر تا برسیم به جلسه سمینار استاد و محققی در فیلد پزشکی از MIT که ایران اومده بود و در علوم پزشکی و مرکزی سمت انقلاب در خیابان ایتالیا جلسه ای تخصصی برای فیلد تخصصی پزشکی و زنگ زدم وسط های صبح به ظهر و مادرش گفت داره نماز میخونه و الان حرکت و وقتی اومد صحبت که روزی پنجاه شصت رکعت نماز میخونند در آیین و دینشون و بعدا که سوال از موضوع مهدویت و امام زمان و منجی و نظر دین و آیین شون رو پرسیدم و در جواب صحبت های با موضوع امام زمان و منجی شون احتمالا تفسیر و تحلیل بیشتری داشت
  .
  نمونه بعدی و این اواخر در سال ۱۴۰۰ و زمان فیلد پرواز و خلبانی و نیروی هوایی و هوافضا که برای نماز اول وقت به عصر تجریش بودم و در تجریش وقتی برا نماز و قبل نماز مغرب و عشا وقتی یکی از رییس جمهور های اوایل محبوب در قشر محرومین و بعدا مغضوب در بازی سیاست رو دیدم و بعدش وقت شد و سلام و احوالپرسی و بعدش دو تا سوال پرسیدم و [ قبل پرسیدن سوال دوم که با موضوع پیشرفت دانش و نبود برنامه بلند مدت در کشور بود که باعث مهاجرت جمعی موثر شد]
  و سوال این بود که زمان رییس جمهور بودن در مسافرت های خارج از کشور وقتی میرفتید اسم امام عصر و زمان رو میگفتید و این موضوع که اگر انسان بلغزه و جمعی میلغزند و آیا اینو بعدا دیدید که مثلا صحبت از امام زمان در جامعه ایران تا جایگاه و مراجع خارج از کشور بویژه اروپا و امریکا چه شکلی هست و بعدش تفسیر نسبتا قشنگی در جواب داشت و چه حد در جامعه موثر بود رو نمیدونم
  سلامت باشید و سپاس آقا محمد صادق عزیز و نازنین
  [ این متن و یادداشت نسبتا گسترده شد و الان نزدیک زمان ۱۳:۴۵ یا ۱:۴۵ امروز ۲/۲/۲ شروع به ذکر و گفتن اینها و زمان به ۱۴ که ۲:۲۲ و ۲ و نیم بعد ظهر که اومدم پیام رو بفرستم و بلافاصله دوستی نازنین و اندیشمند در علوم پزشکی زنگ زد و بالای نیم ساعت تخصصی صحبت و الان ۳:۱۳ بعد از ظهر پیام و سلامت باشید]
  عید فطر گرامی و مبارک دکتر عزیز و نازنین
