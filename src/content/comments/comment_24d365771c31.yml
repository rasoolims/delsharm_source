message: |-
  سلام، تو این روزها به نظرم بیشتر مردم ایران برای آرتین اشک ریختن، جگر آدم کباب میشه برا این بچه ۵ ساله، اما اینستاگرام ازش میترسه، آرتین و آرشام رو حذف کرده، به خاطر آزادی بیان بیش از حدشونه، فکر می‌کنم از ایرانی هایی که اونجا کار میکنن برای اهداف ضد ایران استفاده میکنه. بعضی هاشون حتی نمیدونن دارن چکار میکنن، همین که حقوق خوب میگیرن کفایت میکنه.
  خانم مرضیه هاشمی اخبار گوی شبکه پرس تی وی، آمریکایی هستن، تو یه برنامه با مرحوم طالب زاده صحبت میکردن. گفتن تو آمریکا وقتی یه گروه تشکیل میشه. حکومت کاملا مواظبه، اگه گروه مورد تایید قرار نگیره، صریحا حذفش نمیکنن، چند نفر رو میفرستن داخل گروه و از درون نابودش میکنن، اینم یه جور آزادی بیانه به سبک آمریکایی
