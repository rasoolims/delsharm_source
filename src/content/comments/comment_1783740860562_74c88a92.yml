message: |-
  من اولین نقد ادبی تاریخ را که انسانهای غارنشین از آن استفاده می کردند را بر شما وارد می کنم و می گویم
  ایول برادر
  این علم وصنعت عم تنها چیزی که پرورش نداد مهندس بودفی الحال که شما با این قلمتان ما را مسحور کرده اید
