  سلام آقا رسولی
  بنده بسیار از این شعر شما خوشم آمد. کلا سبک های شعر سرایی آشنایی ندارم ولی اگر امکان دارد بفرمایید که چگونه می توانم برای سرودن اینگونه شعرها آماده بشم. البته میدانم که بخش زیادی از شعر سرایی به شاعر بستگی داره یعنی باید طبع شعر داشته باشه ولی به نظر بخشی از اون هم نیاز به آموزش و یادگیری داره. اگر شعرایی که در این سبک شعر میسرایند مخصوصا شعرای عصر حاضر. بنده گشتم در تگ "سیاه مشق: فقط همین یک شعر وجود داشت. خاطرم هست که شعرهای دیگری هم در وبلاگ سابقتون وجود داشت.
  با تشکر فراوان
