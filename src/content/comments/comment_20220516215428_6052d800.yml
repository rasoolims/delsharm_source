  سلام صادق جان
  اولش با تمرکز محیط را تصور می کردم. وسطش را از ظنز گویی خندیدم . اخرش برعکس شد.
  ایشالله خوب کار کنی نه برای کسانی که تفکرشان را قبول نداری بلکه برای اینکه بیشتر یاد بگیری.ایران به این دانش برای ساخته شدن نیاز دارد. جوانان زیادی در ایران منتظر این دانش هستند تا ایران را بسازند.
