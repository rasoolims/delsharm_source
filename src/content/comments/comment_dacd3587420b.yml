message: |-
  ۱. چقدر زشته استادها وسط دفاع، اونم دکتری غذا، اونم چوب‌شور می‌خورن. فکر می‌کردم فقط اساتید خودمون بی‌فرهنگن!
  ۲. چقدر بده دانشجوها سر کلاس غذا می‌خورن. یا حتی توی کلاس با لپ‌تاپ کاری غیرمربوط انجام می‌دن. اگه حاضر غایب نداره خب نیان! مجبورشون که نکردن.
  ۳. قوانین تقلبش خیلی جالبه و منم خیلی سعی کردم به همین اندازه تقلب نکنم. ولی به نظرم حتی قوانین‌ش از اصول اخلاقی من هم سفت و سخت تره. راستی پنالتی دیر تحویل دادن تمرین یا پروژه‌ی درسی چیه؟ من معمولا از ددلاین عقبم!
  ۴. در مورد آزادی دانشجو هم من خودم روش مرحله به مرحله رو خیلی بیشتر دوست دارم و دوست ندارم ولم کنند. ولی خب دوست دارم تو همون کارها هم ایده بزنم. اینکه فقط عین ماشین از آدم یکسری کار رو می‌خوان بده. ولی خب وقتی پول می‌دن، وسطش یکسری خرحمالی هم باید کرد دیگه!
  ۵. من هم خودم دانشگاه وابسته به دولت رو دوست ندارم، ولی ازهری می‌گفت تو صنعت وقتی ۱۰۰۰ تومن برای تحقیق بهت پول می‌دن، حداقل انتظار دارن ۱۰۰۰ تومن براشون محصول سود‌آور ایجاد کنی، که در تحقیق که خیلی چیزها سعی و خطاست و شاید نگیره خوب جواب نمی‌ده. برای همین دولت همیشه باید کمک کنه. اما به نظرم آمریکا نسبت به بعضی کشورهای دیگه خیلی دانشگاه‌هاش دولتیه و نمونه‌اش NSF که خیلی از پروژه‌هایی که بودجه‌شون رو تامین می‌کنه به درد جامعه و صنعت نمی‌خوره. از لحاظ صنعتی بودن دانشگاه‌ها فکر می‌کنم فنلاند و خصوصا آلمان نسبت به جمعیت و بودجه‌ی دولتی‌شون بهتر عمل کردند.
  ۶. در مورد سگ دو زدن دانشجو برای اساتید هم، این قضیه همیشه برای دانشجوهای تحصیلات تکمیلی (حتی تو ایران) وجود داشته، خصوصا وقتی پای پول و بورس وسط باشه.
