message: |-
  خوب بود صادق جان
  متاسفانه تاثیر درس خواندن چند سال اخیر باعث شده روش کتاب خواندن و سفرنامه خواندن رو فراموش کنم.
  خیلیها مثل من هستن، چشم هامون میگرده دنبال اطلاعات توی متن، شاید فراموش کنیم که شاخ و برگ نوشته و جزئیات به ظاهر بی اهمیت، خیلی مهم هستن.
  این متن رو با حول و ولع اساسی میخوندم، به شدت منتظر بقیه اش هستیم.
  خوب باشی
  فعلا
