message: |-
  ممنون بابت پاسختان.
  بله قبول دارم در فضای رسانه‌ای تقریبا همه جا این گونه است.
  درباره واقعی‌بینی شاید حق با شما باشد اما درباره ایران به نظر من ربطی به مسائل اخیر ندارد. هر وقت و همیشه حرفی می‌زدی در خطر بودی. مثلاً فرهاد میثمی زمانی به صلح‌آمیزترین شیوه اعتراض کرد که فضا امنیتی نبود. البته شاید شما نظرتان درباره‌اش چیز دیگری باشد که اگر هست مشتاقم بشنوم.
adminResponse:
  date: '2022-10-25T08:39:00Z'
  message: |-
    به صورت مطلق حق با شماست اما به صورت نسبی و تاریخی با واقعیتی به اسم ایران مواجهیم که تا همین هشتاد سال پیش پزشکی در زندان پهلوی بوده که با آمپول هوا ترتیب مخالفان را می‌داده. یعنی ما با انواع افراد مواجهیم که سطح رواداریشان متفاوت است. یکی می‌شود قاسم سلیمانی یکی دیگر می شود بسیجی دهن‌گشاد. لذا یک بسته کردن را نمی‌شود پسندید. اما در مجموع بله. حرف شما درست است. زمان دانشجویی ما تعدادی از بچه‌های صنفی به کیفیت غذا اعتراض کردند بهشان انگ امنیتی زدند. چرا؟ چون آن مسؤول دنیاطلب فقط برایش حفظ میزش مهم بود.
    یکی از دخترهای دانشکده ما کشته شد. چطوری؟ کامیون بدون راهنمای اضافی دنده عقب وسط روز کار از روی دختر مردم رد شد و لهش کرد.
    بعد دفتر ریاست دانشگاه چه خبری تیتر کرد؟ برخورد دختر دانشجو با کامیون در دانشگاه!
    تو خود حدیث مفصل بخوان از این مجمل
    متأسفانه فضا بلبشوست
    بهترین سیستم فکری هم بیاید با این نبود خودآگاهی راه به جایی نمی‌برد. اینجاست که پیشنهاد به گفتگو می‌دهم
