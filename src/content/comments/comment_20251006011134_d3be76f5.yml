message: |-
  سلام
  مطلب رو خیلی خوب نوشتید، در واقع بهترین نوشته‌ای بود که از شما خوندم.
  نگران حال جسمی شما هستم و از خدا براتون شفا می‌خوام.
  خوشحال هستم که دارید خودتون رو در طولانی مدت آماده می‌کنید برای برگشتن. فکر می‌کنم شما وقتی می‌رفتید می‌دونستید این رو که تحصیل در غرب، آدم رو برای کار در همین موقعیت‌های شغلی که ذکر کردید، آماده می‌کنه. سوالی که دارم این هست که آیا شما به جوان بیست و چند ساله‌ای که باورهایی مشابه باورهای شما داره، توصیه می‌کنید همین راه رو بره؟ آینده خارج رفتن برای آدمی که به انقلاب اسلامی و جمهوری اسلامی باور داره، چطور هست؟ کار کردن در شرکتی که آدم اعتقاد داره به درست نبودن کارش، چه احساسی داره؟
  حالا که از اینا دیگه نمی‌نویسید، از اونا بیشتر بنویسید بی‌زحمت :)
