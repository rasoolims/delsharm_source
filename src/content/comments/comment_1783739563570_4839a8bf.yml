message: |-
  سلام و خسته نباشید آقا صادق
  اول عیدت با کمی تاخیر مبارک باشه
  جا داره از خاطراتی که مینویسی با مشغله و شرایطی که گفتی شخصا تشکر کنم
  چون برای افرادی امسال خودم خیلی کمکه که با محیط اونجا آشنا بشن و تصمیم شون را بگیرم، متن کامل و واضح بود اگر چه گفتن بعضی چیزا واقعا سخته ولی شما با صداقت گفتی،
  به هر حال زندگی سردی و گرمی زیاد داره و نابرده رنج چیزی حاصل نمیشه
  انشاا... با توکل بتونی قدم هات را محکم برداری
