  سلام بر دوست عزیز
  ممنون از مطالب خوبی که می نویسید. ایشالا ادامه دار باشه. در مورد کتاب زبان شعر در نثر صوفیه احساس کردم کمی بی انصافی کردید. این کتاب و مطالب آن که البته سال هاست در مجامع علمی می چرخد نقطه ی عطفی است در مطالعات مربوط به تصوف. اصلا می توان گفت تصوف شناسی علمی را در ایران با این کتاب و نظریات شفیعی کدکنی باید جست. ضمن اینکه ایشان نه تنها در ادبیات که در تاریخ نیز صاحب نظر هستند.
  باز هم از مطالب خوب شما تشکر میکنم. من هم همانند شما معمولا نقد یا معرفی گونه ای بر کتاب های خوانده شده می نویسم. اگر ایمیلی بهم بدین معرفی خودم رو از این کتاب براتون میفرستم. البته ایمیل دانشگاهتون هست ولی گفتم شاید بخواین از ایمیل دیگه ای استفاده کنین. ممنون
