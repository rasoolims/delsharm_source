  سلام
  من کارم شعر نیست و گاهی اوقات ذوقی چیزهای بی‌ربطی سر هم می‌کنم. کارهای قبلی هم در مطالب ماه‌های قبل همین وبلاگ نوشته شده.
  ولی کتاب «روزنه» نوشتهٔ «محمدکاظم کاظمی» رو بخونید خوبه. و البته شعر باید زیاد بخونید چه از قدما مثل حافظ و سعدی و چه از جدیدترها. از بین جدیدترها فکر می‌کنم «قیصر امین‌پور» و کارهای آخر «فروغ فرخزاد» با اون سبکی که شما خوشتون بیاد نزدیک باشه
