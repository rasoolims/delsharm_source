message: |-
  نمی‌دونم اگه همون موقع اینو نوشته بودی چه برداشتی می‌کردم. ولی الآن امیدوارم گذر زمان سختی‌ها رو آسون کرده باشه. غربت بد دردیه، باز خوبه یه تجربه‌ی اندکی داشتی.
  عکس‌هاتو دیدم و شادمان گشتم برادر. باز یاد مرغابی‌های سنترال پارک افتادم و اینکه زمستونا کجا می‌رن.
  سلام
  این حس اون روزهاست درسته. ولی سعی کردم همون حس رو منتقل کنم.
  مرغابی‌ها کجا میرن؟
