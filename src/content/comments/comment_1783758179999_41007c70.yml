message: |-
  اولا از تفکر و تعهدتون و ثانیا از قلمتون خیلی خوشم اومد.
  لینک گردانیدیمتان.لینک بگردانیدمان.
  "افسر به من گفت در این چند هفته که سفارت دانشجوهای ایرانی را پذیرش می‌کند تو اولین موردی هستی که با این مسأله مشکل داری."
  اینجا اوج متنتون بود.نهایت غربت و دردو میشه حس کرد.
  به نظرم سفرنامه ی خوبی میشه از نگاه یه ایرانی که آمریکا رو نمیپرسته.ولی گاها از سیر روایی منطقی خارج میشه.شرح بعضی وقایع که نه رابطه ی علی خاصی با قبل و بعدش داره نه نتیجه گیری مشخصی خواننده رو خسته میکنه.
  از نظرتون ممنونم. به پیوندها اضافه شدید.
