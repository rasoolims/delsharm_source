message: سلام.خداقوت بر دوست خوبم .کتاب(آسیب شناسی دینی)اثر استاد محمداسفندیاری در
  موضوع نقد دینداری و آسیب های  رفتارهای دینداران بسیار برای دینداری صائب در دنیای
  معاصر خواندنی است.از ارایه اطلاعات عالی شما در شناساندن آمریکا بدون رتوش سپاسگزارم
  ومنتظر مطالب جدیدت هستیم.ما را از شرابه (آب شنگولی)ها سفر و همسفرهای شراب(آب شنگولی)
  اتان بی نصیب نگذارید
