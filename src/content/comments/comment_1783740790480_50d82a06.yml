postSlug: quran-1
name: رضااسفندیاری
date: '2120-08-22T09:56:00Z'
message: |-
  سلام اقا محمد،
  من به علت ضیق وقت، حقیقتش نمیتونم خیلی مطالب تون رو بخونم، ولی هر وقت میخونم، لذت میبرم. و فارغ از همه کامنت ها و اصلاحاتی که دوستان مطرح میکنن، خود این تلاااااااااش شما در انجام امور مختلف(کار سنگین-مطالعه - نگارش همسفر شراب و سراب- مطالعه سایر رمان ها- خانواده - قران و‌.....)واقعا مثال زدنیه که واقعا دارین از عمرتون نسبت به خیلی از انسان ها، بهتر استفاده میکنین.
  انشاالله همیشه موفق و سربلند باشید.
