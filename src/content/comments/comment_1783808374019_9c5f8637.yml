message: |-
  ان شالله در قسمت‌های بعدی از موضوع جذاب حقوق و مزایای بچه های کامپیوتر در شرکت‌های مشهور آمریکایی رونمایی کنید ببینیم در اونجا شرایط به چه صورت هست. من از همین الان هیجان زیادی برای خوندن اون قسمت‌ها دارم.
  و البته باز هم ممنون بابت به اشتراک گذاری تجربیات ارزشمند خودتون
