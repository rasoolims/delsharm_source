message: آقا این موجز نویسی شما خود هنری است برادر . ولی مثل این رستورانها با کلاس
  که برنج را کمتر می دهند خیلی با کلاسه نوشته هات. ما بچه های شهرستان و جنوبشهر برنج
  خواریم برادر . بیشتر و طویلتر بنویس تا بهره ها ببریم
