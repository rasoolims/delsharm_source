message: |-
  «بارونِ درخت‌نشین» / «ایتالو کالوینو» / «ترجمه‌ِ مهدی سحابی» / «مؤسسه انتشارات نگاه»
  من که می‌گم از اون کتاباییه که باس یکیشو تو خونه داشت...:
  کارهای برجسته‌ای که آدمی به پیروی از وسوسه‌ای درونی می‌کند، باید ناگفته بماند؛ همین که به‌زبان بیاوری از آن لاف بزنی، چیزی بیهوده و بی‌معنی جلوه می‌کند و پست و بی‌مقدار می‌شود (صـ 66).
  O
  کوزیمو، علی‌رغم فرار شگفت‌انگیزش، کمابیش مانند گذشته با ما بود. تنها زندگی می‌کرد، امّا از آدم‌ها نمی‌گریخت. حتّی برعکس، می‌توان گفت که نمی‌توانست دور از مردم سر کند (صـ 97).
  O
  عشقش به درختان، مانندِ عشق‌های راستین، اغلب با سنگ‌دلی و بی‌رحمی همراه بود. تنِ درخت را می‌برید و زخمی می‌کرد تا آن را نیرومندتر و زیباتر کند (صـ 151).
  O
  کوزیمو هنوز در سنّی بود که شورِ داستان‌پردازی در آدمی به شکلِ شورِ زندگی در می‌آید؛ دوره‌ای که می‌پنداریم هنوز آن‌اندازه زندگی نکرده‌ایم که بتوانیم سرگذشتِ خود را تعریف کنیم (صـ 181).
  O
  بسیار دیده شده است که مردمانی که برای آرمانی نه‌چندان روشن و مشخّص مبارزه می‌کنند، مجبورند برای جبرانِ گنگی و سستیِ انگیزه‌هایشان ظاهری بسیار جدّی به‌خود بدهند (صـ 191).
  O
  بدین‌گونه عشق‌شان آغاز شد. کوزیمو خوش و گیج و منگ بود؛ دختر نیز خود را خوش‌بخت حس می‌کرد، امّا شگفت‌زده نبود (دختران هیچ‌کارشان اتّفاقی نیست) (صـ 195).
  O
  ولتر... بسیار چیزها از من پرسید. از جمله:
  ــ این‌که ... همیشه بالای درخت‌ها می‌ماند، برای این است که به آسمان نزدیک‌تر باشد؟...
  ــ ... معتقد است که برای بهتردیدنِ زمین باید کمی از آن فاصله گرفت (صـ 216).
  O
  ... می‌دانید که قلبِ سگ نزدیکِ شکم‌اش است. سگِ شما جای خوبی گیر آورده و همان‌جا می‌ماند (صـ 225).
  O
  خلاصه این‌که، زمانه‌ای فرامی‌رسید که آزاداندیشی بیشتر می‌شد، و دورویی نیز (صـ 249).
  O
  ... (بدین‌گونه می‌کوشی این سرسختیِ ویژه‌ی جوانان را حفظ کند که هرگز نمی‌خواهند بپذیرند که از دیگران تأثیر گرفته‌اند) (صـ 250).
  O
  می‌دانیم که انقلابی‌ها بیش از محافظه‌کاران به «فرمالیسم» گرایش دارند (صـ 304 / منِ خواننده می‌گویم در این سخن، حرف‌ها و حدیث‌ها فراوانند و اعتمادِ کلی به آن نمی‌توان کرد!)
