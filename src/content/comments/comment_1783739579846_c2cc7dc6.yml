postSlug: '%D9%87%D9%85%D8%B3%D9%81%D8%B1-%D8%B4%D8%B1%D8%A7%D8%A8-%D8%B3%D9%81%D8%B1%D9%86%D8%A7%D9%85%D9%87-%D8%A7%D9%85%D8%B1%DB%8C%DA%A9%D8%A7-%D9%81%D8%B5%D9%84-15'
name: رامین
date: '2113-08-19T20:09:00Z'
message: |-
  سلام می دم که جوابش رو بدی، پس سلام!
  خپ! این جوری که معلومه از یه نظر زندگی خوشمزه تر می شه برات چون خانومتون هم می تونه کمک هزینه تحصیلی بگیره و دخل و خرجتون بهتر شه. اما دومیش که به نظرم شاید براتون سخت شه دوری از همه، بالاخره 4 ساعت باهم اختلاف دارید، این رو چیکار می خواهید بکنید؟
  راستی نگفتی که چقدر با "میراث آلبرتا" هم خونی داره؟
  کلا "مچکریم"
adminResponse:
  date: '2113-08-19T20:09:00Z'
  message: |-
    سلام
    ممنون از لطفت. در مورد مسائل مالی که گفتی میشه ۲ تا اجاره خونه به علاوهٔ هزینهٔ رفت و آمد. یعنی رسماً مخارج اضافه میشه یک جورهایی. در هر صورت الحمدلله
    میراث آلبرتا رو دیدم. دومیش که به نظرم اصلاً‌ جالب نبود. ولی چه چیزی رو منظورته که هم‌خونی داره؟
    حق
