name: محمد
date: '2113-04-09T19:14:00Z'
message: |-
  نکته‌ی مهم و بزنگاه خطرناک گردنه‌ی بحث این جاست که ما(البته با عرض معذرت)، بی دینی، تنبلی و کم کاری خودمونو به حساب ضعف اصل دین میذاریم و توقع داریم که با حلوا حلوا گفتن لپ و لوچمون شیرین بشه که اینم نمیشه. پس نبایستی این مسئله  رو به گردن علماء یا هر کس دیگه ای انداخت. بله علماء اگه تو تبلیغ دین کم کاری کنند به همون اندازه مسئولند ولی ماها هم باید عمل کنیم و هر کسی وظیفه اش رو بایستی انجام بده.
  خلاصه لب کلوم این که آدم تا قوای عقلیش به قول عرفا و سلکا در سرزمین وجودیش ملکه و پادشاه نشه خیلی راحت به قول مهندسای کامپیوتر با یه الگوریتم غلط(توهم و مغالطه) از اینپوت های درست(ولی ناقص)، اوتپوت های غلط و درب و داغونی جنریت میکنه که بدتر از اونم اینه که اوس کریم میگه:
  **قُلْ هَلْ نُنَبِّئُکُم بِالأَخْسرِینَ أَعْمَلاً(103) الَّذِینَ ضلَّ سعْیهُمْ فی الحَیَوةِ الدُّنْیَا وَ هُمْ یحْسبُونَ أَنهُمْ یحْسِنُونَ صنْعاً(104) أُولَئک الَّذِینَ کَفَرُوا بِئَایَتِ رَبِّهِمْ وَ لِقَائهِ فحَبِطت أَعْمَلُهُمْ فَلا نُقِیمُ لهَمْ یَوْمَ الْقِیَمَةِ وَزْناً(105) ذَلِک جَزَاؤُهُمْ جَهَنَّمُ بِمَا کَفَرُوا وَ اتخَذُوا ءَایَتی وَ رُسلی هُزُواً(106) إِنَّ الَّذِینَ ءَامَنُوا وَ عَمِلُوا الصلِحَتِ کانَت لهَمْ جَنَّات الْفِرْدَوْسِ نُزُلاً(107) خَلِدِینَ فِیهَا لا یَبْغُونَ عَنهَا حِوَلاً(108)**
  موفق باشید. یا علی
  سلام حاج ممد
  دمت گرم
