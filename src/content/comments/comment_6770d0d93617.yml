message: |-
  سلام
  چون شناخت دقیق از شما ندارم نمی دونم چی شما رو خطاب کنم بیشتر به دلتون میشینه. دکتر؟ دوست عزیز؟مهندس؟...
  اما معمولا دوستان اهل انقلاب و دین و هیئت و بسیج و عدالت(یکی از دوستان میگفت از بچه های جنبش هستید) را برادر خطاب میکنم.
  پس از اول؛ برادر صادق
  الان ساعت شش صبح است و چند روز بیشتر تا عید عزیز نوروز نمیانده. اینجا که بوی بهار غوغا میکنم. بوی خونه تکانی، بوی خرید و بازار و لباس نو، ...
  از ساعت 2 شروع کردم و الان هشت فصل سفرنامه شما را خوندم.
  چند تا مطلب به ذعن رسیده؛
  - یه چیزی لابلای نوشته هات بود که اگه رهاش نکنی بتونه خط اصلی سفرنامه ات باشه؟
  اونم این حس بود که چرا اونجایی؟ آیا تصمیم درستی بوده؟ ارزشش رو داره؟ نفع و ضررش به هم میاد؟ ...
  این سوال برای محمد صادقی که رهبر داره، امام داره، انقلاب داره معنای متفاوتی داره از پسر ایرونی که عاشق اینه که تو اینتل کار کنه!
  - اصلا سفرنامه هات رو دست کم نگیر. میتونه نگاه و تصمیم و سرنوشت هایی رو عوض کنی بدونه اینکه تو فکرش رو هم بکنی. پس یه وقتی بذار برای این امر که نه مستحب موکد بلکه شاید واجب کفایی باشه و الان هم به دلیل کم بودن نمونه ای چون شما برای دوستان شبیه شما، امر بر شما واجب عینی میشه(روند استنباط حکم رو دیدی!!!)
  - سبک قبلیت روان تر و شیرین تر بود.
  ادامه دارد...
