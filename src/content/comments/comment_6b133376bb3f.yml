  سلام علیکم
  اتفاقاً همین دو روز پیش صحبتی درباره‌ی اصطلاح «white noise» پیش آمد. در برخی متون تخصصی آماری این اصطلاح را به‌صورت «نوفه‌ی سفید» هم ترجمه می‌کنند که به نظر می‌رسد خود واژه‌ی «نوفه» از «نویز» نامأنوس‌تر است.
