name: دوست خیاطیان
date: '2108-09-02T04:37:00Z'
message: |-
  سلام
  دست مریزاد
  خیلی قشنگ ، خوب سروده ای
  جسارت نباشه من اینطور بیشتر می پسندم:
  ابر خواهش آسمان
  آنقدر ارتفاع پست بیشه را
  سجود رفته است
  که اینجا
  فقط گاوها می‌‌دانند
  بالاتر از سیاهی رنگی نیست
  ***
  سر بزنید خوشمان می آید
