  سلام داداشی.
  خداقوت
  من از فصل اول تا این فصل خوندم فصلای اول کمی خسته کننده بود نوشته ها رسایی فصلای بعدی نداشت ولی نکات جالبی نوشته بودین که در فصلای بعدی خبری ازش نیست. این فصل هم عالی بود. ضمنا عنوان هایی که در هر فصل انتخاب می کنید بسیار زیباست.
  انشالله فصل بعدی خیلی عالی تر و بهتر باشه.
  خوش و خرم زیر سایه حق باشید.
