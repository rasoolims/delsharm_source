message: |-
  چرا علمای ما نتوانستند با وجود داشتن منابع قوی دینی جامعه‌ای مترقی بسازند؟
  شاید بگوییم جواب سوال این باشد که تازه حکومت شیعه بعد از دوران امام علی ع نزدیک به 35 سال است که واقعا حکومت را بدست گفته و کار اجرا دارد. اصلا قبلا تجربه اجرا وجود نداشته، مثلا اقتصاد چطور باشد، در مقابل سیاست های خارجی چکار باید کرد و ... . ما منابع داریم، قبول هم داریم منابع ما قوی هست، ما از این منابع صرفا در مورد استخراج وظایف فردی استفاده کردیم، حال فرض کن با شرایط جدید،  هنوز کار خوب و عملیاتی بیرون نیامده که بر اساس اصول و منابع قوی، چکار کنیم به آن سمت باید برویم. به نظرم در این زمینه ها انقدر جای کار هست که سالیان سال نیاز به درس خارج حوزه و کلاس دانشگاه دارد، در ضمن باید صرفا در آن جا بحث متوفق نشده و در جامعه پیاده شود، تا بتوانیم مدل خود را از زندگی اسلامی پیاده کنیم. پیاده کردن مدل های غربی جامعه ما را به سمت همین وضعیت اخلاقی فعلی می برد
