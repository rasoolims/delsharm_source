  سلام
  خداقوت واسه نوشتن متن و تهیه عکس‌ها
  یکی دو نوشته اخیر از سوالای ذهنی من دور بود!
  خوندن این حال و هوای نیویورک هم بسیار جالبه و وقت از دست آدم در میره مخصوصا با نثر روایی و دوستانه شما :دی منتظرم برگردید به محیط دانشگاه و ...
  یا علی
