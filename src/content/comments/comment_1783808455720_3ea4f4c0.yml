date: '2019-03-12T11:40:00Z'
message: 'اگر توصیه شما به نویسنده کتاب این است که: "امیدوارم نویسندهٔ جوان این کتاب
  باز هم دست به جسارت بزند و فضاهای جدیدی را در ادبیات داستانی مورد آزمون قرار دهد."
  توصیه من اما این است که امیدوارم نویسنده جوان این کتاب دست به جسارت بزند و بیشتر
  زندگی کند و بیشتر با خود صداقت داشته باشد. گرچه بسیار سخت و جانکاه است و پایمردی
  بسیاری می طلبد."'
adminResponse:
  date: '2019-03-12T19:49:00Z'
  message: |-
    سلام
    سخت است این‌طوری قضاوت کردن در مورد زیست فردی نویسنده (حتی اگر جوان باشد). مثلاً نویسنده‌های دورهٔ جنگ ایران در سن کم نوشتند چون در سن کم تجربه‌هایی را به دست آوردند که پیرمردها هم نداشتند. ولی آن چیزی که می‌شود قضاوت کرد خود نوشته فارغ از سن و سال نویسنده است که آن را در متن نوشتم.
    ممنون
