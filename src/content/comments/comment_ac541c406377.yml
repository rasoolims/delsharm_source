  1- دِین به کارون گردن همه ماست. بابی خوابی و خرکاری باید اندکی از دین را پرداخت کرد. شاید نمره مان روی نمودار بره و ناپلئونی پاس شیم.
  2-اگر خواب تهرانت مثل خوابگاهی ها برعکس می شد. شب بیدار و روز خواب. اونجا مشکلی نداشتی
