  سلام
  می خوام نقد بنویسم برات
  1. اشکال اول را حاج احمد هم گفته بود. آواز با فاصله ی یک بیت. هم معنی.
  2. نگاه راه راه کبوتر (قفس) چه ربطی به آواز نخواندنش دارد؟ بماند که کبوتر چندان هم به آواز معروف نیست.
  3. ربط ترانه و شعر به ناز چیست که با حتی به هم چسبانده شده اند؟
  4. ولیکن یار بد، همراز تعطیل!       ؟؟؟
  یک سوال هم دارم : رسولان را پی تسلیم بردند اشاره به ماجرای خاصی دارد؟
  متشکر و شرمنده
  مهدی
