message: |-
  لامصب! این کامنتو ده بار نوشتم و پاک کردم، نمیدانستم چه بگویم که سزایت باشد، فقط میگویم:
  "میخواهمت، میخوانمت
  زین شعر خط خطیت
  خطها فکنده ای تو که دلشرم مَردُمی
  بر تار و پود من
  بر جان و روح من
  تا دل ببازمت ای شعر جان شکن
  زین زلف پر شکن
  بر روی چشم خمار من آمدی
  ای نور سرمدی"
  علی علی
