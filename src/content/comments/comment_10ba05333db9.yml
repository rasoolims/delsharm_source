message: |-
  سلام صادق جان
  امیدوارم همیشه سالم و سلامت باشی
  نوشته هات فوق العادست. الانم که دارم این نظر رو مینوسیم همراه خونوادم داشتیم مطالب زیبات رو میخوندیم و بسیار عالی نوشتی مثل همیشه
  پاینده و پیروز باشید
  یا علی
