message: |-
  سلام آقا صادق
  بنده که خیلی خوشم اومد
  نصف سوالام از شما تو این سفرنامهاحتمالا پاسخ داده میشه
  اگر از تفاوت های علمی و کاری اینجا و اونجا بنویسی که خیلی بهتر
  یا علی
  سلام حاجی
  توی موارد هست. اینجا این قدر تفاوت زیاد هست که باید دونه به دونه بگم. از سوار تاکسی شدن تا خرید کردن. سعی می‌کنم جزئی‌تر و دقیق‌تر بگم
