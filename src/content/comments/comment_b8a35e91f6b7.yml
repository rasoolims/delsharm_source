message: سلام، ۳ برابر قیمت یک نیروگاه اتمی‌ جدید و نو به روس‌ها برای بوشهر پول دادیم.
  حالا خدا کند مثل هواپیما‌هاشون سقوط نکند.  گفتند به خاطر یک ویروس یک سال افتتاحش
  عقب افتاد اگر یک زلزله بیاید خدا میداند چقدر مردم برای رسیدن به دنیای دیگر، جلو
  بیفتند. آلمان، فرانسه، هند، ژاپن همه تصمیم گرفتدن دست به اتم نزنند فقط ما‌ها دنبال
  اتم هستیم و البته روس ها.
