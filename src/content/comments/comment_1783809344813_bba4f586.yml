message: |-
  اگر از پست "مردی بدون چیزی شکلاتی" به این نتیجه رسیدی که من دولتک را ورای ظهور دانسته ام، برادر به خطا رفته ای ...
  اگر هم از پست "خدایا! بنزین، مردم، خدایا! کمک" استنتاج کردی از این دولت قطع امید کرده ام، باز هم به خطا رفته ای ...
  من آقای احمدی نجات را دوست میدارم، تشویقش میکنم، بندهای کفشش را زود ببندد "مردی بدون چیزی شکلاتی" اما در عین حال انتظار دارم، مدیریت سامان یافته ای بر اوضاع مملکت داشته باشد.
  مطمئناً احمدی نجات معیار حق نیست، که حق معیار باید باشد. اگر روزی تخطی آشکار از او ببینم، به صف منتقدانش خواهم پیوست.
