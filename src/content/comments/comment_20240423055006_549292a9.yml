message: 'اگر توصیه شما به نویسنده کتاب این است که: "امیدوارم نویسندهٔ جوان این کتاب
  باز هم دست به جسارت بزند و فضاهای جدیدی را در ادبیات داستانی مورد آزمون قرار دهد."
  توصیه من اما این است که امیدوارم نویسنده جوان این کتاب دست به جسارت بزند و بیشتر
  زندگی کند و بیشتر با خود صداقت داشته باشد. گرچه بسیار سخت و جانکاه است و پایمردی
  بسیاری می طلبد."'
