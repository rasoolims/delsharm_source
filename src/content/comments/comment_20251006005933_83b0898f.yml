  سلام
  ممنون که تجربیاتتون رو با ما به اشتراک میگذارید.
  یه سوال داشتم و اونم اینه که آیا شما نمیتونستید تو طول تحصیل هیچ پولی پس انداز کنید؟ همیشه تو ذهم اینطوری بود که دانشگاه ها یه فاندی به دانشجوها میدن و پس از کم کردن مخارج زندگی یه چی تهش برای آدم میمونه مثلا ۳۰۰-۴۰۰دلار. میخوام ببینم درسته؟
