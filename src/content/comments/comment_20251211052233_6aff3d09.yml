message: |-
  نظرم از سر لطف بود نه عصبانیت، لطفم از سر محبت: دوستت دارم مم صادق جان
  عجله ام از بابت اشتیاق جواب بود، نه باز هم عصبانیت
  خوب گفته بودی، دلگیر نشدم دلشرم جان، خواستم وجدانم آسوده ماند.
  قربان همت ابراهیمی ات!
  علی علی
