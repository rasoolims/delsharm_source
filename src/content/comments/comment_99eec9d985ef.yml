  سلام
  ممنون از معرفی، به واسطه کتاب در مورد محمد قائد هم مطالبی را خواندم که برام جالب بود و جالب‌تر اینکه چه شخصیت‌هایی در ایران وجود دارند و من حتی اسم آنها را نشنیدم.
  کتاب سفرنامه حاجی بابا ترجمه میرزا حبیب هم خالی از لطف نیست ...
