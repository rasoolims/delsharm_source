message: |-
  سلام رفیق قدیمی، هم ورودی کارشناسی، یار کارشناسی ارشد
  ما که برای جویا شدن از حال رفیفمان متن هایی که می نویسی می خوانم. بنابراین نمی توانم نظرات کارشناسی و فنی در مورد سفرنامه نویسی بدهم.
  جات خالی رفتیم آموزشی سربازی دو ماه پیش- دسترسی به هیچی نداشتیم تو سرما با کلی خاطره ولی در مجموع خوب بود.
  دکتری بدون کنکور هم می تونستیم بریم تا امسال که تا دو سه سال دیگه فعلا بی خیال دکتری شدم.
  الان هم شماره ۸ را نوشتی و من تازه ۴ را خواندم. بقیه اش را هم ان شا الله می خوانم.
  یاد خدا دل ها را آرام می کند.
  ان شاالله ببینیمت با مدرک دکتری یا بدون آن. سالم و صادق و انقلابی.
  دمت گرم سرباز
