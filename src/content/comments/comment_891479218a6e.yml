message: |-
  ُسلام
  اولا، که کم بود و خیلی کم بود.
  ثانیا، که آن دوستی که آن اول گفتی آنقدری که من می دانم حال و روز بهتری از تو ندارد. تو لااقل پای قولت ایستاده ای و داری در بهترین دانشگاه های دنیا درس می خوانی.
  ثالثا، که شما حق درآمد زایی نداری نه بانوی محترم. پس بهونه نیار.
  رابعا، که هیچی، همینجوری خواستم بگم چهار رو هم به عربی بلدم.
  بعدش هم میشه خامساً
