postSlug: '%D9%87%D9%85%D8%B3%D9%81%D8%B1-%D8%B4%D8%B1%D8%A7%D8%A8-%D8%B3%D9%81%D8%B1%D9%86%D8%A7%D9%85%D9%87-%D8%A7%D9%85%D8%B1%DB%8C%DA%A9%D8%A7-%D9%81%D8%B5%D9%84-5'
name: الهام
date: '2113-01-28T06:01:00Z'
message: |-
  سلام، نیمه اتفاقی ایمیل شما رو دیدم، به نظر میاد آدم مذهبی ای باشید. جالبه!کاملا هم که یک مرد ایرانی هستید. رفتید اونجا دید انداختن به زن ها. از نوشته های وبلاگتون معلومه.
  مطالبتون مثل اینه که یه نفر با ماشین زمان از حدود 100 سال پیش به زمان حال سفر کرده باشه.
  واقعا تاسف برانگیزید
  سلام جناب الهام
  یادم نمیاد به شما ایمیلی فرستاده باشم.
  خیلی ممنون از تأسفتون. ان‌شاءالله اصلاح بشم.
