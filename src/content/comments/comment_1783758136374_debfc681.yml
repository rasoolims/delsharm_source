name: نیما
date: '2113-01-29T10:33:00Z'
message: |-
  سلام صادق
  یه جورایی فک میکنم داری با ی دید خاص به ماجرا نگاه می‌کنی- به نظرم اینقدرها هم نباید امریکا داغون و خسته باشه- به هر حال نظر شما ملاک است.
  متنت خیلی بهترتر شده نسبت به این اوایل- این سبک نگارشت رو دوست می‌دارم سبکی که نشون میده نویسندش کتاب زیاد مطالعه کرده و گلچینی از اون رو داره پیاده میکنه
  موفق باشی مرد
  دعا کن
