message: |-
  سلام
  چه قدر بعضی چیزا رو نصفه گذاشتید! خب مثلا ادامه حرفتون با اون دختر چینی چی شد؟ یا ادامه حرفتون با استادتون راجع ب نماز؟با اون اقای سیاه پوست؟
  یعنی شما نسبت ب این دختر ک خودش علاقه نشون داد ب معنویت هیچ کاری نکردید؟ک مثلا با اسلام بیشتر اشنا بشه؟
  ای کاش اینا دو می گفتید
