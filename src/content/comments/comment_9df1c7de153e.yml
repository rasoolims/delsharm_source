  تو رو خدا بیش از بیست بار نوشتی "چپ "و "راست" .
  من برام خیلی سخته چپ و راست رو کلا گذاشتمش توی بلک لیست .
  یادش بخیر. وارد طبقۀ پنجم مرکز که می‌شدیم، یک بار از آسانسور به چپ دوباره باز به چپ بعد به راست می‌رفتیم به اتاق حسین جوزی می‌رسیدیم. :)
