  محمدصادق عزیز سلام
  از ۸۴ که در سرویس به سمت حکیمیه با تو آشنا شدم، دانستم که دل گنده ای. حالا که همسفر شراب را نمی‌نویسی، سر خم می را سلامت دار، ما خمار این شرابیم.
  خدا به توفیقاتت بیافزاید مرد. یا علی
