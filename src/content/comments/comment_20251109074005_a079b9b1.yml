message: |-
  جوانی که به آمریکا فرار کرده و نگران جامعه‌ی ایران است که «تفکرات خداناباوری» در آن شیوع پیدا کرده و «بنیان خانواده» و «معنای زندگی» را متزلزل ساخته!
  نه برادر، این سطح از بحث‌ها که داوکینز چنین گفت و داروین چنان گفت و علم طرفدار علم است یا علیه آن برای همان جامعه‌ی مرفه آمریکایی خوب است که درآمد متوسطش سالانه به صد هزار دلار می‌رسد و از روی شکم سیری این بحث‌ها برایش هنوز جذاب است
  درد جامعه‌ی ایران را اگر می‌خواهی پیدا کنی به جنایت‌های اشرار مسلحی که بر ایران مسلط‌ هستند گیر بده، به دزدی‌ها و آدم‌کشی‌های کسانی که لباس دین پوشیده‌اند و حرف از دین می‌زنند، به کسانی گیر بده که تمام حقوق انسانی مردم را در ایران لگدمال کرده‌اند تا 30 درصد از مردم بیایند زیر خط فقر، تا هر لحظه چشم این مردم بدبخت به قیمت دلار و سکه باشد که حکومت چقدر با تورم از جیبشان دزدی کرده است
  نگران دین جامعه‌ی ایران هستی؟ عامل نفرت مردم از دین را در شیوع تفکرات خداناباوران نجوی! این حر‌ف‌ها شیوع پیدا کرده چون نمایندگان دین در ایران مشغول دزدی و غارت ثروت ایران و ایرانیان هستند و جواب اعتراض را هم با جنایت و آدم‌کشی می‌دهند. این‌ها هستند که باعث شیوع خداناباوری و تزلزل بنیان خانواده و معنای زندگی شده‌اند نه صحبت‌های خداناباوران در شبکه‌های مجازی!
  به آمریکا گریخته‌ای و دلارها را در جیبت می‌گذاری و نفست از جای گرم بلند می‌شود!
