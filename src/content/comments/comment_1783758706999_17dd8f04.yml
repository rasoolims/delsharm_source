message: وبلاگ " خروش ملت"  منتظر بازدید شماست.  " جریان انحرافی اصولگرایان از سال84
  تشکیل شد" مطلب جدید این وبلاگه. لطفا به رغم طولانی بودن با دقت و بدون تعصب بخوانید
  و نظر دهید. باید فضای منطقی و مستدل در نقد جریانات کشور فراهم شود. آینده از آن حزب
  اللهی ها است.
