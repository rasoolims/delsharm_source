message: |-
  خدا بگم چیکارت کنه صادق
  کلی کار داشتم ولی مجبور شدم اینو تا ته بخونم.
  جالب بود.
  نمی دونم همینطوری که اونجا رو برای اینجا معرفی میکنی،
  اینجا رو هم برای اونجا معرفی میکنی؟
  توی انگلیسی نویسی هم میتونی سجع بکار ببری؟ فکر میکنم کار سختی باشه.
