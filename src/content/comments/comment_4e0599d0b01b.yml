  سلام صادق جان!
  امیدوارم که سلامت باشید. سبک جدیدت خوبه ولی راستشو بخوای با قبلی بیشتر صفا میکردم. نکات جالب و جدیدی رو از خوندن مطلبت یاد گرفتم.
  فقط می خواستم بگم که توی اون محیط سعی کن خوبی هاتو حفظ کنی تا روحیه ات همیشه با صفا بمونه.
  موفق باشی. یا علی
