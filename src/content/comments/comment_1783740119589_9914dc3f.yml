postSlug: '%D9%87%D9%85%D8%B3%D9%81%D8%B1-%D8%B4%D8%B1%D8%A7%D8%A8-%D8%B3%D9%81%D8%B1%D9%86%D8%A7%D9%85%D9%87-%D8%A7%D9%85%D8%B1%DB%8C%DA%A9%D8%A7-%D9%81%D8%B5%D9%84-9'
name: محمد
date: '2113-04-09T19:12:00Z'
message: |-
  سلام صادق. سال جدید شما هم مبارک. مطالب خوبی بود و بهره بردم.
  در رابطه با سوالی که مطرح کردی چند مورد به نظرم میرسه که سیاه مشقی میزنم:
  اول اینکه اساسا توی آموزه های هر دینی دو نوع گزاره وجود داره: *تأکیدی و *تأسیسی
  تأکیدی اون دسته از آموزه های دینی هستند که در حقیقت همون ارزش های انسانی و مطابق با فطرت و سرشت انسانی هستند و هیچ ربطی هم به دین یا بی دینی آدم ها نداره مثل راستگویی، امانتداری، احترام به والدین و به قول شما قص علی هذا(که درستش قس هست. چون میدونم شخصیت ادبی داری و غلط املایی هم در ساحتت راه نداره متذکر شدما)
  خب داشتم میگفتم. این دسته از آموزه ها رو هیچ دینی رد نکرده و اتفاقا هم تأیید و تأکید هم کرده اند. پس وجه تسمیه اش هم معلوم شد.
  دومین دسته، آموزه های تأسیسی هستند که برای هر دینی به صورت مجزا تعیین شده مثل نماز(علی الخصوص شیوه‌ی خوندنش)، حج، روزه و قس علی هذا.
  دوم اینکه این عالم با تموم بند و بیلاش، عالم اسباب و مسببات و علت و معلوله و خدا(البته از دید ما که مثلا باورش داریم) هم با کسی شوخی نداره
  پس مؤمن! معلومه که هر کسی به هر کدوم از آموزه های بیان شده در بالا عمل کنه نتیجه میگیره حتی اگه کافر هم باشه و اگه عمل هم نکنه نتیجه نمیگیره حتی اگه اسم دینی رو هم به قول اهل فن یدک بکشه. اونا دسته اول رو عمل میکنن(البته تا حدی و خودت هم مشکلات، ظلم و بی عدالتی ها و ناهنجاری های اجتماعی اون جا رو تازه داری درک میکنی) و عدل خدا به همون اندازه هم نتیجشو بهشون رسونده که خودت داری تا حدودی شهود میکنی اون جا.(اتفاقا دین اسلام روی حق الناس از حق الله هم بیشتر حساسه ولی کو گوش شنوا و چشم بینا)
