postSlug: چه-کتابی-بخرم
name: آقاگل ‌‌
date: '2118-12-07T10:57:00Z'
message: |-
  سلام.
  در زمینۀ داستان از کیهان خانجانی بند محکومین رو پیشنهاد می‌کنم. کتاب خوبیه، نثر یک‌دستی داره و داستان هم داستان پرکشش و فوق‌العاده‌ایه. توی گودریدز ریویوهایی که درباره‌اش نوشته شده رو بخونید. از خانجانی مجموعه داستان سپیدرود زیر سی‌وسه پل هم هست. اونم کتاب خوبیه.
  دیگه تاخون سیدحسین طبسی هم کتاب خوبی بود. باورکن تو فوجیکو نیستی نعیمه بخشی هم از مجموعه‌های داستانی خوب امساله گویا. تعریفش رو شنیدم. ولی خودم نخوندمش همچنان.
  کتاب جدید آقای دولت‌آبادی هم که امسال چاپ شد. طریق بسمل شدن، نسبت به دیگر آثار خودشون شاید پایین‌تر باشه. ولی همچنان محمود دولت‌آبادیه و کتاب ویژه‌ایه و من باشم خوندنش رو پیشنهاد می‌کنم.
