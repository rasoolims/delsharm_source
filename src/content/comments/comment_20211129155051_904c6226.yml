message: |-
  سلام آقا صادق
  بسیار خوب بود.
  چند نکته جالب این شرکت، اول قرار داشتن در محل بسیار زیبا و چشم نواز، دوم ایجاد مکان های استراحت برای کارکنان و سوم، ایجاد فضاهای مجزا برای هر شخص که هر کدام به نوبه خود بازدهی را بالا می برد.
  برای من جای سوال است که ظرف سه ماه چطور می توانند از دانشجو بهره کافی را ببرند؟ چون معمولا هر چقدر هم خوب باشد تا بیاید جا بیفتد حداقل 1 تا 1.5 ماه می گذرد. دو سه هفته آخر هم طرف فکر رفتن از شرکت هست. پس عملا جای استفاده مفید خیلی باقی نمی ماند؟
