    سلام
    آریایی‌ها به زمین خالی مهاجرت نکردند. مثلاً طبق گفتهٔ خود این کتاب تپوری‌ها (طبرستان)، آخوزها (خوزستان) و بسیاری دیگر مانند کاسپی‌ها (نزدیک خزر) بودند. بعدتر هم ورود عرب‌ها، حکومت چندصدسالهٔ حکومت‌های با اصالت نژادی تورانی (مثل اشکانیان یا خوارزمشاهیان) و بعدتر ورود اقوام کاسا (اشک‌نازی)، گرجی (الان در مازندران گرجی‌محله هنوز هست) و ارمنی. خلاصه خیلی مسألهٔ سرراستی نیست. مخصوصاً در مورد تپوری‌ها و دیلمی‌ها این هست که به خاطر جغرافیای خشن البرز، خیلی از مهاجمین راه به آن نبردند. شمال ایران تا قرن چهارم مسلمان نشد و شاید به دلیل فراریان شیعه (حداقل با خوانش زیدی و اسماعیلی) اولین مسلمانان آن‌ها شیعه بودند. به همین خاطر آریایی دانستن همهٔ ایرانی‌ها خیلی مطابق واقع نیست و اصلاً نمی‌شود دقیق این مسأله را سنجید.
