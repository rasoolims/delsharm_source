  شعر قشنگی بود. اتفاقا به نظر من نسبت به شعرهای قبلیت بیشتر متناسب با این زمانه بود. بعضی وقت ها فکر می کنیم رک گویی و نقد کردن فقط با تخریب ممکن است. نه والا این طور ها هم نیست. شاید خیلی چیزها با سلیقه ما جور در نیاید اما محسناتش را هم باید دید.
  خوشحالم که هنوز زنده ای :-)
