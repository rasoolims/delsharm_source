message: |-
  سلام علیکم.
  به نظرم ، شما به عنوان یک متخصص در حوزه زبان شناسی رایانه ای خیلی کار جالبی انجام داده اید ولی متاسفانه در این جا خیلی خلاصه آمده است در حالی که ارزش چاپ به صورت یک کتاب مستقل  یا حداقل یک مقاله در حوزه قرآن پژوهی را دارد. امیدوارم هر چه زودتر فرصت این کار را پیدا نمایید . خیلی دوست داشتم اطلاعات فنی بیشتری می دادید .
