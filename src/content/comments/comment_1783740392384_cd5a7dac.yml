name: پیمان ‌‌
date: '2022-10-25T07:43:00Z'
message: |-
  سلام.
  شرمنده‌ام کردید اصلاً انتظار نداشتم انقدر وقت بگذارد و پاسخ بنویسید.
  درباره تمامیت ارضی آیا
  Yes California
  را آزادی بیانی در این باره حساب نمی‌کنید؟ چون گفتید موردی ندیده‌اید پرسیدم.
  من متولد ۷۵ هستم و متاسفانه دوره سازندگی را تجربه نکردم. ولی متوجه بهتر شدن اوضاع نسبت به آن زمان هستم. گرچه برایم بسیار ناکافیست.
  آزادی بیان را می‌شود از زوایای مختلفی دید. من متوجه عدم آزادی بیان در بعد فرهنگی هستم. در ایران هم اگر آن دوست شما بیاید در جمع مذهبیون دم از هم‌جنس‌گرایی یا سقط جنین بزند برخورد خوبی نخواهد دید. اخراج به کنار شاید عواقب فیزیکی داشته باشد. این بعد فرهنگی کنترل‌اش راحت نیست شاید حتی ناممکن باشد
  زاویه‌ای که من درباره آزادی بیان حرف می‌زنم بعد قانونی آن است. یعنی تا زمانی که به قانون و دولت مربوط می‌شود اگر حرفی غیرقانونی نباشد آن را آزاد می‌دانم. یعنی وقتی مخالفت با سقط جنین در آمریکا مجاز است تا جایی که قانون را هم به نفع خودشان اخیرا عوض کرده‌اند من می‌گویم این مسئله در آمریکا آزادی بیان دارد. مخالفان اقلیت‌های جنسی هم گمانم همین‌طورند در آمریکا، آزادی بیان دارند ولی مقبولیت فرهنگی شاید نه.
  ولی حرفتان را درک می‌کنم که از نظر فرهنگی فشار وجود دارد. آزادی بیان حتی در قانون هم گاهی محدود شده در بعضی کشورها. من هیچ کشوری را به عنوان الاهه آزادی‌بیان معرفی نمی‌کنم، فقط خواستم بگویم آزادی بیان با گفت‌و‌گو یکی نیست.
  درباره حرف بعدی شما اگر به من بگویید برو گفت‌و‌گو کن من اصلاً نمی‌دانم باید چه کار کنم. موضوع اصلاً چیزی نیست که بشود درباره‌اش گفت‌وگو کرد. بنیان‌ها متفاوت است. مثلاً عده‌ای (از نظر من اکثریت، در نسل خودم با اختلاف اکثریت) خواستار حجاب اجباری نیستند. عده‌ای دیگر به حکم حاکم شرع می‌گویند مجبورید حجاب کنید. ما الان چه چیز را گفت‌و‌گو کنیم!؟ رفراندوم هم حاضر نیستند می‌گویند عقیده ما این است.
  دموکراسی اصلاً به همین درد می‌خورد که با هم گفت‌و‌گو نکنیم چون همه قرار نیست با هم هم‌نظر بشوند. آن‌ها معتقد به دموکراسی نیستند. اگر هم گفت‌و‌گویی بشود بین خودشان است که از نظر فقهی حالا حجاب اجباری باشد یا نه، ما چه گفت‌و‌گویی کنیم؟
  (بگذریم که در دانشگاه من هر که لب باز کرد پایش به بازداشتگاه باز شد. من می‌گویم حتی اگر همه بازداشت نمی‌شدند هم چه گفت‌و‌گویی!؟)
  در نهایت جسارتا چون یک وقت سوء برداشت نکرده‌ باشید از نظر پیشینم، بگویم من فقط منظورم این بود که گفت‌و‌گو و آزادی‌بیان دو چیز کاملا متفاوت هستند. فقط همین را خواستم بگویم که به نظرم درست نیست بین این دور ارتباط برقرار کنید. اصلاً کاری به مسائل اخیر ایران نداشتم.
adminResponse:
  date: '2022-10-25T08:18:00Z'
  message: |-
    سلام مجدد
    به شما بزرگوار
    خلاصه عرض کنم در مورد موضوعاتی که فرمودید:
    قصهٔ کالیفرنیا شوخی است. یک حاشیه است که شاید در آینده جدی شود ولی قصه آن است که هر قضیه‌ای از این حیث از سمت دادگاه عالی رد می‌شود. کما اینکه قصه ال‌جی‌بی‌تی را بدون رأی‌گیری از مردم انجام دادند.
    در مورد بازداشت و این حرف‌ها اگر حرفتان ناظرتان به اتفاقات اکنون است؛ متأسفانه این واقعیت روی زمین است که وقتی فضا امنیتی بشود و برای نظامی قصه بقا باشد، نتیجه بگیر و ببند است. اسلامی و کمونیستی و لیبرالیستی ندارد. همه‌اش همین است.
    به این معنی است که من راضی‌ام؟ نه!
    . مسأله واقع‌بینی است من خودم به چشم تانک نفربر در فیلادلفیا دیدم و فیلمش موجود است. دههٔ ۷۰ میلادی در شهر نیوآرک نیوجرسی تانک ضدنفر آوردند و مردم را به رگبار بستند. در همان زمان در دانشگاه کلمبیا به دانشجویان معترض حمله شد و بگیر و ببند. خلاصه فضای امنیتی چنین اقتضائات تلخی دارد.
    در مورد تفاوت بنیان‌ها حرف دقیق گفتید اما در مسألهٔ مثلاً حجاب قصه خیلی پیچیده است. نه اصول دین است نه خط قرمز دین. اما پیچیده است و مسائل اجتماعی را نمی‌شود در چند جمله پیچید.
    اما در مجموع چون می‌دانم شما اهل فضل هستید، می‌دانید و می‌دانیم در غرب فضای رسانه طوری است که حرف مخالف گفته می‌شود اما خیلی کم شنیده می‌شود
    در مورد کسانی که بهشان نقد دارم، آ‌نها هم باب گفتگو را بستند هم آزادی بیان را
