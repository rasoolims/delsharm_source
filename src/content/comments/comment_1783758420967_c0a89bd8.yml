message: |-
  سلام صادق جان
  سال نو شما مبارک.
  این بحث اخرت که تو مطلب قبلی هم درخواستی داشتم را 3 سالی است با برخی از تصمیم گیران حوزه اموزش کشور داریم. متاسفانه سبک امتیاز دهی به اساتید و دانشجویان مقاله است که ضعیف ترین روش تولید علم از بین 10 روش تولید علم است.
  برای همین ازت خواهش کردم سبک اموزش انجا، نحوه ارتباط صنعت و دانشگاه و .. را اگر فرصت کردی به مرور برام میل کن.
  البته در اخر ما منتظر برگشت شما هستیم :) نازپرورده نیویورکی
  سلام رفیق
  چشم. اگر فرصتی شد حتماً.
  نازپرورد تنعم نبرد راه به دوست...
