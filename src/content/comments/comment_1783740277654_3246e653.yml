message: |-
  دوستانی که اینجا کامنت گذاشتن خیلی از وضعیت داغون حداقل مترو و حمل و نقل نیویورک تعجب کردند. ولی متاسفانه این واقعیت داره. برای اطلاع بیشتر از زندگی داغون افراد طبقه پایین در نیویورک می‌تونید فیلم Mary & Max - 2009 رو ببینید. یا فیلم‌های دیگه‌ای که توشون نیویورک به صورت واقعی به تصویر کشیده شدن. (مثلا نه Spiderman) حتی اگر به سریال How I Met Your Mother هم دقت کنید، راحت می‌بینید که آپارتمان‌های نیویورک معمولا بالای ۱۰۰ سال عمر دارن. متروش هم همین‌طور و در نتیجه انتظار بیشتری نمی‌شه ازش داشت! ضمن اینکه برخلاف How I met your mother، فقط پولدارهای نیویورک مدام تاکسی سوار می‌شن و مدام تاکسی سوار شدن همون‌قدر مسخره است که مدام آژانس گرفتن تو تهران!
  این مساله در بین آمریکایی‌ها هم مورد قبوله و به همین دلیله که کالیفرنیا، خصوصا به خاطر آب و هوای خوبش و زندگی ویلایی‌ش طرفدار بیشتر داره که باعث می‌شه حتی Application Fee دانشگاه‌هاش هم بیشتر از دانشگاه‌های ایالت‌های دیگه باشه.
  آهان راستی صادق همون طور که تو نوشتی این رو هم می‌خواستم به خودت بگم که: یعنی واقعا خانم‌های نیویورک با این حال که حجاب ندارن از بدحجاب‌های اینجا ساده‌تر و سنگین‌تر هستند؟
  سلام
  ممنونم از توضیحاتت
  در مورد حجاب:‌ به نظرم خیلی ساده و شلخته‌پوش‌ترند و البته (اگر دعوام نکنید و نگید چرت می‌گی)‌ لباس‌های زنان نیویورک خیلی کمتر از لباس‌های خانم‌های به اصطلاح بدحجاب ایرانی جلب نظر می‌کنه.
