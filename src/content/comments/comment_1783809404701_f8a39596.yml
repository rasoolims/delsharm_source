  سلام
  وقتتون بخیر
  بسیار متشکرم از انتشار این تحلیل.
  سوالی که مطرح هست، آیا علت ( یا حداقل یکی از دلایل) اخراج نیروهای ماهر و فناوری پایه حقوق بسیار بالای این نیروها نبوده؟
  قطعا هوش مصنوعی موجبات بیکاری برخی فراهم خواهد آورد ولی بنظر میرسد علت اصلی این تعدیل نیروی اخیر حقوق بسیار بالای این نیروها میباشد
  متشکرم
adminResponse:
  date: '2023-03-22T20:00:00Z'
  message: |-
    سلام
    ممنون از لطف شما. من در انتهای مطلب به این مسأله اشاره کردم که این اتفاق به خاطر سیاست انقباضی فدرال ریزرو (بانک مرکزی آمریکا)‌ است. به همین خاطر، حداقل در مورد شرکت‌های بزرگ، سهامداران برای آن که هزینه‌ها کاهش یابد و در نتیجه ارزش سهام برود بالا، اقدام به تعدیل نیرو
    می‌کنند.
    این قصه ربط زیادی به هوش مصنوعی ندارد.
