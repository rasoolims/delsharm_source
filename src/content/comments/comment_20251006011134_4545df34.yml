  سلام
  به قول بایرام باقالی در اخراجی‌ها «هر کسی راه و مرام خودشو ادامه می‌کنه» [که البته پاسخش این بود که «مرده‌شور اون مرامت رو ببره»]
  حرف ویژه‌ای به هیچ کسی ندارم. راه ناهموار است و زوایا بسیار بیشتر از دو زاویهٔ تعهد اجتماعی و ارتقای تحصیلی. من در حدی نیستم که توصیهٔ خاصی داشته باشم. فقط یک تجربه آن که کسی که به فرنگ می‌آید، اگر برگردد وطن در درونش احتمالاْ با درونیات متناقض و متلاطمی مواجه می‌شود و اگر بماند هم وضع بهتری نخواهد داشت. یک وضعیت «یک بام و دو هوا»یی ایجاد می‌شود که کاری‌ش هم نمی‌شود کرد.
  مخلصیم
