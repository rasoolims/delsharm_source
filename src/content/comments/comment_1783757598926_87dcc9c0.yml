  سلام...
  اینکه در پیوندتان باشیم...همیشه به شما سر بزنیم...کامنت بگذاریم...خلاصه اینکه
  خانه زادتان شویم...!!!
  این همه بی توجه هی روا نباشد.
  که به خود زحمت جوابمان را ندهید.
  از بچگی یادم دادند هر رفتی آمدی دارد.
  یا علی.
