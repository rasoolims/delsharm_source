message: |-
  سلام
  خوبی آقا محمد صادق؟
  اره مثل من. من هم کلا توی کارها و رویاهای خودم غرق بودم. با سهمیه ی استعداد درخشان و مصاحبه رفته بودم ارشد. همش درگیر همین کارهای تحقیقاتی بودم که دوستشون داشتم و از لیسانس حتی شروعشون کرده بودم. فکر می کردم اگه اینطوری موفق باشم دیگه تمومه و همه ی اون چیزی هست که می خوام و می تونم برای همه از جمله خانوادم موثرتر باشم. ولی
  ولی نشد... پارسال مرداد ماه یه روز برادر کوچکترم که فقط 14 سال و نیم داشت کاملا به صورت ناگهانی و بدون هیچ مریضی از دنیا رفت. اونم همش سفرنامه ی شما رو می خوند.
  از اون موقع به بعد من دیگه عوض شدم. همه فکر می کنن که نه امین همون آدم هستش. ولی من خودم می دونم که دیگه اون امین با داداشش رفت. و من کسی هستم که دیگه مثل اون نمیشه. کاملا این رو حس میکنم.
  به قول قیصر امین پور ناگهان چقدر زود دیر می شود گاهی. ای کاش قبل از اون که دیر بشه یادمون بیاد که کی هستیم و چه چیزها و کسایی همه ی دارایی های ما توی این دنیا هستن نه وقتی دیگه کاری نمیشه کرد.
  ببخشید سرتون رو درد آوردم.
