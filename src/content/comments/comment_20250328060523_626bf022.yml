message: نقد جالبی بود. در مورد رهش همیشه اینطور فکر میکردم که امیرخانی برای کاری
  اداری چندین بار به شهرداری مراجعه کرده و حسابی اذیت شده و هر بار در راه بازگشت به
  خانه با خود گفته انتقام خواهم گرفت و نتیجه آن شده رهش.
