message: |-
  تا حدی بیش از ۹۶ ساعت مانده به عید
  به نم نم بارون و موثر بارون قشنگ امروز شمال
  مازندران مرزن آباد
  .
  عید ما تاریخ محدودی نداشت
  جلوه نوروز عیان در ماه رخسار تو بود
  با قدمهایت بنفشه میشکفت
  نازنین......
  لحظه ها بی تاب الفاظ گهربار تو بود
  .
  این شعر بخشی از صدای قشنگ استاد و پدری آسمانی بود که امروز بارون قشنگ شمال ایران در شنیدنش بودم وسط شنیدن آهنگ و ریتم شعر
  وقتی چشات خوابش می آد
  آدم غم هاش یادش می آد
  یه حالتی تو چشماته
  که عشق خودش باهاش می آد
  .
  و ذکر دوباره این به عصر امروز تا حدی
  به زمان صبح به ظهر Montreal Canada و ادامه مود Neuro مون و و به زمان عصر به شب وطن ایران
  موثر زمان ۱۷:۱۷ امروز
  .
  و سپاس از شعر زیبای شما که همیشه الگو و موثره
