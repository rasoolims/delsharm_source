  بسیار زیبا و جذاب
  واقعا شما باید نویسنده می شدی!
  اشارات مذهبی ات را بیشتر کن که برای ما بسیار جالب است.
  یک سوال، این گرایش به اسلام و تشیع ناشی از صدور انقلاب است یا ربطی به ما ندارد؟!
