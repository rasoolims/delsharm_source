message: |-
  سردی آب را به گرمی دلفریب محبت آدمکهای مجنون می ستایم .
  عریانی گرگهای گشنه را به فریب پوشش آدمک رانده از بهشت نمی فروشم.
  عریانی بیراهه را به  پوشش صدها صدها دروغی که خیل آدمکها را به حقیقت واهی می برد ترجیح میدهم.
  در پناه حق
