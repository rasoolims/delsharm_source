date: '2113-09-04T03:22:00Z'
message: |-
  آسمانت بی غبار
  سهم چشمانت بهار
  قلبت از هر غصه دور
  بزم عشقت پر سرور
  بخت و تقدیرت قشنگ
  عمر شیرینت بلند
  دوست عزیز منتظر حضور محبت انگیز شما در وبلاگ نا قابلم هستم تا از نظرات ارزشمند شما استفاده کنم. امیدوارم که شادی همیشه میهمانتان باشد.
  با نهایت احترام
