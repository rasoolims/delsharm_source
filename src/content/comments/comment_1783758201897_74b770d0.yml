date: '2120-09-08T15:43:00Z'
message: سلام. خدا قوت بابت این نگارش های دقیق و حاوی جزییات. ببخشید یک سوال خدمت
  شما داشتم، در ایران سازمان‌ها و ادارات اصطلاحی به کار میبرن به عنوان اشباع شدن و
  پر شدن سمت‌های سازمانی. وقتی متن شما رو خوندم تعجب کردم آمریکایی که چند برابر ایران
  جمعیت داره و کلی هم مهاجر مثل شما چطور اینقدر راحت و صرف یک ایمیل زدن یا معرفی دوستان
  ترتیب مصاحبه و جذب نیرو میدن!!!
adminResponse:
  date: '2120-09-09T16:46:00Z'
  message: |-
    سلام
    ممنون از نظر لطف شما.
    آن اتفاقات شبیهش در ادارات دولتی آمریکا می‌افتد. در ادامه خاطرات تلخی از سر و کار داشتن با ادارات دولتی آمریکا ان‌شاءالله خواهم گفت. شاید تفاوتش آن است که متصدیان ادارات دولتی آمریکا خوش‌برخوردتر هستند اما در عملکرد تفاوت چندانی ندارند.
    فرهنگ عمومی شرکت‌های خصوصی کاملاً متفاوت است.
