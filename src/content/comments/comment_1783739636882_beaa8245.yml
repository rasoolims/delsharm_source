message: |-
  سلام
  از اینکه رنگ قالب وبلا به سپیدی گراییده خیلی خوشحالم اون رنگ تیره به متن‌های روشن شما نمی‌اومد :)
  اولین پست رو هم خونده بودم! تصویرسازی خوبی تو متن‌ها هست که آدم رو به خوندن ترغیب می‌کنه :) قسمت سفارت آمریکا در ایروان عالی بود...
  منتظر ادامه داستان هستیم
  از لطف شما بسیار ممنونم
