  چرا دیگر نمی آیید؟؟؟
  اما من آمدم!!!
  هر روز هم آمدم...!
  هنوز هم "نا آدم" آمدم.
  شاید با شعر تازه آدم شدم!
  پس برای آدم شدنمان هم شده شعر تازه بگویید...
  علی علی...
