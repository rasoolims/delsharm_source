name: میم عین میم
email: ''
url: http://www.bedahe.blogfa.com
date: '2009-11-08T19:38:00Z'
message: |-
  سلام
  می‌خواهم تو را
  سجده سجده ببوسم
  و تکبیرت را با غرور
  اقامه شوم
  احسنت برای هدایت ما هم دعا کن
  سری بزنید خوشحال می شویم
  یاعلی
