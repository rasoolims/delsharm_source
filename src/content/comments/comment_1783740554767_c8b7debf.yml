name: دلشــرم
date: '2111-03-04T19:23:00Z'
message: |-
  سلام
  یکی از دوستان این نظر خصوصی را در مورد مطلب قبلی (سیاه‌مشق 27) ارسال کرده‌اند
  این نظر رو خصوصی می دم ولی اگه خودتون صلاح دونستین عمومیش کنین
  نمی دونم چه جور بگم که بتونم درست گفته باشم. شما خیلی خوب فکر می کنین ولی وقتی مثل خیلی از ... رنگ تعصب می گیرین آدم حس خوبی بش دست نمی ده.
  من از بسیجی متنفرم ولی اسلام رو عاشقم. از هر کسی که ... چرا تعارف کنیم خیلی ها فقط برای سوء استفاده و اکثرا از روی جهل و با جو سازی وارد این نظام می شن که اگه واقعا تو اینا آدم خداشناس و خوب پیدا می شد ....
  کم ندیدیم سوء استفاده و حماقت ها و توهین هاشون رو.
  به هر حال فکر می کنم که شما تو بعضی از جاها ترسیم می کنی و خواسته و یا نا خواسته تعصبی بحث می کنی.
  در مورد اون بحث رو و پررو که طنزآمیز بیان کردم شاید خوب دید دلم رو نتونستم بگم. ولی فکر می کنم خیلی از این بسجس ها هستن که بین اسلام و مردم فاصله ایجاد می کنن
  راستس اسلام یک تسلیم قلبی است یا تسلیم بر اساس زر یا زور یا جوسازی و ...
  ممنون میشم جوابم رو بدین
