message: سلام، به نظرم اگر به این ترس یا پرهیز یا هر چیزی که اسمش را بگذاری باشه،
  بسیاری از آثار حتی فارسی مثل بعضی از کارهای آل احمد، گلشیری، چوبک و امثالهم بدتر
  از این مورد هستند. فرقش فقط این هست که موضوع آن مسأله نیست ولی میزان پرداختن به
  مسائل خاک‌بر‌سری توی اونها هم زیاده. من وظیفه‌ام صداقت در نظر بود :)
