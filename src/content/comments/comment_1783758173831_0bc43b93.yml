name: دانشجو
date: '2120-06-13T18:50:00Z'
message: |-
  سلام. من خاطرات همسفر شراب رو خوندم و این خاطرات هم تا اینجا تکرار وبازنویسی همانها بوده - کمی منسجم تر. آیا قراره همینطور ادامه بدین یا محتوای جدید هم اضافه میشه؟
  نکته بعدی کاش درباره حوادث روز هم - قتل جورج فلوید و ... - یه چیزی بنویسین. انگار اصن تو امریکا نیستین!!!
adminResponse:
  date: '2120-06-13T19:11:00Z'
  message: |-
    سلام
    همسفر شراب از جایی به بعد متوقف شد. هدف اصلیم از این مطالب اخیر، همان‌طور که از عنوان مطلب پیداست، کار در فیس‌بوک است. ولی چون حدس زدم خیلی‌ها آن مطالب قبلی را نخوانده‌اند ناچار از این کار شدم.
    همین الان که دارم تایپ می‌کنم، صدای بلند آمبولانس می‌آید. هفتهٔ پیش هم حدود ۱۰ نفربر از کنار ساختمان مسکونی ما رد شدند. آن مطالب روز هم تا من با این سرعت حلزونی بنویسم می‌شود مطالب پریروز.
    مخلصیم
