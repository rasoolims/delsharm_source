message: |-
  ممنون برادر از جواب هایت
  ولی بعدا از پیشرفت پروژه ات  ما را در جریان بذاری خیلی ممنون میشیم.
  پروژه خیلی جالبی به نظر می آید . دوست دارم ببینم چطوری حلش می کنید.
  حال این اطلاع رسانی می تونه تو همین سفرنامه هات باشه تا تو وبلاگ پردازش زبان طبیعی یا هر جور دیگه که صلاح می دونی
  یا علی
  در پناه امام زمان موفق باشی
