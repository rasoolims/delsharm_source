message: |-
  آقای رسولی خسته نباشید.
  سبک نوشتن این سری شما بسیار برای من مطبوع‌تر از فصل‌های قبلی بود. امید است همین را دنبال کنید. تا سریعتر هم مطلب به چاپ برسد!
  آقای رسولی من در یک دانشگاه معتبر تهران اما به شیوه‌ی آموزش محور کارشناسی ارشد فناوری اطلاعات گرفتم. آیا این موضوع برای پذیرش من در آمریکا مشکل ساز می‌شود؟
  پایان‌نامه‌ی شما چقدر در پذیرش‌تان تاثیر داشت؟ (شما در این فصل گفتید که ارشد در آن‌جا پروژه ندارد، آیا این یک موضوع کلی در سراسر آمریکا است؟ پس تفاوت ارشد و کارشناسی در آنجا چیست؟)
  خیلی ممنون
  سلام
  معمولاً‌ برایشان تفاوتی ندارد و معیارشان کارهای تجربی  که داشته‌اید هست. ممکن است این تجربه‌ها را در کار واقعی هم داشته باشید.
