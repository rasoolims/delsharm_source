  سلام محمد صادق گل گلها
  خوبی عزیزم
  این نوشته ات رو خیلی خوشم اومد. جزئیات رو خوب داری بیان میکنی. خیلی از سوالهای توی ذهنم رو جواب میداد. هر بار که مطالب رو میخونم سوالهات بیشتری توی ذهنم میاد. برداشت های خودت از مردم و فرهنگ و زندگی مردم رو میتونی با آب و تای بیشتری بیان کنی. مقایسه های جالبی هم میتونی بکنی. از اینکه خیلی طولانی میشه هم نگران نباش. اوایل سفر حرفهای بیشتری واسه گفتن هست و به مرور بعضی چیزها عادی میشه. خوش باشین. به خانمت هم سلام برسون.....
