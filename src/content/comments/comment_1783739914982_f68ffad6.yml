  با سلام
  به وبلاگ حامیان دولت ولایی سر بزنید. با مطلبی در مورد تناقضات فکری و عملی علی زاکانی رئیس کمیته 7+8 بروزم. این کمیته پاتوق خواص بی بصیرت- ساکتین فتنه- حامیان دانشگاه آزاد و اصولگرایان! حامی موسوی است. با دقت بخوانید و نظر دهید
