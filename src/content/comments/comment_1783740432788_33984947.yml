message: |-
  بسم الله
  سلام
  داشتم وبلاگتون رو نگاه میکردم و پستای قبلی رو می خوندم
  هم زمان سایت بچه های قلم هم باز بود
  یکدفعه متوجه شدم چقد به هم میاد این نوا و این متنها ...
  موفق باشید
  یا حق
