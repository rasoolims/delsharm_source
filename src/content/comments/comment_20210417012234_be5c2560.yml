message: |-
  سلام
  خیلی جالب بود، با عرض معذرت اما کلی برای بخش دوا درمونتون خندیدم  خداییش خیلی مصیبتیه. نظر مشروحم رو بعدا برات می نویسم
  2 تا آفرین داری، یکیش بابت عدم برداشتن به نام خدا دومیش برای دست ندادنت. جالبه طرف مقابلت به سادگی با این قضیه کنار اومده اما در اینجا وقتی با بعضی از نا محرم های خانواده دست نمی دیم ناراحت می شن. راستی بیشتر در مورد ایرانی های اونجا بنوبس. در مورد مراسم مذهبی که احتمالا برگزار میشه، نماز، افطاری، قدر... . در مورد گندکارهای ایرانی ها هم بنویس چقدر با میراث آلبرتا 1 هم خونی داره؟تازه 2ش هم اومده.
