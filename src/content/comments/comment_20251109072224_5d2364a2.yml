  سلام
  یک چیزی معادل تکبیر که ادبی باشد برای شعرت.
  یک چیزی معادل آفرین که کارگری باشد برای باغبونای علم و صنعت.
  یک چیزی هم معادل زرشک که زرشکی باشد برای این انتخاب تیترت که فکر کردم از خودت است.(به یاد جشنواره توت طلایی و زرشک قهوه ای)
