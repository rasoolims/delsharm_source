  سلام
  امیدوارم همیشه موفق باشی برادر عزیز
  تو نوشته هات چیزی که من بیشتر از همه ازش لذت می برم خوندن تفاوت ها و شباعت های اونجا با اینجاست. ذکر جزئیاتت واقعا عالیه مثل چاله چوله های آسفالت
  از جزئیات بخش تحقیق و توسعه یاهو تا ماشین اجارخ کردن همه و همه برام خیلی جذاب و مفیده
  دست مریزاد دوست عزیزم
