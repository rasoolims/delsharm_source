message: |-
  با سلام
  ضمن تشکر و سپاس از بذل محبت های شما
  از وب پر محتواتون خوشه چینی می کنم و بهره مند شدم
  با یه مثنویغزل به روزم و منتظر نظر ارزشمند تون
  اگه به روز شدین مطلع بفرمایین
