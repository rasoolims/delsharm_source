message: |-
  سلام...حالاآفرین که اومدید
  اما میخوام بدونم آسمان دست به نفد و شعر های نسیه شما چه ربطی به جاده
  داره؟
  هان...تا واژه ها روش راه برن...
  خوب بعدش چه اتفاقی بیفته؟
  دیر اومدی بادست نیمه پر...یادتون باشه!
  نکنه احساستون مثل دل من کپک زده؟؟؟!!!
  علی یارتون
