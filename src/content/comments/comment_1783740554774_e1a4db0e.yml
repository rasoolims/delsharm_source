postSlug: '%D8%B9%D8%B4%D9%82-%D8%A2%D9%86-%D8%AD%D8%AF%DB%8C%D8%AB-%D9%86%DB%8C%D8%B3%D8%AA-%DA%A9%D9%87-%D8%A7%D8%B2-%D8%AF%D9%84-%D8%A8%D8%B1%D9%88%D9%86-%D8%B4%D9%88%D8%AF'
name: دچار
date: '2111-03-05T11:05:00Z'
message: |-
  اختیار داری.
  حرف تو درست است و آدم نباید با هر بادی تغییر موضع دهد. و غیرت هم بسیار موضوع مهمی است. غیرت (و یا تعصب مثبت تو) باعث می شود که اجازه اهانت به ارزشهایت را به کسی ندهی. ما که نمی خواهیم در واژه ها بمانیم. پس اگر تعصب مثبت در این راستا باشد خیلی خوب است. اما من در حرفم گفتم، انتقاد. و انتقاد(که در تضاد کامل با اهانت است) را باید حتی نسبت به ارزشها، شنید و بر آن تأمل کرد. اگر تعصب باعث شود این امر از بین رود نتیجه خوبی برای خود فرد و جامعه ندارد. از واژه تعصب، غالب در ذهن من دومی بود که آنطور گفتم. اما اولی هم هست. قبول است.
  اما باز هم همان لغت غیرت را بیشتر می پسندم. (این جمله آخری هم فقط از روی تعصب بود ;-)   )
  انتقاد را باید شنید ولی این را که آدم همیشه تمایلات فکری دارد نباید انکار کرد. مسألۀ همیشگی من این است که برخی از افراد طوری بحث می‌کنند که انگار هیچ تمایل فکری‌ای ندارند و کاملاً بی‌طرفانه حرف می‌زنند. منصف بودن با طرف‌دار بودن در تناقض نیست بلکه برخی اوقات به خاطر مسائل نفسانی این دو دچار!!!! تزاحم می‌شوند.
  باز هم ممنون
