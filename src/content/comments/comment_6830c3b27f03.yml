message: خیلی جالب اهمیت کتاب خوندن رو گفتی. چند ماهی هست مطالعه رو دوباره شروع کردم
  برای این که مجبور شم این کار رو انجام بدم گاهی خلاصه کتاب رو تو وبلاگ مینویسم. اما
  یه چیز اساسی که قدیم مانع میشد کتاب بخونم این بود که کتاب خوب پیدا نمیکردم. هرچی
  میخوندم مزخرف بود بعدش کلا حس کتاب خونی میرفت کنار. حالا که به توصیه وبلاگ های دوستان
  کتاب های خوب پیدا کردم، لذت زیادی رو موقع کتاب خوندن تجربه میکنم. اگه کتاب خوبی
  به نظرت اومد لطف کن و معرفی کن.
