message: |-
  سلام. شما به زبان اصلی شعر می‌خوانید شعر مزه دارد؟ من از سال‌ها پیش سعی کردم شعرهای انگلیسی را بخوانم ولی هیچ شاعرانگی‌شان را درک نمی‌کردم.
  احساس می‌کنم مشکل من حسیست که به واژه‌ها دارم. مثلاً در فارسی «جادو رو زیاد کن» برای من شاعرانه نیست ولی «افسون را بیافزا» چرا. مشکل این است که در انگلیسی هر چقدر هم شاعرانه بنویسند «increase the magic» ذهن من همان «جادو رو زیاد کن» می‌خواندش.
