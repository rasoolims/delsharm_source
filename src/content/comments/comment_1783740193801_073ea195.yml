name: ردایی موسی
date: '2022-09-06T10:20:00Z'
message: |-
  تا حدی کَلَمْحِ الْبَصَرِ رو در ذکر واقعه هایی که در این دهه از مسافرت و درس و کار و زندگی... که داشتید رو میشه ببینه انسان و موثر یقینا میبینیم.
  بخواهیم زیبایی در نگاه مون باشه اینو بعد از خوندن این پست و ارزیابی این زمان که گذشت تا واقعه و لحظه ها تا حدی منتهی میشه به این نقطه که : خدا رو شکر که تا حدی دانش و روشنایی بود و بشه نهایت مث پرواز در ملکوت آسمانها و زمین
  .
  در نهایت معنای زندگی که حدیث هست مث "رَحِمَ الله اِمْرَءً اَعَدَّ لِنَفْسِه وَ اسْتَعَدَّ لِرَمْسِه وَ عَلِمَ مِنْ اَیْنَ وَ فی اَیْنَ وَ اِلی اَیْنَ" و در ذکر این واقعه ها از تلخی و شیرینی و جمع اضداد در دنیا و جوامع و فرهنگ و سیاست و اقتصاد و اجتماع و....موثر همچنان نقطه روشنایی در تاریکی هست و بویژه وطن و ایران رو هر چند ویرانه سرا باشد می سازیم و معقولانه بدون بدبینی و خوشبینی که با همه مشکلات و ویرانی و تباهی ولی آینده روشن هست و رسم و سنت خدا بر این هست که هیچ نیرو و قدرتی بالاتر از الله نیست و ابدیت نیز در پیش داریم
  .
  حالا ذکر حدیث رَحِمَ الله..... عَلِمَ مِنْ اَیْنَ وَ فی اَیْنَ وَ اِلی اَیْنَ که متعالی بودن هدف نهایی انسان و مقصد نیز ضریب تاثیر بالایی داره
  در احوالات اندک انسانهایی اندیشمند که اساتیدی نازنین داشتند ذکر شده: مرحوم آیت الله شیخ جعفر شوشتری (ره) نشسته بودند، الاغی آمد. بارش را خالی کردند. الاغ به شیخ نگاه کرد و گوش هایش را تکان داد. شیخ ابتدا گریه شدیدی کردند، سپس فرمودند: گویا این الاغ با زبان حال به من گفت: من بارم را به مقصد رساندم، آیا تو هم بارت را به مقصد رسانده ای؟
  .
  ان شاءالله عاقبت بخیر ی در انتها باشد.
  درود و سپاس آقا محمد صادق عزیز و نازنین
