message: |-
  محمدصادق اصل ماجرا شاید اینه که
  یُریدُونَ لِیُطْفِؤُا نُورَ اللَّهِ بِأَفْواهِهِمْ وَ اللَّهُ مُتِمُّ نُورِهِ وَ لَوْ کَرِهَ الْکافِرُونَ
  الان هم نتیجه رفتارشون با مسلمونا حالت معکوس داده مسلمونا محبوب تر میشن
  دادا بیشتر بنویس و شعر ها رو بیشتر کن و  خیلی خوب از اینکه نکات ظریف علمی رو هم میاری یا علی
