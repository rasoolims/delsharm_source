message: |-
  سلام.
  خیلی استفاده می کنیم. امیدوارم با همین انرژی ادامه بدی.
  به نظرم اینکه تو در یک لحظه خاصی در کدام خیابانی و از کدام خیابان با چرخش به کدام سمت به کدام خیابان می رسی و کدام خیابان از آن یکی بزرگتر است، خیلی نیاز نیست گفته شود. اما مثلاً اینکه پیاده رو چه شکلی است و اینکه الگوی نام گذاری خیابان ها چیست خوب است.
  یعنی اگر بخواهی هم مفید بگویی هم زحمتت کمتر شود فکر می کنم بعض جاها باید عمومی تر حرف بزنی نه راجع به یک اسم خاص.
  قلمت درد نکنه.
