message: |-
  سلام عزیز
  جالبه سیستم آموزشیشون
  نوشته ات خیلی خوب بود اما به نظر من سعی کن اکثر نوشته هات بیشتر از این از حالت داستانی خارج نشه، برای مثال خیلی خوب بود که یک جلسه ی دفاع رو مبنای توضیحاتت پیرامون جو دفاع کردن و درس خواندن قرار دادی، و بعد توضیحات دادی
  یعنی در کل سعی کن اگر میخواهی پیرامون قضیه ای توضیح بدی با یک مثال از یک مشاهده شروع کنی.
  خیلی منتظر شنیدن دیده ها و نظرهات پیرامون دینداری، حجاب، و محدودیت های اجتماعی (مثل عدم امکان حضور ما مسلمانان سر سفره ای که درش مشروب سرو میشه، مصافحه، محدودیت در برخوردهای اجتماعی هستم)
  البته میدونم که حریم شخصی ات برات خیلی مهمه و امیدوارم توضیح پیرامون این موضوعات به اون حریم وارد نشه.
  ما ایرانیا عادت داریم به چیزایی که چندان هم به ما مربوط نیستن افتخار کنیم، تاریخ 2500 ساله و نمیدونم ننه ی همسایه ی دوستم فلانه و اینا
  منم افتخار میکنم که هماتاقیم داره اونجا درس میخونه!!
  امیدوارم سلامت باشی
  فعلا
  مخلصیم برادر
