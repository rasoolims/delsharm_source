message: |-
  سلام دکتر
  به صورت خیلی اتفاقی اسمت رو جستجو کردم و وبلاگت رو یافتم! چقدر خوبه که از خودت و تجربیاتت برای ما مینویسی...
  انقدر نوشته هات جالب بود که هر پنج فصل رو در یک روز خوندم! البته احساس میکنم فصل پنجم یک مقدار ضعیف نوشته شده باشه، البته دلیلش میتونه کمبود وقت و یا با عجله نوشتن باشه.
  به هر حال همین که مینویسی و مارو از احوالت باخبر میکنی خیلی عالیه!
  به خانومم گفتم وبلاگت رو بخونه، تعجب کرده! میگه منکه نمتونم انقد با سختی زندگی کنم!
  البته مسلما سختی های شما همین چند ماه اوله " ان مع العسر یسرا"
  همت بلندی داشتی که تونستی واسه کلمبیا اپلای کنی، برات آرزوی موفقیت میکنم. به خانمت هم سلام برسون...
  دمت گرم حاج مجید
