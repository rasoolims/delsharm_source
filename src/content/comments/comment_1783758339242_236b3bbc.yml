message: |-
  سلام صادق جان!
  خداییش تو که این قدر به شعر و نثر و ادبیات علاقمندی میرفتی رشته‌ی ادبیات فارسی خیال همه رو راحت میکردی؛ این جوری نبوغت هم بیشتر رشد میکرد، والّا ...
  بعدشم یادت باشه خودت تو هم با همین خاک پاک وطن اون قدر خاک بازی کردی تا به این جا رسیدی.
  این یه بیت هم هدیه به تو:
  همت طلب از باطن پیران سحرخیز   زیرا که یکی را ز دو عالم طلبیدند     یا علی
  چه بگویم والله. دم شما گرم
