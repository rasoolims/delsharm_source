message: تا به معرفی شما، چندین نقد و خلاصه ی یک یا چند صفحه ای از این کبابِ غازِ
  رمان رو خونده (خورده!) بودم حتی یه بار به چند صفحه ایش هم ناخونک زدم. اما باز ترسیدم
  و رهاش کردم. اما آخه مومن، چرا کتابی رو که خودتم دلت نیست کسی بخوندش این قدر قشنگ
  معرفی میکنی؟! تازه، تازه آخرش هم میگی که با آلوی برغان شاعرانگی طعم دار شده. اتقوالله
  حاجی، اتقوالله (;
