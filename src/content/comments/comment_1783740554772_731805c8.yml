name: دچار
date: '2111-03-05T10:13:00Z'
message: |-
  سلام.
  مقصود فضولی در بحث نیست اما گفتی تعصب مثبت، مرا به فکر برد این شد که خواستم نظر صرفاً شخصی ام را بگویم.
  راستش من فکر می کنم اصلاً چیزی به اسم تعصب مثبت وجود ندارد. تعصب، تعصب است. فرق است بین ایمان و باور و حب چیزی با تعصب داشتن. تعصب بر امری یعنی اینکه هیچگونه اعتراض، انتقاد و حتی نظر ناموافقی را درباره آن بر نتابیدن.
  در حالی که ایمان راسخ به موضوعی هیچگاه ناراحتی از نقد شدنش را به همراه ندارد. چه اگر هر چه راسختر باشد، آنقدر شناخت و اطمینان به موضوع بالاست که نه تنها از انتقاد کک فرد نمی گزد بلکه به چالش کشیدن منطقی دیگران را هم می پسندد. و البته همیشه درصدی را برای احتمال خطای خویش می گذارد (که عقل سلیم این را می گوید). در هر صورت به نظرم واژه تعصب ذاتاً واژه خوبی نیست. و در هر صورتی اگر در وجودمان یافت شود باید کنار گذاشته شود. چرا که تعصب، ولو در امور مثبت باعث می شود انسان دیواری به دور خود و هم عقیدگانش بکشد و از پشت آن دیوار هیچ خبری از دنیای اطرافش نداشته باشد. و نتیجه طبیعی (ولو غلط) این امر این است که نسبت به آن عده داخل حصار حتی اگر بهترین چیزها را با خود داشته باشند، بزرگترین بغض ها بوجود آید.
  حیف است که تو (با شناختی که ازت دارم) عقاید زیبایت را با واژه تعصب بیان کنی.
  سلام عزیز
  فکر کنم دکتر شریعتی در کتاب امامت بحثی در همین باره دارد و معنای تعصب مثبت را گفته است. مخلصش این است که تعصب مثبت چیزی شبیه غیرت است. البته این کتاب را 8 سال پیش خواندم و متأسفانه چیز زیادی یادم نمی‌آید.به همین دلیل گفتم که تعصب از نوع مثبت بد نیست. شاید باعث می‌شود که آدم دهن‌بین نباشد و سریع نسبت به اعتقاداتش تغییر موضع ندهد.
  ممنون که باز هم مرا با لطف بسیارت شرمنده کردی
