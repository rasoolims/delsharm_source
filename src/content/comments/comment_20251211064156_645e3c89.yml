message: |-
  ممنون بابت پاسختان.
  بله قبول دارم در فضای رسانه‌ای تقریبا همه جا این گونه است.
  درباره واقعی‌بینی شاید حق با شما باشد اما درباره ایران به نظر من ربطی به مسائل اخیر ندارد. هر وقت و همیشه حرفی می‌زدی در خطر بودی. مثلاً فرهاد میثمی زمانی به صلح‌آمیزترین شیوه اعتراض کرد که فضا امنیتی نبود. البته شاید شما نظرتان درباره‌اش چیز دیگری باشد که اگر هست مشتاقم بشنوم.
