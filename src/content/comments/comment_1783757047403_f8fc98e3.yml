name: ردایی موسی
date: '2022-10-13T08:37:00Z'
message: |-
  درود و سلام. وقتی حسین منزوی تبدیل به غزلسرایی موثر شده طبیعتا میشه تا حدی این شکل تفسیر شه که فارغ از خلاقیت و نوآوری انگار در درونش به نقطه ای از روشنی رسیده و این ساده و صراحت و روشن بودن خودش با درونش و محیط و جامعه و واقعه ها هست و تا در ادامه در معنای عشق که واقعی و زمینی گفت . مث کودک در داستان پادشاه و لباس که واقعیت رو ذکر داشت و مطرح شد و در این مجموعه شعر و در غزل ها در حسین منزوی تقریبا روشنی و نوعی محاوره همراه با تسلطش در زمینه ها رو میشه دید که در ادبیات عصر حاضر نیز جلال و سیمین شکل زبان محاوره روشن و نثر ساده داشتند و اندیشمندانی دیگه و منزوی موثر اینها رو تبدیل به شعر و در نهایت تاثیرش که در کل مجموعه غزلی قشنگ شد
  سپاسگزارم آقا محمد صادق دکتر عزیز و نازنین
  .
  من تو را برای شعر برنمی‌گزینم
  شعر، مرا برای تو برگزیده است
