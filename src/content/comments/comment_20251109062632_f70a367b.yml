  سلام
  به دوستم همهٔ اون مطالب رو در مورد سربازی ایران، حتی بدترش رو گفتم. همین که راست و حسینی در مورد ربع‌شدن ارزش پول ملی در عرض یک سال گفتم، کافی‌ست. همون طور که در مطلب دیگری پاسخ شما را دادم، هدفم یادآوری ایرادهای ایران در خاطراتم نبوده. دوست کره‌ی از مشکلاتش گفت و من هم نوشتم. راستی، همین هفتهٔ پیش پدرش فوت کرد و او به خاطرات همان مشکل سربازی موفق به حضور در مراسم ختم پدرش در کرهٔ جنوبی نشد.
