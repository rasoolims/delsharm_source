message: |-
  سلام
  چند وقتی بود ننوشته بودی! ما هم از چند وقت عقب تر نخونده بودیم!
  ولی وقتی این عکس های زیبا و تمیز را دیدم بر عکس نیویورک شروع کردم به خوندن!
  ان شاالله یک دوچرخه بخری و این طوری مجبور شی روزی یک ساعت ورزش مفرح دوچرخه سواری اون هم در یک هوای پاک را بچشی!
