  message: |-
    سلاک علیکم
    مشتاق دیدار، خیلی ممنون از دلگرمی شما. راستش اینرسی عجیبی نسبت به شبکه‌های اجتماعی پیدا کرده‌ام، یک جورهایی همین قالب قدیمی را بیشتر می‌پسندم.
