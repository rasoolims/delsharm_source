  اینا نیوز با عنوان
  سفر بی نتیجه مقامات حقیقت یاب بنیاد شهید به آذربایجان غربی
  بعد از گذشت یکسال از شیوع برخی تخلفات در بنیاد شهید و امور ایثارگران آذربایجانغربی معاون این سازمان بهمراه هیاتی بلند پایه از تهران هفته گذشته وارد ارومیه شدند...
