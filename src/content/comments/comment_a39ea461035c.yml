  سلام و وقت بخیر
  اول از همه چند ماه (سال؟!) پیش کتابی رو معرفی کرده بودین از جناب موسوی گرمارودی. هرچه گشتم پیداش نکردم. لطفا لینکش رو بذارین. اگه بلاگ امکان "جستجو" داشت چقدر خوب میشد! (نداره؟!)
  دوم از همه کتابی در مورد چطور کتاب خواندن و چطور فیش برداری کردن و ... هم خوندید؟ خوب میشه اگه معرفیش کنیدا !!
  آخر از همه متشکرم
