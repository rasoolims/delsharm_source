  سلام حاج محمد صادق عزیز
  حس رو خیلی خوب منتقل کردی مرسی.......خیلی برات غصه خوردم....... از روی کامنت هات هم معلومه که خیلی داره بهت فشار میاد. چی میکشی از دست این آقا....
  خدا بهت صبر و توان بده و البته یه مقدار هم همت و تدبیرت رو بلند تر کنه...... تو میتونی از پس این شرایط بر بیای.... مواظب خودت و خانواده ات هم باش..... خوش باشی... منم برات دعا میکنم. ان شاألله که شرایطتت رو به راه میشه. غصه اش رو نخور....
  منتظر نوشته های بعدیت هستم
  دمت داغ
  یکی از هدف‌هام از نوشتن این خاطرات تلخ هم این است که کمی دید واقع‌بینی در میان بچه‌هایی که از اینجا بهشت ساختم ایجاد کنم
