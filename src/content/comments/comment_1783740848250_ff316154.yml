message: |-
  سلام ممنون از معرفی کتاب
  در کتاب پاییز نکته ای که هست منو یاد مفهوم حجاب بی خبری رالز (نظریه پرداز عدالت) انداخت.
  به نظرم شاید بی توجهی شخصیت های داستان علی الخصوص نویسنده به جوانب شخصیتی بتواند تصویر متفاوتی از جهان ارائه بدهد. البته نمی دانم چون از طرف دیگر وظیفه نویسنده پرداخت شخصیت هم هست.
  موفق باشید
