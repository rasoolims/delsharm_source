  سلام‌علیکم
  گاهی رها کردن، شجاعت می‌خواهد. من معمولاً در مواجهه با کتاب‌ها این شجاعت را نداشته‌ام. اما در بیشتر موارد در نهایت از رها نکردن رضایت پیدا کرده‌ام.
