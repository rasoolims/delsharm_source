  سلام.
  و کُنّا إذا اشتَقنا الی نبیِّک نظَرنا الَیه
  هر وقت دل تنگ پیامبر می شد علی را نگاه می کرد.
  با غزلی برای حضرت علی اکبر بروزم و منتظر.
