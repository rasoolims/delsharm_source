message: واقعیت این هست که دنیای بدون گوگل و فیس بوک هم قابل تصوره و چه بسا بهتر هم
  باشه و از منظری تمام این به ظاهر پیشرفت ها دردی از درد اصلی بشریت که به نظرم معنی
  دادن به زندگی هست، دوا نمیکنه. اینکه ایران بشود نسخه اسلامی اروپا و آمریکا هم باز
  کمکی به معنی بخشیدن به زندگی هیچکدوم از ماها نمیکنه. ممکنه یکی که دیدگاه مذهبی داره
  بگه من میخوام nlp کارِ امام زمان بشم و اینطور به زندگی خودش معنی بده. خیلی از ماها
  اگه چند کیلومتر اونورتر بدنیا میومدیم شاید الان داشتیم برای سربلندی افغانستان و
  عراق و ترکیه تلاش میکردیم و الان داریم با تلاش برای سربلندی ایران به زندگیمون معنی
  میدیم. زندگی جاریست و گاهی همه این تلاش ها و رسیدن ها فقط برای ریختن چند قطره آب
  روی آتش پیدا کردن معنی برای زندگی هست وگرنه مردم دویست سال پیش بدون گوگل و هواپیما
  و اتومبیل خودران زندگی آرامتری رو تجربه کردن.
