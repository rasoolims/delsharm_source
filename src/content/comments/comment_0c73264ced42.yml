message: |-
  من احساس میکنم داستان شروع نوشتن ر ه ش این طور شروع شده.
  رضا امیرخانی چندین بار رفته شهرداری و کارش رو از طریق درست راه ننداختن و اعصابش رو خورد کردن. اون هم برگشته و گفته چنان انتقامی از کل شهرداری بگیرم که همتون کیف کنید.
  این طوری شده که رمان رو نوشته و نتیجه شده این.
