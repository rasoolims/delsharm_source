postSlug: '%D9%87%D9%85%D8%B3%D9%81%D8%B1-%D8%B4%D8%B1%D8%A7%D8%A8-%D8%B3%D9%81%D8%B1%D9%86%D8%A7%D9%85%D9%87-%D8%A7%D9%85%D8%B1%DB%8C%DA%A9%D8%A7-%D9%81%D8%B5%D9%84-5'
name: سعید عادل مهربان
date: '2113-01-27T16:05:00Z'
message: |-
  سلام.
  قضیه‌ی روز بدون شلوار یکی از چیزایی بود که منتظر بودم اینجا ببینمش. نمی‌دونستم چقدر فراگیره، فقط یکی دو تا عکس از همون فیسبوک آدم‌های نیویورک دیده بودم ازش.
  این قدر که نوشتی همه چیز کهنه و کثیف و داغونه آدم با خودش فک می‌کنه چقدر اونا بدبختن. در حدّ صداوسیمای خودمون.
  البتّه از یه نظر هم خوبه که آدم می‌فهمه همه چیز مثه تو فیلم‌ها نیست.
  راستی قضیه‌ی اونی که تو مترو کشته شد به نظرم اون جوری هم نمی‌شه گفت بی‌تفاوتی مردم بوده، مگه ایستگاه خالی نبود؟ درسته که طرف جیبشو زد و ولش کرد تا کشته بشه ولی خب با یه مورد نمی‌شه این جوری گفت. فکر می‌کنی اگه ایستگاه شلوغ بود کسی کمکش نمی‌کرد؟
  راستی در مورد نحوه‌ی برخورد و نگاه‌ها به شما که مثل بقیه نمی‌پوشید هم به نظر می‌تونه جالب باشه البتّه اگه از نظر خودتون ایرادی نداره نوشتنش.
  بازم خیلی گلی و گل می‌نویسی مهندس زبان‌شناس نویسنده‌ی عکّاس!
  سلام
  در مورد قضیۀ مترو من نقل قول از دوستان مطلع کردم. یک فیلمی از آتش‌سوزی ماشین در ایران بود که شبیه همین اتفاق و البته به شکل خیلی بدتری افتاد. آدم‌های دنیای مدرن این طوری هستند.
  سیاه‌نمایی در کار نیست. باور کن! متروی نیویورک واقعاً کثیف هست. باور نداری توی گوگل جستجو کن تا ببینی واقعاً همین طوریه.
