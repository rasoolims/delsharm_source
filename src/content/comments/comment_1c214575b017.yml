message: |-
  سلام
  یه سوالی داشتم. با توجه به اینکه گرایش بنده نیز "پردازش زبان طبیعی" است و با توجه به شنیده هایم و بعضا تجربیاتم، ته ته پروژه های آمریکا و غرب در زمینه پردازش زبان طبیعی با محوریت زبان فارسی به پنتاگون و وزارت دفاع بر میگردد- که البته با حساب دو دو تا چهار تای من هم جور در میاد. شما این مسیله رو چگونه برای خودتان حل کردید؟ آیا پروژه ای که شما االان در حال انجام کار بر روی آن هستید متفاوت است؟ خاطرم است یکی از بچه های شریف که در دانشگاه رنک بالایی تحصیل میکرد، بعد 2 سال به خاطر همین مسیله انصراف داد..
  سلام
  واقعیتش رو بخواهید به نظرم این مسأله با کلاه‌های شرعی قابل حل هستش و لا غیر ;)
