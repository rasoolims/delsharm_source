  سلام
  ممنون از ونشأته هاتون،خدا خیر و سلامتی به خودمون و خانمتون بده،من یه سؤال دارم،این احمدی نژاد منتصب نبود؟منتخب بود؟چی فکر می کنید
adminResponse:
  date: '2113-07-29T21:18:00Z'
  message: |-
    سلام
    به فکر من کسی منتخب یا منتصب نمیشه. ولی دلایل مبنی بر تقلب ضعیف‌تر از اونی بودند که من باورم شه.
