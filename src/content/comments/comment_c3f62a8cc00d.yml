message: نمی‌دانم چرا دلایل یاس ایرانیان را فقط افتصادی می‌بینید و دلایل بزرگ دیگری
  را نادیده می‌گیرید. عده زیادی از مردم از چوب اصلاح‌ناپذیر دیکتاتوری مذهبی ناامیدند،
  مثلاً همان به اصطلاح شما بدحجاب‌هایی که با زور آن نیمچه حجاب را بر سرشان گذاشته‌اند.
