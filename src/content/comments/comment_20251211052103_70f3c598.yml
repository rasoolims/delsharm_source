message: |-
  ممنون از حضورتان...اما شما با شعر هایتان همیشه میخواهید آن بالاها سیر کنید؟
  این فقط یک نظر بود...همین! جدی نگیرید.
  در مورد نظرتان هم باز تشکر که خواسته ی مرا اجابت کردید.اصلا ناراحت نمیشوم.
  البته این کار آخرم هنوز جایی عرضه نشد تا نظر دیگر منتقدین را هم بدانم.
  اگر این اتفاق افتاد و چند نفر دیگر هم در مورد کارم با شما هم رای بودند حتما فکری
  برای آن واژه ها خواهم کرد.
  در پناه خدا
