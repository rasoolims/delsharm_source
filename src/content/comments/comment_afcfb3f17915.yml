message: |-
  سلام صادق جان
  امیدوارم قبراق باشی
  متنت فوق العادست مخصوصا گریزهایی که گاهی اوقات به خاطراتت تو ایران میزنی(مثلا دوچرخه سواری چالوس)
  یه نکته ای تو نوشته هات برخوردم که برای خودم سوال شده بود که خوردن ماهی ای که تو خارج صید شده حلاله یا نه؟
  حکم آقا رو نگاه کردم
  http://www.leader.ir/tree/view.php?parent=n8853&catid=49
  و حکم بقیه مراجع
  http://portal.anhar.ir/node/2032/?ref=sbttl
  حالا یه سوال دیگه برام شده که گوشت ماهی هم اونجا به صورت حلال فود هست یانه؟ یا کنسرو حلال؟
  بعضی از ماهی‌ها فلس دارن مثل تیلاپیا و سلمون. از آقای مسلمانی که اونجا بود پرسیدیم گفت مشکل نداره (البته بنده خدا اهل سنت بودش).
