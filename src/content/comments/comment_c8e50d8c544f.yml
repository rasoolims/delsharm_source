  سلام محمد صادق عذیذ
  دفعه قبل هم گفتم که جزئیات رو دقیق بازگو کن. این دفعه خیلی بهتر شده، واقعاً خوبه، بعد این چپ و راست و اینها رو خیلی میپیچونی من گیج میشم!! (البته خنگی خودمه ها)  به هر حال ادامه بده، خیلی خوبه، عنوان های قسمت های مختلف رو قشنگ انتخاب کرده بودی. لذت بردم. دقت کن توی خود نوشته هات، من به عنوان یه نفری که نوشته هات رودنبال میکنه ترجیح میدم که یه متن سلیس رو بخونم هرچند یکی دور روز بیشتر توی کف باشم.  به هر حال من برات دعا میکنم تو هم برای ما دعا کن، هرچند به دعای ... بارون نمیاد..............
  یا علی.......
