message: |-
  متنت را خرد خرد می خوانم و فعلاً تا آنجا که خواندم نظر می دهم که یادم نرود.
  خوب است این که شرایط جلسه دفاع را توصیف کردی خوب بود، اقل کم بار دیگر فهمیدیم آنجا هم این مدلیش که تو ایران هست زیاد یافت می شود.
  یاد روز دفاع خودم افتادم که سه استاد مشغول لنباندن بودند و من مشغول بال بال زدن و دوستانم مشغول به سیخ نشستن و سر تکان دادن. استاد راهنمای خودم هم که بدتر از همه استادها روی صندلی درازکش شده بود. جوری که دوستانم هم خنده شان گرفته بود.
  فکر می کنم آنچه در ایران به عنوان احترام به بزرگتر و احترام به استاد آنقدر بزرگ شده و روش مانور داده می شود نیمی از مجموعه اصول احترام متقابل، (یا در سطح کلان تر حقوق و وظایف متقابل است) که به نفع موضع قدرت است (یعنی استادها، بزرگتر ها و... که در موضع قدرتند) این یعنی تو مملکت ما استاد جلوی چشم من در دفاع یکریز می لنباند اما من حق ندارم در کلاس آدامس بجوم چون بی احترامی است. و من هم فردا که پدر شوم می توانم به فرزندم همه جوره با میل خودم تحکم کنم و او که طفیل من است باید احترام به بزرگتر را فراموش نکند. تا اینکه روزی روزگار قصه را برعکس کند و من در پیری از فرزندم بی احترامی ببینم. القصه اینکه ما هم سر کاریم. و فقط به نیمه هایی که به نفع موضع قدرت است پرداخته می شود. به خاطر همین واژه هایی چون احترام به کوچکتر و احترام به شاگرد خیلی برایمان ناآشنا و مسخره اند.
  خوب می فهمم آنچه توصیف کردی چقدر مشمئز کننده است ولی به نظرم این یک طرفه بودنش از آن هم مشمئزکننده تر است.
  سلام
  وقتی آن استاد راهنمای شما آن کار را می‌کند کار به جایی می‌رسد که دوستانت هم می‌خندند. یعنی استاد به خاطر داشتن یک قدرت (مجازی)‌ بی‌ادبی‌اش بی‌جواب می‌ماند. اینجا این مسأله کاملاً‌ عادی است. مسأله قدرت که گفتی اینجا هست خیلی خوبش هم هست فقط شکل و قیافه‌اش عوض شده.
