message: |-
  سلام صادق
  آقا خدا خیرت بده، داشتیم کور میشدیم، قبلی رو که خوندم تا دو روز برنامه ماساژ چشم داشتم :)
  فلش بنگ! زدنت رو میزاریم به پای فکر مشغولت! آدمی است دیگه یادش میره اون موقع، بعداًترها یه چیزایی رو یادش میاد و میگه! ولی خب خوبه که اینها رو مینویسی! میشه بعدها مرتبشون کنی
  چقدر خوبه برای من که متن رو میخونم همون  ژست صورت، همون تیکه تکلام‌های صادق، همون خنده‌های صادق، تو ذهنم کاملا مصور و زنده میشه- حداقل این فرمی به یادتیم دوست عزیز، به قول نیما:
  یادت روشنم می‌دارد :)
  راستی یه چیزی از خودت هم عکس بزار - و اینکه این سبک نوشتنت رو دوست دارم چون اولا پر از "سبک کلام صادق" است و یادآور خاطرات و ثانیا انتظاری نیست که شما جلال بشی، رضای امیرخانی نویسنده بشی، همین!- البته به نظرم متن‌ت بیشتر از سفرنامه به گزارش‌نامه شباهت داره ولی خب خیلی خوبه خیلی :)
  هر چند به نظرم شعرهات از نوشته‌هات خیلی قوی‌تره
  پی‌نوشت :
  رسم ما ایرانی‌هاست که تا بزرگی در بینمون‌ه میگیم حالا وقت است میریم ازشون استفاده می‌کنیم ولی خب .... خدایش بیامرزد - عرض تسلیت
  جان برلبست و حسرت در دل که از لبانش
  نگرفته هیچ کامى جان از بدن برآید...
  ودیگرهیچ...
