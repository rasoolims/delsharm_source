message: |-
  سلام و عرض ادب
  من که خودم بسیار از نوشته هاتون لذت می‌برم فقط تنها انتقادی که دارم اینه که خیلی دیر به دیر مطلب منتشر می‌کنید شاید به خاطر اینکه این کار را برای لذت انجام می‌دهید اما من در نوشته های شما به دنبال چیزی فراتر از لذت هستم شاید دنبال تجربه‌ای که شاید خودم هیچ وقت نتو‌نم امتحانش کنم
