message: |-
  سلام .من و احسان پیگیر نوشته هاتون هستیم و لذت میبریم و با خوندنشون کم کم دارم احساس میکنم چیز غریبی نیست این غرب..
  برای آشنایی ما خیلی خوب بود متناتون
  فقط تو این چند بار که میخونم این نوشته هارو این سوال پیش اومده برام که احساس خانومتون چیه از این زندگی جدید؟ هیچ اشاره ای نکردین بهش
  سلام
  ممنونم. احساسات هر کسی رو خودش باید بنویسه. من نمی‌تونم در مورد احساسات خانمم صحبت کنم. ایشون خودشون اگه صلاح بدونن می‌نویسن.
