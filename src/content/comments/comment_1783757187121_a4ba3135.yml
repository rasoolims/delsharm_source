name: سایه ساری اش مبارک!
date: '2108-03-16T14:57:00Z'
message: |-
  بسم الله
  یا حاضری یا غائب ... غیبت را در مقابل حضور معنا کرده اند .. اما .. پس چرا می گویند 1200 سال غیبت!؟ .. تهمت ناروایی است .. درست است که ظاهر نیستی .. اما حاضری .. از سال 260 هجری .. وقتی که 5 ساله بودی .. در بطن بطن ما جای داری .. روشناییت میرسد .. بسان خورشید پشت ابر .. از امروزی .. سَروَریت آغاز شد .. سایه ات بر سر ما قرار گرفت .. چه سایه ای که نور می دهد ..! سایه ای محافظ در مقابل ظلمت ..! دنیا را ببین .. چه برعکس می چرخد ..!
  و اما تو .. پس کی میخواهی بخود آیی ..!؟  لحظه ای فکر کن .. به لحظات غفلتت که با لحظه لحظه عمرت در حال افزون شدن است ..! تو چه بخواهی چه نخواهی به این مهم می رسی که باید خودت را آماده کنی برای آن روز .. « روز واقعه » .. بشتاب .. به این فکر کن که شاید فقط منتظر تو باشند .. «روز واقعه» به خاطر توست که روز به روز عقب می افتد .. جمعه به جمعه .. دیگر فرصتی برای غفلت نیست .. اگر آماده نشوی .. شاید کس دیگری را جایگزین کردند .. آن وقت .. بار حسرتی است که تا آخر عمر بر پشتت سنگینی خواهد کرد .. بار «یالیتنا» هایی که دیگر سودی ندارد .. نخواه که همچون بی غیرتان سال 61 هجری، پرچم «یالثارات الحسین» را با کمال شرمندگی به دوش کشی .. نخواه .. نخواه ..
