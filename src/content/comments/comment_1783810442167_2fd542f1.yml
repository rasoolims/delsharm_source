    سلام بزرگوار
    خیلی ممنون از لطف شما. فکر می‌کنم مشکل بزرگ‌تر من این باشه که همین یک ذره چیزی رو هم که از مذهب بلدم به سختی می‌تونم به زبان انگلیسی بگم. حرفتون متین و درسته.
