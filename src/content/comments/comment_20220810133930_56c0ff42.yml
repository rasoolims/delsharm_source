message: |-
  تو سف اضاف که می بینمت صادق جون از این شعرا نمی خونی !
  آن صداها به کجا رفت
  صداهای بلند
  گریه ها قهقه ها
  آن امانت ها را
  آسمان آیا پس خواهد داد ؟
  پس چرا حافظ گفت
  آسمان بار امانت نتوانست کشید
  نعره های حلاج
  بر سر چوبه ی دار
  به کجا رفت کجا ؟
  به کجا می رود آه
  چهچه گنجشک بر ساقه ی باد
  آسمان آیا
  این امانت ها را
  باز پس خواهد داد ؟
