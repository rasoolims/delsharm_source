  کتابی بسیار خوب با ترجمه ای بسیار بد.
  پ.ن. یک: منظور من ترجمه ی قدیمی ست. ترجمه جدید را نخوانده ام!
  پ.ن. دو: فیلمی که از روی این رمان اقتباس شده هم افتضاح است و به هیچ عنوان در عیار این کتاب نیست.
