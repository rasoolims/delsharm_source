message: |-
  سلام
  اولا که این بار هم از لحاظ زمان هم از نظر متن انصافا در حد «روحانی متچکریم» بود
  ثانیا به قول این همشهری ما مواظب خودت باش
  ثالثا نصف ایرادگیریت به سخنران ها تقصیر مرحوم «حاج آقا مجتبی» است. بد عادتمان کرده بود این مرد. نیویورک که هیچ، در یزد و مشهد هم دیگر سخنرانی هیچ کسی به من نمی چسبد.
  رابعا اگر خبر دم دست داری از واکنش رفقای مصری ت به قضایای مرسی بی خبرمان نگذار.
adminResponse:
  date: '2013-07-15T16:46:00Z'
  message: |-
    پاسخ:
    سلام.
    جواب رابعاً‌ این که زمان انقلاب دومشون من نیویورک نبودم ولی از لای فیس‌بوک میشه فهمید که هیچ کی راضی نیست. اونهایی که طرفدار اخوان هستند که تکلیفشون معینه ولی حتی با یکی از سکولارهاشون که چت می‌کردم شاکی بود که توی مصر ملت تحمل مخالف رو ندارن و هی به جان هم می‌افتن. و البته این که طبق گفتهٔ‌ خودش دولت مصر از مزدوران مبارک پاک‌سازی نشده و تا این‌ها هستند کشور روی آرامش رو به خودش نخواهد دید.
