message: "اینو باتوجه به این انتخابت از کتاب گفتم.\n«متوجه شدم که بله، مغز گوشت است…\
  \ اگر پدرم را و حتی خودم را وقتی که سالم \nهستیم به عنوان مجموعه‌ای از اجزای طبیعی\
  \ بفهمیم همهٔ کسانی که دوستشان \nمی‌داریم تبدیل به مختصات عصبی-شیمیایی می‌شوند.\
  \ چه کسی دوست دارد داستان \nزندگی این طوری باشد؟» (صص ۱۹-۲۰)"
