message: |-
  سلام
  عجب ، فکر کنم  هیلاری هم سمت اونورا امده برا رای دادن
  حالا امشب کنفرانس خبری میزارن و خودشون رو برنده انتخابات اعلام میکنند
  ترامپ هم که داماد محله ترامپ اباد هست و ...
  داداش، اذوقه اینها جمع کنید...
