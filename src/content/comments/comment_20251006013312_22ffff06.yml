message: |-
  سلام صادق، سال نو! مبارک!
  یعنی من کامنت نذارم شما نباید یه یادی از من بکنی؟ من نباشم کی غلط املایی بگیره ازت؟
  در مورد اینکه در غرب بدون دین چه جامعه‌ای ساخته شده، در مقایسه با جامعهٔ دینی به نظرم اگر در گذشته ما عقل رو این قدر محدود نمی‌کردیم می‌شد انتظار داشت «حدّاقل» جامعه به اندازهٔ غرب پیشرفت کرده باشه.
  یه سری دیگه باید بیام نظر بدم، الآن حوصلهٔ اون همه نوشتن ندارم.
  موفّق باشی و برگردی!
