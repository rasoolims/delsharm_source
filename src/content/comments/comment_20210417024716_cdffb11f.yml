  سلام
  اول از دروازه های ورودی شبیه به دروازه قران بیشتر بنویس. خوشمان امد :)
  دوم اینکه یکی از دلایل جوان تر ماندن غربی ها هم برایم کشف شد. زن در غرب و مرد در شرق. جانم :)
  اخرش خوشحال شدم از نزدیکی دانشگاه تو و خانمت. شنیده بودم خیلی بیشتر از هم فاصله دارید.
  دهه سوم ماه مبارک را مشهدم و روز عید. چند بار یادت کردم. همینطور الکی
