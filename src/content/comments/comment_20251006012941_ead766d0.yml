message: |-
  سلام.
  در مورد هویت ایرانی کتاب جالب دیگری هم با عنوان پیدایش ناسیونالیسم ایرانی نوشته رضا ضیا ابراهیمی وجود دارد که همایون کاتوزیان طرف مشورتش بوده است.
  ایده اصلی کتاب هم مستحدث و موخر بودن ناسیونالیسم ایرانی است. اگر به مطالعه بیشتر در این زمینه علاقه‌مند هستید انتخاب خوبی خواهد بود.
