message: |-
  سلام
  اومدم که دعوت کنم برای شعر جدیدم که سفرنامه ی اخیرتون رو خوندم
  و جداً لذت بردم از قلمی که روز به روز بهبود پیدا می کنه
  امیدوارم شما و همسر محترمتون با غم غربت کنار بیاید و از این فرصت پیش آمده بهترین توشه ها رو بردارید
  طاعاتتون قبول باشه و ایام به کام
  یاعلی
  ــــــــــــــــــــــــــــــــــــــــــــــ
  من شنیدم که کسی نام تو را از بر کرد
  و قســم خــورد که ابیـات تــو را باور کرد
