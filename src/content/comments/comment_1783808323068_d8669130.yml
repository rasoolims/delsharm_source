message: |-
  سلام صادق جان
  طبق معمول لذت بردیم.
  برخی از این روشنفکران علوم اجتماعی می گویند مشکل عدم پایبندی به قانون و حق الناس در ایران ناشی از سابقه استبدادی و دید کوتاه مدت ناشی از استبداد در جامعه ایرانی است، البته برای خودم خیلی قابل درک نیست ولی در کتاب "ایران، جامعه کوتاه مدت" که ترجمه سه مقاله از دکتر محمد علی همایون کاتوزیان است مطالعه کرده ام.
  یا علی
  سلام ای.دی.تی.
  من هم از یکی از دانشجوهای دکتر کاتوزیان شنیده بودم که این کتاب دید جالبی رو معرفی کرده. البته اون بنده خدا می‌گفت یکی دیگه از مشکلات در ایران این هست که کار اخلاقی هزینه داره (مثلاً دروغ نگفتن هزینه‌اش بیشتر از دروغ گفتنه)
