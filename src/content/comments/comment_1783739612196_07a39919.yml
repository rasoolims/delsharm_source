message: |-
  خوبه! پس بحث هم میکنید!
  از نظر من با تجربه نزدیکان، زندگی خیلی سخته آمریکا!  البته بعضی ها برای به اصطلاح خودشان آزادی یا رفاه طلبی میرند!
  قناعت کنی تو ایران زندگی خیلی بهتر است!
  تحلیل ات هم از سبک زندگی آمریکایی جالب بود.
