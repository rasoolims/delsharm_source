message: |-
  خیلی خوب و به موقع بود
  خسته شده بودم بس که روی سیستمم فقط صحبتهای انتخاباتی رو می خوندم
  به نظر می رسه الان فقط داری تایید می کنی و ماله می کشی و اصلا فرصتی برای انتقادهای سبک مجمعی نداری. برادر انتقاداتو فراموش نکنی ها! یهو نبینیم اومدی اینجا و حرف امام نمیزنی ها!
  منتظر فریاد عدالتخواهیت هستیم!!!
  خلاصه دمت گرم
  خدا صبر بده
