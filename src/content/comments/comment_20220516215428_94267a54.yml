message: |-
  خیلی عالی بود. من چند وقتی هست که باوبلاگتون آشنا شدم و فرصت نداشتم خیلی برگردم عقب و از اول سفرنامه تون همه اش رو بخونم ولی چند فصلی رو خوندم.
  منطقی و با جزئیات خوبی می نویسید. نکاتی رو مطرح میکنید که در عین سادگی، واقع بینی و جذابیت ظریفی داره.
  اگر فرصت می کنید بیشتر بنویسید.
  حق پناهتون.
  یا علی.
