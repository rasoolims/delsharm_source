message: |-
  به روزم با
  شعری تقدیم به آرمیتا و علیرضا، برای پدر جدیدشان.....
  مامان میگه که دوباره، بابا توی سفری!
  مگه قرار نشد هر جا میری منم ببری؟
  دعوتید به پرسه‌ای برای نکوداشت شهدای نسل خودمون.
