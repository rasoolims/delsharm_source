message: |-
  بعد از خواندن سفرنامه(بهتراست بگویم حکمت نامه) و اینگه آسمان آنجا رنگ دیگه نیست ومخصوصا قسمت گذشته سفرنامه شما یادشعر حافظ میافتم
  مصلحت نیست که از پرده برون افتد راز   ورنه درمجلس رندان خبری نیست که نیست
