message: |-
  روش کاراموزی جالب بود برام. ایده خوبی است.
  یادمه تو مرکز تحقیقات علوم اسلامی نور هم در مورد عدم درج بسم الله بهت تذکر داده بودند!!! فقط تو حرفها سکولار نیستیم فکر کنم.
  البته جایی که مشاوره می دهم درج "بسمه تعالی" برای انجا عجیب و غریب است اما شعورشان تو کشور جهان سومیمان بالاتر است مثل اینکه
