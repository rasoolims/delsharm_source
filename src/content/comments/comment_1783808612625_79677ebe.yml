message: |-
  عید پارسال عوارضی اتوبان رشت-تهران رو 50هزار تومن دادیم؛
  کلیسای دانشگاه منو یاد کلیسای سنت استپانوس انداخت؛
  چشمت روشن ! از دستشویی های کراهتی تو یکی از این مجتمع های بین راهی بعد از قزوین به تعداد زیاد ساختن و استقبال خوبی هم بود، وقتی دیدم رفتم تو شوک؛
  مثل اینکه دیترویت دو بخش قدیمی و جدید داره که پول دارها و سفیدها به بخش جدید نقل مکان کردن و سیاه ها در خود دیترویت مرکزی زمین ها رو شخم زدن و مشغول کشاورزی هستن؟
