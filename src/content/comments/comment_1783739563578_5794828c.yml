message: |-
  سلام آقا صادق.
  اول از همه خسته نباشی مرد :)
  شرایطت دقیقاْ همونیه که یکی از دوستان من الان تو Rutgers با استادش داره تجربه میکنه. اون دوستمون که با استاد سر همین فشارهای بیش از اندازه به مشکل خورد در آخر و الان هم فعلاْ بدون فاند داره سر میکنه. اما امید تمام چیزی هست که تو نوشته ها و تو روحیات شما میبینم و این عالیه و ممکن نیست این شرایط برای شما تکرار بشه.
  من سخت کوشی رو از پدرم یاد گرفتم که میگفت "اگه تا جوون هستی سختی نکشی به سن من که برسی باید سختی بکشی حالا انتخاب با خودت!"
  در ضمن همین که هدفت خدمت به کشور خودته (با تمام مشکلاتی که میدونیم تو کشور هست) بزرگترین منبع تلنگر واسه کار بیشتر رو داری.
  در کل که صادق جانا موفق و پر کار باشی همیشه :)
