message: |-
  سلام صادق جان
  ان شا ء الله شما و خانم سلامت باشید و دفعه بعد هم که به بیمارستان می روید برای یک امر خیری باشد!
  خودمانیم ها این دست ندادن در سرزمین کفر خودش یک جهاد است سختتر از پیدا کردن غذای حلال!
  ضمنا در مورد سیستم بهداشتی جامعه مدرن فکر کنم یک کم ضایع شدی ها. به روی مبارک نیاوردی که! تازه این برای شما بود که بیمه نداشتی. کجایی گزارش های بیست و سی را ببینی که ملت بیچاره ما در این چندماهه چه پولها بالای دارو می دهند. همین دیشب خانمی می گفت دو آمپول روزانه باید برای شوهرش بخرد هر کدام به نهصد چوق!  و موارد متعدد دیگر. بیمه هم چون دارو گران شده زیربار نمی رود. تامین اجتماعی پسرخاله ای همین می شود دیگر.
