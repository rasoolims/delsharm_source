message: |-
  خیلی ممنون و سپاسگزارم از نظر مفیدتون.
  همونطور که شما هم اشاره کردید بیشتر باید مطالعه کنم. تا روانتر شعر بگم. در مورد ارتباط منطقی هم به نظرم بیشتر باید در مورد استعاره ها مطالعه کنم.
  منتظر شعرهای خوب شما هست. همونطور که حدس زدید شعرهای فروغ فرخ زاد خیلی به اون سبکی که علاقه دارم نزدیک هستند. شعری که تو این ارسال نوشتید هم خیلی عالیه و دقیقا دنبال یه همچین تصویر سازی هایی هستم.
  باز هم ممنون.
