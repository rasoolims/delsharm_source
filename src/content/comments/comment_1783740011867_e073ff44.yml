message: |-
  سلام صادق.
  خیلی وقت بود ننوشته بودی نه؟ اوّل کار مجبور شدم برگردم آخر پست قبل رو بخونم تا بفهمم کجا می‌خواستی بری اصلاً.
  چقدر خوشگل بود این سانی‌ویل. کاش از همین جا درستو ادامه می‌دادی :دی
  امیدوارم که قسمت بعدی بگی یه دوچرخه گرفتی و تو این هوای خوب هر روز نیم ساعت هم واسه رفت و برگشت رکاب می‌زنی.
