message: |-
  سلام
  وقت به خیر
  کتاب تخصصی و سنگین نبود؟
  فدک در تاریخ رو از ایشون خوندم و روان بود
  این کتابشون هم همین طوره یا تخصصی نوشته شده؟
  (طبیعیه که بررسی تاریخی داشته باشه و یا چیزهایی از این دست، منظورم از تخصصی بودن محتوا و ادبیات سنگین حوزویه)
