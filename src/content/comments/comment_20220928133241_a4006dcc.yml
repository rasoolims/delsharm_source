message: |-
  بسم الله الرحمن الرحیم
  سلام و وقت بخیر دکتر‌ رسولی آقا محمد صادق عزیز و نازنین
  موثر و ارزشمند بود این موضوع پیشنهاد کتاب و الان در گفتن و ذکر کتاب هایی هستم که شهریور ۱۴۰۰ و اوایل پاییز خوندم کامل [ به غیر از کتاب اولی که فرصت نشده و همچنین کتاب دهم که در مراسم رونمایی بودم در فرودین ۹۷ با حضور دکتر صالحی و اساتید از دانشگاه شهید بهشتی]
  و گفتن شون تا حدی موثر هست ان شاءالله که ضریب تاثیر موثری داشته برا اصحاب کتاب و خوانندگان وبلاگ
  .
  این لیست کتاب بروز رسانی میشه و فعلا ۱۰ تا کتاب رو حضور ذهن داشتم رو ذکر کنم
  سلامت باشی و سپاس .
  ردایی موسی
  پاییز ۱۴۰۰
  .
  ۱.کتاب The Accidental Engineer اثر Ray Holt که تا حدی اولین Microprocessor کامپیوترا در اواخر دهه ۶۰ میلادی و پیدایش و ایجاد شون رو ذکر داشته
  The autobiography of the designer of the World's First Microprocessor, the device that started the digital revolution
  .
  ۲. کتاب پرواز با آتش . خاطرات خلبان محمد عتیقه چی
  .
  ۳.کتاب مهمان صخره ها . خاطرات خلبان غلامحسینی
  .
  ۴.کتاب شهروند آسمان . خاطرات خلبان انصاری
  .
  ۵.کتاب روزهای بی‌آینه . خاطرات منیژه لشکری، همسر آزاده خلبان، حسین لشکری
  .
  ۶.کتاب آخرین اسکادران . خاطرات خلبان علیرضا جراح
  .
  ۷.کتاب پرواز روی خاک . خاطرات خلبان منوچهر شیرآقایی
  .
  ۸.کتاب حمله هوایی به الولید اچ سه . دکتر احمد مهرنیا
  .
  ۹.کتاب ستاره های نبرد هوایی . دکتر مهرنیا
  .
  ۱۰.کتاب گذری در تاریخ . خاطرات دکتر علی اکبر صالحی
