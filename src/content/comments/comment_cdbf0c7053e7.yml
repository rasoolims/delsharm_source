  استادم می گفت فلسفه ی اینه ی شکسته کار کردن تو اماکن مقدس همین بوده .چقدر در گذشته ادمهای عمیق زیاد بوده راستی چرا مردم انقد سطحی شدن؟چه دردیه این درک پایین اینکه دائم گردن بکشی اما چیزی نبینی !
  در پناه خدا
