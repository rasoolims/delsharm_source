message: |-
  سلام دوباره!
  اول از همه عید شما هم مبارک
  خوب من فکر میکنم در دریافت مطالب شما دچار پیش داوری شدم و همون نکته اصلی شما که گفتید یعنی اینکه متن رو راجع به آمریکا نوشتید نه ایران رو نادیده گرفته بودم.
  به همین خاطر صمیمانه از شما عذر میخوام بابت رفتار عجولانه ام
  نکته مهم دیگه شما که زاویه دیگری از زندگی در آمریکا و حالا اروپا وجود دارد که کمتر از آن صحبت شده رو کاملاً قبول دارم، در اروپا هم این مسائل هست، بعضی شهر ها بیشتر بعضی ها کمتر و البته فکر کنم آمریکا از بیشتر بخش های اتحادیه اروپا این مشکلات و اختلاف طبقاتی بیشتر باشد
  از صمیم قلب برای شما و خانواده تون بهترین ها رو از خدا میخوام، ان شاء الله کارهای ویزاتون هر چه زودتر به بهترین نحو انجام بشه و بتونید کارتون رو شروع کنید و البته با نوشتن خاطرات تون از کالیفرنیا ما رو از تجربیات تون بهره مند کنید :)
  باز هم شرمنده از اینکه عجولانه قضاوت کردم
  شما هم برای ما دعا کنید
