  سلام محمدصادق عزیز
  در وانفسای این روزهای پایانی اسفند ۹۸ یا همان فوریه ۲۰۲۰ که در پایان فصل صفر همسفر سراب آمده است، خواندن متنی که نشان از نو شدگی و پختگی داشت، خبر خوبی بود
