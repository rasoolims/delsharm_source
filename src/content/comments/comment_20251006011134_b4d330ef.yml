message: |-
  قدیمی‌ترها می‌گفتن مرغ همسایه غازه. داستان آن ینکۀ دنیا و ما اینوری‌ها هم همینه گویا.
  امیدوارم زودتر مشکل ویزاتون حل بشه و چرخ‌های زندگی روی غلتک بیفته و بچرخه مثل گذشته.
  زنده باشید و برقرار.
