message: |-
  نمیدونم چرا فکر می کنم خنثی می نویسی و درپیت!
  درسته شاعرها گل و بلبلند ولی کسی که کاظمی..معلم...سیدحسن حسینی..ووو را می شناسه و البته مجمع را..! که نباید اینقدر گل و بلبل نویس باشه...
  ننویس لامصب ننویس
  خداکندها را بردار از دهان آمدن ها...
  گل و بلبل..عشق و سنبل...
  ننویس..نه..اصلا بنویس لامصب!
  ...خدا کند که بیایی...
