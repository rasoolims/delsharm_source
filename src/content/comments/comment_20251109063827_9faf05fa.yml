  این که چیچیززده ای یا چیچیزنزده یا چیچیزطلبی یا چیچیزنطلب را باید یکی که بیرونه از اینا بگه، خودت فقط میدونی که اینجایی، نه اینکه کجایی
  تو نوشتت دنبال یه چیزی میگشتم که نبود، بعدیاش ببینیم پیدا میشه یا نه
