message: سلام آقای دکتر. خداروشکر که مجددا قصدداریدبنویسید.من بیشتر مایلم از نوع نگاه
  مدیریتی زوکربرگ بدانم. همچنین خیلی علاقه مندم از نکات جالب خودتون در بحث فضای کاری
  حرفه ای، اخلاق کاری اونجا، اینکه چطور بهره وری کارمندان رو بالا می برن، و به خصوص
  اینکه سیستم مدیریت منابع انسانی شون چطوره و از این قصه ها بفرمایید. ممنون
