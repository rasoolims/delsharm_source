name: یاور
date: '2111-12-03T20:28:00Z'
message: |-
  باز باران با محرم ….
  از باران با ترانه/ میخورد بر بام خانه
  یادم آید کربلا را / دشت پرشور وبلا را
  گردش یک ظهر غمگین/ گرم وخونین
  لرزش طفلان نالان/ زیر تیغ ونیزه ها را
  با صدای  کودکانه/ وندر این صحرای سوزان
  میدود طفلی سه ساله/ پر ز ناله
  دلشکسته/ پای خسته
  بازباران/ قطره قطره
  میچکد از چوب محمل
  خاک چادرهای زینب
  چون به آرامی شود گِل
  فرمایش امام حسین علیه السلام:
  الناس عَبیدُ الدُّنیا و الدّینُ لَعِقٌ علی اَلسِنَتِهِم یَحوطونَهُ
  مادَرَّت مَعایِشِهِم فَاذا محِصّوا بِالبَلاء قَلَّ الدَّیانون
  « مردم بندگان دنیایند، و دین بازیچه ای بر سر زبان های
  آنهاست - برای زندگی و معیشت شان-
  و چون به سختی ها امتحان شوند، چه اندکند دینداران! »
  بحارالانوار ج75 ص
