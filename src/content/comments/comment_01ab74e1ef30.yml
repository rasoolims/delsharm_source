adminResponse:
  date: '2013-06-05T17:53:00Z'
  message: |-
    پاسخ:
    یه منطقه اطراف سان‌فرانسیسکو. در مورد وجه تسمیه‌اش نمی‌دونم چقدر ربط به سیلیکون پردازنده‌ها و رایانه و ... داره ولی بیشتر شرکت‌های فناوری اطلاعات معروف دنیا اینجا هستن مثل گوگل مایکروسافت ای‌ام‌دی یاهو و ...
    کارآموزی اجباری نیست و پیدا کردنش هم زیاد راحت نیست. نکته‌اش تجربهٔ کار واقعی و البته حقوق به مراتب بیشتر از حقوق دانشجوییه.
