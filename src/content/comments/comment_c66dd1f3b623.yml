message: |-
  همه‌ی این غربت‌ها، تنهایی‌ها در میان تن‌ها، حال چه هم‌وظن چه ناهم‌وطن منو دوباره یاد اون سوال بنیادینم می‌ندازه که معمولا از خودم می‌پرسم: «که چی؟»
  ‫ولی جدیدا دارم یک جواب پیشنهادی براش پیدا می‌کنم؛ از وقتی که برای نوشتن Statement of Purpose تمرین کردم که متن‌هایی بنویسم تا بتونم استاد رو قانع کنم که برای زندگی‌م برنامه‌ریزی کردم و با توجه به اهدافم در زندگی می‌خوام بیام اونجا درس بخونم، مدام بیشتر و بیشتر به اینکه واقعا می‌خوام تو زندگی‌م چیکار کنم فکر کردم و به این نتیجه رسیدم که چیزی که منو از همه بیشتر تو این زندگی خوشنود خواهد کرد اینه: «کمک کردن»، نه مدرک دکتری، نه پول زیاد و نه حتی جایگاه اجتماعی در جامعه.
  با این دید دیگه نگران نیستم که ادمیشن بهم ندن. دیگه نگران نیستم که برم سربازی و حتی دیگه نگران آینده هم نیستم. با این دید اتفاقا دارن شک می‌کنم که اصن برای ادامه تحصیل برم خارج چون اینجا بمونم بهتر می‌تونم کمک کنم تا اینکه از اول از صفر شروع کنم.
  تو هم چه موندی چه برگشتی، سعی کن «کمک کردن»ت رو به «بشریت» به حداکثر برسونی، حالا چه ایرانی چه آمریکایی چه هر کس دیگه
  نگاهت قشنگه که هر کسی نداره.
