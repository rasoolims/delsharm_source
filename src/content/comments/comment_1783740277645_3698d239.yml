postSlug: '%D9%87%D9%85%D8%B3%D9%81%D8%B1-%D8%B4%D8%B1%D8%A7%D8%A8-%D8%B3%D9%81%D8%B1%D9%86%D8%A7%D9%85%D9%87-%D8%A7%D9%85%D8%B1%DB%8C%DA%A9%D8%A7-%D9%81%D8%B5%D9%84-5'
name: مهدی
date: '2113-01-27T15:11:00Z'
message: |-
  سلام
  اولا که حسین آقای جوزی خوب گفته که یک سال طول می کشد که این چهار ماه را بنویسی.
  ثانیا در این که شکی نیست که هر چیزی که ما نویش را داریم آنها کهنه اش را دارند. کاش از چیزهای نوی آنها هم که ما نداریم می نوشتی (اگر چیزی هست)
  ثالثا مگه جی ال ایکس تو امریکا هم تبلیغات می کنه؟  یا نکنه ماهواره  دارید.
  رابعا که اینی که اینجا می شود با سیصد چهارصد تومن با مترو از استان تهران به استان البرز هم رفت مثل همون ایالت به ایالت شدنه؟
  خامسا که خواستم بگم بعدیاش می شه سادسا و سابعا و ثامنا و تاسعا و عاشرا
  خوش باشی
  سلام
  صرفاً جهت اطلاع ببینی انگار کل صدا و سیما را و البته تلوبیون.
  ایالت به ایالت شدن مثل رفتن از تهران به قم یا حتی به اصفهانه.
