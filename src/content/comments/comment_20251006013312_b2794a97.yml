  سلام
  سال نو مبارک
  به نظرم یکی از علت های اصلی مشکلات در ایران اینه که ماها یاد گرفتیم زرنگی تو اینه که نفع خودمون و ضرر فرد مقابلمون را نتیجه بده !!
  این که کجای دین ما این رو نوشته واقعا نمیدونم !!!!
  ما عادت کردیم به همه موضوعات رقابتی نگاه کنیم آنقدر در جامعه مون از گذشته تا حالا تبعیض و ظلم  بوده که حس میکنیم اگه بخوایم نتیجه بگیریم باید از قانون جنگل استفاده کنیم.
  و طرف مقابل  برامون اهمیت نداره...
  سلام
  خیلی ممنون از حسن نظر شما
