  سلام و عرض تبریک
  دوست عزیزم شما منو نمی شناسید ولی یه دوست مشترک داریم که از طریق ایشون با شما آشنا شدم.
  شاید باورت نشه اما روزی چند بار وبلاگت رو می بینم تا مطالب جدیدت رو بخونم...
  امیدوارم روزی منم از این وبلاگها برای دوستانم بنویسم.
  همیشه موفق باشی
