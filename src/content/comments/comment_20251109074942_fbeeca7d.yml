message: |-
  بیاهو
  سلام.در اصلاح اموز مشارکت کنید
  سم الله العزیزالحکیم
  مقام معظم رهبری(دامت توفیقاتکم)
  با سلام ،احتراما بعنوان یک شهروند ایرانی  و پس از طی مراحل امر بمعروف و نهی از منکر از طریق مراجع مربوط در مورد آقای علی کردان  که جاعل و سوء استفاده کنندهء دهها باره از مدارک مختلف تحصیلی داخلی و خارجی میباشد و اخذ حقوق در طی سالهای متمادی  با این مدارک جعلی و اخذ مسند تدریس در دانشگاهها و حتی نمایندگی حقوقی ایران در تعدادی از پرونده های بین المللی کشور  بعنوان ارتکاب جرائم مذکور اعلام شکایت و مصرا تقاضای رسیدگی  و پاسخگوئی دارم.اینجانب...
