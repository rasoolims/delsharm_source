  خوب است. وحدت حوزه و دانشگاه را هم می توانی ادامه بدی!!:)
  یه نکته دیگه اینه که امریکاییها واقع بین تر از ما هستند. انها هم مثل ما فهمیده اند که سرایدار همان رئیس است در هر اداره و سازمانی.
  دلمان برایت تنگ شده. از خودت هم عکس بفرست. تنها توجیهم برای رفتن تو اینست  که روی پردازش زبان فارسی کار می کنی. وگرنه ...
  مخلصیم. برخلاف خیلی‌ها که نارسیسیم گرفته‌شان من برعکس از گذاشتن عکس خودم ابا دارم. چه کنم؟ :)
