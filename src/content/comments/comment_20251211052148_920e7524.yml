  سلام صادق جان. از اینکه دیدم بالاخره دست به کاری آلوده کرده ای خیلی خوشحال شدم. امیدوارم از سر درد و مسئولیت باشد. و این لینکها و نظرات امیدوارت بکند اما دگرگونت نه... که: لکی لا تاسوا علی ما فاتکم و لا تفرحوا بما آتاکم.
  ان شائ الله شهریور ماه مشهد ببینمت. خودت را و چند نفر دیگر که به واسطه تو آمده اند.
  یا حق
