  سلام و خدا قوت
  بعنوان یک استاد دانشگاه در رشته فنی خیلی از متن هایتان استفاده کردم. اگر ادامه یابد یک آمریکا شناسی دقیق و جامع (حداقل از دید علمی) از توش در می آد. در مورد چند موضوع هم پیشنهاد اکید دارم که اگه تونستید قلم بزنید چون  کم کاره!
  1- شرح نوع برخورد، احساس و نحوه گذران زمان همسرتان در این مدت که بسیار موضوع مهمی است، (البته از دید خودشان با توجه به متدین بودن هر دوی شما)
  2- وضعیت مسلمانان نیویورک و گعده های آنها و تعامل احتمالیشون با دانشگاهها (به چی علاقه مندند، چی از ایران و انقلاب می دونند و چقد غیر دولتی هستند(
  موضوعات دیگه ای هم هست، بعنوان یک جنبشی قدیمی (البته از نوع مشهدی) خواننده متون شما هستیم.
  ممنون از لطف شما. حتماً مواردی که فرمودید در نظر خواهم گرفت.
