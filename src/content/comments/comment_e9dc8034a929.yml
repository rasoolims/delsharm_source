message: |-
  سلام صادق جان
  سال نو مبارک
  سفرنامه های با حالی می نویسی کلی حال کردم.
  این که دولت متولی امر پژوهش در دانشگاه است به نحوی سیاستگزاری علمی و صنعتی  از توش در می آید یعنی نهادهای دولتی با آینده نگری به پژوهش های دانشگاهی جهت می دهند تا در نهایت، این جهت دهی ها، آینده صنعت را رقم بزند. این یعنی تنها اقتصاد بازار آزاد جهت رشد علم را تعیین نکرده بلکه مولفه های دیگری هم در تعیین جهت  رشد علم نقش داشته اند. ذهن و سیاست های سیاست مداران غربی یکی از این مولفه ها است که خدا می داند چه چیزی از آنها تراوش می کند.
  با این متن نادر ابراهیمی ات هم خیلی حال کردم، کتابش رو ندارم چون من فقط کتابهای انتشارات روزبهانش رو دارم لازم شد بروم این را هم بگیرم.
  یا علی
