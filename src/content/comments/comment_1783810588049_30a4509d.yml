    سلام
    ممنون از وقتی که گذاشتید
    البته نکتهٔ اصلی این کتاب در مورد ماهیت مسألهٔ تماشای رنج دیگران از قاب عکسی بی‌جان است که میتونه یکی از عوارضش بی‌عملی و خنثی‌شدن روح نسبت به درد دیگران باشه.
    در مورد موزه مثلاً بحث کرده که این حس تعینی (آبجکتیو) آمریکایی خوداستثناپندار (اکسپشنالیزم) در عکسهایی که به نمایش گذاشته میشه دیده میشه
    به نظرم مسألهٔ اینستاگرام و امثالهم مسأله‌ای کاملاً متفاوته و اگر  استثنائات را در نظر نگیریم، باید در مورد خودشیفتگی (نارسیسیسم) بیشتر اندیشید.
