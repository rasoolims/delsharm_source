message: |-
  چون دوستت دارم، پاسخت را میدهم:
  شاعران  آرمانشهر را آفریدند، یا فلاسفه؟ کودکان در خیالاتشان؟ ما برای کودکانمان در قصه ها و لالایی هایی که برایشان می خوانیم؟ یا خداوند با فرستادن مبشران و منذران؟ شعرا، فلاسفه، خدا یا هر کس دیگری که ارمانشهر را آفرید، انتظار داشت ما به سویش حرکت کنیم، نکنیم؟ نمی شود؟ حرکت که میشود کرد؟ نقدی را مجبور به استعفا کنیم و بگوییم نمی شود به جامعه ی بدون قاچاق رسید؟ باید حرکت کرد. موش ها وقتی شروع به دویدن کردند، که احمدی نژاد شهردار بود، نه قبل از آن. شاید هم قبل تر. موشها در بهشت شروع به دویدن کردند ... و بدالت لهما سوءاتهما ...
  گناه ما خوردن میوه ی ممنوعه نیست، برادر. گناه ما شاید علاقه به میوه ی ممنوعه است ...
  زیاده عرضی نیست
  یا علی مدد
  یادم آمد، دولت قبلی هم از موشها می نالید! راستی قضیه ی این موشها را میدانی؟
