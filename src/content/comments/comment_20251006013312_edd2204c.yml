  سلام محمد صادق عزیز و دوست داشتنی
  شرمنده که خیلی دیر اومدم و این فصلرو خوندم. ولی تنبلی هست و هیچ بهانه دیگه ای هم قبول نمیکنیم. این سبک جدید نوشته ات خیلی داره بهتر میشه، من خیلی خوشم اومده. میدونم که خیلی سرت شلوغه و وقت کم داری واسه نوشتن. سوالی که پرسیدی و دوستان هر کسی نظرش رو گفت. برای خود من خیلی سوال بوده! اصلاً چیه که باعث میشه توی یه همچون فضایی با همچون مردمانی و همچون افکار و عقایدی همه حقوق همدیگه رو رعایت کنن؟؟
  جواب قانع کننده ای نیست: شاید واقعاً به قول دوستمون به این باور رسیدن! شاید هم قوانین سفت و سختی که دارن جلوی خیلی ها رو میگیره!
  اما در مورد ما مسلمونای.... حکایت علی(ع) و مردم کوفه است!!!!
  =========
  همینطوری ادامه بده، داری به جاهای خوب خوبی میرسی!!!!!
