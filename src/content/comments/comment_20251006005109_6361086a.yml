message: |-
  با سلام
  پیشنهاد تبادل لینک
  من لینک شما رو قرار دادم
  اگر موافق هستید شما هم لینک من رو با نام
  کد تقلب بازی ها
  قرار بدید
  منتظر پاسخ شما هستم
