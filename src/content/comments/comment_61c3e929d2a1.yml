message: |-
  سلام صادق جان.
  خب مثل همیشه اوّل از همه می‌خوام بهت گیر بدم :دی
  اوّلای متن رو احساس می‌کنم خودت دوباره نخوندی. سلیس نبود. ولی بعد خوب شد. اون جایی هم که داری داخل خونه‌ی میزبانت رو توصیف می‌کنی یه جایی می‌گی آفتاب بی‌جان از سمت رودخانه‌ای ...
  شما که می‌دونی اون رودخونه اسمش چیه خب بنویس از همون اوّل. دیگه بیشتر از این بهت گیر نمی‌دم.
  از اسم قسمت‌های مختلف خوشمان آمد! :)
  در مورد افغانی‌ها هم به کسی محل نذار، من که جانستان کابلستان رو خوندم همه‌ش می‌خواستم برم تو خیابون هر چی افغانی می‌بینم بغل کنم و یه ماچ آب‌دار و اینا.
  امیدوارم موفّق باشی و این همسفر شراب هم روز به روز قوی‌تر بشه.
  فکر می‌کنم دلیل اصلی سلیس نبودن متنم وقت کم و شوق زیاد برای نوشتن باشه. شرمنده، خودت یه جوری تحملش کن.
  هر چی افغانی رو دیدی بغل کنی و ماچ کنی؟ یعنی زن و مرد فرق نداره؟
