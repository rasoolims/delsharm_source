message: |-
  من توی کانادا توی یک شرکت داروسازی کار هوش مصنوعی انجام میدم. با عمده نظراتتون موافقم و من خودم کارهام با چت جی بی تی خیلی سریعتر جلو میره
  و معتقدم مدل های سالهای آتی به مراتب تخصصی تر کار برنامه نویسی رو انجام خواهند داد که نتیجه ش بیکاری برای ما هوش مصنوعی خواهد بود.
  اما با خبر ورشکست شدن بانک سیلیکون ولی آمریکا به نظر من اینبار شرایط به مراتب بدتر از بحران ۲۰۰۸ خواهد بود و ممکنه به فروپاشی اقتصادی آمریکا منجر بشه
  رفتن اعراب به طرف چین و مانور چین و روسیه و ایران و صلح خاورمیانه برای من معنی کمرنگتر شدن نقش آمریکا هستش. حالا این چرا خطرناک هست چون آمریکا بدهی خارجی سرسام آور داره و اگه تعداد شرکت ها و کشورهایی که این احساس رو دارن زیاد بشه نتیجه ش خروج سرمایه از آمریکا خواهد بود و به تبع اون فروداشی اقتصادی
