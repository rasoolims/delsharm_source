  سلام
  این کتاب رو تقریبا ۳ سال پیش خوندم و اعتراف می‌کنم که هیچ کدوم از این معانی عمیقی که شما دریافت کردید رو متوجه نشدم.
  و بدتر اینکه به نظرم اصلا کتاب خاصی نبود؛ شاید چون نثرش خیلی خاص نبود.
adminResponse:
  date: '2018-02-15T17:00:00Z'
  message: |-
    سلام
    معتقدم کی و چه طوری خواندن کتاب‌ها خیلی مؤثر هست. مثلاً من کتاب «تصویر هنرمند ...» جیمز جویس را در سرویس دانشگاه خواندم و بعدش حس کردم با یک کتاب میان‌مایه طرفم در حالی که سال‌هاست دارند روی نحوهٔ روایتش نقد می‌نویسند. و البته این که اکثر کارهای کلاسیک مطول هستند و ایجازی که در کارهای امروزی وجود دارد، در کارهای کلاسیک نیست.
