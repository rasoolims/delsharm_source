message: |-
  سلام...
  از اینکه پر کار شدید خوشحالم.
  دوباره در تو طلوع کرد ...خورشیدی که در من به غروب سلام کرده بود...
  ما همچنان این راه 3 ساعته ی آزاد راهی !!! را 5 ساعته گز می کنیم و میریم میایم..
  اگه وقت اضافه داشته باشیم که همش باید گیر بدیم که آقایون محترم چی شد
  این آزاد ...راه!!!؟ آخه ما عادت داریم از بودجه های اختصاصی چند منظوره استفاده
  کنیم خوب! استفاده بهینه یعنی این.
  به منم اگه یه پول گنده بدن اول نمیرم سر اصل موضوع که... هزار تا کار باهاش می
  کنم آخرش استفاده شو میزنم به زخم اصلی...لعنت خدا بر شیطان.
  باز ما رو به حرف آوردی برادر؟؟؟ میخواستیم مثلا لالمونی بگیریم ها!!!
  شما همون شعرتو نو بگید خوب. اینقدر از مردم حرف نکشید با این سوالهای
  ته شعرتون.
  در پناه حق.
