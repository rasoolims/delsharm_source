message: سلام. خدا قوت بابت این نگارش های دقیق و حاوی جزییات. ببخشید یک سوال خدمت
  شما داشتم، در ایران سازمان‌ها و ادارات اصطلاحی به کار میبرن به عنوان اشباع شدن و
  پر شدن سمت‌های سازمانی. وقتی متن شما رو خوندم تعجب کردم آمریکایی که چند برابر ایران
  جمعیت داره و کلی هم مهاجر مثل شما چطور اینقدر راحت و صرف یک ایمیل زدن یا معرفی دوستان
  ترتیب مصاحبه و جذب نیرو میدن!!!
