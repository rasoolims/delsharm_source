message: |-
  از بابت تسلیت ممنون
  از بابت قیصر تسلیت
  راستی دیروز ضایعه از دست دادن قیصر را فهمیدم
  پدرم و او هر دو یک روز رحلت کردند
  داغ مضاعف شد
  چه کنم؟
  از دو جهت یتیم شدم.
