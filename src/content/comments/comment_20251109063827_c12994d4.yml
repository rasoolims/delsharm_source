  سلام....
  تعریف رو که دوستان کردن. بذار یه انتقاد کوچیک بکنم.
  این حالت نوشتن بیشتر شبیه خاطره نویسی هست یا گزارش!
  سفر نامه یجورایی متفاوته فکر کنم.(ابته من که در این ضمینه صاحب نظر نیستم)
  فکر کنم اگه بخوای سفر نامه بنویسی باید دقت کنی که اون آقاهه که جلوتو گرفت و گفت که معلولین و .....  ،  جذاب تر باشه تا ساعت دقیق رسیدن شما به فرودگاه بر حسب ثانیه و مبالغی که خرج کردید بر حسب سنت!
  یجورایی باشه که آدم رو جذب کنه لطفا!!!!
  البته میگم نقطه قوت هم داره ولی دیگه اون مبحث رو واگذار میکنم به دوستان!
  راستی بد نیست یادی از شاعر کنیم که میگه :
  گر از این کویر خاکی به سلامتی گذشتی *** به شکوفه ها به باران برسان سلام ما را
  سلام
  حرفت درست و منطقی. سعی‌ام رو بیشتر خواهم کرد.
