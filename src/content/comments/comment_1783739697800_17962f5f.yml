name: فاطمه اردیبهشتی
date: '2116-12-25T01:15:00Z'
message: با سلام. امشب با وبلاگ زیبای شما آشنا شدم. از قلم شما، صداقت ستودنی تان که
  نوشته هایتان را به مراتب جذاب تر کرده، اعتقادات و نحوه نگاهتان بسیار لذت بردم. تا
  حد زیادی آرشیو را هم مطالعه کردم که به نظرم کاملا ارزش وقت گذاشتن داشت و دارد. مطمئن
  هستم باز هم به وبلاگ شما میآیم . امیدوارم زود به زود برایمان مطلب بنویسید.
