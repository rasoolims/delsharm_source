  جناب آقای دکتر رسولی
  درود بر شما
  متاسفانه بنده این افتخار رو نداشتم تا شما رو از نزدیک زیارت کنم ولی با توجه به نوشته‌هایتان، حال شما رو در بازه‌های زمانی مختلف به خوبی درک کرده‌ام. اصلاً شاید بخاطر نوشته‌های شما بود که به پردازش زبان‌های طبیعی علاقه‌مند شدم و پروژه کارشناسی خودم رو در این حوزه انتخاب کردم و اکنون نیز که در حال سپری کردن دوره ارشد هستم و  بر روی ایجاد مفاهیم (روابط معنایی بین واژگان) از منابع مختلف کار می‌کنم.
  جا دارد از شما برای مطالبی که در اینجا و همینطور وبلاگ چرتکه منتشر می‌کنید تشکر و قدردانی خودم رو اعلام کنم چراکه حقیقتاً دانش و اطلاعات بنده را افزایش داده‌اند و همین امر موجب شده که تصمیمات بهتری اتخاذ کنم.
  احتمالاً حس خوبی که نسبت به مطالب منتشر شده در وبلاگ‌های شما دارم این است که بنده هم به نحوی در مسیر شما گام برداشته‌ام و در حال پیمایش این مسیر هستم. حداقل در ظاهر که این‌گونه است (تحصیل بنده در هر دو مقطع در همان دانشگاهی که شما در ایران تحصیل نمودید و استفاده از استاد راهنمای یکسان) اما یقیناً باطن و کیفیت پژوهش‌های شما نیاز به تعریف و تمجید ندارند و خود آن‌ها گواه بر این ادعا هستند.
  در پایان امیدوارم که مشکل مربوط به چشم‌تان و همچنین مشکل روادید شما هر چه زودتر حل شوند و همچنان شاهد موفقیت‌های شما یکی پس از دیگری باشیم.
  موفق و پایدار باشید
  یاعلی
