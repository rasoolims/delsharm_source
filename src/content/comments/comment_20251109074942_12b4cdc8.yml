message: |-
  سلام
  و ممنون از حضورت
  اگه منظورت از اشکال وزنی اون چیزیه که آقای انصاری نوشته ؟
  که ایشان اشتباه کردند و کار اشکال وزنی نداره
  اما اگه خودتون به نکته خاصی برخوردید راهنماییم کنید ، خوشحال می شم
  و اینکه چرا - نجاتها- به نظرتون خوب نیومد؟
  از نظر محتوا
  یا انتخاب مکان در مصرع
  یا ...
  برام بنویسید
  ممنونم
  موفق باشید
