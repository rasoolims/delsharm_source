name: موسی ردایی
date: '2021-10-30T10:01:00Z'
message: |-
  سلام
  سپاسگزارم از پاسخ موثر شما
  بله . این کتاب های خاطرات پروازی فارغ از چارچوب و تم پروازی جت ، به نظر می آید شامل توصیف و شرح واقعه هایی از دوران انقلاب و جنگ و دانشجویی خلبانان در ایران و آمریکا و تکمیل مراحل پروازی و وقایع منتهی به انقلاب و بعد از انقلاب و جنگ و دفاع مقدس و حماسه هایی بی نظیر است.
  .
  بله دکتر صالحی رییس انرژی اتمی و وزیر خارجه دوره قبل که این کتاب از انتشارات وزارت خارجه هست.
  در کتابخونه وزارت خارجه در نیاوران هست. تجریش به سمت نیاوران ،
  ندیدم در لیست خرید کتاب مراکز سفارش دهنده اینترنتی باشه و حتی کتابخونه باغ موزه دفاع مقدس در اراضی عباس آباد سمت ایستگاه شهید حقانی و ونک که تا حدی موثر کتاب هایی با این مقوله رو دارند.
  دکتر صالحی رو باید پیدا کنم و یک نسخه از کتاب رو بگیرم . ان شاء الله حتما ایران تشریف آوردی به شما هدیه بدم.
  سلامت باشید.
adminResponse:
  date: '2021-11-01T20:13:00Z'
  message: |-
    سلام مجدد
    خیلی ممنون از لطف شما. راضی به زحمت نیستم.
    مشکل اساسی که من تا حالا با کتاب‌های تاریخ شفاهی جنگ داشتم ضعف عجیب روایت است که بیشتر بر عهدهٔ مؤلف است تا راوی.
