date: '2109-06-01T17:48:00Z'
message: |-
  با توجه به این که شعرهای منظوم و اهنگین رو بیشتر دوست دارم واقعا لذت بردم از خوندن شعرتون
  اینم انتخابم برای شاه بیت:
  با آن که غم عشق تو دردی شده بر جان
  تا درد تو باشی، همه دردی‌ست سزایم
  موفق باشید.
  یا حق
