message: |-
  سلام بر شما و ممنون به خاطر سفرنامه ها و خاطرات قشنگتون. مهم ترین وجه این بلاگ از نظر بنده پایداری شما بر حفظ اصول اسلامی-انقلابی در محیطی آن چنانی هست که باعث خوش عطری، جذابیت و متفاوت بودن این خاطرات شده است. در ضمن اگر امکان دارد خاطرات کاری و فنی بیشتری منتشر کنید. اگر به پیشرفت ایران علاقه مند هستید، مطلع باشید که خاطرات و نظرات شما در مورد موضوعات مدیریتی، مهندسی و کاری دانشگاه و شرکت هایی که خودتان همکاری می کنید یا آشنایان شما دارند (علی رغم آن که ممکن است از دید شما معمولی و پیش پا افتاده دیده شود)،  می تواند تاثیر خوبی در انتخاب درست تر اهداف و چشم اندازهای کاری-درسی به امثال اینجانب که هم در دانشگاه تدریس داشته و هم در صنعت مشغول هستیم، بدهد. (به عنوان مثال دوست داشتم نوشته های بعدی شما را در کارآموزی سال اول در سانی ویل (نوآنس) مطالعه کنم، اما حذف شده اند.) .  موارد ذکر شده برای کارآموزی گوگل هم واقعا آموزنده بود.
  از توجه شما سپاسگزارم
