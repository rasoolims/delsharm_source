message: |-
  ... بنابراین این تفکر می تونه وجود داشته باشه که برای رسیدن به دین گام اول در این مقطع رهایی از دین در سطح حکومت و برقراری نظام و سیستمی بر اساس اصول و منافع مشترک از طریق اخلاقه. بعد خود به خود در چنان حکومتی در ایران با بنیه اعتقادیش خلا دین احساس می شه و مردم اخلاق مدار خیلی بهتر می تونن فکر کنن و درست و غلط رو تشخیص بدن و اسلام ناب رو پیاده کنن. تا کسایی که تا خرخره تو مال حرام فرو رفتن و ... (چه تو سطح مسئولین چه مردم) کما اینکه به عقیده من اگه خاور میانه امروز و تصویری که از اونها در دنیا ساخته شده وجود نداشتن تا الآن خیلی از ملت های قانون مدار مسلمان شده بودند. و این خود به خود به مرور منجر به استقرار حکومت اسلامی می شد.
  در مورد اینکه گفتی "هیچ جوری برای من قابل فهم نیست که چطور و به چه عنوان باید کار اخلاقی انجام بدن." باید بگم که کافر مگه کیه؟ کافر کسیه که نتونسته اعتقاد قلبیش به خدا رو به صورت عقلی واسه خودش اثبات کنه و تقلیدی هم نخواسته یا نتونسته قبول کنه. وگرنه خیلی نادر هستند کسانی که دروناً این حس رو نداشته باشند. همون چیزی که وجدان یا میل به خوبی رو در انسان باعث می شه. من هم قبلاً برام عجیب بود این موضوع چون ماها (مخصوصاً بچه مذهبی ها) در فرهنگ خطا و ثواب (جهنم و بهشت یا ترس و تشویق) بزرگ شدیم. شاید بعضی ها مثل شما بعداً از این مرحله بالاتر رفته باشند اما چون بستر فکری جامعه در زمان شکل گیری شخصیت این بوده غیر این واسمون سخته. ولی من بعدا با آدم های خوب کافری آشنا شدم که فهمیدم آدما ذاتاً و دروناً متمایلند به خوب بودن فقط باید بسترش فراهم بشه.
  ااااه. چقدر حرف زدم
