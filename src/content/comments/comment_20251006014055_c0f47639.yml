message: |-
  سلام صادق جان
  بعد از مدت ها گفتم یه احوالی ازت بگیرم و مطلبی برات بنویسم.
  ماشاء الله، دو تا نکته که در مطالب شما وجود دارد، باعث می شود انسان لذت ببرد. یکی اینکه خیلی خوب و روان می نویسی و انسان باعث خستگی انسان نمی شود.
  دومی اینکه برعکس خیلی از غیر کامپیوتری ها که سر در کد و دیباگ و ... غرق هستند و معمولا آیتی انسان را چنین بار می آورد، از محیط، قوانین  و ایین و رسوم اطرافت بی خیال و بی خبر نیستی و تحلیل هایی که در مورد نظام آمریکا می کنی واقعا از این جنبه برای بنده لذت بخش هست.
