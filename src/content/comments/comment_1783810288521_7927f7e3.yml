  سلام. میتونم بپرسم که گوگل برای کارآموزها چقدر حقوق میده؟! و اینکه این دوره کارآموزی از نظر زمانی چقدر هست و کی اون رو تعیین میکنه؟!
  اگر در مورد مصاحبه اش هم بگید ممنون میشم.
  متشکر
adminResponse:
  date: '2016-02-10T09:33:00Z'
  message: |-
    سلام
    هر کارآموزی با توجه به سطح تحصیلی، سطح مصاحبه و فاصله با پایان تحصیلات حقوق تقریبا متفاوت می‌گیره. معمولاً کارآموزهای دکترا حدود ۶۰۰۰ - ۹۰۰۰ دلار (قبل از مالیات) ولی برای بعضیها کمتر و برای بعضیها بیشتر هست.
    مصاحبه‌اش رو می‌تونید با جستجوی internship interview questions پیدا کنید.
