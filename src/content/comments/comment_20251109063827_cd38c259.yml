  اون وبلاگ شکوی متعلق به آقای علی جلالی است که معلم بنده در راهنمایی و دبیرستان بود. برای آشنایی بیشتر با ایشون به ali-jalali.com مراجعه کن. تو هوش (یادگیری ماشینی آماری) تخصص داره و شاید بد نباشه بهش ایمیلی بزنی، هر چی نباشه یک همزبون اونجا پیدا می‌کنی، گرچه ایشون بیشتر تگزاس‌نشین و کالیفرنیانشین هستن.
  وبگاه خود من هم sinamomken.com هست که البته در دست تعمیره و چند هفته دیگه کامل می‌شه
