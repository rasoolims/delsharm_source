message: |-
  سلام جناب رسولی
  من  دانشجوی ارشد مدیریت صنعتی  گرایش مالی از تهران هستم
  سفرنامه امریکای شما را خواندم ، تجربیات شما برای من بسیار مفید بود فقط  چند پست شما ادامه مطلب نداشت که فکر می کنم مشکل از بلاگفا بوده، اگه امکان داره ان پستها را اصلاح و اگه اصلاح امکان نداره با توجه به اینکه گفتید متن ان را موجود دارید برای من  ایمیل کنید .
  این مطالب دید مناسبی راجع به نیویورک بمن داد من احتمالا سال اینده مسافر نیویورکم
  ممنونم از لطفتون
  برای شما ارزوی موفقیت بیشتر دارم
