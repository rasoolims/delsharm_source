  سلام صادق جان
  خوبی؟ خیلی دلم برات تنگ شده. نوشتنت هم مثل شعر گفتنت خیلی خوبه. انشالا همیشه موفق باشی.
  ضمنا رحلت حاج آقا مجتبی رو بهت تسلیت میگم. من که ایشون رو از طریق تو شناختم. تو تشییع جنازش خیلی به یادت بودم.
  در پناه خدا
