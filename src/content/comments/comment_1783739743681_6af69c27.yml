message: |-
  سلام
  با این قسمت موافق نیستم:
  اگر نادان بمانی بهتر از آن‌ست
  جواب پرسشت را با طناب دار بنویسند!
  *********************
  شاید چون طعم طناب را
  گلوی سوالم چشیده است!
  **************************
  راستی پیشنهاد می کنم کتاب ددریائیهای یدالله رویایی را بخوان
  و
  به روزم
  میایی؟
