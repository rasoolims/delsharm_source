  سلام عزیز دل- خیلی خوب بود - خیلی خوشحالمون کردی - بازهم از این کارا کن - راستی هفته قبل ارائه‌ت رو تو دانشگاه کلمبیا خوندم - حرف سرش بسیار دارم  :)
  موفق باشی دوست خوب
  یا علی
  در پناه خدا
  سلام
  برای حرف‌هات آماده‌ام ;)
