message: |-
  یه ویدئو از دکتر شهریاری هست که دانشجوهاشون میخوان دکتر رو مثلاً سورپرایز کنند و استاد بودن ایشون رو به طور رسمی اعلام کنند ،دکتر تو اون ویدئو به مزاح یه خاطره تعریف میکنه و میگن:
  یه روز یه نفر از جلوی یه مجلس ختمی رد می شد و همینجوری میره تو مراسم و وقتی میخواد بیاد بیرون چون نسبتی با مرده نداشته و تو مراسم شرکت کرده ،میگه : "ببخشید که ایشون مردن"؛
  حالا من[دکتر شهریاری] هم میگم ببخشید که استاد شدم.
