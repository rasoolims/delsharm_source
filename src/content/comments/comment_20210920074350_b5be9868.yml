  تمام قصهٔ ما شد به دلداری و دلگیری
  دلت تنگ است می‌دانم مجال هوی و هایی نیست
  احسنت خیلی خوبه.
  قبلا ها هم برای خودم برای بچه ها شعر می گفتم. احسنت به این ذوق و توانایی و استعداد. یعنی خوشبحال شما باشد.
