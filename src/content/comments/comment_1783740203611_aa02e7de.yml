message: |-
  آمریکایی ها اگر می دونستند چه شعرهای خیال انگیزی برای سرزمینشون گفتین گریبان چاک می کردند و سر به بیابان های نوادا می گذاشتند :)
  زیبا و خیال انگیز..
  این جاده هم که نخ شده تسبیح فراموشی را
  ذکر تمام اضطراب‌های شمالی
  به التهاب‌های جنوبی
  از مشرق نگاه خستهٔ اطلس
  تا مغرب خماری آرام
  دوست داشتم در این قالب های آزاد می تونستم شعر بگم اما ارتباط برقرار کردن با این قالب ها برام سخته..
