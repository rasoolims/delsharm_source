  چه کار خوبی کردی مهندس رفتی امریکا
  هم کارتو میکنی هم کتاباتو میخونی زندگی تم داری
  خوب شد توی خاورمیانه و مخصوصا توی ایران نموندی که هیچ روزش مشخص نیس قراره چی بشه
