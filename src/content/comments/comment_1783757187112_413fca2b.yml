postSlug: بی-نشان-شهر
name: «او» علیه السلام
date: '2108-02-27T22:56:00Z'
message: |-
  بسم الله
  پس کسی که مرا نمی شناسد، بشناسد .. من ... من ... من ...
  -- آهااااااااای مؤذن! اذان بگو!
  -- الله اکبر ... الله اکبر ... الله اکبر ... الله اکبر ...
  -- هیچ چیز بزرگتر از خدا نیست ..
  -- اشهد ان لااله الاالله ..
  -- پوست و گوشت و خون و موی بدنم نیز به این کلام شهادت می دهند ..
  -- اشهد ان محمد رسول الله ..
  «او» علیه السلام .. بر می خیزد .. عمامه از سر می گیرد .. فریاد بر میگیرد ..
  -- ای ملعون! محمد جد من است یا جد تو!؟ اگر بگویی جد من که همه می دانند دروغ می گویی! اگر جد من .. پس چرا به ستم پدرم را کشتی و اموال او را به تاراج بردی و اهل بیت او را به اسارت ..!؟
  ... و همه گریه می کردند .. گریه می کردند .. گریه می کردند .. در مدینه ، فاطمه خواند و گریه کردند .. در کوفه زینب خواند و گریه کردند .. در شام .. شام .. شام .. «او» علیه السلام خواند و گریه کردند ... و تاریخ چه تلخ .. چه زود .. تکرار می شود .. تو نیز گریه می کنی!؟ فقط!؟
