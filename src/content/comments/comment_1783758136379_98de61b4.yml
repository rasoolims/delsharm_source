  سلام صادق جون
  داداش خیلی با نوشته هات حال کردم به طوری که تا اینجا همه رو پشت سر هم خونده ام. برای کسی مثل من که مدت ها دنبال اپلای گرفتن بوده زاویه دید جدیدی باز کردید
