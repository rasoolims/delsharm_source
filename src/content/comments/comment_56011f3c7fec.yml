message: سلام خوشحالم که به ما سر زدی...میگم حالا که ما این چیزها رو می دونیم...منظورم
  همین اینترنت صهیونیستی و به قول شما اینتل و...است...چرا هیچ کاری نمی کنیم؟؟؟؟چرا
  ساکتیم؟؟؟بهتر نیست به جای این حرفهای تکراری که همه چیز آخرش اسرائیلی میشه یه جور
  جدیدی فکر کنیم...
