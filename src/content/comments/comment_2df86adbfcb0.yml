message: |-
  سلام برادر
  سال نو مبارک
  از توصیف کمی کاسته و بر تحلیل افزوده اید. نتیجه ی این تغییر زاده شدن سوالی است که سوال اکثر مسلمانانی است که به غرب رفته اند. از سید جمال بگیر تا عباس میرزای غرب ندیده تا شریعتی و آل احمد و ...انگار این سوال تاریخی ماست و همچنان در جستجوی جواب آنیم.
  اما سوال: چرا در جامعه‌ای که کفر از سر و رویش می‌بارد این قدر حق‌الناس اهمیت دارد و در جامعه‌ای که دین و مذهب از سر و رویش می‌بارد این قدر بی‌اخلاقی نمود دارد.
  1- در منطق قرآن انسان مجموعه ای از روحیات و باورها و رفتارهای ظاهری است و اینها با هم باید در مسیر الهی باشد. ضمنا اخلاق با اعتقادات و اعمال انسان ربط دارد و اینگونه نیست که شما مثلا کافر باشی اما اخلاق خوب داشته باشی و این نزد خدا با ارزش باشد و به حسابت اخلاق خوبت جدا برسد و به حساب اعتقاد بدت جدا. بلکه به صراحت بیان می کند که برخی چیزها باعث نابودی یا به تعبیر قرآن باعث حبط اعمال می شود.
  این آیات رو ببین:
  " ولو اشرکوا لحبط عنهم ما کانوا یعملون "    انعام  88
  " اولئک الذین کفروا بایات ربهم ولقائه فحبطت اعمالهم فلا نقیم لهم یوم القیامة وزنا "    کهف 105
  " ان الذین کفروا وصدوا عن سبیل الله وشاقوا الرسول من بعد ما تبیّن لهم الهدی لن یضروالله شیئا وسیحبط اعمالهم "   محمد 32
  در آیه سوره کهف قرآن می فرماید که کفر و عدم باور به بازگشت نزد خدا، باعث میشه که اعمال(که منظور اعمال خوب هست دیگه) روز قیامت ارزشی نداشته باشه.
  ممکنه که ما با عقل خودمون بگیم که اینکه نشد! یعنی این همه کار خوب بی ارزش میشه! یا پس نتیجه این کارای خوب رو کجا باید ببینه! و اینکه یعنی کافر بهشت نمیره و کلی سوال دیگه که طولانی میشه! اما این منطق الهیه و انسان رو مجموعه میبینه و اگر کسی کافره و لی اخلاقش خوبه نزد قرآن بی ارزشه. مثل مومن ریاکار. آیا خدا بابت عبادات مومن ریاکار باید بهش ثواب بده و بابت ریا مجازاتش کنه. نه. میگه کلا اعمالت با همون ریا از بین رفت. پس اون حق داره اعتراض کنه و بگه تو عباداتم رو جدا حساب کن و ریا بنده رو جدا!!!
  ادامه...
