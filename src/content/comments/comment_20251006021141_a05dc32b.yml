message: |-
  سلام صادق جان
  امیدوارم حالت خوب باشد.
  خدا را شکر دوباره پیدات کردم.
  این کار و فرار از خود به شدت توی تهران دیده می شه. دور دور کردن عصرگاهی و جاده های شمال در آخر هفته که مصداق بارزشه. نمی دونم این الگوبرداری چقدرش خودخواسته بوده و چقدرش تحمیلی اما فکر می کنم خیلی بیشتر از بعضی هایش را داریم تجربه می کنیم. و البته متاسفانه غالباً منفیها
