  سلام به تو گل پسر
  راستش یه مدت اصلا نتونستم سفرنامتو بخونم. ولی این آخری رو خوندم امیدوارم هرچه زودتر همه مشکلاتت حل بشه. در کنار خونواده زندگی خوب و خوشی داشته باشی.
  البته یه کمی هم با حرفای خوابگاه داخل موافقم. خخخ
