message: |-
  سلام محمد صادق عزیز
  دیروز به فکرت بودم
  متنت رو در روز نیمه شعبان خوندم
  ممنون که با ایمیل از نوشتن فصلی جدید مطلعمون می کنی
  برادر دل ما میگیره برات وقتی اینطوری می نویسی
  باور نمیکنی چقدر از دست استادت شاکی شدم
  از اینکه تو غربت اینطوری کسی با برادرم برخورد کنه خیلی
  حال بدی پیدا میکنم
  دوست دارم مثل دوستان دیگه دلداریت بدم و بگم باشه
  سختی رو تحمل کن و با خودت یه چیزهایی بیار
  اما همون طور که قلاب هم با هم گپ زدیم
  شما اولین نفر نیستی که به اون محیط رسیدی و احتمالا چیزهایی خواهی آورد و این یعنی مشکل با آورده های شما حل نمیشه برادرم
  مشکل چیز دیگری است و اگر دردمون رو درست نشناسیم
  عمر در راه به دست آوردن دوایی میذاریم
  که بعد آوردن می ترسم نه تنها حال مریض بهتر نشه
  بلکه بدتر هم بشه
