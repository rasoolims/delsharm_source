message: |-
  با سلام. وقت شما بخیر.
  من این مطلب رو از کانال تلگرامی کیوان ابراهیمی که به اینجا لینک داده بودن مشاهده کردم. آمدم اینجا خدمت شما عرض کنم که در درجهء اول سبک نوشتاری شما کمی پیچیده و سنگین هست، چقدر خوب بود اگر کمتر از واژه های عربی و ضرب المثل های فارسی استفاده می کردین. مسئلهء بعدی اینکه کاش کانال تلگرام یا پیج اینستاگرام داشتین. خیلی ها مثل من، بسیار علاقمند به خوندن همچین تجربه هایی هستن، اما این وبلاگ ها رو پیدا نمی کنن و اگر هم پیدا کنن، یادشون میره چون هیچ آلارمی برای پست جدید وجود نداره.
  سپاسگزارم
