message: |-
  سلام
  با تشکر بسیار از شما که زمانی اختصاص می دهید و این سفرنامه رو می نویسید، شاید این مطالب بتونه مسیر زندگی یه نفر که قصد اپلای داره رو عوض کنه! قسمت " لعنتی" واقعاً خوب بود، فقط به نظر من سختگیری استاد با توجه به دانشگاه تحصیل و تعداد publication هایی که دارن طبیعی به نظر می رسه، فقط عکس العملهای ایشون فکر می کنم برمی گرده به همون دینی که به قول خودتون  تعجب کردید داشته باشه.
  باز هم از شما تشکر می کنم، خدا خیرتون بده .
