  سلام
  صادقانه نشده. برخلاف اون چیزی که همه فکر می‌کنن تا حالا هیچ کسی ناراحت نشده. راستش توی این افراد خانم ایرانی مسیحی، آلمانی، فرانسوی، آرژانتینی، امریکاییِ، چینی، تونسی، و سوئدی بودن و فقط از یک کشور نبودن که بگم اونا مسلمونا رو حتماً‌ می‌شناختن. تا حالا برام پیش نیومده الحمدالله، ان‌شاءالله هیچ وقت پیش نیاد.
