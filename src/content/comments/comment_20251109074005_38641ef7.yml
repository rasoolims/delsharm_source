  شما لطف دارید.  اخیراً به خاطر وقت کم دیگر برای هر کتابی که میخوانم نمی‌نویسم ولی خب این کتاب به نظرم ارزش وقت گذاشتن داشت (مرخصی هم بی‌تأثیر نبود)
  چیزی که من فهمیدم آن است بسیاری از این قواعد ریاضی متکشف از طبیعت کیهانی به  گونه‌ای است که تعدادی موارد حدی با ثوابت و متغیرها وجود دارد که در بسیاری موارد، حتی اپسیلون تغییر در بعضی از متغیرها باعث از هم پاشیدن کامل هستی می‌شود. به همین خاطر نظریهٔ چندجهانی مطرح شد که بگوید این جهانی که داریم بقایافتهٔ نمایی-عدد جهان ممکن است که به وجود نیامده، که باز قضیهٔ مرغ و تخم مرغ پیش می‌آید و برمی‌گردیم سر جای اولش.
