  آنان که لاف بیشتری از وفا زدند پیش از شروع حادثه در عشق جا زدند
  سَ لام
  وبلاگت عالیه. خیلی خوشگله. موفق باشی.
  یه سری هم به من بزن
  تبادل لینک کنیم
  خبرم کن
