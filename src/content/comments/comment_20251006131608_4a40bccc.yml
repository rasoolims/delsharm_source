  سلام
  ممنون از لطف شما. من در انتهای مطلب به این مسأله اشاره کردم که این اتفاق به خاطر سیاست انقباضی فدرال ریزرو (بانک مرکزی آمریکا)‌ است. به همین خاطر، حداقل در مورد شرکت‌های بزرگ، سهامداران برای آن که هزینه‌ها کاهش یابد و در نتیجه ارزش سهام برود بالا، اقدام به تعدیل نیرو
  می‌کنند.
  این قصه ربط زیادی به هوش مصنوعی ندارد.
