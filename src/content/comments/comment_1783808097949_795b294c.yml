  گفتی که:"...
  نان اینجا می‌شود نظم، خودروی شیک، لبخند ماسیده بر لب منشی‌های ادارات و فروشنده‌های مغازه‌ها، حقوق سر وقت و برای دانشگاهی‌ها، درک متصدیان دانشگاه از ارزش علم و دانش
  ..."
  منظورت از نظم چیه؟ منظور همون سرو سامون گرفتن خودمونه؟
adminResponse:
  date: '2016-10-25T18:49:00Z'
  message: |-
    سلام
    منظورم همان سامانمندی اجتماعی است. این طوری نیست که مثلاً اگر قانونی باشد فقط برای بودن هست، واقعاً به آن توجه می‌شود.
