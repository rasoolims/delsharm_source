message: چند روزی بیشتر نیست که با وبلاگتون آشنا شدم اما همه سفرنامه هاتونو خوندم
  تا حالا ...آخه هم به روزه هم با نگاهی متفاوت از بقیه نگاهایی که تا الان دیدم بوده...اگه
  موضوعی بنویسید خیلی بهتر میشه مثلا درباره عقاید و اخلاق امریکایی ها البته نه مهاجرین
  آمریکا...منتظر فصل های بعدی هستم...راستی به نظرم خیلی لازم نیست ریز اطلاعات مکانی
  تا شماره خیابونا رو همبگید یه دید کلی نوشته هاتونو روان تر میکنه باسه خوندن و به
  جاش از اتفاقات و رفتار بیشتر بگید...موفق باشید
