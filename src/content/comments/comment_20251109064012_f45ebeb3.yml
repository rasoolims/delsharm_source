  همچنان معتقدم امیرخانی دیگری در راه است! و چه بسا بهتر.
  "روایت آمده از راوی مؤنث که چندی قبل از به هوش آمدن خرناسه می‌کشیدم پر از صدای نُتِ خِ فالش"
  کلی خندیدم.
  روند ادم ها و وقایع کمی تند است. و من گیج میشم. کتی کی بود، شاگردش کی بود؟ قسمت قبلی چی بود؟! البته شاید از خنگی ما باشد.
  علیک به پاورقی. مثلا دانکین دوناتز چیه؟
  وایت آمده از راوی مؤنث که چندی قبل از به هوش آمدن خرناسه می‌کشیدم پر از صدای نُتِ خِ فالش.
