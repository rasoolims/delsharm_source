  سلام وقت بخیر
  از سال 99 هر چند وقت یکبار به وبلاگتان سر زده ام به امید اینکه این مطالب را ادامه دهید. برای منی که ارشد کامپیوتر علم و صنعت بودم و خیلی از حرفهای شما حرف دلم بود خیلی راهگشا بودند این مطالب. چرا ادامه نمیدهید؟
adminResponse:
  date: '2023-09-20T18:02:00Z'
  message: |-
    سلام
    خیلی ممنون از نظر لطف شما. در میانهٔ راه نوشتن دچار بیماری مزمنی شدم و نخ تسبیج ماجرا ماه‌ها از دستم دررفت و دیگر هرچه در حافظه داشتم پرید و نمی‌توانستم با آن جزئیات بنویسم. الان هم که مشغله‌های کاری‌ام بیشتر از آنی است که بتوانم بنویسم.
