message: |-
  این جمله سفرنامه یک ملیارد دلار  می ارزه:
  تفاوت بین نابودی اسرائیل ومحو شدن اسرائیل
  نابودی یعنی این که بمب و موشک روانهٔ سرزمینی کنی و تر و خشک را با هم بسوزانی. ولی محو شدن یعنی این که کافی است فلسطینی‌ها را آدم حساب کنی و رأی‌گیری کنی و این طوری بنیامین و دار و دسته‌اش خیلی طبیعی از صحنه خارج می‌شوند. چون بعید است کسی آن‌ها را قاطی آدم حساب کند. بعد توی همان انتخابات آن رژیم سرزمین موعود هم از صحنه خارج می‌شود و هر چیزی که جایش بنشیند یعنی این که آن رژیم دیگر محو شده است
