message: |-
  فیلم dune رو آنقدر خوب درسا کرده بودن که اگه کسی هم به منجی و امام زمان اعتقاد نداشت حداقل برای دقایقی به فکر فرو بره. اینجا که احمدی نژادم از نشانه های ظهور.
  به نظرم فکر به ظهور در حتی ده هزار سال بعدی هم خودخواهیه چه برسه به اینکه بگیم قراره چند سال و چند ماه دیگه ظهور بشه.
  انسان باید به یه نقطه ای تو بینش و درک عمیق برسه تو تاریخ و اونوقت منتظر ظهور باشه.
