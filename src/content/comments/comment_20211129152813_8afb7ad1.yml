message: "سلام اقای دکتر؛ البته شما ماشالله خدای رمان خوانی هستین و معرفی کتاب به\
  \ شما بسی دشوار!\nمن اینا رو خدمتون معرفی میکنم(شایدم خونده باشین البته...)\nرمان\
  \ فوق العاده دشت های سوزان کار اقای صادق کرمیار(من اینو تو یه شب تا نیمه شب تمومش\
  \ کردم!)\nکارای دفاع مقدسی نمیدونم میخونید یا نه؛ اما چیزایی که قبلا خوندم و عالی\
  \ بودن: نورالدین پسر ایران/ عباس دست طلا / پایی که جا ماند / جهنم تکریت / فرمانده\
  \ من / پا به پای باران / دختر شینا /\nکتاب خاطرات سفیر رو دیدین؟ اونم خوب بود من\
  \ خوندمش؛ خاطرات دانشجوی دختر ایرانی از تحصیل در فرانسه (اسم دخترخانم یادم رفته!)\n\
  ونکته اخر هم اینکه اخیرا برنده های جایزه ادبی جایزه جلال معرفی شدن؛ گفتم شاید به\
  \ دردتون بخوره؛ لیست ش اینان:\nبخش نقد ادبی:\nکتاب «بلاغت ساختارهای نحوی در تاریخ\
  \ بیهقی» به قلم «لیلا \nسیدقاسم» از نشر هرمس، اثر شایسته تقدیر\nبخش داستان کوتاه:\n\
  کتاب «زخم شیر» به قلم صمد طاهری از نشر نیماژ\nبخش مستندنگاری:\nدر این بخش دو اثر\
  \ مشترکاً برگزیده شدند. «الف لام خمینی» به قلم \nهدایت‌الله بهبودی از انتشارات موسسه\
  \ مطالعات و پژوهش‌های سیاسی \nو «رکاب‌زنان در پی شمس» به قلم حسن کرمی قراملکی از\
  \ انتشارات \nستوده\nبخش جنبی آتیه داستان ایرانی:\nجایزه ادبی جلال آل‌احمد در این\
  \ بخش به محمدعلی رکنی، محمدرضا شرفی \nخبوشان، الهام فلاح و سیدمیثم موسویان که با\
  \ رأی مردم به عنوان «آتیه‌داران\n داستان ایرانی» انتخاب شده بودند، جایزه داد.\n\
  بخش رمان و داستان بلند:\nجایزه اثر برگزیده این بخش به «رهش» نوشته رضا امیرخانی رسید"
