  سلام صادق جان.
  مطالبت رو خوندم و استفاده کردم. امیدوارم که موفق باشی و ادامه داشته باشه. با توجه به این که احتمالا فضا تو دستت اومده یه سوال داشتم و اون هم این که واقعا بین اون کارهایی که اون جا داره انجام میشه با کارهای مشابهی که تو ایران توسط بچه ها داره انجام میگیره چقدر تفاوته؟ واقعا اون ها خیلی جلوتر از ما هستن؟ ممنون میشم که جواب منو میدی. یا علی
  سلام
  این نظر منه شاید درست نباشه: توی دانشگاهامون که به نظرم داریم گل‌بازی می‌کنیم. اینجا خیلی نیازمحور پروژه تعریف می‌کنند نه رزومه‌پرکن‌محور. توی کارهای محدودی که توی ان.ال.پی. توی شرکتای ایران هست به نظرم دست‌کمی نداریم فقط نکته این هست که اونها سی سال زودتر شروع کردند و ما تا بخواهیم کارهای اولیه رو انجام بدیم یک صبر چندین ساله لازم داره و باید اون کارهای اولیه رو به خوبی انجام داد. در مورد کارهای زبانی به نظرم هیچ کسی بهتر از ما ایرانی‌ها نمی‌تونن روی متون فارسی و حتی روی متون دینی کار کنن.
