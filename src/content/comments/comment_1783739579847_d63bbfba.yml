message: |-
  سلام. منم قبولی خانمتون رو تبریک میگم.
  با خودم فکر میکنم اگه من جای تو بودم توی اون غربت خیلی سریع می رفتم طرف هر کسی یا هر چیزی که رنگ و بوی وطن داره و به این راحتی ولش نمیکردم. اینکه آدم یه همشهری توی اون سر دنیا ببینه یا تو خیابون راه میره پرچم کشورشو ببینه میتونه جالب باشه ولی به نظرم گاهی خیلی معمولی از کنارشون رد میشید.(یا شایدم من فکر میکنم معمولی رد میشید) البته منم توی موارد مشابه به این چیزا فقط به چشم یه دلخوشی لحظه ای نگاه کردم و بعدش هم گذاشتن و گذشتن، انگار که اصلا اتفاقی نیفتاده! شاید خصلت ما آدمهاست.
  امیدوارم هر روز موفق تر و بهتر از قبل زندگی کنی.
