name: جشن بزرگ شعر بلاگفا
date: '2108-04-15T07:32:00Z'
message: |-
  بر آنیم تا طرحی نو به کار زنیم و چشم‌ها را به میهمانی شاخه‌های خوشرنگ شعرها ببریم در :
  جشن شعر بلاگفا
  این جشن، ابتکاری از هم‌قلمان شماست که برایتان در وبلاگ های «از شما چه پنهان...» و «روزگار وصل» نوشته‌اند.
  هدف این است: ارائه و معرفی مشق‌های شاعرانه در محیط مجازی، آشنایی با شاعران جوان و کمتر شناخته شده، سپاس‌گزاری از آنان که در ارتقای فضای رسانۀ اینترنت می‌کوشند.
  و اما در مورد اصل برنامه: می‌خواهیم بهترین پُست‌های شعر در محیط بلاگفا را، با نظر شاعران نامدار کشور انتخاب کنیم و این مجموعۀ گزیده را توسط یکی از ناشران معتبر ایرانی به چاپ برسانیم.
  این برنامه کاملا" مستقل است و هیچ گونه وابستگی به نهادهای دولتی یا خصوصی ندارد.
  شیوۀ شرکت در جشن شعر بلاگفا:
  ·   حداکثر 3 شعر از بهترین پُست‌های وبلاگتان را- که البته اثر خودتان است- و تا پایان سال 86 (تا آخر اسفند امسال) در وبلاگ آمده، برایمان بفرستید.
  ·       مهلت ارسال آثار هم تا پایان فروردین ۸۷ است.
  ·       قالب و موضوع شعرها آزاد است .
  ·       m_pournejati@yahoo.com شعرها را به نشانی الکترونیکی   ارسال نمایید.
  منتظر آثار شما برای برپایی جشن شعر بلاگفا هستیم... .
  مصطفی پورنجاتی
