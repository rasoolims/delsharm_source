  با سلام و تشکر
  وقتی تاریخ علم و فلسفه در غرب رو می خونیم ،نکته ی مهم اینجاست که غرب در دوره روشن گری تصمیم گرفت خدا را حذف کند، آگاهانه. در نتیجه فهمید خود باید جای خدا را پر کند و نشستند و برای همه ابعاد زندگی بشر فکر کردند و تصمیم گرفتند و با سخت کوشی کار کردند و البته لیس للانسان الا ما سعی. مشکل جامعه ما این است که نه خدا را داریم و نه خودمان به فکر ساختن جامعه هستیم. یعنی سپردیم به خدا. و البته خدا هم با سنت های جاری بر طبیعت کار می کند و نه معجزه وارانه: لا یغیر ما بقوم حتی یغیروا ما بانفسهم.
  سلام
  ممنون از لطف شما. حالا سوالی که برایم پیش آمده این هست که چرا علمای ما نتوانستند با وجود داشتن منابع قوی دینی جامعه‌ای مترقی بسازند.
