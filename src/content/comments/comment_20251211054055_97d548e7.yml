name: بیت النور ...
email: ''
url: ''
date: '2008-04-17T09:10:00Z'
message: |-
  بسم الله
  می گویند ..
  جایی در میر .. میدان میر .. در بیتی با مسمای نور .. «بیت النور» .. دوسه روزی .. نوری، نور را عبادت کرده است ..
  .
  خانمی یکپارچه نور .. نورش لیس کمثله نور .. مثل همان نور .. عین همان نور .. در انتظار دیدار نور .. دوسه روزی .. «قم» را نورباران کرده است ..
  .
  انتظار دیدار نور .. یا عزم دیدار نور .. شاید بسان این زمان ..  گناهی نابخشودنی بوده .. پس عزم کردند .. خاموشی نور را ..
  .
  خیال کردند .. خاموشی نور را .. مرگ ستاره را .. زهی خیال باطل .. چه .. ستاره ای که نورش را از لایزال بگیرد .. با مرگش عالمگیر می کند نورش را ..
  .
  «قـــــــم» را بسان سیاهچاله ای در نظر گرفتند .. مدفن ستاره! .. اما .. قرنها می گذرد .. و «ستاره» .. همچنان «نور»ش، علی «نور» است ..
  .
  به ستاره ی ما می گویند: «کریمه» .. چون «ستاره»پرور است .. می گویند: «شفیعه» چون .. «کریمه» است ..
  .
  .. وامروز تمام «قــــــم» ... «بیت النور» .. شده است ..
  .
  اللهم انی اسئلک ان تختم لی بالسعادة فلا تسلب منی ما انا فیه ....
  خدایا می خواهم همچون ستاره ات بمیرم ...
  ... و لا حول و لا قوة الا بالله ... العلی العظیم ...
  برای تو هیچ کاری، کاری ندارد ..
