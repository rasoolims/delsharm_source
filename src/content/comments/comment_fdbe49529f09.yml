message: |-
  سلام آقا صادق
  واقعیتش دلم به حالت سوخت اونم تو برخورد اول
  ولی فکر کنم در این جور مسائل به هدفی که داری فکر کنی می تونی با سختی ها خیلی بهتر کنار بیایی مخصوصا اگر هدف مقدسی داشته باشی
  ان مع العسر یسرا
  آقای تهرانی بود قبل از اینکه می خواست بره نیورک امام جمعه بشه رفت پیش آقای بهجت گفت بهش بهم دستوری بده تو نیورک که بتونم تقوار خود را حفظ کنم  و غربت را تحمل کنم و عوض نشم گفت همیشه پیش از نمازت ژپاشو و با امام زمان صحبت کن و فقط بگو که مهدی جان دوست دارم. آقای تهرانی گفت همین دستور کار خود را کرد و انس من تو غربت در اون چند ساله بود. البته این مضمون داستان بود.
  امید وارم که با دست پر تو تهران ببینمت و بتونیم ازت بهره فراوان را از تجربیاتت ببریم
  یا علی
  دم شما گرم رفیق
