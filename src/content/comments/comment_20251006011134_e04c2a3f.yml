  سلام علیکم
  ممنون که مطالعه فرمودید.
  عددی که اعلام کردم از کتاب زیر برداشته شده است. این کتاب در سال ۲۰۱۶ منتشر شده است:
  http://delsharm.blog.ir/1397/03/24/math_destruction
  همان طور که مستحضر هستید معیارها متفاوت است. مثلاً استیگلیتز، استاد اقتصاد آمریکایی، آن را نزدیک به پانزده درصد اعلام کرده است:
  http://delsharm.blog.ir/1397/04/08/great_divide
  آن چیزی که اهمیت دارد، آن است که آمار فقر در آمریکا بالاست. حتی در سایتی که ارجاع داده‌اید آن را ۱۲٫۷ درصد نوشته است. متوجه نشدم از کجا آن شش درصد را بیان فرمودید.
  ممنون
