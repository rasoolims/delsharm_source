message: کتابی که گفتید رو نخوندم. ولی یادم هست پارسال کتاب عهد قاجار رو که نویسنده
  اش ونستا مارتین (یک غیر ایرانی) بود رو می خوندم. تاکید نویسنده بر قدرت مذاکره ی
  مردم فرودست جامعه نسبت به حاکمان بود و این که چطور مردم با وجود عدم قدرت ظاهریشون
  از قدرت مذاکره و گرفتن حق برخوردار بودند. یعنی برعکس کتابی که گفتید نه تنها به تحقیر
  ایرانی ها نمی پرداخت بلکه از هوش بالاشون برای احقاق حقوقشون پرده برمیداشت.
