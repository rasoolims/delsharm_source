  سلام
  سخت است این‌طوری قضاوت کردن در مورد زیست فردی نویسنده (حتی اگر جوان باشد). مثلاً نویسنده‌های دورهٔ جنگ ایران در سن کم نوشتند چون در سن کم تجربه‌هایی را به دست آوردند که پیرمردها هم نداشتند. ولی آن چیزی که می‌شود قضاوت کرد خود نوشته فارغ از سن و سال نویسنده است که آن را در متن نوشتم.
  ممنون
