message: من رو یاد کتاب نون نوشتن محمود دولت آبادی و یا ابن مشغله و ابوالمشاغل نادر
  ابراهیمی انداخت. و البته بیشتر همون کتاب اول. از این جهت که دولت آبادی در نون نوشتن
  خاطرات خودش رو دربارۀ نوشتن کتاب‌ها و دست‌نوشته‌هاش رو داخل اون کتاب آورده.
