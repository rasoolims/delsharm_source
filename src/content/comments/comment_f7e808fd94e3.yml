message: |-
  سلام
  این دفه کم بود، حس کنجکاویمون ارضا نشد داش صادق
  من هنوز هم گه گاهی که استادم بهم بی توجهی میکنه یا وقت نداره گاها آب تو گلوم خشک میشه، چه برسه به برخورد اول
  نمیدونم شما و همسرتون چقدر وقت ازاد دارید اما یه پیشنهاد کوچیکی دارم، میتونید تو وقت آزادتون APP های موبایل بنویسید، درآمد کوچولو و خوبی داره. الان iOS بازار خیلی خوبی داره، کافیه یکم ایده ات جدید باشه
  سرمایه ی اولیه ی زیادی هم نمی خواد اگه یه مدل قدیمی آیفون رو استفاده کنی.
  اون موقع میتونی کانن A1200 ات رو آپگرید کنی ما با کیفیت بالا تر ببینیمت! :)
  (تورو خدا فضولی ما ایرانی ها رو ببین، عکس هات رو دانلود کردم، اتفاقا یه نگاهی هم به متا دیتاش کرم)
  سلام من به تو یار قدیمی
  اول این که فرق بسیار است بین استادها اینجا با استادهای اونجا. اینجا استاد حکم حقوق‌دهنده دارد. پول ندهد کارت تمام است. همیشه باید راضی باشد.
  دوم این که ما اجازهٔ درآمدزایی نداریم حتی به اندازهٔ یک دلار. بفهمند دمار از روزگارمان ....
  سوم این که ما به همین کانن معمولی راضی هستیم دااااش
