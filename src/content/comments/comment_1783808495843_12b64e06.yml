  به خاطر پیشنهاد شما این کتاب و نیز کتاب مرگ ایوان ایلیچ که هر دوترجمه شده (فارسی) رو خوندنم. واقعا عالی و عجیب بود هر دو؛ و تمرکز اصلی هر دو رمان بر «مرگ». بقول معروف اینکه آخرش چه می شود... یا آخرش که چه!!!
