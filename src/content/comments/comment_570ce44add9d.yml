  رفته رفته داره جنبه داستانی روایت کردنت قوی تر می شه. این 89 دلار رو چطوری حساب کرد انقد دقیق. نرخ مصوب دارن، یا می خوان بگن دقیق حساب شده، یا اینکه ترفند تبلیغاتیه که یهو حس نکنی 90 دلاره و خیلی گرونه، 80 بیاد تو ذهنت؟
  ___
  "یا رب تو جمال آن مه مهرانگیز                 آراسته ای به سنبل و عنبر نیز
  پس حکم چنان کنی که در وی منگر         پس حکم چنان که کج دار و مریز"
  البته نگفته بودی که غلط املایی هم بگیریم ولی ما جسارت کردیم ;-)
  سلام
  اول این که طرف دیمی حساب کرده بود. دوم این که توی امریکا مد هست که مثلاً یک جوری عدد پایین رو بگن مثلاً 99/99 که به ذهنت نرسه این همون 100 دلاره و جالب‌تر اون که 1 سنت رو پس میدن.
