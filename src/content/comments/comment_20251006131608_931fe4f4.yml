  درود و سلام
  موثر اگر افزایش تعدیل نیروها رو به نوعی رویکرد سلیقه ای در مدیران کمپانی های مستقر در سیلیکون در نظر بگیریم برای بالا رفتن ارزش سهام یا هر علت دیگه ولی موضوع با این ابعاد و گستردگی یادآور بحران ۲۰۰۸ میلادی هست.
  هوش مصنوعی با همه ی کاربردها چرا در اولین قدم باید نقاط قوت و مجموعه هایی که باعث پیشرفتش شدند رو کنار بگذاره مث سوالی که در متن ذکر داشتید؟
  الان داشتم برای جواب این سوال تون شاخص های رشد تا چالش های هوش مصنوعی رو نگاه و بعدش مقاله ای در بروکینگز Brookings میخوندم ریویو
  The impact of  AI on International Trade
  مقاله AI در Brookings بخونید و تاثیرات در کسب و کارهای دیجیتالی و بعضی جواب ها رو ذکر داشته با موضوع هوش مصنوعی و رشد تجارت و اقتصاد جهانی که به نوعی Future of AI هست.
  .
  اگر در امریکای شمالی نتیجه بگیریم موضوع تعدیل نخبه ها و متخصصان فارغ از رویکرد سلیقه ای مدیران ذوب در پول سهامداران و منافع اقتصادی که میتونه خبر از بحران اقتصادی پیش از طوفان آینده باشه، و یا ساده ترینش بالاتر بودن هزینه ها نسبت به درامد.
  .
  تا حدی مثال تعدیل بومی از نوع هوش مصنوعی اینو میشه در ایران دید تخصصی نمونه به دوران کرونا و حضور هر روزه من در دانشگاه شهید بهشتی که نیمه تعطیل و پرنده پر نمیزد و امیدوار بودن مون به حضوری شدن تحصیلات تکمیلی و کار و مقاله و تکمیل طرح ها بود و بعدش وقتی حضوری شد که نود درصد ورودی ها نموندند و کنار کشیدند و استاد راهنما اولیه مون به کانادا اومد و نبود امکانات در دانشگاه و تا حدی مستقل ادامه میدادم یک بخش هوش مصنوعی کاربردی برا تز نهایی و رفرنس موثر در MIT AeroAstro و CSAIL و استاد راهنمایی نازنین که هوش مصنوعی رو در خط تولید کمپانی بی ام و اجرایی داشت تا Performance بره بالا بدون اینکه کارمند و کارگری تعدیل شه و DoD کار و پروژه کار کرده بود و Human AI
  برا خودم در وطن ایران که هوش مصنوعی در مقیاس پروازی و هوافضایی برا تز نهایی مو از سیستم Pilot در کابین جلو و AI در کابین عقب باید استفاده میکردم مث Self Repair Flight control system در پرنده ای شکاری رهگیر ولی در نهایت هواپیمایی نبود که بشه تست و اجرایی داشت فارغ از نبود بودجه و... حتی برای خلبانی بورسیه ای داخل که قبول شدم در ازمون و مصاحبه بعدا شکل اموزش که برنامه و توسعه و بودجه ای نداشتند و حتی بعدا برای اینکه طرح پروازی مو به جای نیروی هوایی به وزارت دفاع بردم برای ارائه بعدش نامشخص ممنوع الورود شدیم و بعدا شما بیا از هوش مصنوعی استفاده کن در جایی که از پای بست ویران هست.
  اقا محمد صادق موثر اگر در امریکا تعدیل نیروی با استعداد و متخصص با هوش مصنوعی به چالش تبدیل شده ولی همراه با رشد اقتصادی بوده ولی در ایران امکان رشد حتی در نقطه اولیه نیز وجود نداره با این سیستم بیمار و....
  .
  مایکروسافت و گوگل و... در بازی اعداد ریاضی نخبه ها و سهامداران هست و میتونی آخر اینو یقینا ببینی واقعه هایی که بوده
  ولی در ایران این روال مث زوال عقل کسانی شده که به این مث بازی و مث قمار می بینند و ممکنه برای ما که تا حدی وسط بازی باشیم و یا در بازی ناخوداگاه ذکر استغفرالله و لا اله الا الله و الله اکبر و... داشته باشیم از شگفتی
  ما که به فیلد Neuro مهاجرت کردیم.
  شما مهاجرت دانش بنیان ها رو بیینید
  .
  بعضی واقعه ها اتفاق می افته تا که از Comfort zone به Growth zone درون مون بریم.
  موثر بود این مبحث هوش مصنوعی
  سلامت باشی و سپاس اقا محمد صادق عزیز و نازنین
