message: |-
  هئی! از الان می‌بینم که برنخواهی گشت! طبق یک آماری که تعداد محصلان دکتری از کشورهای مختلف و درصدی‌شون که تو آمریکا موندگارشدن رو نشون می‌داد (منبع‌ش رو بعدا می‌ذارن تو سایتم) از ۷۴۵ دانشجوی دکتری ایرانی مابین سال‌های ۲۰۰۳ تا ۲۰۰۹، ۸۹.۴٪ شون موندن.
  نمونه‌ی وبلاگی که شما نوشتید رو هم چند تا دیدم، نمونه‌ش http://shakva.blogspot.com/
  ولی این‌جور سفرنامه‌ها باز هم آموزنده است و به آدم دید می‌ده
  امیدوارم چه برگشتی چه نه برای نوع بشر و اون دنیای خودتون سودمند باشید.
  براتون دعا می‌کنم
  ممنون سینا. این سایتی که گذاشتی باز نمیشه.  نشونی سایت خودت رو هم ندادی.
