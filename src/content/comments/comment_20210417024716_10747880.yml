message: |-
  سلام می دم که جوابش رو بدی، پس سلام!
  خپ! این جوری که معلومه از یه نظر زندگی خوشمزه تر می شه برات چون خانومتون هم می تونه کمک هزینه تحصیلی بگیره و دخل و خرجتون بهتر شه. اما دومیش که به نظرم شاید براتون سخت شه دوری از همه، بالاخره 4 ساعت باهم اختلاف دارید، این رو چیکار می خواهید بکنید؟
  راستی نگفتی که چقدر با "میراث آلبرتا" هم خونی داره؟
  کلا "مچکریم"
