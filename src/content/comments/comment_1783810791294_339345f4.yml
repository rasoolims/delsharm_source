message: سلام آقای دکتر، امیدوارم حالتون خوب باشه! شما نسخه‌ی چاپی این کتاب‌ها رو
  تهیه می‌کنین؟ می‌شه بگی کجا می‌شه با قیمت مناسب تهیه کرد (ساکن بوستون هستم)؟ راستی!
  نمی‌دونم یادتون هست یا نه ولی من قبلاً در یک سلسله ایمیل با شما در مورد اپلای و
  ازدواج صحبت کردم! خواستم بگم اومدم! پیشاپیش ممنون از پاسختون.
adminResponse:
  date: '2022-10-30T08:01:00Z'
  message: |-
    سلام
    خوش آمدید
    کتاب‌ها را سابق بر این بخشیش در کتابخانه دانشگاه کلمبیا بود و مختصری را به دوستان می‌سپردم برایم بیاورند از ایران. از دانشگاه که رفتم بیرون، مدت طولانی بیشتر کتاب انگلیسی می‌خواندم. پارسال که توفیق دیدار ایران شد بعد از سال‌ها، ۱۳۰ جلد کتاب خریدم که این قطار کتاب‌خوانی از آن منشاً می‌رسد. به کتابفروشی‌ها رفتم و هر چه که عنوانش به نظرم جالب بود برداشتم برای رزق یک سال!
