name: ㋡ عاشقانه ها ㋡
date: '2112-10-14T03:15:00Z'
message: |-
  در صبر به پای عشق تو ایوبم
  با این که گسل گسل پر از آشوبم
  من منتظرم که بشکنی قلبم را
  چون سنگ تو را به سینه ام می کوبم
  + من هم دلم تنگ است
