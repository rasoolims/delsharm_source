message: |-
  سلام
  وقتتون بخیر
  بسیار متشکرم از انتشار این تحلیل.
  سوالی که مطرح هست، آیا علت ( یا حداقل یکی از دلایل) اخراج نیروهای ماهر و فناوری پایه حقوق بسیار بالای این نیروها نبوده؟
  قطعا هوش مصنوعی موجبات بیکاری برخی فراهم خواهد آورد ولی بنظر میرسد علت اصلی این تعدیل نیروی اخیر حقوق بسیار بالای این نیروها میباشد
  متشکرم
