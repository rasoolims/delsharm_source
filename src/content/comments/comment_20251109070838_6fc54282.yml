  سلام آقای رسولی. خوبین انشالله
  من تمام خاطرات همسفر شراب شما رو خوندم و الانم سه فصل همسفر سراب رو خوندم، و واقعا لذت بردم گرچه فکر میکنم وقایعی که توی همسفر سراب بهش اشاره کردید یه جورایی برام تکراری بود(چون قبلا توی خاطراتتون خونده بودمشون.) ولی از اینکه دوباره به نوشتن شروع کردید خیلی خوشحالم.
  یه خواهشی هم داشتم اگر میشه وقتی فصل جدید رو گذاشتید یه ایمیل برای مخاطبین بفرستین تا به موقع از به روز رسانی مطالب مطلع بشیم. ممنون
