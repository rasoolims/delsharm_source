message: چطور میتوانستید تحمل کنید فضایی را که اینقدر با احوالات شما (چیزی که درحد
  نوشته های شما در این وبلاگ مشهود است) متفاوت بوده. به نظر میرسد شکل دادن انگیزه،
  تا حد زیادی نیازمند همسو شدن با روح حاکم بر آنجا و همگرا شدن به هدف جمعی آن تشکیلات
  باشد. چطور چنین تعادلی را میتوانستید برقرار کنید؟
