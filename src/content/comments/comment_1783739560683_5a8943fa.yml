message: |-
  سلام، من خیلی دقیق چت‌جی‌پی‌تی رو بررسی نکردم. ولی به نظر عمده تواناییش نسبت به چیزی مثل جستجوی گوگل در توانایی پردازش متن هست. فکر نمیکنم قدرت زیادی در سنتز کد داشته باشه. مثلاً گوگل پارسال نرم‌افزاری برای حل مسائل مسابقات برنامه‌نویسی داد که نسبتاً ابتدایی بود. به نظر شما اینطور نیست؟ یعنی توانایی سنتز قابل‌توجهی هم در این ابزار هست؟ سپاس
  پ.ن.: لینک خبر مربوط به گوگل
  https://www.deepmind.com/blog/competitive-programming-with-alphacode
adminResponse:
  date: '2023-03-11T01:45:00Z'
  message: |-
    سلام
    چت‌جی‌پی‌تی یک مدل زبانی بر اساس ساختار ترنسفورمر هست که روی دادهٔ متنی خیلی زیاد یادگیری شده (جی‌پی‌تی) و روی داده‌های پرسش و پاسخ بازتنظیم شده (اینستراکت جی‌پی‌تی با الگوریتم یادگیری تقویتی).لذا در مجموع یک مدل تولید زبان است بر اساس حافظهٔ متنی. چون داده روی متن گیت‌هاب یاد گرفته شده است و به همین خاطر تا حدی کدهای ساده را می‌تواند بازآفرینی کند. کاری که دیپ‌مایند می‌کند در همان راستاست و در واقع یک جور رقابت است.
