message: |-
  یاد یک جمله طلایی از آیت الله جوادی املی افتادم:
  خانه سالمندان،محصول مهدکودک است.
  وقتی انقدر کار ارزش باشد و خانواده سست، ضریب افسردگی و خودکشی و توجه به خانه سالمندان بالا میرود......زنده باد خانواده
  یاد یک جمله از آیت الله طالقانی هم افتادم که همواره می گفتند(خانواده خیلی ساده اما خیلی پیچیده)گره های اجتماعی که ملیاردها دلار برای رفع  آسیب اجتماعی باید هزینه شود با یک دلار هزینه درست خانواده قابل پیشگیری است
