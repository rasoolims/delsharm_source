postSlug: از-جاده-1
name: گریبان فطرت
date: '2107-07-21T10:00:00Z'
message: |-
  خوب مادرین دیگه، حق دارین ... میدونم سخته، امّا گریه الآنش بهتر از افسوس فرداشه ... انقدر میخنده حالا ... گریه نکنین، خوب میشه ان شاءالله، راه می افته، وقتی دوید، همه این صحنه ها یادتون میره ... می خواین شما بیرون باشین اگر اذیّت میشین؟ ... گریه نکنین، بچّه داره نگاه میکنه ... این صحنه ها برا اون سختتره...
  قسم نده خانومم، تو رو خدا منو شرمنده نکن ( دارم خفه میشم، من خودم دارم از تو میسوزم.... نمیدونم چی بگم بهت، چی بگم؟ با چشم منتظر و قلب نگرانت منم آتیش میزنی... برو، برو...قسم نده... تو رو خدا...)
  گله دارم از پله های اتوبوسها و متروها، از جوبها و دست اندازها!!! گله دارم از خونه هایی که اون ور شهر ساخته شده اند!!! و نمیدونستن که باید بالا شهر باشن تا صاحبا و مستأجراشون دکتر و درمانگر دمِ ستشون باشه!!!
  خدایا دارم خفه میشم! مگه چقدر ظرفیت دارم من؟
  کاش مسئولین هم بخوانند...خبرنگارها هم...
