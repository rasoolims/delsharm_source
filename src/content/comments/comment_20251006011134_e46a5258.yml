message: |-
  درود برشما
  مدت کوتاهیست که وبلاگ شما را دنبال می کنم و نوع نگاه به مسائل و معرفی کتاب و سبک نویسندگی شما را دوست دارم. به جرات می‌گویم که وبلاگ شما از معدود وبلاگهاییست که از دنبال کردن آن دلسرد و نهایتا منصرف نشدم. امیدوارم بعد از مدتی استراحت ادامه بدهید.
  احتمالا بنده به زودی با وبلاگ جدیدی شما را دنبال خواهم کرد. این را گفتم که بعد از حذف وبلاگ کنونی‌ام تناقضی برداشت نشود.
