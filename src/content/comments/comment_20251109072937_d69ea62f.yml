  سلام
  بله درست می‌فرمایید. البته در این مورد حداقل این کتاب صادق نبود. چون از سایت آمازون خریده بودم فرصت پس دادن فراهم بود.
  ایران که بودم و المفلس فی امان الله، بیشتر کتاب‌ها را از کتابخانه تهیه می‌کردم. عملاً فقط برای کتابهای مذهبی و شعر پول می‌دادم و در بقیهٔ حوزه‌ها که مطمئن بودم فقط یک بار کتاب را خواهم خواند (مثل رمان) از کتابخانه قرض می‌کردم. اینجا قصه فرق می‌کند و بیشتر کتابهای رمان را دست‌دوم و به ثمن بخس تهیه می‌کنم.
