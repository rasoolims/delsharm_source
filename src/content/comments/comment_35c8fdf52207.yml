  قلم خوبتان و دقتتان در وصف اتفاقات و صحنه ها، خواندن خاطراتتان را جذاب تر می کند. بماند که خود موضوع برای ما دانشجویان داخل وطن... به اندازه کافی جذاب هست.
  موفق باشید
  چه جالب که همسرتان در امریکا چادر می پوشند. می شود بیشتر ظاهر و لباس همسرتان را توصیف کنید یا یک عکس از ایشان بگذارید.  خوشمان امد
  سلام
  همسرم مثل ایران چادر می‌پوشد بدون هیچ تغییری در پوشش. خوشبختانه در نیویورک مسلمان زیاد هست (البته چادری خیلی کم، در حد دو سه نفر که افریقایی بودند) و حجاب داشتن طبیعی است.
