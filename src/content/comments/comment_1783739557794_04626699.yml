message: ماهیت این کاراموزی ها چیست؟چرا  شما با اینکه رشته کامپیوترهستید تو ازمایشگاه
  کار میکردید؟بنظرم بخشی از علت پیشرفت امریکایی ها و پیشتازیشون در علم مدیون همین
  کاراموزی متفاوت وازمایشگاه باشه؟با توجه به تحصیل شما در دانشگاه های ایران وامریکا 
  به نظر شما علت پیشتازی غربی ها در علوم در چیست؟
