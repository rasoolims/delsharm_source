  سلام. من دانشجوی کامپیوترم و اخیرا با خوندن ارشیوتون متوجه شدم که شما برنامه‌نویس هستین. ازتون یک سوال داشتم که اگر لطف کنین راهنماییم کنین ممنون میشم درمورد برنامه‌نویسی.
  میخواستم بدونم سوالمو توی نظرات بگم یا ایمیل بدم بهتون؟ ممنون
