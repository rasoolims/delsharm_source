  سلام آقا صادق
  اینبار خیلی خوب بود. خیلی لذت بردم.
  فقط چند سوال
  این پروژه تان Speech هست یا NLP. یعنی چه ربطی به NLP دارد؟
  دوم چرا اون زبانی که تصریفی نداشت را کنار گذاشت؟ تصریفی بودن زبان چه کمکی به مسئله می کرد؟
  سوم از کلاس درس این بنده خدا کمی هم بنویسی بد نیست؟ در مورد دیدش به NLP،
  منتظر فصل های بعدیت هستم
  سلام
  نکته اول این که پردازش گفتار یک جورهایی زیرمجموعهٔ پردازش زبان هست. حالا کار ما بیشتر پردازش واژه‌هاست. فرض کن واژهٔ «کتاب» توی داده‌هامون باشه و همین طور واژه‌های «مداد» و «مدادها». ما با این دید که این زبان تصریفی هست باید بتونیم واژهٔ «کتاب‌ها» رو هم بر اساس الگوهایی که کشف می‌کنیم تولید کنیم. حالا اگر زبانی تصریف نداشته باشه نمی‌شه هیچ حدسی در مورد کلماتی که در دادهٔ یادگیری وجود ندارند زد.
  ان‌شاءالله در مورد کلاس هم می‌نویسم
