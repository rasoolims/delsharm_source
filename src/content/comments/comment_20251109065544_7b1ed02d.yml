message: |-
  دو چیز همیشه منو مشکوک می‌کرد که شاید ایرانی‌های باستان بور بودند. یکی تعداد خوبی از روستاهای دور افتاده و کوهستانی ما که هر چقدر دور افتاده‌تر احتمال بور بودن آدم‌هاش بیشتر، و دیگری نام «سیامک» در داستان‌های باستان. اگه ایرانی‌ها سیاه مو بودند عجیب بود نام کسی رو «سیاه‌مو» بگذارند، شاید موهاشون سیاه نبوده که نام این یکی رو سیامک گذاشتن. البته این حدس و گمان‌ها قطعا علمی و تحقیقی نیست و حرفی در هواست!
  به نظرم با وضعیت ظاهری کنونی ایرانی‌ها و هندی‌ها و افغان‌ها نمی‌شه درباره گذشته دور قضاوت کرد. اومدن تعداد محدودی ژن غالب می‌تونه ظاهر جامعه رو در طی هزاران سال از این رو به اون رو بکنه.
