  سلام وقتتون بخیر
  خیلی برام جالب بود، من هم کارشناسی و ارشدم رو علم و صنعت مهندسی کامپیوتر خوندم و کاملا برام قابل درک بود نوشته ی شما، برای دخترها هرچند این وضعیت بنظرم خیلی خیلی سخت تره و خیلی بیشتر بلاتکلیف میشن که چه باید بکنن.
