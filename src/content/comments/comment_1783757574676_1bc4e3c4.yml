    خوبه دیگه. موجب شادی دوستان هم هستیم :)
    البته یک نکته رو بگم. اون هم این که نسبت به مسألهٔ «چیز» تصورهای عجیب و غریب نشه. مثل آدمای عادی هستن ولی زوجیتشون چیزه :) کار خاصی در ملأ عام هیچ وقت صورت نمی‌گیره.
