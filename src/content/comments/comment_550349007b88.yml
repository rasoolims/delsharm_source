  سلام
  اون پاراگراف یکی مونده به آخر ابتدا به ساکن حرف خودت بود یا نقل به مضمون از کتابهای مارکسیستهاست؟  چون اونها هم دقیقا همین ایراد رو به سرمایه داری میگیرن.
  ولی من با خود غریبه بودن و از خود فرار کردن رو با اینکه خیلی شنیدم اما درک نمیکنم که دقیقا چیه یعنی. لطفا این رو بیشتر توضیح بده. باذکر مثال لطفا (2 نمره!)
