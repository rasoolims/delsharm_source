  سلام
  یک علت سنگینی متن این نویسندگان این هست که در مورد روحیات انسانی می نویسند و بیان این حالات دشوار است و هر انسانی قادر به درک حال و هوای نویسنده نیست.
  و اینکه زبان آلمانی زبان فلسفه نیست از همین رو دشواری هایی در خوانش وجود دارد.
  به نظرم تاریخ فلسفه استاد ملکیان جلد 4 مطالب و خصوصا مقدمه خوبی دارد.
  ممنون از شما
