  سلام آقای رسولی
  شما با اندیشه های آقای معرف آشنایی دارید؟
  چون بنده تازه با گفتن شما از وجود چنین شخصیتی آگاه شدم با وجود اینکه به فلسفه علاقه مند هستم ولی چندان اسمی از این مرد بزرگ نشنیده بودم.
  اگر مطلبی دارید لطفا در قالب یادداشت بیان بفرمایید
  ممنون
