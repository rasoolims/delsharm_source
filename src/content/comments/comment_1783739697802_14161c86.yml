name: سیدعلی بطحایی
date: '2119-08-10T14:28:00Z'
message: |-
  رمان سرزمین نوچ سعی در نشان دادن چهره واقعی مهاجرت دارد با نگاهی تازه. سعی نویسنده اوایل به سفرنامه شباهت دارد و این باعث می‌شود که خواننده انتظار آدم‌های واقعی را از داستان داشته باشد. چنین رمان‌هایی حتماً لازمند و هر چه فکر می‌کنم چه قدر کمند رمان‌های معروف در مورد مهاجرت. رمان کشش خوبی برای دنبال کردن دارد البته قوت زبانی «بی‌وتن» امیرخانی، قوت داستانی «همنوایی شبانهٔ ارکستر چوب‌ها»ی قاسمی و قوت احساسی «ثریا در اغما»ی فصیح را ندارد ولی لنگه کفشی است در بیابان.
  مهمترین نقطه‌ٔ قوت داستان، سعی نویسنده در واقع‌نگاری و گذاشتن اجزای واقعی زندگی امریکایی است. همین که آخر رمان می‌نویسد که کتاب را در لس‌آنجلس تمام کرده نشانی است از آن است که نویسنده همت کرده و رفته و از نزدیک مشاهده و لمس کرده. دومین نقطهٔ‌ قوت داستان کشش خوب داستانی است که می‌خواهی بدانی آخرش این تنش‌ها کارش به کجا خواهد کشید.
  و اما نقاط ضعف داستان متأسفانه کم نیستند؛‌ خلاصه می‌شود در ضعف تألیف:
  ۱- نقطهٔ‌ ضعف اول روشن نبودن شخصیت اصلی داستان است. چه طوری است که آمده آمریکا؟ این آدم انگار گرین کارت گرفته ولی چه طوری؟ با بخت‌آزمایی؟ در ایران دقیقاً چه کاره بوده؟ زنش چطور؟ اصلاً معلوم نیست این صنمی که با اشک می‌آید امریکا چه طوری این گونه منقلب می‌شود. من منکر اتفاقاتی که در امریکا می‌افتد نیستم. حتی بدتر از این‌هایی که گفته را از نزدیک شنیده‌ام ولی این رمان است و نه خبررسانی.
  ۲- ضعف املای انگلیسی!!! ای کاش حداقل نویسنده یک بار املای درست کلمات خارجی را با کسی بررسی می‌کرد. پر است این کتاب از غلط املایی.
  ۳- شاید برخی فکر کنند که گفتگوها شعاری است. ولی واقعاً ایرانی‌های امریکا این قدر شعاری حرف می‌زنند. این قدر شعاری نتیجه می‌گیرند و این قدر شعاری غر می‌زنند. پس در این مسأله خوب عمل کرده. ولی معلوم نیست که این ایرانی‌هایی که رانندگی را می‌گویند درایو، مالیات را می‌گویند تکس و به هر حال را می‌گویند انی‌وی چه طوری این قدر اصلاحات اصیل کوچه‌بازاری ایرانی را می‌گویند. همه یک جور صحبت می‌کنند. چه الهام که امریکا بزرگ شده و چه بهادر و چه هومان و چه عماد. بماند که چه طوری است که دکتر متخصص ایرانی به سانتاکلاز می‌گوید پاپانوئل؟ سیگار زیاد کشیدن این داستان هم نوبری است برای خودش.
  ۴- معلوم نیست که چه طوری اینها ساعتی ۷ دلار حقوق می‌گیرند ولی هر روز رستوران پلاسند و استارباکس. ارزان‌ترین کاپوچینو و موکای استارباکس الان نزدیک ۵ دلار است. شما بگو با حساب تورم آن موقع‌ها ۴ دلار بوده. ساب‌وی ارزان‌ترین غذایش که سیر کند می‌شود ۹ دلار؛ باز هم بگو آن موقع ۷ دلار. رستوران که حسابش جداست. یک استیک ساده ممکن است تا ۱۰ یا حتی ۲۰ دلار آب بخورد. چیزی در ریاضیات این داستان جور نیست.
  ۵- آخر کتاب نویسنده هول شده که همه چیز را بگوید: تعرض به صنم (خوب این صنم خبر نداشته که می‌شود شکایت کرد و پدر طرف را درآورد؟)، مسیحی شدن پسرخالهٔ آرش برای گرین‌کارت (این اتفاق زیاد می‌افتد ولی خب این که چه شده باید خوب بیان شود)، جدا شدن بهادر و کارولین و آخرش دل‌کندن صنم از آرش.
  ۶- در این داستان خبری از مذهبی‌های امریکا نیست. اینها سر قبر فاتحه می‌خوانند ولی یک بار هوس مسجد رفتن به سرشان نمی‌زند. نمی‌گویم که باید می‌رفتند ولی طبیعتاً چنین برخوردهایی پیش می‌آید در امریکا. جایش خالی است.
