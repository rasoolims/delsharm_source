  سلام آقای رسولی ممنون از یادداشت های خوب شما
  بنده واقعا دوست دارم کتاب ها را به زبان اصلی بخوانم اما متاسفانه با وجود تلاش برای افزایش مهارت انگلیسی هنور نتوانستم به راحتی کتاب های انگلیسی را مثل فارسی بخوانم.
  البته با خواندن نوشته های شما انگیزه بیشتری برای یادگیری زبان پیدا می کنم.
  ممنون از شما
  موفق باشید
adminResponse:
  date: '2018-06-28T23:16:00Z'
  message: |-
    سلام
    ممنون از لطف شما. کمی طول می‌کشه که این مهارت به دست بیاد. به نظرم بدترین کار کند کردن مطالعه با مراجعهٔ زیاد به واژه‌نامه است. باید سعی بشه بدون مراجعه به واژه‌نامه معنای واژه‌ها را از بافتی که در آن حضور دارند فهمید.
