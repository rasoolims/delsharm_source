message: |-
  سلام
  به نظرم فصل 2 نسبت به فصل 1 به مراتب روان‌تر و بهتر شده بود.
  مخصوصا جاهایی که سعی کردی احساسات و درونیات خودت رو هم در قبال فضا و اتفاقاتی که برات میفته بیان کنی. مثلا:
  "غربت آنجا بر من حادث شد که افسر به من گفت در این چند هفته که سفارت دانشجوهای ایرانی را پذیرش می‌کند تو اولین موردی هستی که با این مسأله مشکل داری."
  هرچند فکر میکنم بعد گذشت چند ماه به یاد آوردن و بیانشون یک مقدار سخت باشه. اما شخصا بیشتر از این که محیط و اتفاقاتی که میفته برام جذاب باشه، این که در این فضا تو چه احساس و عقیده‌ای داری جذاب‌تر و مهم‌تره.
  یا علی
