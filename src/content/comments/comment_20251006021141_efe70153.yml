message: |-
  سلام آقای رسولی. به واسطه دوستان مشترکمان با شما آشنا شدم. من شما را میشناسم ولی شما نه. بخشی از نوشته های شما در مورد ریچارد ساچر ذهن من رو مشغول کرد. به نظرم ایشون خودش فهمیده از عهده تدریس بر نمیاد. من که مقالاتش رو خوندم و درس  deep nlp رو دیدم به نظرم قدرت تدریس نداره. فکر کنم سختی استاد دانشگاه بودن توی آمریکا باعث شده به فکر تاسیس metamind بیفته.
  به نظرم این رقابت سنگین برای کار سبب تنهایی شده. آدم وقتی ساعت ها از خودش غافل میشه دیگه با خودش هم غریبه هست. این مشکلات اثر صنعتی شدن جامعه هست. متاسفانه کم و بیش اینجا هم همین مشکلات وجود داره.
  ممنون بابت نوشته های خوبتون. از خوندنشون لذت میبرم. امیدوارم موفق باشید.
