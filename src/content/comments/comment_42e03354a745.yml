message: |-
  سلام و عرض ادب دارم و احترام محضر شما بزرگوار و نیک اندیش
  سروده بسیار زیبائی بود و لذت بردم جناب آقای دکتر رسولی
  خوشحال میشوم حضور شما را نیز داشته باشم
  *********
  این شعر از سرکار خانم مهشید محمدیان است
  پایین تر
  مردی دستان خونی اش را می شوید
  هر قطره خون شاعری می شود
  مرا شش ساله می سراید
  در شبهایی که موهایم را شانه می زدی...
  *********
