  سلام...
  کبوتر...؟ کافر...؟ برادر...؟قا فیه ها ؟؟؟!!!
  ممنون از نظر تان.
  مرثیه نمی داند
  جهان را بر گرده ات نشاندی
  رمز
  در دهانت چرخید
  طاق زدی
  با دو دست جا مانده
  علم اش ته دریا
  برای پست آینده ام بود.
  خدا نگه دارتان
