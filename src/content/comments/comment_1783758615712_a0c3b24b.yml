name: ردایی موسی
date: '2021-12-20T09:44:00Z'
message: |-
  خوش آمد گل وز آن خوشتر نباشد
  که در دستت بجز ساغر نباشد
  زمان خوشدلی دریاب و در یاب
  که دایم در صدف گوهر نباشد
  .
  خوش اومدی به ایران و وطن دکتر عزیز و نازنین
  الحمدُ للهِ رَبِّ العالَمین
  .
  ان شاء الله تهران می بینمت
  و شمال
  .
  سلامت باشی
  .
