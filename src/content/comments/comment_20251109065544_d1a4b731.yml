  سلام
  بله: همان رئال‌پالتیک.
  تعریف از ویکی‌پدیا:
  درکی از سیاست یا دیپلماسی ست که بنای خود را بر آن می‌گذارد که شرایط و عوامل موجود و معین را در نظر بگیرد، به جای آن که بر قضایای سادهٔ ایدئولوژیک یا امور وجدانی و اخلاقی مبتنی باشد. به این معنی، مفهومِ "سیاست واقعی" جنبه‌های فلسفی مشترکی با واقع‌گرایی و عمل‌گرایی دارد. غالباً به سادگی، از آن به عنوان عمل‌گرایی در سیاست یاد می‌شود، به عنوان مثال، چنین می‌گویند که فرد «به دنبال سیاست‌های عمل‌گرایانه» است. گاهی نیز اصطلاح سیاست واقعی را در معنایی کنایه‌آمیز و تحقیرگر به کار می‌برند و به سیاستی اشاره می‌کنند که بر قهر و اجبار تکیه دارد و غیراخلاقی، یا ماکیاولیایی ست.
