name: پیمان ‌‌
date: '2022-10-25T04:55:00Z'
message: |-
  سلام، جسارتا نقدی داشتم به برداشت شما از آزادی بیان.
  آزادی بیان به هیچ وجه به معنای گفت‌و‌گو نیست. این‌ها دو چیز جدایند.
  تا جایی که من متوجه می‌شوم آزادی بیان یعنی به خاطر بیان عقایدت زندان یا خشونت فیزیکی در انتظار نداشته باشی.
  مثلاً شما در آمریکا می‌توانید به هیئتتان بروید و به سخنان سخن‌ران گوش کنید -و او حتی به رئیس جمهور کشور بدترین فحش‌ها را بدهد- بدون آن که فردا در زندان باشد. این آزادی بیان است. نه این که بقیه مردم آمریکا باید به گفت‌و‌گو با آن سخن‌ران راضی باشند. این که سخن‌رانی با دین و عقایدی کاملا متفاوتِ حکومت توان تریبون داشتن دارد آزادی بیان است نه گفت‌و‌گوی حاکم و مردم با آن تریبون‌دار.
  در کشور دیگری اگر به حاکم بالای چشمت ابرو بگویی زندانی می‌شوی. این عدم آزادی بیان است. اگر آن بالای چشم ابرو گو معتقد به گفت‌و‌گو با طرف دیگر نباشد به معنای عدم باورش به آزادی بیان نیست. این ربطی به آزادی بیان ندارد.
adminResponse:
  date: '2022-10-25T06:45:00Z'
  message: |-
    سلام
    خیلی ممنون که وقت کردید و مطالعه کردید.
    در مورد آزادی بیان در چند سطح می‌شود حرف زد:
    آزادی بیان در سطح اصول موضوعهٔ یک گروه یا اجتماع؛ مثلاً تمامیت ارضی کشور که من جایی نمی‌شناسم چنین آزادی‌ای وجود داشته باشد. اگر کسی اعتقاد به تمامیت ارضی نداشته باشد، چاره‌اش بیان نیست؛ نبرد است.
    آزادی بیان به معنای آنکه اجازهٔ توهین به گروه‌ها و افراد وجود داشته باشد. متأسفانه از این جهت در ایران خیلی این مسأله رعایت نمی‌شود و هر کسی که زورش می‌رسد چیزهایی می‌گوید که توهین به گروه دیگر است. مثلاً اخیراً در آمریکا برنامه‌ساز تلویزیونی به اسم الکس جونز به خاطر مسخره کردن گروهی که از تیراندازی گروهی لطمه دیده بودند، به یک میلیارد دلار (دقیقاً میلیارد) جریمه محکوم شده است. حالا بازیگری چند سال پیش توییتی از یک حساب کاربری دروغی می‌گذارد، بعد یکی تحت تأثیر آن توئیت طلبه‌ای را به قتل می‌رساند. بعد این آدم راحت از کشور خارج شده است و جولان می‌دهد. اخیراً هم شده است تریبون اندیشکده‌ای که رئیسش به صراحت طرفدار جنگ است.
    آزادی بیان به معنای آزادی بیان اندیشه‌ها حتی اگر ضدجریان باشد. در این مسأله با شما موافقم که در آمریکا و به طور کلی در غرب آزادی بیان بیشتری وجود دارد. اما ذکر دو نکته را لازم می‌دانم: نخست آن که در همین آمریکا در مورد بعضی مسأله‌ها آزادی بیان باید باشد و نیست. نه این که زندانی‌تان کنند اما آنقدر انگ به شما می‌زنند که عملاً از زندگی ساقط می‌شوید. مثل اخراج و ریختن آبرو. مصادیق این موضوعات نقد آزادی‌های جنسیتی نوظهور و نقد صهیونیست است. این مسأله تا جرمی کوربن، نمایندهٔ حزب کارگری انگلستان هم کشیده شده است. خود من سه باز تذکر گرفتم که یک بارش در فیس‌بوک بود. یک بار مدیرم به من گفت که آزادی بیان واقعاً وجود ندارد و حواست باشد چه می‌گویی. قضیه این بود که یکی از همکاران پایش را از گلیمش درازتر کرده بود به من تهمت زده بود. مدیرم او را به عنوان آینهٔ عبرت گذاشته بود و نصیحتم می‌کرد. یک بار سر قضیهٔ سقط جنین صرفاً نظر مخالف را به عنوان «مدافع شیطان» گفتم که بعد از صحبتم یکی از همکاران گفت که ما که خودی هستیم ولی از این حرف‌ها جایی نگو که برایت فقط حاشیه درست می‌شود (مثل برچسب ضدزن زدن و ضدآزادی و بعدش اخراج و به خاطر برچسبی که می‌خوریم هیچ شغل دیگری پیدا می‌شود). دوم آن که آن که من گشایش واضحی در افزایش رواداری در ایران می‌بینم. نمی‌دانم آیا سن شما به دورهٔ سازندگی قد می‌دهد یا نه. آن دوره نمی‌شد هیچ چیزی بر خلاف مقامات گفت. خاطرات مرحوم عباس معروفی در این مورد جالب است که به خاطر آن برخوردها مجبور شد از ایران خارج شود. بماند که ظاهراً-دوستانِ معروفی بعد از مرگش هم از خاطره‌اش در مورد مرحمت رئیسی به او نگذشتند.
    اما فرمودید گفتگو:
    این که توی سخنرانی مسجد اقلیتی چیزی بگویند چیزی نیست که باب گفتگو لازم داشته باشد. اما گفتگو جایی لازم است که اشتراک یا تعارض منافع وجود داشته باشد. چیزی که من می‌بینم (در برخی از ایرانیان) گزارش کردن افراد، انتشار تصاویر خصوصی، اجبار به هم‌نظر کردن بقیه با تهدید و فشار، حمله به پست‌های مجازی، درخواست برای اخراج استاد برای دگراندیشی و چیزهایی از این دست است. ما بالاخره باید بپذیریم چه بخواهیم چه نخواهیم، از دست روزگار چند گروه فکری توی یک جغرافیا و زمان مشترک قرار گرفته‌اند. اگر گفتگو نباشد، چاره‌اش حذف همهٔ گروه‌ها از سوی گروه‌های قوی‌تر است. اتفاقی که موقع به قدرت رسیدن رضاخان میرپنج افتاد.
    اما من اصلاً‌ نه دوست دارم نه فایده‌ای برای صحبت در مورد مصادیق می‌بینم. هر چه باشد تجربهٔ هشتاد و هشت به من ثابت کرد که هر دو طیف حاضر به تغییر حتی اندکی نظر خود نداشتند. یکی می‌گفت برگهٔ رأی تانشده دیدم، آن یکی می‌گفت خودم پای صندوق فلان شهر بودم و اعداد دقیق است. اما این را قبول دارم که بخشی از این اتفاقات انفجار اعتراض به نشنیده شدن گروهی است که حتی اگر اقلیت باشد، درصد زیادی از جامعه است. متأسفانه ناتوانی در گفتگو چندطرفه است.
    اما ناظر به این کتاب به پرسشم برمی‌گردم. فضایی که عزت شاهی ترسیم می‌کند فضایی است که می‌شود دید بعد از رفتن شاه، چه بلبشویی بین انقلابیون خواهد شد. و دیدیم که شد. یکی از این رفتارها بایکوت افراد است. در زندان کسی اگر با او حرفی نزند، می‌تواند او را به مرز جنون برساند.
