message: |-
  سلام
  من خیلی درگیر بودم با این مسئله ذکر شده در پی‌نوشت و تا حدی درک می‌کنم چقدر مهمه
  به نظرم کمی آگاهانه‌تر و با شناخت و وسواس بیشتری هزینه کردن برای کتاب این شک رو کمتر می‌کنه
  این البته در مورد من صادقه که عذاب وجدان هزینه یا انرژی صرف شده برای کتاب بیشترین عامل ایجاد شکه واسم
