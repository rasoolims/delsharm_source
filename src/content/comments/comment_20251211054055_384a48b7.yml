  به گوشی آسمان؟ پرواز تعطیل!
  قناری هیس! چون آواز تعطیل!
  ...
  کبوتر بی‌هوا غمگین نشسته
  نگاهش راه راه، آواز تعطیل!
  سلام حاجی! خسته نباشی. کلاً مثل سیف فرغانی زدی تو خط ردیف‌های مشکل؟!
  دمت گرم. مخلصیم و التماس دعا.
  همین.
