  با سلام و تبریک سال نو :)
  در مورد اون بخش که نوشتید اینجا دانشجویان هیچ آپولویی را هوا نمی کنند، من هم با شما موافقم. در اروپا هم تقریبا ( یا بهتر بگویم تحقیقا) همینطور است..اما موضوع اصلی دموکراسی آموزشی است یعنی آزادی در ارایه تمامی فرصتهای آموزشی + اخلاقی کار کردن است..دقیقا همان مطالبی که گفتید...بی اخلاقی، سرقت پژوهشی، ادعاهای بزرگ بی پشتوانه و غیره همه و همه دردهایی است که جامعه آموزشی ما با آن مواجه است...
  موفق باشید
  سلام
  ممنون از لطف شما
