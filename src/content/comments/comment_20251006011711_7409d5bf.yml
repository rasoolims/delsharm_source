  سلام
  تعریفی که کتاب از بنیادگرایی ارائه می‌دهد در انتهای آن و شامل القاعده و امثالهم شده است. دین‌داری هم درست می‌فرمایید که واژهٔ دقیقی نیست: منظورم طرفداران حکومت دینی و غیرسکولار بوده است.
