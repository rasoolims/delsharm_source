  سلام صادق جان
  ان شاالله از خوانندگان مستمر این سفرنامه خواهم بود(البته اگر خبر مطالب جدیدت را اعلام کنی که چه بهتر)
  نوشتنت مستدام، خدا نگهدارت و عاقبتت خیر باد.
