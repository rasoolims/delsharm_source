message: |-
  صادق جان چرا بد باشه، البته من در اندازه ای نیستم که بخوام نظر بدم.
  خیلی عالی نوشتی، نوشتن که اصول و قواعد نداره البته برای من اینجوریه، ییست هات با اینکه اسلامیه دوسشون دارم، احترام میذارم.
  همیشه خواننده ی متن هاتم.
  با احترام
  ممنونم
  «ییست»؟
