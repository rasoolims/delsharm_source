name: AE
date: '2118-08-31T03:09:00Z'
message: |-
  سلام!
  این پست تون هم برام خیلی جالب بود! از یه طرف بابت حرف هاتون راجع به همون کشور مذکور! من البته با کسی راجع بهش بحث یا صحبت نمیکنم، فقط یک بار یکی از بچه های بلژیک که علوم سیاسی هم میخونه ازم پرسید چرا ایران فکر میکنه مقابل این کشور که بمب اتم داره میتونه وایسه؟ که من گفتم اول اینکه همچین کشوری رو من اصلا به رسمیت نمیشناسم، میتونیم با هم رژیم کودک کش صداش کنیم و از طرفی هم چرا برا ما عب داره برا اون خوبه؟
  البته جوابی نداد به سوالم ولی آخر سر جفتمون نتیجه گرفتیم چه خوبه که با این همه تفاوت عقیده میتونیم با هم صحبت کنیم و کنار بیایم :)
  اما باز مجدد بحث کره و سربازی!
  خوب بود به دوستتون میگفتید که آره، اینا وقتی اینجایی خیلی مهربون میشن باهات، پاسپورتت رو تمدید میکنن ولی اگه برگردی ایران همون جا تو فرودگاه میدونن باهات چیکار کنن! همون سال 94 که شما این متن رو نوشتید، من به واسطه عدم گرفتن اجازه خروج از طرف ایران چون رشته پذیرشم لیسانس بود مسیر زندگیم عوض شد...
  پس تو رو خدا،طوری صحبت نکنید که چون بقیه بدبختن ما هم میتونیم بدبخت باشیم و چیزی نگیم
  تو رو خدا، جوری ننویسید که انگار باید از بدبختی بقیه خوشحال بشیم و در عین حال بدبختی خودمون رو فراموش کنیم
adminResponse:
  date: '2118-08-31T09:50:00Z'
  message: |-
    سلام
    به دوستم همهٔ اون مطالب رو در مورد سربازی ایران، حتی بدترش رو گفتم. همین که راست و حسینی در مورد ربع‌شدن ارزش پول ملی در عرض یک سال گفتم، کافی‌ست. همون طور که در مطلب دیگری پاسخ شما را دادم، هدفم یادآوری ایرادهای ایران در خاطراتم نبوده. دوست کره‌ی از مشکلاتش گفت و من هم نوشتم. راستی، همین هفتهٔ پیش پدرش فوت کرد و او به خاطرات همان مشکل سربازی موفق به حضور در مراسم ختم پدرش در کرهٔ جنوبی نشد.
