  سلام
  ممنون از لطف شما
  منطقهٔ نیوانگلند هر چقدر به شمال نزدیک‌تر بشه و از بوستون دورتر ارزون‌تر هست چون چیز خاصی درش نیست
  و اقلیم خیلی خشنی داره
  اما فرآیند خرید خانه مشابه هست
  توجه کنید که قیمت منزل در آمریکا نسبتی با درآمد متوسط منطقه داره
  به این معنی که همون‌طور که برای اهالی کالیفرنیا خرید خانه دشوار شده برای بقیهٔ آمریکا هم همین قصه پایداره
