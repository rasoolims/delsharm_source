message: |-
  سلام
  میدونی چرا از ایرانی بودنت آخرش حال نکردی چون ایرانی بودنت را به مسلمان بودنت ترجیح دادی بهتر بود اونجا که داشت اینهمه از مسلمانها بد میگفت از اعیاد و شادی های مسلمانها دفاع میکردی
  شاید پیشنهادم تو این همه مشغلتون بیخودی باشه ولی به عنوان یه دوست که از شما تصویر یه آدم مذهبی یادمه برای جواب داشتن و دفاع از اسلام با یه کارشناس مذهبی در ارتباط باشید و اطلاعات دینیتونو بالا ببرید
