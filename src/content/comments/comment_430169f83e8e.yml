message: |-
  باسم رب الحسین
  سلام
  باز هم مشکل وزن داری پسر. خداییش همین یکی است کل مشکلت.
  وگرنه من مرده این تعبیرات سپید و شاهکارتم:
  بیا سپید کن این کوچه را، ای برف
  که روسیاه شد این سان، پیاده‌رو
  هر چند کم کم تکراری می شوند.
  راستی راه را نخر. فردا زنگ می زنم سفارش می گیرم یه 20 تایی برا خودمون. تبلیغ کن.
