message: |-
  سلام
  من یکی از دانشجویان دکتری امیرکبیر هستم که برای فرصت قراره بیام امریکا از خوندن مطالب شما وقعا لذت می برم. خیلی خوب می نویسید و این نشان میده که خیلی خوندید. برای موفقیت شما حقیقتا دعا می کنم. یه جورایی دورادور اشنا هستم چند باری خوابگاه دوستانم تو علم و صنعت میومدم اونا برق میخوندن و اکثرا هیئتی بودن و از این باب بود که با وبلاگ شما اشنا شدم. امیدوارم تو کار علمی خودتون هم بهترین باشید. یا علی
  از آشنایی با شما خوشحالم. خیلی ممنون از نظرتون.
