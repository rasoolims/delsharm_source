message: |-
  سلام آقا صادق
  بسیار خوب بود
  اینبار خواستی نویسندگیت ترکیبی از دو سبک قبلیت باشه که به نظرم خیلی بهتره هر چند فکر کنم کمی بیشتر باید بنویسی تا بتونی بهتر ترکیبی از دو سبک نویسندگی داشته باشی
  البته جسارتا
  اما در مورد حق الناس، فکر کنم همین فرهنگ که حداکثر سازی منافعم در گرو این باشدکه طرف مقابل را راضی نگه دارم و حق و حقوقش را به طور کامل بدم ، فکر کنم برایبرای رعایت حقوق همدیگر کافی باشد. به نوعی منافع مادی خود را در گرو کار خوب کردن و رعایت حق یکدیگر  می بینند.
  مثلا از اساتید شنیدم که در مورد حق کپی رایت خیلی مواظبند، شاید این خودش دو علت داشته باشد،
  1- اگر من الان رعایت نکنم فردا کسی دیگر همین کار را در مورد محصول بنده انجام می دهد
  2- ممکن است برخی از مجازات های قضایی جلوی آن ها را برای انجام کار خلاف گرفته باشد.
  حال شما فرض کن یک دفعه این فضا از بین برود، یعنی قانونی محکمی نباشد که دیگر آن ها را مجبور به اطاعت کند یا رعایت حق طرف باعث بهبود منافع مادی شان شود آیا انوقت جایی برای رعایت کردن حق دیگران می شود. مانند ظلم ها و تجاوزهایی که سربازان آمریکایی در افغانستان و عراق می کنند.
  سلام
  این که شما می‌گویی درست هست ولی به نظرم کامل نیست. این منطق زمانی که یک نفر احساساتی می‌شه قاعدتاً شکسته باید بشه ولی بعضی وقتا این اتفاق نمی‌افته. در ضمن، از آن طرفش، چرا یک مسلمان نباید این گونه فکر بکند؟
