postSlug: '%D9%87%D9%85%D8%B3%D9%81%D8%B1-%D8%B4%D8%B1%D8%A7%D8%A8-%D8%B3%D9%81%D8%B1%D9%86%D8%A7%D9%85%D9%87-%D8%A7%D9%85%D8%B1%DB%8C%DA%A9%D8%A7-%D9%81%D8%B5%D9%84-11'
name: محسن
date: '2113-06-24T18:45:00Z'
message: |-
  سلام محمد صادق عزیز
  دیروز به فکرت بودم
  متنت رو در روز نیمه شعبان خوندم
  ممنون که با ایمیل از نوشتن فصلی جدید مطلعمون می کنی
  برادر دل ما میگیره برات وقتی اینطوری می نویسی
  باور نمیکنی چقدر از دست استادت شاکی شدم
  از اینکه تو غربت اینطوری کسی با برادرم برخورد کنه خیلی
  حال بدی پیدا میکنم
  دوست دارم مثل دوستان دیگه دلداریت بدم و بگم باشه
  سختی رو تحمل کن و با خودت یه چیزهایی بیار
  اما همون طور که قلاب هم با هم گپ زدیم
  شما اولین نفر نیستی که به اون محیط رسیدی و احتمالا چیزهایی خواهی آورد و این یعنی مشکل با آورده های شما حل نمیشه برادرم
  مشکل چیز دیگری است و اگر دردمون رو درست نشناسیم
  عمر در راه به دست آوردن دوایی میذاریم
  که بعد آوردن می ترسم نه تنها حال مریض بهتر نشه
  بلکه بدتر هم بشه
adminResponse:
  date: '2113-06-24T18:45:00Z'
  message: |-
    سلام برادر
    همون طور که گفتم قصدم از نوشتن اون اتفاقات دلداری شنیدن نبود گرچه دوستان خوب دلداری دادند. قصدم بیان بخشی از واقعیت بود که کمتر گفته میشه.
    من مطمئنم که مشکل با آورده‌های امثال من حل نمیشه ولی من وظیفه دارم به کار خودم عمل کنم و بهترین شکل وظیفه‌ام رو انجام بدم. کار دیگه‌ای از دستم برنمیاد. نمی‌دونم شما هم مثل من فکر می‌کنی یا نه. اگر فکر می‌کنی اشتباه می‌گم ممنون می‌شم نظرت رو بگی.
    یا حق
