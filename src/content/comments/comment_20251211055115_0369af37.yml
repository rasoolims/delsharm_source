message: سلام دوست عزیز از این همه زیبایی و شیوایی لذت بردم امیدوارم همیشه سبز باشید
  حتی در سرد ترین سردی ها با خوانش دوباره بر غزل ژست مدرن به روزم خوشحال می شوم مرا
