message: |-
  سلام
  سلامت باشید
  کاملا موثر و درست فرمودید.
  [ با بعضی کتاب ها و ژانرها نمیدونم چرا هیچ ارتباط و لینکی رو نمیتونم در خوندن برقرار کنم ]
  الان به این نتیجه رسیدم که در موضوع کتاب و همه کتاب‌ها تا حدی یافتن پدیده ها و بررسی موثرشون در کتاب هایی که انسان میخونه طبیعتا به افزایش دانش و تجربه و آرامش و به نوعی لذت روح هست
  الان سوال هست که ؟
  این خنثی و بی عملی روح رو که ذکر داشتید و در کتاب اشاره شده ، میتونه برا دنیای مدرن امروز و جوامع پیشرفته بشری روانکاوی شه
  مثلا من از شکل روانشناسی [ با اینکه فیلد تخصصی من نیست و هرچند در اوقات نوجوانی مطالعات فراوان و بررسی های کاربردی داشتم]  میتونم این نتیجه رو بگیرم که انگار ریشه این موضوع شبیه PTSD هست
  Post-traumatic stress disorder
  یعنی جامعه و مردم و بشریت در این موضوع بی عملی و انفعال انگار دچار PTSD شده
  .
  برا موضوع و نکته پایانی که در مورد خودشیفتگی ذکر داشتید کاملا صدق نمیکنه
  هر چند در بیشتر مواقع درست هست
  صدق نمیکنه یعنی کی میتونست پیش بینی کنه که مجموعه و شرکتی کوچک در کالیفرنیا توسط شرکت های فناوری بزرگ در سیلیکون ولی خریداری شه و این چنین ضریب تاثیر داشته باشه و مجموعه ای از افراد تاثیر گذار تا ورشکاران و هنرمندان و سلبریتی ها تا اندک اساتید و اندیشمندان و محقق و دانشپژوها رو مثبت یا منفی جذب خودش کنه
  من ریشه این پررنگ بودن موضوع خودپرستی و خودشیفتگی در جامعه مدرن و حتی در اینستاگرام رو به نوعی در تغییر ذائقه مردم و خودشناسیِ وارونه بشریت و جوامع میبینم
  یعنی از یاد بردن خودشناسی و خدا و در یک کلمه توحید یا مثلا خدا پرستی
  هر چند صحبت و ذکر این موضوع موثر هست و حتما در تخصص و جایگاهی نیستم که این معارف رو تبیین کنیم ولی یقین دارم که ریشه و تابعی از رفتار انسان و بشریت هست
  Monotheism
  The Principle of Monotheism is the root and basis of our belief
  .
  خب تا حدی گسترده و مقدارکی طولانی شد
  سپاس از پاسخ تخصصی و ارزشمندتون
  سلامت باشی دکتر عزیز و نازنین
