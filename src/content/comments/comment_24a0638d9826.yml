message: |-
  در مورد اون افغانیه اصلا تعجب نکردم. اگه فیلم یا کتاب "بادبادک‌باز" (The kite runner ) رو دیده باشی دیدی نسبت به این مردم مظلوم پیدا می‌کنی.
  در مورد ساختمان‌های قدیمی و اتاق‌های نمور و نم‌زده‌ی نیویورک هم از قبل از طریق دیدن فیلم Mary and Max [2009] انتظار تصاویری شبیه آنچه تو توصیف کرده بودی داشتم. به طور کلی به هیچ‌وجه از نیویورک خوشم نمیاد و اون رو چیزی هم‌رده‌ی تهران و حتی دهلی می‌دونم. ولی خب باز فکر می‌کردم شما منتهنی‌ها امکانات بهتری داشته باشید.
  و در آخر خیلی خوشحالم که شما با همسرتان رفتید. هر چه جلوتر می‌روم بیشتر شک می‌کنم که اگر کار پذیرش من درست شوم چگونه آنجا را تحمل کنم؟ تنها، در یک مملکت غریب و شاید حتی به دور از طبیعت. شاید من اگر جای تو بودم یک ماه نشده افسردگی می‌گرفتم. مگر آنکه با گشتن در دل طبیعت در آخر هفته‌ها روح خود را جلا داده و کمی از تنهایی و غربت را فراموش کنم.
  به قولی "اگر شما در فراق او را که می‌خواهید نباشد، در غربت هر که را بخواهید نیست"
  بادبادک‌باز را دیده‌ام. قسمت‌هایی از کتابش را هم از قول دوستان شنیده‌ام. یک جورهایی زمینه‌سازی ظهور! امریکاست در افغانستان.
