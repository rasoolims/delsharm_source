message: سلام. آیا خاما رو خوندین؟ خیلی دوست دارم نظرتون رو راجع بهش بدونم چون که
  تفکر شما رو درمورد کتابها( در همین چند دقیقه‌ای که وبسایتتون رو پیدا کردم!) دوست
  داشتم ، نمیدونم اگه جند تا مطلب دیگه بخونم نظرم همین میمونه یا نه اما واقعا نقدهاتون
  عالی بودن.
