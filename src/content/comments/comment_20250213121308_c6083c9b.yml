  سلام
  اولین چیزی که می‌گم اینه که فرآیند پیچیده‌تر از اونی هست که فقط به بُعد تحصیلی یا رفاه اقتصادی بشه نگاه کرد. در مورد خودم، من تجربهٔ زیست همزمان در ایران در این سن و سال رو نداشتم و نمی‌تونم بگم که دقیق کجا پیش رفتم و کجا پس. تنها چیز واضح سطح تحصیلی بالاتر آمریکاست نسبت به ایران. بقیهٔ چیزها، حتی رفاه اقتصادی، نسبی است. هستند دوستان هم‌دورهٔ من در ایران که از نظر اقتصادی خیلی جلو هستند. از نظر اعتقادی و زندگی خانوادگی که زندگی توی آمریکا راه رفتن روی لبهٔ تیغه.
