message: |-
  سلام.  عالی هست ، گفتن کامل واقعه ها بعضی موقع ها طبیعی هست که نیاز نباشه
  فقط گذاشتن رمز،  مقداری محافظه کارانه و احتیاط بیش از حد هست که
  تو مقیاس بالاتر میشه گفت : ترس خفیف از گفتن یا نوشتن تو لحظه هایی که خواننده
  میخواد از شما یاد بگیره و خودش رو در واقعه ها و خاطره ها بگذاره
  درست هست که تو گفتن و نوشتن،  نیاز هست بعضی چیزها رو رعایت کرد... ولی
  اگه مثل اوایل دهه نود ، جسورانه و روشن واقعه ها رو ذکر کنید در
  گفته و نوشته ها تون .. تاثیر گذاری بیشتری داره احتمالا ... و مثل شعر گفتن و
  اوردن شعر ها که فضا رو تلطیف میکنه و
  و دوباره به روزهای اوجتون برمیگردید و منظور استحکام و تاثیر بیشتری در
  همه و خوانندگان دلشرم داره در عصر مجازی این دنیای مجازی و این انبوه شبکه های مجازی
  خیلی از استاد راهنماها و محقق و دانشجویان تا داتشمندان ایرانی ، معمولا تجربه و روایت های
  مشابه رو تو مقیاس های متفاوت از غرب دارند،  ولی معمولا دچار خود سانسوری و نگفتن تا احتیاط مستحب در گفتن هستند ... از خاطرات و وقایع بعضی موقع فراتر میشه به
  سمینار و .... اشاره داشت ،  نمونه ش رو مثلا تو همین تهران و نشست های علمی با
  موضوعات زندگی و درس و کار و پژوهش در غرب که اگه جلسه و سمینار تخصصی باشه برا ارزیابی اسیب ها تا مزیت ها رو میشه دید ... مثال واقعی ش تو علوم پزشکی و همایش یا سمیناری رفته بودم سال ٩٧ ... یه محقق هم از نیویورک اومده بود و چقدر حرف های نگفته و چقدر  مشتاقان دونستن و یاد گرفتن بودند،
  مراجع و رفرنس ها میتونند زیاد باشن،  ولی گفتن و انتقال مفاهیم و اثرگذاری شون اگه
  محور قرار بگیره،  عالی هست ... تشکر
  ... شاد و سلامت باشید اقای دکتر ...  سربلند باشی و موفق اقا محمد صادق نازنین مون
