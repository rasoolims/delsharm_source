  معنی این جمله این است که ماندن و کار کردن در ایران بهتر از رفتن و نماز شب خواندن در آمریکاست؟
  "
  البته آدم جاهل کشور خودش را به باد می‌دهد و این برای بعضی‌ها از جمله نماز شب‌خوان‌های عشق امریکا یعنی از دست دادن رفاه و موقعیت زندگی کنونی."
