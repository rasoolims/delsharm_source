message: هی که بیشتر پیش می روم در قصه تو اشتراکات بیشتر و هم حسی های بیشتری را با
  خودم کشف می کنم که برایم جالب است. از موارد کوچکی مثل اینکه قصه نوجوانی من هم با
  دوچرخه قرمزی شروع شد (حالا هر چند کنار شالیزار نبود اما کنار درخت های پارک جنگلی
  بود) بگیر تا موارد کوچکتری مثل اینکه مادر من هم به شهریور می گفت شهر یه ور و در
  نهایت هم حسی های بزرگی مثل این شعر زیبا که پی نوشت کردی که بدجور وصف احوال من هم
  هست.
