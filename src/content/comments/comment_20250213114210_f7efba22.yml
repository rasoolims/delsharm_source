  سلام
  مجمع دانشجویان حزب الله همایش بایسته های فرهنگی دولت نهم را با موضوع نقد عملکرد مدیریتی دوال در حوزه فرهنگ اوایل اردیبهشت ماه در دانشگاه علم و صنعت برگزار میکند.وبلاگش هم راه اندازی شده پس:
  1- حتما به وبلاک سر بزنید.
  2- لطف کنید و در وبلاگتان لینکش کنید.
  3- باز هم لطف کنید و مطالبتان در این موضوع را در قالب مقاله طنز قطعه ادبی و..به آدرس Khizesh.no@gmail.com
