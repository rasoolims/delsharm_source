name: آشنا
date: '2118-08-31T17:10:00Z'
message: |-
  سلام
  امیدوارم مشکل ویزا و چشم شما حل بشود
  واقعا تلاش کردید و امروز دارید مزد زحمات خودتان را می گیرد و واقعا فرزند شما ازتان سپاسگزار خواهد بود که شرایط خوبی را برای زندگیش فراهم کردید.
  دیگر اینجا محلی برای زندگی نیست و همه فقط به حیات ادامه می دهند
  کار جدید در فیسبوک هم واقعا فوق العاده است اسمش هم باعث تهییج آدم می شود
  سلامت و موفق باشید
