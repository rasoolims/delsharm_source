message: |-
  سلام
  ممنون از لطف شما
  مشکل سلامتی که برای من ایجاد شد مزمن بود و اوج مسأله بیشتر از یک سال طول کشید و همزمان شد با نوشتن مطالب. به همین خاطر چاره‌ای نداشتم از حجم کار با کامپیوتر کم کنم. حتی دو بازهٔ دو ماهه و چند وقت دیگر (در مجموع پنج ماه) کلاً کامپیوتر را گذاشتم توی کمد و در بیکاری مطلق زیست می‌کردم به امید آن که مشکلم حل شود. الان حل نشده است اما به حدی رسیده که بتوانم به شکل معقول کار کنم.
