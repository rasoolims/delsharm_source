  البت رنگ سیاه خوب است! ما روشنفکر بازی در آوردیم و سفیدشدیم، دیگر بلاگمان آن خفن سابق نیست! آه جوانی!
  برادر مم صادق جان! از من میشنوی به حرف دلت گوش کن! کراهت هم خوب چیزیست
