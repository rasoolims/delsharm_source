name: یک علامت سوال
email: ''
url: ''
date: '2020-12-31T06:58:00Z'
message: |-
  سلام...وارد سه سال مهاجرت شدم...در قلب آلمان!
  اوایل هر روز، بعد هر هفته، و حالا هرماه با خودم فکر بازگشت میکنم. برگردم و تمام کنم این داستان سراسر غربت و تنهایی را...
  اما می ترسم...
  ترس از ادامه، همانقدر که ترس از بازگشت دارم.
  نگران شرایط عمومی داخل ایرانم و نگران شرایط خصوصیم خارج از ایران...
  آیا نتیجه چیزی جز افسردگی روح و روان نیست... و اینکه زندگی واقعا اینه؟!
