message: |-
  سلام. ممنون از پستای خوبتون.
  من و دوستانم تو فارسی به overthinking «بیش‌اندیشی» می‌گیم. شاید شما شنیده باشیدش و به قصد استفادش نکردید ولی گفتم شاید هم نشنیدید.
  پ.ن: شخصا اگه بخوام از «بیش‌اندیشی» استفاده نکنم جای «عدم تصمیم‌گیری همراه با تفکر دوری تکرارشونده» می‌نویسم «نشخوار فکری»
adminResponse:
  date: '2024-12-03T05:46:00Z'
  message: |-
    سلام
    خیلی ممنون از پیشنهاد شما. من معمولاً این مطالب را، به خاطر مشغلهٔ فراوان، سریع و فی‌البداهه می‌نویسم: اخیراً هم به خاطر افزایش مشغله فقط در مورد کتاب‌هایی که ارزش چند خط نوشتن داشته باشند می‌نویسم (به زبان بی‌زبانی: زیاد خواندن را کماکان با وجود مشغلهٔ فراوان به عنوان عادت مطلوب حفظ کرده‌ام ولی فرصت نوشتن در مورد خوانده‌ها کم و کمتر شده است). لذا این ترجمه در لحظه به ذهنم رسید و نوشتم.
    بیش‌اندیشی ترجمهٔ جالبی است.
    خیال حوصلهٔ بحر می‌پزد هیهات
    چه‌هاست در سرِ این قطرهٔ مُحال اندیش!
