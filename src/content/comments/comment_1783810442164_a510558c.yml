  سلام صادق جان
  خیلی خوب بود
  به نظرم برای شادی مسلمان ها جشن نیمه شعبان، عید غدیر و دیگر اعیاد اسلامی را می گفتی
adminResponse:
  date: '2013-07-11T00:39:00Z'
  message: |-
    سلام برادر
    دلیل اصلی من از اون حرف این بودش که همون موقع‌ها یلدا بودش و از طرفی اعیاد اسلامی رو بقیهٔ کشورهای اسلامی هم دارن ولی واقعاً‌ در اون کشورها هیچ اتفاق شادی صورت نمی‌گیره (به گفتهٔ‌ استاد). من هم از نوروز و یلدا به عنوان اتفاق‌های شاد مثال زدم که مسلمون‌های ایران انجام میدن.
