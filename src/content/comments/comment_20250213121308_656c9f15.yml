  سلام، تشکر بخاطر این کارناوال کتابی که راه انداختی. فقط چطور وقت میکنی که
  اینقدر بخونی؟ آخه من هم دارم تو حوزه هوش مصنوعی کار میکنم و عاشق کتاب هم هستم ولی واقعا نمیرسم اینقدر کتاب بخونم.
