postSlug: همسفر-شراب-سفرنامه-امریکا-فصل-1
name: مهدی آذرپندار
date: '2112-12-31T09:39:00Z'
message: |-
  سلام
  خوشحالم که مینویسی همین!
  به این هم که برگردی یا برنگردی خیلی فکر نمی کنم چون ایمان دارم که تصمیم درستی میگیری
  به نظرم سفرنامه نویسی نیاز بیشتری به توجه به جزئیات داره که تو این متن یه کوچولو جاش خالیه یعنی از یه آدم غیر نویسنده هم بپرسن سفر چطوری بود همینا رو میگه ولی یه شاعر معمولا به همون ابرهایی که دیدنش چشم رو اذیت میکنه توجه میکنه تا شاید یه چیزی تو ذهنش تداعی بشه چون ممکنه فقط یه بار آدم بتونه وسط ابرها قرار بگیره. یا اینکه همین قومیت های مختلف وقت خالیشون رو تو هواپیما چه میکنن. میشه این موضوع رو مقایسه کرد
  به هر حال من منتظر یه چیز ویژه تر بودم و البته هستم
  رک بگم سطح این نوشته همچنان در سطح وبلاگه و نه یه سفرنامه جدی
  آقا صادق! چون میدونم هنوز دلت از ینگه دنیا هم برای نوشتن می تپه میگم
  به عنوان یه دانشجوی مهندسی که همیشه دوست داشت بنویسه و نمی شد
  جدی تر بنویس! آدمای کمی هستن که تو موقعیت دراماتیک شما قرار می گیرن، مهاجرت می کنن، هنوز تصمیم شون رو برای موندن و نموندن نگرفتن و توی یکی از مهم ترین دانشگاه دنیا و توی بزرگترین دشمن سنتی کشورشون درس می خونن
  اینا کم دراماتیک نیست ها! آدمای کمی تو این موقعیت قرار میگیرن و از بین همین آدمای کم، خیلی معدودن کسایی که قلم خوبی داشته باشن
  کوتاه کنم . خواستم بگم بنویس و بدون که بعضی ها منتظر نوشته هاتن
  ایشالا که جسارت نشده باشه من کوچیکتر از اینم که کسی رو نصیحت کنم نمی دونم چرا نصیحتم گرفت
  یاعلی
  سلام رفیق
  ممنونم از نظراتت. پای نوشتنم کمی لنگ شده. سعی می‌کنم این کمیت لنگ رو به تاختن وادارم.
  علی یارت
