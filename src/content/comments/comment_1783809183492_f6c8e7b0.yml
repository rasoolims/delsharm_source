  سلام
  سامانه ی کامنتینگم مشکل داره کلی نقد کرده بودیم نوشته تان را .
  همین قدر بدانید این که مجبور نیستید روز به روز به روز کنید.
  وقتی خوب نمی نویسی خوب ننویس .
