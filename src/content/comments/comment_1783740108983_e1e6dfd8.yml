message: |-
  عالی بود.
  خیلی وقت بود اینجا سر نزده بودم. قبلا سر می زدم داستان های شما رو می خوندم. دوباره امروز یادم افتاد که سر بزنم.
  راستش دوست داشتم از ایام محرم در امریکا و در امسال برای ما خاطراتی تعریف کنید.
  ممنون.
