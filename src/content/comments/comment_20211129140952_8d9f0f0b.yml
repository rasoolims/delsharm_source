message: |-
  سلام
  دیگه اولا و دوما و سوما و اینا رو بی خی خی.
  * نه به اون سری که اونقدر کم بود نه به این سری که انقد زیاد بود که خانومم دیگه داشت می زدم.
  * دیشب دوباره "از به" امیرخانی رو خوندم. اونجا قشنگ بفهم اینجا چه حسی داشتم.
  * چند روز پیشا مجید شاکری بهم زنگ زده بود. می گفت دلم می خواد برگردم به علم و صنعت، نه اینکه چیزی رو جبران کنم، بلکه همون کارایی که کردم رو دوباره بکنم. (منم اضافه می کنم دوباره با صادق بشینیم وسط چمن پارک حسرت آی حرف بزنیم تا خود صبح)
  * خلاصه این که این غربت و این حرفا مال نیویورک نیست. مال یزدم نیست. مال همه علم و صنعتی های دهه هشتاده. مال همه است. "روزگار غریبی است نازنین"
  * ولی انصافا این کارایی که اونجا می کنید رو قشنگ یاد بگیر اومدی اینجا به یه دردی بخوری. انصافا ها. و گرنه که مدیون خون شهدایی و طرف حساب اون پیرمرده "اونایی که تو خط امام و رهبری نیستن، خون شهدا رو پایمال می کنن "
