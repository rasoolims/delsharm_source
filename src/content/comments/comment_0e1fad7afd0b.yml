    سلام
    بله؛ وضعیت نشر در ایران کلاف درهم‌پیچیده‌ای شده که هر طرفش را بگیری جای دیگرش گره می‌خوره. تا زمانی که بخش قابل توجهی از جامعه کتاب‌خوان نشوند، مشکل اقتصادی نشر حل نمی‌شه. وقتی شمارگان کتاب خیلی پایینه، ناشر چاره‌ای جز بالا بردن قیمت برای صرفهٔ و توجیه اقتصادی نداره.
    در مورد مهاجرت که فرمودید، با وجود آن که ایرانی‌های اینجا تحصیل‌کرده‌تر از متوسط ایرانی‌های ایران هستند اما من اثری از پرمطالعه‌گی در اکثرشان ندیدم [حتی می‌تونم با ضرث قاطع بگم اکثرشون اصلاً کتاب نمی‌خونن]. بنابراین همان طور که گفتم مشکل اصلی کتاب‌نخوانی هست نه اقتصادی. کسی که واقعاً دغدغه‌اش پول کتاب هست می‌تونه از کتابخونه کتاب بگیره. من خودم اینجا اکثر کتاب‌هام رو از خیریه‌ها به صورت دست‌دوم می‌خرم که چندین برابر ارزون‌تر درمیاد (وگرنه با این تعداد زیادی که می‌خونم ورشکست می‌شم :)
