  آقا رسولی واقعا قیمت کتاب بالاست
  الان رفتم یک کتاب خریدم به نام تاریخ تقریبا همه چیز، 35 تومان پول دادم واقعا برای خود من قابل خواندن نیست اولا اصلا از مطالبش سر در نمیارم با تعریفی که شنیده بودم احساس می کردم برای عموم هست حالا آن به کنار انقدر مطالب تو هم تو هم و ریز هست که آدم وقتی نگاه می کنه و هنوز شروع به خواندن نکرده خسته می شود
  فقط الان میگم شما در دنیا چه کار خیری کرده بودید، که حداقل برای تحصیل مهاجرت کردید.
  موفق باشید
