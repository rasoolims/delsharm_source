  سلام
  عالی مث قسمت های قبل
  ولی حیف شد اون پلی استیشین یا اکس باکس رو رد کردید
  شبیه دوچرخه تفریح و ورزش بود،  حالا میشه گفت که دوچرخه تفریح جسم و پلی استیشن یا اکس باکس ورزشی برا مغز هست
  سلامت باشید و موفق محمد صادق نازنینم ....
