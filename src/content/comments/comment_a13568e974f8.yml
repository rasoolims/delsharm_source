message: |-
  دوستان خوبم
  بیایید خدا را شکر کنیم که خداوند دشمنان ما را از احمقها قرار داد
  پیرو ارسال پست قبلی من با نام «کاش مسئولین هم بخوانند...»، مسئولین آن را نخواندند اما شماری از سایتهای معاند فیلتر شده مثل فریاد بی صدا و شیما بلاگ اسپات و ... با خواندن و حاشیه پراکنی راجع به آن سعی در مخدوش کردن چهره نظام ایران به خاطر کمبودهای بخش درمان و ... داشتند و آماروبلاگ ما  را به رشدی باور نکردنی رساندند و اسم کشوری نبود که در آمار وبلگ ما ثبت نشده باشه؛  از آمریکا و انگلیس و استرالیا گرفته تا هلند و سوئد و امارات! اما نه از سر دلسوزی برای آن بینوایان؛ بلکه از سرنردبان سازی به نام  آنان برای زیر سؤال بردن غیرت و حمیّت نظام اسلامی ایران!!! ...
  نظر شما خاری در چشم آنها خواهد بود ان شاءالله ... منتظرم...
