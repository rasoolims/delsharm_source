  سلام محمد صادق عزیز
  خیلی خوشحال شدم از اونور دنیا به وبلاگم (البته اگه بشه اسمشو گذاشت وبلاگ)سر زدی چند تا عکس جدید گذاشتم .
  ماه رمضانم هم بر شما و خانواده محترمت مبارک باشه
  امیدوارم که همیشه موفق باشی
