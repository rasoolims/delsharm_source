  سلام
  این جمله من رو به فکر فرو برد: "ولتر جهان را سیاه و خشن می‌بیند ولی در عین حال، راه حل را در کار و تلاش می‌بیند..."
  در ادامه از تاثیر افکار ولتر بر تمدن غربی نوشته اید. چرا مردم غرب چنین افکاری را پذیرفتند؟
  و چرا به نظر شما افکارش قابل اثبات نبوده جز با همین داستان عجیب  غریب؟
adminResponse:
  date: '2018-01-29T07:44:00Z'
  message: |-
    سلام
    این که چرا غرب (به معنای عام نه لزوماً به معنای آحاد غربی‌ها) این طوری فکر می‌کنند سؤال سختی است. جواب ساده‌اش شاید این باشد که تحت تأثیر فشار کلیسا از آن طرف بام افتاده‌اند (که مثلاً مرحوم محمد مددپور در یکی از کتاب‌هایش این مسأله را رد می‌کند و استدلال می‌آورد که تفکر جدید غرب را عده‌ای بورژوا از دل خود کلیسا راه انداختند چون این طوری از مطامع دنیوی بیشتری برخوردار می‌شدند.) خودم قبلاً فکر می‌کردم که کسی که به عدل خداوند یا حتی خود خداوند کافر است، لزوماً کارش منتج به خودکشی می‌شود ولی هم از دیدگاه تفکر فلسفی غرب هم در عمل می‌بینیم که برای آن‌ها از جهتی باعث رشد شده است (از جهتی البته). وقتی جهان را سیاه و ناقص ببینید و فکر کنید که این نظام احسن نیست، اجازهٔ تسخیر به خودتان می‌دهید (کاری که در عمل در سال‌های اخیر شده است مثل تغییر جنگل‌ها، تغییر آب و هوا، ساختن برج‌های بلند و ...). حالا این که همین اشتباهات پی در پی بشری چه تبعاتی برای آینده و حال بشر داشته (مثل جنگ‌های جهانی) و دارد (مثل فاصلهٔ‌ طبقاتی و مشکلات محیط زیستی مخصوصاً در کشورهای فرودست) بماند. به نظرم به همین دلایل، خواندن کتاب ولتر جالب است. این که گفتم که افکارش قابل اثبات نبوده به دلیل پی‌رنگ داستان است. در این داستان، اتفاقات اینقدر عجیب و غریبند (و البته تا حدی طنزآمیز) که اولین ایرادی که می‌شود گرفت این است که اگر قرار است این همه اتفاق عجیب و غریب بیفتد خب، یک نفر می‌تواند برعکس داستانی بنویسد با اتفاقات عجیب و غریب اما خوشبینانه و نقد خود ولتر را بکند.
