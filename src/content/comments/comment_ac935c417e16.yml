  سلام
  این جمله من رو به فکر فرو برد: "ولتر جهان را سیاه و خشن می‌بیند ولی در عین حال، راه حل را در کار و تلاش می‌بیند..."
  در ادامه از تاثیر افکار ولتر بر تمدن غربی نوشته اید. چرا مردم غرب چنین افکاری را پذیرفتند؟
  و چرا به نظر شما افکارش قابل اثبات نبوده جز با همین داستان عجیب  غریب؟
