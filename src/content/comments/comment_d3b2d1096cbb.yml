message: |-
  بسم الله
  در خیمه نشسته اند .. دوتایی .. چشمها بیشتر وقت به زمین دوخته شده .. از آن چشمهایی که خیره می شوند به نقطه ای و خیال می رود به سمت خاطرات ..  گاهی به هم نگاه می کنن .. آخرین شب است دیگر .. هردو خوب می دانند ...
  یک به یک خاطرات را مرور میکنند ..
  روز وفات حضرت رسول  .. شاید زجرآورترین لحظه ها، لحظه ای بوده است که حضرتش تقاضای کاغذ و قلمی می کند تا بنویسد، تا گمراه نشوند .. اما او را به از دست رفتن مشاعر  - نعوذبالله - متهم میکند .. اللهم العن الثانی .. خواهر شاید یادش نیاید .. آخر خیلی کوچک بوده ..
  شاید زجرآورتر از آن نگاه به چهره برافروخته ی مادر است .. که انگار عنقریب است که قالب تهی کند .. شاید هم چهره پدر .. از همان موقع غم غربت را در چهره ی پدر دیده بودند .. بد دردی است ..
  روزهای با مادر را هیچکدام توان بازگو کردن ندارند .. چون آخرش را نمی خواهند یادآوری کنند بهم .. فقط در ذهن خود مرور می کنند .. ذهن همدیگر را می خوانند!
  پدر .. پدر .. پدر .. چه روزهایی بود .. روزهای بی مادر .. ولی پدر بود .. پدر هم رفت .. چقدر آن شب اصرار کرده بود که به مسجد نرود ..
  .. خواهر دلش قرص است که با وجود شهید شدن پدر، دو برادر دارد .. مثل شیر .. نه .. سه برادر .. عباس جانم ..
  شاید همانموقع عباس وارد خیمه می شود .. به! چه حلال زاده .. لبخند لبریز از عشق بر لبان هردو می نشیند .. اجازه می گیرد برگردد و بیرون برود .. به رسم همان روزی که گرد بستر پدر نشسته بودند و عباس در کنار بچه های فاطمه مانده بود .. این بار هم با اجازه برادر .. سید و مولا .. می ماند ..
  این بار عباس می گوید .. از زمانی که بدن مطهر برادر را تیرباران کرده بودند .. خواهر در خانه مانده بود .. عباس نمیدانست چگونه باید به خواهر می گفت .. شرح ماوقع را .. و اینکه بدن برادر را در بقیع .. شاید نزدیکی های مرقد مخفی .. دفن کرده بودند ..
  صلی الله علیک یا رحمة للعالمین .. صلی الله علیک یا کریم اهل بیت .. این روزها را .. روزهای آخر صفر را .. قدر بدانید ..
