message: |-
  پیشنهاد دوستتون احمد جالب بود.
  از کانال کیوان این یو اس آ با وبلاگ شما آشنا شدم و معتاد این سفرنامه.
  هروقت فرصتی کنم اینجا رو باز میکنم و میخونم.
  تا حالا بیشتر چیزهایی که شنیده و خونده بودم(درباره آمریکا) از زبون غیر مذهبیها بوده ولی سفرنامه نوشته یک بچه حزب اللهی به نظرم خیلی جالب اومد.
  امیدوارم شما و همسرتون توی تحصیل و کارتون موفق باشین (البته هنوز قسمتهای بعدی رو نخوندم که ببینم خانومتون هم بالاخره وارد مقطع دکترا میشن یا نه)
  ضمنا چادر پوشیدن خانومتون اونجا برام واقعا حیرت انگیز بود. با اینکه خودم هم چادری هستم.
