message: |-
  پاسخ:
  سلام برادر
  همون طور که گفتم قصدم از نوشتن اون اتفاقات دلداری شنیدن نبود گرچه دوستان خوب دلداری دادند. قصدم بیان بخشی از واقعیت بود که کمتر گفته میشه.
  من مطمئنم که مشکل با آورده‌های امثال من حل نمیشه ولی من وظیفه دارم به کار خودم عمل کنم و بهترین شکل وظیفه‌ام رو انجام بدم. کار دیگه‌ای از دستم برنمیاد. نمی‌دونم شما هم مثل من فکر می‌کنی یا نه. اگر فکر می‌کنی اشتباه می‌گم ممنون می‌شم نظرت رو بگی.
  یا حق
