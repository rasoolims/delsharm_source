  راستی متاسفانه گوشی ام خاموش شد از جمکران عکس بگیرم. خیلی دیروز قشنگ بود، طوری که نمیشد دل کند.
  ولی این رو از مزار شهدا همون قطعه که به دنبالش بودم گرفتم. یاد شما هم کردم انجا.
  انشالله شهید دست همه را بگیرد.
