  خیلی غمگین به نظر می‌رسید...البته منظورم شما هستید!....این نیز بگذرد...توکل بر خدا کنید...البته بنده تردید دارم کاری که شما در پی انجام آن هستید در آینده از آن استفاده های جاسوسی نشود.نمی‌دانم ولی من اگر جای شما بودم بیشتر فکر می‌کردم و دلم را به کلاه‌های شرعی (به قول خودتان!) خوش نمی‌کردم. شاید ارزش انسانی انسان بسیار بیشتر از مدرک و اعتبار دانشگاهی آن مدرک باشد!...اینطور فکر نمی‌کنید؟
  والله اعلم
