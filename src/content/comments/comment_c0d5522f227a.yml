message: |-
  سلام
  درسته، قبول دارم که اونجا هم این خبرا هست و روش بحثی ندارم. بحثم اینه که اینجا هم خبر خاصی نیست. مثل همونجا، بل آب باشه شناگرای ماهرتری هم هستیم. اون احترام محترامایی هم که هست از رو منفعته. (خوب های استثنا هستن که تعدادشون خیلی کمه)
  اینو گفتم که خیلی دلتنگی وطنت اذیتت نکنه :-)
  با نظر مهرزاد موافقم. اگه لذت داستانی بودنش از بین نره، پرداختن موضوعی هم خیلی خوبه. بالاخره ما راضی به درد دست و بال شما نیستیم :-)
  یا علی
  علی یارت
