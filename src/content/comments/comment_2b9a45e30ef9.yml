  سلام صادق جان
  نمی‌دونم شاید دیدومون فنی شده! (البته همون‌طور که میدونی ما یه جورایی ادبیات فنی‌ها رو خوندیم!)، احساس می‌کنم استفاده از عبارت‌هایی مثل «چشم را نوازش می‌کرد» برای سفرنامه کمی تصنعی و زیادی شاعرانه‌س؛ یا این قسمت که «آفتاب بی‌جانی از سمت رودخانه‌ای که از پنجره‌های پشت مبل معلوم بود بر روی عسلی جلوی مبل می‌باری».
