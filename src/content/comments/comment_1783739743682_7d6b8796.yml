message: |-
  بسم الله
  سلام
  درسته ! اینم یه جهت دیگه از تشبیه دریاست . به خدا که از شدت ظهور .. یا من هو اختفی لفرط نوره / الظاهر الباطن فی ظهوره .. چون تعرف الاشیاء باضدادها .. و خدایی که ضد و غیر ندارد .. و ماهی ای که همیشه در اب غوطه ور است ............
  اما اینو قبول ندارم که :
  سراغ آب را هرگز
  نگیر و آب را تنها
  میان واژه‌های خیس و مبهوت خودت گاهی به یاد آور!
  که در دریا همیشه
  آب یعنی آب را هرگز ندانستن!
  مگه نه اینکه اون ماهی اخر جست و جو فهمید که تمام مدت توی مطلوبش غوطه ور بوده ؟ اصلا فرق مومن و غیر چیه ؟
  همه ی ادمها توی سطح ناخوداگاهشون خداپرست و موحد هستن . اما هنر مومن اینه که این اگاهی رو میرسونه به خوداگاهش .
  استادم می گفت ، خدا که یکیه ! پس موحد شدن یعنی چی ؟ماهی که همیشه توی آبه ... میگفت یعنی اینکه تو یگانه شو ! تو درک کن که همیشه توی آبی ... "و لکل وجهه هو مولیها " . برگردوندن کامل وجه به سمت خدا .
  البته اگه منظورتون رو درست فهمیده باشم .
  در پناه خدا .
