  سلام و درود به مصائق (همون محمد صادق) عزیز!
  خیلی وقت بود به وبلاگتون سر نزده بودم ولی توفیق شد بعد مدتها اومدم و سفرنامتون رو خوندم و تازه فهمیدم ایران نیستی!!
  در کل نوشته هات خوبه! یه پیشنهاد اینکه یه کم اعتماد به نفس داشته باش و یا اینقدر شکسته نفسی نکن. قضاوت رو بذار به عهده خواننده و این قدر از متن و عکسهات ایراد نگیر و تشخیص گیج بازی و بقیه قضایا را بذار به عهده خواننده. دوم اینکه نوشته هات با عکسهات یه مقدار همخوانی نداره، (البته توی یکی دو تا از پستا داره). مثلاً با دیدن عکسا میگم عجب بهشت گمشده و جای زیبایی ولی از نوشته ها میگم عجب خراب شده ای!!
  به هر حال لذت بردم از خوندن سفرنامت. امیدوارم تو دیار غربت زندگی بهت سخت نگذره، ایده آلهات کمرنگ نشه و در کل زندگی خوبی رو تجربه کنی. شادی و لذت و خوشبختی درون آدماست....
