message: |-
  سلام، جسارتا نقدی داشتم به برداشت شما از آزادی بیان.
  آزادی بیان به هیچ وجه به معنای گفت‌و‌گو نیست. این‌ها دو چیز جدایند.
  تا جایی که من متوجه می‌شوم آزادی بیان یعنی به خاطر بیان عقایدت زندان یا خشونت فیزیکی در انتظار نداشته باشی.
  مثلاً شما در آمریکا می‌توانید به هیئتتان بروید و به سخنان سخن‌ران گوش کنید -و او حتی به رئیس جمهور کشور بدترین فحش‌ها را بدهد- بدون آن که فردا در زندان باشد. این آزادی بیان است. نه این که بقیه مردم آمریکا باید به گفت‌و‌گو با آن سخن‌ران راضی باشند. این که سخن‌رانی با دین و عقایدی کاملا متفاوتِ حکومت توان تریبون داشتن دارد آزادی بیان است نه گفت‌و‌گوی حاکم و مردم با آن تریبون‌دار.
  در کشور دیگری اگر به حاکم بالای چشمت ابرو بگویی زندانی می‌شوی. این عدم آزادی بیان است. اگر آن بالای چشم ابرو گو معتقد به گفت‌و‌گو با طرف دیگر نباشد به معنای عدم باورش به آزادی بیان نیست. این ربطی به آزادی بیان ندارد.
