message: |-
  سلام
  استفاده کردم، هم از مطلب، هم بیشتر از کامنتها.
  یک فضولی هم من بکنم و نکته ای اضافه کنم، ما سابقه تاریخی رو هم نباید فراموش کنیم.
  در ایران چند صد ساله که عدم ثبات و حکومتهای ضعیف و بی قانونی داشتیم، عملا این فرهنگ ایجاد شده که فقط به فکر خودت باش و زرنگی اینه که حق بقیه رو بخوری و ...
  برعکس در غرب چند صد ساله که ثبات نسبی و حکومتهای قوی و تجربه تمدن سازی وجود داشته. و علاوه بر همه چیزهایی که دوستان گفتن، این امر یک فرهنگ جمعی و عمومی ایجاد کرده که در این طرف همچین خبری نیست.
  عملا هم ایران و شرق رو زیاد مذهبی حساب نمی کنم. بله فرهنگ مسلمین اینجا جاری هست، اما وقتی مذهب در زندگی نقش زیادی نداشته باشه عملا ما مذهبی نیستیم! وقتی افتخار بعضی اینه که « اون زورگیر عرق خور هم محرم و صفر که میشه کاراش رو تعطیل میکنه» و بقیه سال برمیگرده سر همون کاراش! معلومه نوع مذهبی که ما داریم چیزی نیست که خدا خواسته و دین نامیده!
