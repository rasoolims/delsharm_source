message: |-
  نبودی
  حاج آقا مجتبی رفت
  یادت کردیم
  با حسن -می‌گفت حاج آقا مجتبی بهت گفته نماز اول بخونی
  می‌خواستم پوسترش رو بگیرم اومدی تهران بهت بدم
  گفتم میای خودت می‌گیری
  سفرنامت رو خوندم دلم بیش‌تر تنگ شد
  خدا بیامرزدت گلیه مرد
  سلام ناشناس آشنا
  آقا مجتبی وقتی رفت حس کردم عزیزترین کسم رفت. من به گفتن‌هایش دل بسته بودم. اینجا شب و روزمان فرق دارد،‌ نماز شب اول قبرمان نمی‌دانم چگونه می‌شود.
  شب عاشورای ۸۷ را یادم نمی‌رود که وقتی گفت «امام حسین عاشق بود» و زینب نیز؛‌ ما رأیت الا جمیلا. هنوز هم لای کتاب درسی‌ام توی بلاد غربت کارت‌های حدیث با عکسش را دارم. هنوز هم یادم نمی‌رود که آن مرد بزرگ در محرم ۸۹ شروع کرد به خواندن شعری معروف با صدای دلنشین خودش:
  کاخ‌سازها و گنج داران کجایند؟ دنیا به تو نشان نداد؟! به خوبی به تو نشان داد و در هر عصری هم این چیزها را می‏بینید. قرآن می‌گوید: فرعونیان کجایند؟ برای این در مورد فرعونیان بحث می‌کند که شاید چون از نظر باستانی قدیمی‌تر از اهرام مصر که بقایای آنها است وجود ندارد. قرآن به سراغ آن می‏رود که همه می‌توانند بفهمند.
  به مصر رفتم و آثار باستان دیدم
  به چشم دیدم آن‌چه در داستان دیدم
  بسی چنین و چنان خوانده بودم از تاریخ
  به چشم آن‌چه شنیدم ز داستان، دیدم
  من خفتگانِ در دلِ خاک را دیدم
  تو نقش قدرت و من نقشِ ناتوان دیدم
  تو تخت دیدی و من بختِ واژگون از تخت
  تو صخره دیدی و من سُخره زمان دیدم
  تو تاج دیدی و من تختِ رفته بر تاراج
  تو عاج دیدی و من مشتی استخوان دیدم
  تو سکه دیدی و من در رواجِ سکه سکوت
  تو حلقه و من حلقه بی‌نام و بی‌نشان دیدم
  همه رفتند؛ شما بر سرِ چه چیز دعوا می‏کنید؟ ریاست؟ پول؟ همه رئیس‌ها و پول‌دار ها رفتند و تمام شد علی(علیه‌السلام) اینها را می‏گوید: «أین أهل مدائن الرس الذین قتلوا النبیین و أطفؤوا نور المرسلین‏» کجایند اهل شهرهای رسّ که انبیاء را می‌کشتند و به دنبال خاموش کردن نور پیغمبران بودند؟ یزیدیان کجا رفتند که می‏ خواستند نور هدایت را خاموش کنند؟!
