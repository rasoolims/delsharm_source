  سلام اقا رسولی
  اول که دیدم نمی نویسید واقعا میگم دلم گرفت چون خیلی عادت کرده بودم.
  ولی خوب در صورت هر چه خیره امیدوارم مشکلتان حل بشود واقعا سخته زندگی در کشور دیگه.
