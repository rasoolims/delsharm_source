name: حسین
date: '2119-03-12T11:28:00Z'
message: |-
  فراتر از سخن شما این که چنین موضوعاتی را ابتدا
  باید زندگی کرد و سپس اگر قریحه ای بود برای دیگران نقلش کرد. اگر داستایوسکی چنین گیرا
  شخصیت و رفتار راسکلنیکوف را در پنجه کلمات اسیر می کند و در زرورقی به خواننده می
  سپارد و
  خواننده انگار
  که تنها باید زرورق را باز کرده و شکلات را گوشه لپش بگذارد تا آب شود،
  به این دلیل است که او چنین موقعیت هایی را زندگی کرده است حال
  استعداد نویسندگی هم به کمکش آمده و نهایتا چنین شاهکاری خلق شده. اولین خصیصه
  نویسنده باید این باشد که قد و اندازه خود را بشناسد و اگر نه با دیگران که با خود
  صادق باشد.
