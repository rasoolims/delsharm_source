message: |-
  سلام صادق.
  باز گفتی بوستان مرکزی و من یاد هولدن افتادم و مرغابیا.
  با توصیفاتی که از استادتون می‌کنی یاد ... می‌افتم. عکس‌ها هم کامل لود نشدن تا کیف کنم. ولی یک بار که پس‌زمینهٔ سایت بینگ عکسی از سنترال پارک بود واقعاً تعجّب کردم که کنار این آسمان‌خراش‌های بلند این جنگل رو خط‌کشی کردن.
  در هر حال، مطمئنّم که برآیند این سفر مثبت خواهد بود و چمدان وجودت سنگین.
