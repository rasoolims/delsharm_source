message: |-
  مگر خداوند حضرت آدم را از آب ساخت؟
  مگر اینکه شما مفهوم شعر را نگرفته باشید.
  و این دو بیتی نه مال شماست نه مال من. که اجازه داشته باشیم اینقدر دیگرگونش
  کنیم.توضیح بیشتر در پستم نوشتم.
