message: |-
  سلام. تشکر از مطالب عالی و قلم روان شما.
  ای کاش تو نوشته هاتون به تفاوت ها بیشتر بپردازید. مثلا شما سفرنامه رو به عنوان یه روال عادی دارید روایت می کنید اما حتما توجه دارید خیلی از این مسائل برای یک دانشجوی ایرانی بهت آوره. مثلا قرار گذاشتن با استاد تو یه کافی شاپ یا رستوران، کارآموزی که هم بلیط هواپیما کل خانواده رو میده هم مسکن هم حقوق (مثلا توضیح بدید کاری که شما انجام میدید چه ارزش افزوده ای واسه شرکت داشت که اینقدر هزینه کرد). شما با توجه به اینکه تا مقطع ارشد ایران بودید میتونید گریزی در خلال نوشته ها بزنید و همچین مسائلی که تو ایران عجیبه بیشتر توضیح بدید البته با توجه به قلم عالی شما، قطعا داستان از سیر خودش دور نمیشه...
  ممنون
