message: |-
  سلام مم صائق
  دیگه چه خبرا؟ بقیه اش را بگو!
  ما منتظریم!
  راستی حرفهات جالبند اما خودت هم قبلا گفتی توجیه بر نگشتن فقط یک توجیه است و البته به رئیس شرکتت هم قول برگشتن دادی یادت نره ها!
