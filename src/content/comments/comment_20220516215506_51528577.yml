  سلام آقا صادق. نمی دونم من رو یادتون میاد یا نه اما تو علم و صنعت سال 88 اتاق تون بقل اتاق ما بود،طبقه 4 فکر کنم بلوک 3 ! شماره اتاق یادم رفته! حاجی من از طریق اسماعیل خوانین زاده با وبلاگت آشنا شدم، میشه آدرس ایمیلت رو برام بفرستی، چندتا سوال از خدمتت دارم. لطف می کنی.
  آدرس ایمیل همونیه که در قسمت ایمیل آوردم.
