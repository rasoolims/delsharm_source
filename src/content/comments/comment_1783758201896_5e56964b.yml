message: |-
  مفید و موثر و دلنشین
  سلامت باشید و موفق
  آقا محمد صادق نازنینم ...
  نوشته و شعرها و ذکر های تو در دلشرم
  همچو دوا و مرحم هست برای روح
  و یاد میگیریم
  سربلند و موفق باشی
