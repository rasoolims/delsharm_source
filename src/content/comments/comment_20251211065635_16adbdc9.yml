  برادر عزیز، گفتی این جملات رو رهبری نگفته. متن صحبتای رهبری در جمع مردم گرمسار که متن اون جملات رو ازش نقل کردم در تاریخ ۲۱ آبان ۸۵ ایراد شد که میتونی توی این لینک ببینی : http://leader.ir/langs/FA/index.php?p=bayan&id=3344
  ضمنا متن صحبتای دیگه رهبری درباره مذاکره با آمریکا که چهارشنبه ۲۶ اردیبهشت ۸۶) ایراد شد رو هم میتونی اینجا ببینی :
