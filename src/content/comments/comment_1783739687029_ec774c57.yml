message: |-
  سلام
  انگار قرار شده با هر مطلب جدیدی یک تسلیت بنویسیم
  آیت الله فاضل لنکرانی هم رفت امّا آن کس که باید نیامد
  اللهم عجل لولیک الفرج و العافیه و النصر واجعلنا من انصاره و اعوانه و المستشهدین بین یدیه
  یا حق
  دلشــــرم
