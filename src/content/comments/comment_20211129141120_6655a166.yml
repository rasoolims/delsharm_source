message: |-
  برادر چشمت را درویش کن نمی دونم خانمت چطوری اجازه میداد زل بزنی به خانم ها
  حالا شوخی گذاشته خیلی خوب بود تا حدی تونستی مسائل مربوط به میرو را بروسونی
  فقط یک سوال
  منطقه ای که سوار شدی شبیه جنوب شهر خودمان نیست
  مثلا رفتار در مترو تجریش ممکن اشت با شهر ری فرق کنه؟ نظرت چیه؟
  یا علی
  سلام
  منطقه‌ای که ازش گرفتم خیابان 42 و میدان تایمز یکی از گران‌ترین و معروف‌ترین خیابان‌های نیویورک است.
  این هم یک عکسش
