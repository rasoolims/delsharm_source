message: این دوست کره ای اگر موعد خدمت ش برسد چه می شود؟ گذرنامه ش باطل می شود؟ بعد
  چه می شود؟ از آمریکا اخراج می شود؟ ابزار فشار کره برای برگشتن از آمریکا چیست؟
adminResponse:
  date: '2115-11-09T07:20:00Z'
  message: گذرنامه‌ها اعتبارشون محدوده مثلاً ایرانی‌ها ۵ ساله است. خب وقتی اعتبارش
    تموم بشه باید تمدید بشه و وقتی تمدید نشه یعنی طرف رو هواست!
