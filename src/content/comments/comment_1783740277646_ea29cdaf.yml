message: |-
  سلام
  بعدشم تو این فیلمه که گذاشتی نه کسی شلوارک داره نه چیزای دیگه. مرداشون که مثل خودمونن زناشون هم فقط یه لته رو سر کم دارن. اسکل کردی ما رو؟؟
  ما مث صدا و سیما فیلمهای زمستونی رو رو می‌کنیم. فیلم واسه زمستونه.
