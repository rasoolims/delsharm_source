  بسم الله..
  سلام!
  با تاخیر فراوانی آمدم!
  قلم بسیار روانی دارید و از خواندن مطالب شما لذت می برم
  اما چیزی که در نظر اول شاید خواننده رو منصرف کنه از دنبال کردن مطلب طولانی بودن مطلبه، تا حد امکان خلاصه تر نوشتن یا کوتاه نویسی و مکرر نویسی هم میتونه جلوی این مساله رو بگیره!
  البت الان هم خیلی خوبه :)
  موفق و پایدار باشید
  یاعلی
  ــــــــــــــــــــــــــــــــــــــــ
