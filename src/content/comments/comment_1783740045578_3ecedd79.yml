message: |-
  با سلام مجدد و ممنون از جوابت
  یعنی به عبارتی نوعی ریخت شناسی لغات را انجام می دید و بر اساس لغات موجود لغات جدید را می سازید. مانند ریشه یاب اشتقاقی.
  اما یک سوال دیگه
  شما روشی مستقل از زبان می خواهید ارائه کنید. اما با این کار تا حدی وابسته به زبان می شوید. مگر اینکه بخواهید از طریق ویژگی های صوتی و درک معنا و کلمات الگوهای فرا زبانی بخواهید ایجاد کنید که بدون نیاز به زبان مورد نظر بتوانید کلمات جدید تولید کنید یا نه از ویژگی های بالا استفاده می کنید ولی همراه هر زبان جدید یک پیکره مربوط به آن زبان با ویژگی هایی که تتعین می کنید باید به شما بدهند؟
  هنوز اوایل کار هستیم. ولی نکته این هست که بدون داشتن شناخت زبان هیچ درکی وجود نداره و خیلی کار سخت میشه. به خاطر کوچک بودن داده یادگیری و بدون برچسب بودن داده (فقط یک مشت کلمه بدون هیچ اطلاعات دیگری) مجبوریم ساده‌ترین شکل ممکن رو برای ساختار درونی واژه‌ها در نظر بگیریم. به همین خاطر دقت بسیار پایین هست ولی واقعاً‌ بهتر از این هم نمیشه کاری انجام داد. همین که فراخوانی موتور جستجوی کلمات کلیدی در شبکهٔ گراف جستجو بره بالا کافیه.
