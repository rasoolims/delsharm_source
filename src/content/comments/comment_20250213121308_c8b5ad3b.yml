message: سلام آقای رسولی اگر بخواهید درباره مهاجرت به آمریکا به کسی توصیه ای داشته
  باشید، به چه مطالبی اشاره می کنید و اینکه مهاجرت شما به آمریکا چقدر در پیشرفت شما
  در زندگی در تمام ساحت ها، به شما کمک کرده است؟
