  شاعر فوق العاده ای هستید.بی تعارف!اگرچه بیت یکی مونده به آخر یه مقدار سکته ی وزنی داره به نظر.
  من هیچ وقت آمریکا نرفتم و نمیدونم اینکه کلیساها پره راسته یا نه.ولی تعریف "مذهبی"بودن این نیست.یه نفر ممکنه هرهفته که نه هر روز بره کلیسا چنان آوازی بخونه که صد تا شجریان به عمرشون نخوندن ولی توی حیطه ی زندگی شخصی و حرفه ایش هیچ عقیده ای هیچ محدودیت و باید ونبایدی براش ایجاد نکنه.این آدم "مذهبی" نیست چون رفتارش تحت تاثیر مذهب نیست.توی غرب دینو از بین نبردن.چون به قول جامعه شناسای غیر مارکسیست دین سیمان اجتماعیه و کلی فواید داره اما در سطح فردی.توی غرب دین رو محدود کردن به آواز خوندن یکشنبه ها تو کلیسا ولی توی محیط حرفه ای فقط سوده که معنا میده.دلیل اهمیت به بیت المال و  این طور چیزا هم بیشتر قانون و نظارت کار آمده و عدم رعایت این قانون ممکنه "سود" افراد رو تحت تاثیر بذاره پس رعایتش میکنن.توی ایران هم اگرچه ظاهری مذهبی داریم ولی فکر نمیکنم اصلا آدمهای مذهبی باشیم.شاید اول انقلاب این جمله صدق میکرد و عملا هم میدیدیم مردم چقدر اخلاقی عمل میکنن ولی الان اونقدر از خود بیخود شدیم  که...
  تنها فرق ایران و آمریکا در اینه که اینجا به جای اخلاق و مذهب،هنوز قانون جانشین نشده پس ما آدمهای منفعت محور دلیلی برای رفتار اخلاقی یا قانونمند نمیبینیم.
  ببخشید بابت پرحرفی!
