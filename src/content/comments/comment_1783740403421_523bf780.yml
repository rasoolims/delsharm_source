name: ردایی موسی
date: '2022-12-24T18:40:00Z'
message: |-
  سلام
  تا حدی دکتر موثر و تخصصی ذکر داشتید. یک سوال برا MA ایالت ماساچوست ؟
  و یک Unknown در مطالب و موضوعی در متن نامشخص بود و متوجه نشدم شکل Challenge شد
  تا حدی خرید خانه و مسائل فرهنگی و اعتقادی و اقتصادی و شغل و کار در Massachusetts و ایالت های نیوانگلند منتهی به کانادا رو آیا بررسی داشتید و میتونستید مث کالیفرنیا و نیویورک و پن و نیوجرسی و...  ذکر و بیارید ؟
  تا حدی تخصصی و خوب و موثر بوده این جزییات خرید خانه در بعضی از ایالات آمریکا و ولی فارغ از قیمت و پارامترهای اقتصادی و اجتماعی دیگه انگار مقداری تردید داشتید در خریدن و منظورم بیش از حد احتیاط
  پنداری که میخوام بیام به ایران و برمیگردم و نه اینجا در ایالات متحده مدتی بیشتر ساکن هستم
  منظورم اینه که از شکل Mental health آماده نبودید و این تاثیرگذار بود و بعد که منتهی به استخاره شد
  دکتر من متوجه نشدم این استخاره رو
  و استخاره که معنا پیدا نمیکنه
  [ روشن تر یاد واقعه ای بامزه بودم و مثال استخاره مثال فال شد که آذر ۱۴۰۰ که انسانی نازنین یا عزیزی که به هیچی اعتقاد نداشت استوری شکل سوال گذاشت در اینستاگرام و پرسید که چه کسی میتونه فال ترک قهوه بگیره و در جواب نوشتم به زبان فارسی که ابتدا نیت میکنید و بعد از ذکر چند مرحله به زبان انگلیسی و تخصصی گفتم می رسید به اینکه همه اینها نشان از، ترس و اضطراب و تردید و... هست تا متوجه شه و اخر داشت تعمیم میداد که این نوعی از استخاره هست. بهشت و جهنم و آخرت و دنیا رو قبول نداشت ولی به استخاره و فال اعتقاد راسخ]
  حالا اینجا در ریشه دینی استخاره برا خرید خانه حتما ارتباط معقولانه ای یافتید نمیدونم.
  در موضوع خرید خانه نکات ویژه ای بود.
  برا کانادا رو کاملا درست فرمودید و بحرانی تر از چیزاست و افزایش قیمت ها در زندگی روزمره رو اضافه کنید.
  در ایران که همه چی رو هواست و اقتصاد وجود نداره و باید هفتگی برنامه ریزی کنید.
  اقتصاد دانش مهمی هست که غافل شدیم
  هر چند دکتر و پزشک و مهندس و خلبان و کشاورز و معلم و در هر فیلد تخصصی باشیم و هر چه قدر جامعه و جوامع ناپایدار باشند و همه چی Stable نباشه این دانش نیاز به گسترش هست.
  سپاس دکتر رسولی آقا محمد صادق عزیز و نازنین
