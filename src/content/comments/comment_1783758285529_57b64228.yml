message: |-
  سلام عزیز وبلاگ خوب وقشنگی داری من که خیلی خوشم امد  امیدوارم همیشه موفق وکامیاب باشی توی همه ای ارسه ها  راستی من هم وبلاگ دارم اگه دوست داشتی یک سری هم به ما بزن  اگه دوست داشتی من رو با نام تنهایی وحید لینگ کن وخبرم بده تا شمارو با چه نامی بلینگم شاید در وبلاگ نویسی بتوانیم دوست های خوبی باشیم
  به امید دیدار دو باره بای عزیز
