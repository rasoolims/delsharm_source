  سلام ببخشید من هم کتاب پایی که جا ماند رو خوندم و و اقعا لذت بردم، درباره طرح جلد فکرکنم بیشتر منظور حالت اسارت و زندانی شدن نویسند مد نظر است، اما منم فکر می کنم زیاد طرح زیبایی نیست، درباره ضعف های آشکار زبانی و روایی میشه بیشتر توضیح بدین منظورتون چیه...
  ممنونم
adminResponse:
  date: '2019-01-01T07:31:00Z'
  message: |-
    سلام
    در مورد طرح جلد، به نظرم این یک مجموعه طرح جلد شبیه به هم از سوره مهر هست که به نظرم هیچ کدام زیبا نیستند. مثل این: https://www.ketabrah.ir/img/l/7813133169570520.jpg
    زبان کار سست و جاهایی بیش از حد پایین‌تر از حتی سطح روزنامه‌ای است. از نظر فنون روایت خاطره هم ضعف‌های آشکار تکنیکی وجود دارد. اینجا جای ویراستار حرفه‌ای خالی بود. با همهٔ این وجود این کتاب خیلی خواندنی و زیباست و دلیلش صداقت و بی‌تکلفی نویسنده است.
