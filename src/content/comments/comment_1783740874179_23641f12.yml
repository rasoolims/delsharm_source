message: |-
  1-سلام
  2-وزنش یکی از اون 2-3 تا وزن خداست که من خیلی دوسش دارم
  و اما بعد:
  3-توی بیت دوم تلاطم با فعل شد زیاد جالب به نظر نمیاد شاید با "کرد" هم معنی بهتری بده هم مخاطب غافلگیر شه و در حالی که انتظار شد داره چیز دیگه ای ببینه
  4-توی مصراع دومش هم این "جان از پی جانم"در حد قافیه هی یاس و احساس و عباس کلیشه ای به نظر میرسه
  5-بیت بعد خیلی خوبه! فقط فکر کنم با "دو چشمانت"جای "دو چشم تو" کوبش وزنش باحال تر میشه
  6- به بی سوادی م نخندیا! ولی صادقانه میگم:بیت آخرو نفهمیدم!
  7-شاید وقتی دیگر...
