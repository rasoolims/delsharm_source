message: سلام آقای دکتر، امیدوارم حالتون خوب باشه! شما نسخه‌ی چاپی این کتاب‌ها رو
  تهیه می‌کنین؟ می‌شه بگی کجا می‌شه با قیمت مناسب تهیه کرد (ساکن بوستون هستم)؟ راستی!
  نمی‌دونم یادتون هست یا نه ولی من قبلاً در یک سلسله ایمیل با شما در مورد اپلای و
  ازدواج صحبت کردم! خواستم بگم اومدم! پیشاپیش ممنون از پاسختون.
