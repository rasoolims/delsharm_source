date: '2116-09-15T22:56:00Z'
message: |-
  این شعرتون تو سبکی هست که دوست دارم. بسیار خوب بود.
  البته شاید جاش نباشه ولی مصرع زیر با یه (ای) روانتر نمیشه؟ البته ببخشیدا، قصد جسارت ندارم. فقط میخوام چیزی یاد گرفته باشم. ممنون
  خود را ز من دریغ مکن (ای) آفتاب جان
  بی‌روشنای هستی تو هیچ نیستم
adminResponse:
  date: '2116-09-16T04:31:00Z'
  message: |-
    سلام
    خیلی ممنون از لطف شما. اگر وزن دو مصرع را تقطیع هجایی کنید (با کمی اغماض و اختیار شاعرانه) به تقطیع زیر می‌رسید (- علامت بلند و U علامت کوتاه، برای هجای کشیده از -U استفاده می‌کنیم):
    --U-U-UU--U-U-
    --U-U-UU--U-U-
    که اگر هجای «ای» اضافه بشه، یک هجا بیرون می‌زنه که باعث بدوزنی شعر و سکته می‌شه.
