message: |-
  سلام. ممنون از وقت و زحمتی که می‌ذارید. این یادداشت‌ها و خلاصه‌ها ارزشمند هستن و متوجهم که وقت زیادی هم ازتون می‌گیرن. خواستم تشکر کنم.
  یک سوالی درباره بخش به اصطلاح «فاین‌تیونینگ» داشتم. منظور این کتاب این بود که اگه ثوابت تغییر می‌کردن «این جهان» وجود نمی‌داشت یا کلا هیچ جور جهانی(به هر صورت قابل تصور) قابل بودن نبود؟
