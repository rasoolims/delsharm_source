  برادر این قسمت "در شرماشرم حضور تو" رو مثل این که خیلی دوست داری. چند بار تو چند تا شعرت ذکر کردی! یک چیز بگم جیغت در بیاد، این تو کیه؟
  - آخه من چی بگم؟ تو توئه دیگه! پرسیدن نداره!
  - شاید کار ما این است    ..... که در افسون گل سرخ شناور باشیم
