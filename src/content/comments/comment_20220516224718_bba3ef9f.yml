  سلام
  به نظر می رسه یه قسمتی از متن این فصل رو حذف کرده باشید. آخه کامنت ها راجع به بخشی هستند که توی متن نیست!
  این که از اصطلاح بین التعطیلین استفاده کردید جالب بود، حالا هر وقت اینجا دانشگاه رو به خاطر آلودگی هوا تعطیل کنند کمتر ناراحت می شیم!
