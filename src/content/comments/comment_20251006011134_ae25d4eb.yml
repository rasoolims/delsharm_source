  سلام دوست عزیز
  عیدتون مبارک باشه. خیلی ممنون که وقت می‌گذارید و مطالب بنده رو مطالعه می‌فرمایید. امیدوارم مشکلات موجود در متن و فرامتن مطالب بنده رو به بزرگی خودتون ببخشید.
  از نظر من یک موضوع و موضع در نوشتن باید وجود داشته باشه و باید سعی بشه که همهٔ مسائل عالم رو در یک نوشته مطرح نکرد. هدف از کل مطالب تحت عنوان «همسفر شراب» بیان برداشت‌های شخصی من از آمریکاست. لذا هیچ دلیلی بر ایراد گرفتن از وضع ایران در خاطرات آمریکا ندیدم. به همین خاطر نیازی به یادآوری چیزی که ایرانی‌ها به چشم می‌بینند نمی‌دیدم (یعنی مشکلات اظهر من الشمس در نابه‌سامانی ایران). همان طور که از مطالبم برمی‌آید سعی‌ام بر نشان دادن زاویه‌ای بوده که کمتر از زبان ایرانی‌های غرب گفته شده است. حالا اگر به نظرتان با واقعیت تطبیق ندارد، جای بحث دارد. سعی‌ام بر آن بوده که صداقت را سرلوحهٔ کار قرار بدهم. در نوشته‌هایم از خوشی‌ها و امکانات و خوبی‌هایی که در امریکا چشیده‌ام گفته‌ام از جمله همین نوشته در مورد موقعیت‌های ناب شغلی (اگر اعداد حقوقی که به امثال من پیشنهاد می‌شود بگویم، دود از سر خیلی‌ها بلند می‌شود و همهٔ حرف‌های من را به کناری می‌نهند و صرفاً به امید چنان حقوقی همهٔ تلاششان را برای آمدن به آمریکا می‌کنند)
  در متن نوشتم ولی احتمالاً به همان دلیلی که فرمودید، یعنی نیمه‌خواندن مطلب، درنیافتید. ان‌شاءالله عازم کالیفرنیا هستم برای آمادگی برای شروع کار در فیس‌بوک هر موقعی که کار ویزایم درست شود.
  التماس دعا
