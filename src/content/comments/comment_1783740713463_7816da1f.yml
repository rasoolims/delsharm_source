  … مادر جوانی در اثر اصابت ترکش به سرش روی آسفالت خیابان افتاده بود …
  به بهانه روز جهانی شیر مادر؛
  داستان نایاب ترین و متبرک ترین شـیر دنیا را بخوانید…
