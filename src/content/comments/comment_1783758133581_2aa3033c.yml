message: |-
  سلام...
  هیچگاه گریه نکردم بر رهایی یه انسانی...که رهایی را سروری دیگر است... که تولد
  روباره بر او مبارک...آنهم تولدی بدون درد و بدون رنج... که خوش تولدیست.
  یا علی
