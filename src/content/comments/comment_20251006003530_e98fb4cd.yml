  بسم الله
  سلام ..
  .
  چشمان کودک
  پرسشی داشت
  از اعماق نمور و خاک کرده ی من
  : " چه چیز در وجود تو اینسان قلب شده ؟
  که من
  همچو تصویری کمرنگ و مات
  دیده ات که هیچ ..
  لااقل چشم تو را جلب نمیکند ؟!!
  .
  در پناه خدا
