  اگر به جای اینکه اینقدر بنویسی از کجا به کجا پیچیدی و بخوای منظره رو توصیف کنی یک عکس از نقشه گوگل بذاری یا حتی بهتر خود نقشه گوگل رو بذاری خیلی بهتره.
  بعد طرف اگه خواست می‌تونه بره اونجایی که تو نقشه گوگل مشخص کردی و اگه ‫اینترنت خوبی هم داشت از Google Street View برای دیدن تصاویر از دیدگاه تو استفاده کنه
