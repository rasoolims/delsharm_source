message: |-
  زمین وامانده نفرین انسان هاست هر جایش.
  دعا کن آسمانش آبی و روشن بود ای دوست.
  گمانم هر کجا باشی،دلت گر باز باشد همچو قلب مرغ دریایی
  برایت آسمانش جاده ای تا انتها دارد.
  دلم گر باز باشد... ولی اینک دلم تنگ است
