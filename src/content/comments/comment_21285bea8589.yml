  سلام صادگ
  این جلال هم حلال زاده است. آنجایی که اتاق کنفرانس آزمایشگاه را شرح میدادی با خودم گفتم صادق بدجوری داره ادای جلالو در میاره. دو خط پایینتر دیدم خودت هم یادی از آن مرحوم کردی
