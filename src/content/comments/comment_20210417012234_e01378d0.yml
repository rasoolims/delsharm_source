  سلام صادق!
  انشاءالله الآن دیگه حال شما و همسرتون خوب خوب باشه.
  برداشت من از این قسمت این شد که در ینگهٔ دنیا اگه راه و رسم هر کاری رو بلد نباشی حسابی تو دردسر می‌افتی. در مورد گوگل هم از الآن دارم تصوّر می‌کنم زیر پست بعدی وبلاگ فارسی گوگل اسم تو خورده باشه :دی
