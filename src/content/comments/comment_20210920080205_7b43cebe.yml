  سلام
  خیلی ممنون که مطالب بنده رو مطالعه کردید.
  در جواب صحبت اولتون، حرفم این بود که انتهای بسیاری از کارهای اصطلاحاً علمی ما برای مصرف، سرگرمی، غفلت و بسیاری اوقات کارهای نظامی غیرانسان‌دوستانه به کار می‌ره. حرفم به این معنا نبود که مثلاً سطح علمی کار در جاهایی مثل فیس‌بوک پایین هست. مخصوصاً در سطح پژوهش کاربردی که کار ماست، ما عملاً همان پژوهشی را می‌کنیم که یک دانشگاهی می‌کند با این تفاوت که بیشتر تمرکز بر روی محصول است تا مقاله‌نویسی. رشتهٔ ما مهندسی است و اصل هدف ساختن محصولات مهندسی است.
  در جواب صحبت دوم شما، فارغ از گزاره‌هایی که آوردید و باهاش موافق نیستم، راه حل جامع اگر باشه به نظرم بزرگان اخلاق و دین گفتند و من کسی نیستم که راه‌حل جامع بدهم. به اصطلاح، کل اگر طبیب بودی...
  اما اگر منظور شما حفظ پاکدامنی است، ازدواج به نظرم اتمام حجت است وگرنه که تیر شیطان در هر جای عالم در کمین است، حتی در پرت‌ترین روستاهای جهان، به لطف اینترنت می‌شود به پست‌ترین مطالب اخلاقی در کمترین زمان ممکن دست پیدا کرد. به نظرم، مسألهٔ اصلی این هست که فضای غرب این مسائل رو قبیح نمی‌دونه ولی الحمدلله هنوز در فضای ایران، حتی در تهران، بسیاری از مسائل هنوز از دید جامعه قبیح شمرده می‌شه و به همین خاطر حتی به بهانهٔ حیا از اطرافیان، گاه انسان بیشتر حفظ حرمت می‌کنه.
  موفق باشید
