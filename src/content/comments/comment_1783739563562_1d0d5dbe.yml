  سلام برادر
  امیدوارم در حال حاضر حس و حالت به همین صورتی که تو این متن آوردی نباشه. نکات جالبی رو تو متن هات می گی که زاویه نگاه جدیدی داره.
  در خصوص نحوه ارتباطت با سایر افراد هم بنویس. تا حالا با کسی در حد ارتباط خانوادگی ارتباط برقرار کردی؟
