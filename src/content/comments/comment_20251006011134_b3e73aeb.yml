  سلام علیکم
  نخست آن که به خاطر پیدا کردن آن عدد مورددار باید از شما تشکر کنم. واقعیتش موقع فیش‌برداری از آن کتاب در جایی نوشته بود که ۴۰ درصد پایین جمعیت آمریکا در تنگنا و استیصال در تأمین زندگی هستند (desperate straits) که معلوم نیست به چه علتی همان موقع که خوانده بودم آن را اشتباه یادداشت‌برداری کردم. شما به خاطر آوردن اصطلاح poorest 40% of the population بوده است که موقع خلاصه‌برداری آن را با مفهوم فقر مطلق اشتباهی گرفتم. متعاقب تذکر شما، مطلب را تا حدی که فرصت اقتضا می‌کرد تصحیح کردم که برای بزرگوارانی چون شما سوءتفاهم ایجاد نشود.
  این که فرمودید بنده به عنوان یک دانشگاهی باید دقیق صحبت کنم درست است اما با توجه به این که ماهیت وبلاگ‌نویسی مطالب ابن‌الوقتی و بدون ویرایش فنی است این جور اشتباهات پیش می‌آید. دوباره از شما عذر می‌خواهم.
  در مورد سوگیری مطلب که فرمودید، متوجه منظورتان نشدم. آیا کسی در این عالم هست که نسبت به اطرافش بدون جهت‌گیری باشد؟ اصل حرفم بر این است که آمریکا با شکاف طبقاتی بسیار عمیقی مواجه است، فقر در آن بیداد می‌کند و از زمانی که جهانی‌سازی باب شده است، روز به روز وضع کارگران آمریکایی بدتر شده است. این مطلب یک واقعیت اصطلاحاً کف بازار است که آمار و ارقام مختلف آن را تأیید می‌کند. کتابی که شما فرمودید بی‌ربط است برای بیان مطلب بنده چندان هم بی‌ربط نبوده است. بنده مقالهٔ اقتصادی ننوشته‌ام که بیایم به یک مقالهٔ اقتصادی یک مجلهٔ معتبر ارجاع بدهم. کتاب مذکور از سوی یک استاد سابق ریاضی و پژوهشگر شرکت‌های سرمایه‌محور نوشته شده است و در انتهای کتاب به مقالات مرتبط نشریاتی مانند نیویورک‌تایمز ارجاع داده است.
  ممنون
