message: سلام، مثل همیشه عالی بود. یکبار توی پیام‌ها پیشنهاد نگارش خاطرات‌تون در قالب
  کتاب داده بودم که باز هم اصرار به این پیشنهاد دارم. اگر نگارش شما منظم تر بشه (ناگفته
  نماند که همسفر سراب از همسفر شراب خیلی منظم تر نوشته میشه) مثلا اول هر ماه و وسط
  هر ماه مخاطب‌های شما هم فعالانه تر مطالب دنبال میکنن.
