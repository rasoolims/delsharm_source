  سلام وقت بخیر
  تا اونجا که من میدونم شما به عنوان دانشجو رفتین آمریکا و بعد از دکتری جذب فیس بوک شدین. میخوام ببینم میشه تو شرکت های معتبر آمریکایی جور دیگه ای هم استخدام شد؟ مثلا از طریق مصاحبه ی آنلاین یا فرستادن رزومه کاری؟
  سوال بعدیم اینه که فضای حرفه ای و علمی تو شرکت های آمریکایی رو به نظر شما میشه تو ایران پیاده کرد یا به علت نیاز به سرمایه ی بالا و جمع کردن استعدادهای برتر جهان و ... اصن چنین استعدادی فعلا تو ایران مهیا نیست؟
