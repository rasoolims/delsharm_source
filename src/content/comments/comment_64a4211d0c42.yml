message: |-
  سلام آقا صادق
  خوب بود برادر
  البته از نظر من بعضی جاها را خیلی توضیح میدی
  شاید هم سبک سفرنامه نویسی باشه که ما ازش سز در نمی آریم
  منتظر مطالب بیشتر در مورد دانشکده و فرهنگ مردم نیویورک هستم
  یا علی
