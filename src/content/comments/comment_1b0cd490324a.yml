message: |-
  البته ممکن است در بعضی ها آنقدر رسوخ کرده باشد که استثناء بشه، یعنی اگر فرض کنیم طرف اعتقادی به اخلاق توحیدی نداشته باشد، ممکن است استثنائاتی باشد که خود رعایت حق دیگران برایش ملکه شده باشد، وگرنه جوری دیگر می توانی این را توجیه کنی؟ در شمن میشه چند نوع اسثناء را هم بیزحمت بگی؟
  مصداق خاصی در نظرم نیست. همین که بالاخره فرض کن دو تا راننده با هم کل بیفتند و احساساتی شوند و الخ. ولی حتی یک مورد نمی‌بینی که تخلف رانندگی از جنس تخلفاتی که در ایران هست اتفاق بیفتد
