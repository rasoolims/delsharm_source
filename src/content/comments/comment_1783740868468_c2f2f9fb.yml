postSlug: anaam
name: بلوط خانوم
date: '2118-05-09T13:03:00Z'
message: |-
  سلام
  خیلی لذت بردم از خواندن این مقاله. نگاه جالبی بود. بخصوص در بخش شخصیت پردازی که به دلم نشست. بخش زاویه دید و آن نشان دادن به جای گفتن کمی برای من ناآشنا پیجیده بود ولی جالب. و در بخش موسیقی درونی توضیحات شما را نفهمیدم. البته قبلا یک کتاب مختصر دربارهء مسجع بودن عبارات قرآن خوانده ام.
  و این عبارت "فهم بلاکیف" یعنی درک معنا بدون واسطه؟
  باز هم ممنون از این مقاله خوب و جالب.
adminResponse:
  date: '2118-05-09T19:19:00Z'
  message: |-
    سلام
    ممنون از وقتی که گذاشتید
    بله، درک بدون واسطه بیشتر در هنر اتفاق می‌افته مثل موسیقی که ما آگاهی به نت‌ها و توازنشون نداریم ولی ازش لذت می‌بریم.
    موسیقی درونی معمولاً بر اساس تواتر صداهای تکراری، یا حتی توازن در استفاده از مفاهیم به وجود می‌آید. به قول دکتر شفیعی کدکنی «جادوی مجاورت» دارند مثل تواتر «ت» در اتل متل توتوله یا «ب» در «بادمجان بم». توی اون آیهٔ خاص مصوت اول هر کلمه‌ای در مصوت دوم کلمهٔ بعدی دیده می‌شد که این خودش باعث موسیقی ناخودآگاه می‌شه.
