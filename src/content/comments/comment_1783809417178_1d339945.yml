  message: از این منظر با شما هم‌نظر هستم که بسیاری از متفکرین علوم انسانی در اتاق
    کارشان به شکلی انتزاعی به مسأله نگاه می‌کنند البته این مشکل را مهندس‌ها هم دارند.
    چقدر پروژه‌های بی‌خود بدون بررسی واقعیت که این سال‌ها ندیده‌ام.
