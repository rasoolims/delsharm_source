message: |-
  درست می فرمایید.
  من هم کاملا مقتضیات دنیای واقع را درک می کنم و اتفاقا خود بنده در دانشگاه برای دوستان مهندس به این علت که نگاه مهندسی به مسائل نداشتم وصله ی ناجور بودم و به دنبال مدل سازی کامل جهان واقعی نبودم.
  ولی نقد من دقیقا همین دوری از فضای واقعی بود. و حس می کنم داستان بعضی از دوستان حداقل در فضای جامعه شناسی، داستان معروف اون فیله که هر کسی چیزی رو ازش برداشت میکنه که میخواد.
  و دلیل این که روی این نکته تاکید دارم اینه که بارها دیدم همین دوستان علوم انسانی دقیقا با تکیه بر همین فضای غیرقطعی تصمیم گیری ها و جریان سازی های بزرگی می کنن که جامعه رو تحت تاثیر قرار میده. مثل اینه که من مهندس یک فضاپیما بسازم که احتمال 40 درصد سقوط می کنه و به تمام مردم جهان میگم که روش سوار بشید چون من فکر می کنم درست کار میکنه.
  امیدوارم تونسته باشم به درستی منظورم رو رسونده باشم.
adminResponse:
