message: |-
  واقعا پر احساس نوشتی. قالبی خلاقانه که هر قدمش احساس رو حس می‌کردم.
  تهش ولی نفهمیدم که آیا بر خواهی گشت؟ یا هنوز نمی‌دونی؟
  پ.ن: راستی من هم دو سه ماه دیگه از وطن راهیم به غربت.
adminResponse:
  date: '2120-09-01T20:35:00Z'
  message: |-
    فقط از یک چیز مطمئن هستم: خواهم مرد! روزی. شاید امروز یا فردا یا فرداترها. وصیت‌نامه‌ام را نوشتم و به امضا و مهر رسمی رساندم.
    پ.ن.
    بر حذر باش که سر می‌شکند دیوارش
