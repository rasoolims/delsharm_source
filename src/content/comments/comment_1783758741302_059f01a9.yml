message: |-
  تو فضای مهندسی کامپیوتر از معدود دانشجویی هایی بودم که همیشه حس می کردم اشتباهی هستم. رفتار همکلاسی ها هم این رو بیشتر بهم نشون میداد
  قسمت دشوار ماجرا این بود که بارها خواستم از این حوزه بیرون بیام و برم سمت علاقه هام مثل علوم انسانی یا هنر. ولی توانایی حداقلیم تو رشته ی کامپیوتر باعث میشد نتونم بقیه و خودم رو مجاب کنم که این رشته برام جز خسران نیست. چون بالاخره یه منفعت هایی داشت.
  نهایتا خودم رو یه آدم بین رشته ای تعریف کردم تا بتونم بهتر تحمل کنم فضا رو. ارشد رو elearning کار کردم. تو محل کار هم بیشتر سمت مدیریت محصول و مارکت رفتم.
  ولی شاید هیچ وقت لذتی که از خوندن کتاب اصول کارگردانی رو تجربه کردم رو توی هفت سال تحصیل در رشته کامپیوتر تجربه نکرده باشم.
  خدا رو چه دیدیم شاید یه زمانی قراره هوش مصنوعی ای بسازم که فیلم بسازه. :)
